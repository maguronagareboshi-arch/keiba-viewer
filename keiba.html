// ---- ラップタイム折れ線（南関等・区間ラップのあるレースのみ）。実測 vs 距離平均。上＝速い(反転軸)。 ----
function lapChartSvg(raceLaps, avgLaps, dist) {
  const n = raceLaps.length;
  const useAvg = avgLaps && avgLaps.length === n ? avgLaps : null;
  const W = 700, H = 260, padL = 44, padR = 16, padT = 14, padB = 34;
  const allVals = [...raceLaps, ...(useAvg || [])].filter((v) => v != null);
  const vMin = Math.min(...allVals), vMax = Math.max(...allVals);
  const pad = (vMax - vMin) * 0.18 || 0.5;
  const yMin = vMin - pad, yMax = vMax + pad;
  const x = (i) => padL + (n <= 1 ? 0 : (i / (n - 1)) * (W - padL - padR));
  const y = (v) => padT + (1 - (v - yMin) / (yMax - yMin)) * (H - padT - padB);   // 反転: 速い(小さい)ほど上
  const line = (arr, color, dash) => {
    const pts = arr.map((v, i) => (v != null ? `${x(i)},${y(v).toFixed(1)}` : null)).filter(Boolean).join(' ');
    const dots = arr.map((v, i) => (v != null ? `<circle cx="${x(i)}" cy="${y(v).toFixed(1)}" r="3.5" fill="${color}"/>` : '')).join('');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" ${dash ? 'stroke-dasharray="5,4"' : ''}/>${dots}`;
  };
  const ticks = 5;
  const yAxis = Array.from({ length: ticks + 1 }, (_, k) => {
    const v = yMax - (k / ticks) * (yMax - yMin);
    const yy = y(v).toFixed(1);
    return `<text x="${padL - 8}" y="${+yy + 4}" text-anchor="end" font-size="11" fill="var(--sub)">${v.toFixed(1)}</text>
      <line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--border)" stroke-width="1" opacity=".35"/>`;
  }).join('');
  const xLabels = raceLaps.map((_, i) => `<text x="${x(i).toFixed(1)}" y="${H - padB + 18}" text-anchor="middle" font-size="10" fill="var(--sub)">${(i + 1) * 200}m</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:700px;height:auto;display:block">
    ${yAxis}${xLabels}
    ${useAvg ? line(useAvg, 'var(--sub)', true) : ''}
    ${line(raceLaps, 'var(--accent)', false)}
  </svg>`;
}
// 秒→"1.26.8"形式（既存time_str表記に合わせる）
function secToTimeStr(sec) {
  if (sec == null) return '';
  const m = Math.floor(sec / 60);
  const s = (sec - m * 60).toFixed(1);
  return m > 0 ? `${m}.${s.padStart(4, '0')}` : s;
}
function lapChartCard(race, results) {
  const laps = race.extra && race.extra.laps;
  if (!laps || laps.length < 2) return '';
  // クラスを混ぜると意味が無いため、同距離×同クラスの平均のみを比較対象にする（無ければ比較なし）
  const ageFallback = classGroup((race.klass || '') + (race.race_name || ''));
  const cls = classMajor(race.race_name) || (ageFallback !== '3歳以上' ? ageFallback : null);
  const key = cls ? `${race.distance_m}_${cls}` : null;
  const avg = key && state.stats && state.stats.lap_profile_class && state.stats.lap_profile_class[key];
  const chart = lapChartSvg(laps, avg && avg.laps, race.distance_m);
  // 決着時計 vs そのクラスの平均勝ち時計
  const winner = (results || []).find((r) => r.finish === 1);
  const decidingSec = laps.reduce((a, b) => a + b, 0);
  const wt = key && state.stats && state.stats.winner_time_class && state.stats.winner_time_class[key];
  let timeLine = '';
  if (winner || wt) {
    const decidingStr = (winner && winner.time_str) || secToTimeStr(decidingSec);
    const diff = wt ? decidingSec - wt.mean : null;
    const diffStr = diff != null ? `（クラス平均${diff <= -0.1 ? 'より' : diff >= 0.1 ? 'より' : 'と'}<b>${Math.abs(diff).toFixed(1)}秒${diff <= -0.1 ? '速い' : diff >= 0.1 ? '遅い' : '同程度'}</b>）` : '';
    timeLine = `<div class="note">決着時計 <b>${esc(decidingStr)}</b>　${cls ? `${esc(cls)}級平均勝ち時計 ${wt ? `<b>${secToTimeStr(wt.mean)}</b>(n${wt.n})` : 'データ不足'}` : ''}${diffStr}</div>`;
  }
  // 当日の馬場傾向（前残り/差し）。速い/遅いとの組み合わせでコメントを合成。
  const rdate = race.date || race.race_date;
  const bd = rdate && state.stats && state.stats.bias_daily && state.stats.bias_daily[rdate];
  let biasLine = '';
  if (bd && bd.label && bd.label !== '-') {
    const wt2 = key && state.stats.winner_time_class && state.stats.winner_time_class[key];
    const diff2 = wt2 ? decidingSec - wt2.mean : null;
    const speedNote = diff2 == null ? '' : diff2 <= -0.5 ? '決着は平均より速いのに' : diff2 >= 0.5 ? '決着は平均より遅いのに' : '決着は平均並みで';
    const concl = bd.label === '前有利' ? `${speedNote}前残り傾向` : bd.label === '差し有利' ? `${speedNote}差しが決まる傾向` : 'フラットな傾向';
    biasLine = `<div class="note">当日の馬場傾向: <b>${esc(bd.label)}</b>（${concl}・前残り度${bd.rel >= 0 ? '+' : ''}${bd.rel}）</div>`;
  }
  return `<div class="card">
    <h3 class="sec" style="margin-top:0">ラップタイム（区間200m毎・実測）</h3>
    ${chart}
    <div class="legend"><span style="color:var(--accent)">━</span> このレース　${avg ? `<span style="color:var(--sub)">┅</span> ${state.track}平均(距離${race.distance_m}m・${esc(cls)}級・n${avg.n})` : `<span class="sub">（${cls ? `${esc(cls)}級はデータ不足のため比較なし` : 'クラス不明のため比較なし'}）</span>`}　※縦軸は上ほど速い（時間が短い）。</div>
    ${timeLine}${biasLine}
  </div>`;
}
// レース全体の前半3F・上がり3Fをラップから算出（馬の前半3F/上り3Fと同じ定義＝1200m未満は距離-600mが前半）
function raceFrontAgari(laps, dist) {
  if (!laps || laps.length < 3) return null;
  const n = laps.length;
  const frontLen = (dist && dist < 1200) ? Math.max(1, Math.round((dist - 600) / 200)) : 3;
  if (frontLen >= n) return null;
  const front = laps.slice(0, frontLen).reduce((a, b) => a + b, 0);
  const agari = laps.slice(-3).reduce((a, b) => a + b, 0);
  return { front, agari };
}
// 前後半タイムの1セル分（日付+クラス／馬の前3F-上3F／そのレース全体のラップ由来の前3F-上3F）。両方とも3F表記で統一。日付クリックでそのレースへ。
function zenkouhanCellHtml(h) {
  const fa = raceFrontAgari(h.laps, h.dist);
  const cls = classBadge(h);
  const pl = paceLetter(h.pace);
  const f3l3 = (h.f3 != null && h.l3 != null) ? `${h.f3.toFixed(1)}-${h.l3.toFixed(1)}` : '-';
  const raceSplit = fa ? `${fa.front.toFixed(1)}-${fa.agari.toFixed(1)}` : '-';
  const diff = fa ? fa.agari - fa.front : 0;
  const color = diff <= -0.3 ? 'var(--accent)' : diff >= 0.3 ? 'var(--sub)' : 'inherit';
  const dateHtml = h.race_id
    ? `<span class="racelink" data-rid="${esc(h.race_id)}" data-rd="${esc(h.date || '')}" title="クリックでそのレースへ">${mmdd(h.date)}</span>`
    : mmdd(h.date);
  return `<div style="font-size:11px;white-space:nowrap">${dateHtml}${cls ? ` <span class="badge">${esc(cls)}</span>` : ''}</div>
    <div style="font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap" title="この馬の公式前半3F-上り3F">前3F-上3F ${f3l3}</div>
    <div style="font-size:11px;color:${color};font-variant-numeric:tabular-nums;white-space:nowrap" title="そのレース全体のラップから算出した前半3F-上り3F（レースラップ）">${pl ? `<b>${pl}</b> ` : ''}レL ${raceSplit}</div>`;
}
// 前後半タイム・直近5走（時系列）
function zenkouhanRecentCard(horses, hist) {
  const rows = (horses || []).filter((r) => r.horse_id).map((r) => {
    const hs = (hist[r.horse_id] || []).filter((h) => h.laps && h.laps.length >= 2).slice(0, 5);

  }).filter(Boolean).join('');

// 前後半タイム・コース/距離別ベスト（keibabookの「コース・距離を選択」ランキング表と同じ形）
function zenkouhanRankedCard(race, horses, hist) {
  const distSet = new Set();
  (horses || []).forEach((r) => { for (const h of (hist[r.horse_id] || [])) if (h.dist) distSet.add(h.dist); });
  if (race.distance_m) distSet.add(race.distance_m);
  const dists = [...distSet].sort((a, b) => a - b);
  const selDist = state.zenkouhanDist || race.distance_m || dists[0];
  const selSort = state.zenkouhanSort || 'time';
  const rows = (horses || []).filter((r) => r.horse_id).map((r) => {
    const withSplit = (hist[r.horse_id] || [])
      .filter((h) => h.dist === selDist && h.laps && h.laps.length >= 2)
      .map((h) => ({ h, fa: raceFrontAgari(h.laps, h.dist) })).filter((x) => x.fa);
    if (!withSplit.length) return '';
    const sorted = withSplit.sort((a, b) => selSort === 'front' ? a.fa.front - b.fa.front
      : selSort === 'agari' ? a.fa.agari - b.fa.agari : (a.h.tsec ?? 9999) - (b.h.tsec ?? 9999)).slice(0, 5);
    const cells = sorted.map(({ h }) => `<td class="l">${zenkouhanCellHtml(h)}</td>`).join('') + '<td></td>'.repeat(5 - sorted.length);
    return `<tr><td>${r.waku ?? ''}</td><td>${r.umaban ?? ''}</td><td class="l stickyname">${esc(r.horse_name || '')}</td>${cells}</tr>`;
  }).filter(Boolean).join('');
  const distOpts = dists.map((d) => `<option value="${d}"${d === selDist ? ' selected' : ''}>${d}m</option>`).join('');
  const sortOpts = [['time', 'タイム順'], ['front', 'レースラップ前半3F順'], ['agari', 'レースラップ上り3F順']]
    .map(([k, lab]) => `<option value="${k}"${k === selSort ? ' selected' : ''}>${lab}</option>`).join('');
  return `<div style="display:flex;gap:14px;flex-wrap:wrap;margin:4px 0 10px;font-size:13px">
    <label>距離を選択: <select onchange="state.zenkouhanDist=+this.value;renderZenkouhan()">${distOpts}</select></label>
    <label>並び順を選択: <select onchange="state.zenkouhanSort=this.value;renderZenkouhan()">${sortOpts}</select></label>

    <tr><th>枠</th><th>番</th><th class="stickyname">馬名</th><th>1位</th><th>2位</th><th>3位</th><th>4位</th><th>5位</th></tr>
    ${rows || '<tr><td colspan="8">その距離での実測ラップデータがありません</td></tr>'}
  </table></div>`;
}
function zenkouhanBodyHtml(race, horses, hist) {

// 前後半タイム（各馬）本体。直近5走の時系列表とコース/距離別ベスト表をタブで切替。

// ---- 出馬表サブビュー（keibabook風＋能力表＋調教） ----
// その走の「馬場逆行/恵まれ」バッジ。内外バイアス(corner4_inout・正=外伸び)×自分の4角レーン。
// 逆行=その日と逆のレーンで力を出せず過小評価かも / 恵=有利なレーンで実力以上に見えるかも。表示専用。
function tripTag(date, c4) {
  const b = (state.stats && state.stats.corner4_inout) || {};
  const bias = b[date], lane = POS4[c4];
  if (bias == null || lane == null) return '';
  const tf = bias * (lane / 2);
  const dir = bias > 0 ? '外伸び' : '内伸び';
  if (tf <= -0.06) return ` <span class="triptag tg-gyaku" data-tip="この日は${dir}傾向。${c4}を通り不利な巡り＝力を出し切れず過小評価かも（次走で見直せる）">逆</span>`;
  if (tf >= 0.06) return ` <span class="triptag tg-megumi" data-tip="この日は${dir}傾向。${c4}を通り恵まれた巡り＝実力以上に見えているかも">恵</span>`;
  return '';
}
// 逆/恵バッジの凡例（常時表示・スマホ対応）
const TRIP_LEGEND = '<span class="triptag tg-gyaku">逆</span> その日の馬場と逆のレーンで不利＝過小評価かも（次走見直し）　<span class="triptag tg-megumi">恵</span> 有利なレーンで恵まれ＝次走は割引。バッジをタップで詳細。';

// ---- 南関: 降級圏バッジ（格付ポイント制・表示専用） ----
// 検証(test_yariyarazu.py): 次半期の現クラス残留基準まで0〜200pt不足の馬は市場より約0.5〜0.8着分
// 走れていない(半期末t=-3.45/期央t=-2.27)＝時期を問わず割引が有効。下半期(7-12月)基準・馬齢3〜8歳+。
const KAKU_TH_KAMI = { A1: [2800, 3400, 4300, 5000, 5500, 5900], A2: [2000, 2200, 2500, 3200, 3700, 4100],
  B1: [1500, 1700, 1900, 2200, 2700, 3000], B2: [1100, 1200, 1400, 1700, 2000, 2200],
  B3: [700, 800, 1000, 1300, 1600, 1800], C1: [0, 500, 700, 1000, 1300, 1500],
  C2: [0, 200, 400, 700, 1000, 1200] };
const KAKU_TH_SHIMO = { A1: [3000, 3600, 4400, 5200, 5700, 5900], A2: [2200, 2300, 2600, 3400, 3900, 4100],
  B1: [1700, 1800, 2000, 2500, 2900, 3000], B2: [1200, 1300, 1500, 1800, 2100, 2200],
  B3: [800, 900, 1100, 1400, 1700, 1800], C1: [500, 600, 800, 1100, 1400, 1500],
  C2: [200, 300, 500, 800, 1100, 1200] };
function kakuBadge(e) {
  const db = state.kakuPoints && state.kakuPoints.horses;
  const v = db && db[e.horse_name];
  if (!v) return '';
  const am = /(\d+)/.exec(e.sex_age || '');
  if (!am) return '';
  // 「次の半期切替」時点の基準と比較: 1-6月なら同年下半期(馬齢同じ)/7-12月なら翌年上半期(馬齢+1)
  const mon = new Date().getMonth() + 1;
  const th = mon <= 6 ? KAKU_TH_SHIMO : KAKU_TH_KAMI;
  const ageAtSwitch = +am[1] + (mon <= 6 ? 0 : 1);
  const row = th[v.k];
  if (!row) return '';
  const gap = row[Math.min(Math.max(ageAtSwitch - 3, 0), 5)] - v.p;
  if (gap <= 0 || gap > 200) return '';
  return ` <span class="triptag tg-kaku" data-tip="降級圏: 格${v.k}・格付ポイント${v.p}（${state.kakuPoints.asof || ''}時点）。次の半期切替で${v.k}残留に必要な基準まであと${gap}pt＝このまま着内が無ければ降級見込み。検証では同条件の馬は市場評価より約0.5着分走れていない（割引材料）">降</span>`;
}

// バッジをタップ→説明ポップアップ（title はスマホで出ないため）

// ---- 馬装具（ブリンカー/チーク/シャドーロール）＋初ブリンカー ----
const EQUIP_MAP = { 'ブリンカー': 'ブ', 'チークＰ': 'チ', 'シャドーロール': 'シ' };
const EQUIP_NAME = { 'ブ': 'ブリンカー', 'チ': 'チークピーシズ', 'シ': 'シャドーロール' };
// 馬装具テキスト「(2)(9)ブリンカー着用 (2)シャドーロール着用」→ {umaban:[コード]}
function parseEquip(soubi) {
  const out = {};
  if (!soubi) return out;
  const re = /((?:\(\d+\))+)(ブリンカー|チークＰ|シャドーロール)/g;
  let m;
  while ((m = re.exec(soubi))) {
    const code = EQUIP_MAP[m[2]];
    let nm; const nre = /\((\d+)\)/g;
    while ((nm = nre.exec(m[1]))) (out[+nm[1]] = out[+nm[1]] || []).push(code);
  }
  return out;
}
const equipOfRun = (soubi, umaban) => (parseEquip(soubi)[umaban]) || [];
// runs(新しい順)に初ブリンカーを付与。以前の走があり、それまでブリンカー無し→初。
function markFirstBlinker(runs, getEquip) {
  let seen = false;
  for (let i = runs.length - 1; i >= 0; i--) {   // 古い→新しい
    const hasB = getEquip(runs[i]).includes('ブ');
    if (hasB && !seen && i < runs.length - 1) runs[i]._binkFirst = true;
    if (hasB) seen = true;
  }
}
// 装備バッジHTML。binkFirst=true でブリンカーを「初ブ」強調に。
function equipBadges(codes, binkFirst) {
  if (!codes || !codes.length) return '';
  return codes.map((c) => {
    if (c === 'ブ' && binkFirst) return ` <span class="eqp eq-first" data-tip="初ブリンカー＝この馬が初めてブリンカーを着用。一変（急変）に注意">初ブ</span>`;
    const cls = c === 'ブ' ? 'eq-bink' : c === 'チ' ? 'eq-cheek' : 'eq-shadow';
    return ` <span class="eqp ${cls}" data-tip="${EQUIP_NAME[c]}着用">${c}</span>`;
  }).join('');
}
const EQUIP_LEGEND = '装備：<span class="eqp eq-bink">ブ</span>ブリンカー <span class="eqp eq-cheek">チ</span>チーク <span class="eqp eq-shadow">シ</span>シャドーロール　<span class="eqp eq-first">初ブ</span>=ブリンカー初着用（一変注意・データ内で初）。タップで詳細。';

// 当日レースのブリンカー（出馬表のブリンカ列＝entry.marks.blinker='B'）。過去走に無ければ初ブリンカー。
function todayBlinkerBadge(e, history) {
  if (!(e.marks && e.marks.blinker === 'B')) return '';
  const woreBefore = (history[e.horse_id] || []).some((r) => (r.equip || []).includes('ブ'));

}

// 能力表の過去走（他場・中央含む）の1行表示
function nouRunHtml(r) {
  const fin = r.fin != null ? `${r.fin}着` : (r.fin_note || '?');
  return `${mmdd(r.date)} <b>${esc(r.track || '?')}</b>${esc(r.surface || '')}${r.dist || ''} ${fin}` +
    (r.f3 != null ? ` テン${r.f3.toFixed(1)}` : '') + (r.l3 != null ? ` 上${r.l3.toFixed(1)}` : '');
}
// 直近走（能力表・最新順）
function nouRuns(nouByUma, umaban, n) {
  const d = nouByUma[umaban];
  const runs = (d && d.data && d.data.runs) || [];
  return runs.slice(-n).reverse();
}

// 能検成績の1行表示（新馬/未勝利の出馬表・予想に埋め込む）。無ければ空。
function nokenLineHtml(hid) {
  const n = (state.nokenByHorse || {})[hid];
  if (!n) return '';
  const okCls = n.ok === '合格' ? 'nk-ok' : n.ok === '不合格' ? 'nk-ng' : '';
  return `<span class="badge nk-badge">能検</span> ${mmdd(n.date)} ${n.dist || ''}m <b>${esc(n.time)}</b>`
    + `（テン${esc(n.ten)}/上${esc(n.last3f)}）<span class="${okCls}">${esc(n.ok)}</span>`
    + `${n.comment ? ` ${esc(n.comment)}` : ''}`;
}

// 厩舎の話に添える「前走」参考表示: 着順(距離・日付・クラス)。コメントの文脈を読むための最小限の材料。
function prevRunRefHtml(run) {
  if (!run) return '<span style="font-size:11px;color:var(--sub)">前走なし（初出走）</span>';
  const fin = run.fin != null ? `${run.fin}着` : esc(run.fin_note || '結果不明');
  const cls = classBadge(run);
  const parts = [run.dist ? `${run.dist}m` : '', mmdd(run.date), cls].filter(Boolean).join('・');
  return `<span style="font-size:11px;color:var(--sub)">前走 ${fin}${parts ? `（${parts}）` : ''}</span>`;
}
// 厩舎の話（今回のレースに向けた調教師コメント。競馬ブック danwa）
// 各コメントの直前に「前走の着順(距離・日・クラス)」を添える。過去コメント展開でも同じ理論を使えるよう、
// 走歴をstate.danwaHistoryCacheへ退避しておく（toggleDanwaPastが再フェッチ無しで参照する）。
function danwaCard(entries, danwaByUma, history) {
  if (!danwaByUma || !Object.keys(danwaByUma).length) return '';
  state.danwaHistoryCache = state.danwaHistoryCache || {};
  const rows = entries.filter((e) => danwaByUma[e.umaban]).map((e) => {
    const d = danwaByUma[e.umaban];
    const hRuns = (history && history[e.horse_id]) || [];
    if (e.horse_id) {
      state.danwaHistoryCache[e.horse_id] = hRuns.map((r) => ({
        race_id: r.race_id, date: r.date, dist: r.dist, fin: r.fin, fin_note: r.fin_note,
        cls: r.cls, race_name: r.race_name,
      }));
    }
    const nameHtml = `<a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}>${esc(e.horse_name)}</a>`;
    return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
      <b>${e.umaban}</b> ${nameHtml}${d.headline ? ` <span class="badge">${esc(d.headline)}</span>` : ''}
      <button class="foldbtn danwa-expand" style="font-size:11px;padding:1px 8px;margin-left:6px" data-hid="${esc(e.horse_id || '')}" data-hname="${esc(e.horse_name || '')}" data-cur-rid="${esc(d.race_id || '')}">▼過去のコメント</button>
      <div style="margin-top:2px">${prevRunRefHtml(hRuns[0])}</div>
      <div style="font-size:13px;color:var(--sub);margin-top:2px">${d.trainer ? `<b>${esc(d.trainer)}</b>――` : ''}${esc(d.comment || d.raw || '')}</div>
      <div class="danwa-past" hidden></div>
    </div>`;
  }).join('');
  if (!rows) return '';
  return `<div class="card"><h3 class="sec" style="margin-top:0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
    <span>厩舎の話</span>
    <button type="button" class="foldbtn danwa-expand-all" style="font-size:11px;padding:3px 10px">▼全馬の過去コメントを開く</button>
  </h3>${rows}</div>`;
}
// 過去コメントdivへ実HTMLを流し込む（個別クリック・一括表示の両方が共有する描画処理）
function renderDanwaPastInto(wrap, hid, rawRows, curRid) {
  const past = rawRows.filter((r) => r.race_id !== curRid).slice(0, 8);
  if (!past.length) { wrap.innerHTML = '<div style="font-size:12px;color:var(--sub)">過去のコメントはありません</div>'; return; }
  // このコメントが向けられたレースの「前走」も、今走コメントと同じ理論で添える。
  // 既に読み込み済みの走歴キャッシュ(danwaCardが退避したもの)から引くので再フェッチしない。
  const cachedRuns = (hid && state.danwaHistoryCache && state.danwaHistoryCache[hid]) || [];
  wrap.innerHTML = past.map((r) => {
    const y = r.race_id.slice(0, 4), mm = r.race_id.slice(12, 14), dd = r.race_id.slice(14, 16);
    const date = `${y}-${mm}-${dd}`;
    const idx = cachedRuns.findIndex((x) => x.race_id === r.race_id);
    const prevLine = idx >= 0 ? prevRunRefHtml(cachedRuns[idx + 1]) : '';
    return `<div style="font-size:12px;padding:4px 0;border-top:1px dashed var(--border)">
      <span class="racelink" data-rid="${esc(r.race_id)}" data-rd="${esc(date)}" title="クリックでそのレースへ">${mmdd(date)}</span>
      ${r.headline ? ` <span class="badge">${esc(r.headline)}</span>` : ''}
      ${r.trainer ? ` <b>${esc(r.trainer)}</b>――` : ' '}${esc(r.comment || r.raw || '')}
      ${prevLine ? `<br>${prevLine}` : ''}
    </div>`;
  }).join('');
}
// 1頭分の過去コメントをSupabaseから取得（個別クリック・一括表示の両方が使う共通フェッチ）
async function fetchDanwaPast(hid, hname, curRid) {
  const filt = hid ? `horse_id=eq.${encodeURIComponent(hid)}` : `horse_name=eq.${encodeURIComponent(hname)}`;
  return sbGet(`chihou_danwa?${filt}&select=race_id,headline,trainer,comment,raw&order=race_id.desc&limit=8`);
}
// 1頭分の過去コメントを取得して描画（無ければフェッチを開始）。dataset.loading/loadedの2状態で、
// 個別クリックと一括表示が同じ馬を同時に触っても「フェッチ二重発行」「表示状態の後勝ち上書き」が
// 起きないようにする（loadingの間は誰も新規フェッチせず、結果は表示状態を変えずに流し込むだけ）。
async function ensureDanwaPastLoaded(btn, wrap) {
  if (wrap.dataset.loaded || wrap.dataset.loading) return;
  wrap.dataset.loading = '1';
  wrap.innerHTML = '<div style="font-size:12px;color:var(--sub)">読み込み中…</div>';
  try {
    const hid = btn.dataset.hid, hname = btn.dataset.hname, curRid = btn.dataset.curRid;
    const rows = await fetchDanwaPast(hid, hname, curRid);
    renderDanwaPastInto(wrap, hid, rows, curRid);
  } catch (e) {
    wrap.innerHTML = '<div style="font-size:12px;color:var(--sub)">読み込み失敗</div>';
  } finally {
    wrap.dataset.loaded = '1';
    delete wrap.dataset.loading;
  }
}
// 厩舎の話「▼過去のコメント」展開（クリック時に遅延ロード・horse_id優先/無ければhorse_name）
async function toggleDanwaPast(btn) {
  const wrap = btn.parentElement.querySelector('.danwa-past');
  if (!wrap) return;
  if (!wrap.hidden) { wrap.hidden = true; btn.textContent = '▼過去のコメント'; return; }
  wrap.hidden = false;
  btn.textContent = '▲閉じる';
  await ensureDanwaPastLoaded(btn, wrap);
}
// 厩舎の話タブ上部の「全馬の過去コメントを開く/閉じる」。表示状態(hidden/ボタン文言)は先に確定させ、
// フェッチは後から中身を流し込むだけにする。こうしておけば、フェッチ中にユーザーが個別ボタンで
// 手動開閉しても、後から届くフェッチ結果がその操作を勝手に上書きすることがない。
async function toggleDanwaPastAll(btn) {
  const card = btn.closest('.card');
  if (!card) return;
  const items = [...card.querySelectorAll('.danwa-expand')].map((b) => ({
    btn: b, wrap: b.parentElement.querySelector('.danwa-past'),
  })).filter((x) => x.wrap);
  if (!items.length) return;
  const collapsedExists = items.some((x) => x.wrap.hidden);
  if (!collapsedExists) {
    for (const { btn: b, wrap } of items) { wrap.hidden = true; b.textContent = '▼過去のコメント'; }
    btn.textContent = '▼全馬の過去コメントを開く';
    return;
  }
  btn.disabled = true;
  btn.textContent = '読み込み中…';
  for (const { btn: b, wrap } of items) { wrap.hidden = false; b.textContent = '▲閉じる'; }
  // 個別クリックと同じ1頭ずつのクエリをPromise.allで並列実行するだけなので、1頭ずつ開いた場合と
  // 結果が完全に一致する（1クエリへまとめると「馬ごとに最新8件」の保証が崩れるため、あえて分けている）。
  await Promise.all(items.map(({ btn: b, wrap }) => ensureDanwaPastLoaded(b, wrap)));
  btn.disabled = false;
  btn.textContent = '▲全馬の過去コメントを閉じる';
}

// その1走の走破タイムが「その日の馬場を加味した基準タイム」と比べ何秒速い/遅いか。
// 基準 = 距離×馬場×クラスの平均タイム − 当日馬場差(z)×標準偏差（runShisuの補正と同じ向き）。
// マイナス＝基準より速い。
function baseDiffSec(run) {
  const e = baseEntry(run.dist, run.going, run.cls);
  if (!e || !e.time || !e.time.std || run.tsec == null) return null;
  const da = ((state.stats && state.stats.shisu_day_adj) || {})[run.date] || 0;
  return run.tsec - (e.time.mean - da * e.time.std);
}
// 新聞型表示の過去走1マス（着順を大きく・タイムは基準比つき・通過/脚質/騎手/短評/映像まで1箱に）
function npRunBox(run, label) {
  if (!run) return '<div class="np-run np-run-empty">―</div>';
  const finCls = run.fin === 1 ? 'fin1' : run.fin === 2 ? 'fin2' : run.fin === 3 ? 'fin3' : '';
  const diff = baseDiffSec(run);
  const s = runShisu(run);
  const going = run.going ? esc(String(run.going).slice(0, 1)) : '';
  const cb = classBadge(run);
  // 条件名は「サラ」やカンマを落として紙面風に圧縮（例: サラ３歳以上,C4-8 → ３歳以上C4-8）
  const rn = (run.race_name || '').replace(/\s+/g, '').replace(/^サラ/, '').replace(/,/g, '');
  const rnShort = rn.length > 10 ? rn.slice(0, 10) + '…' : rn;
  const ridTrack = RACEID_TRACK[String(run.race_id || '').slice(6, 8)];
  const diffHtml = diff == null ? '' :
    `<span class="${diff <= -0.05 ? 'np-fast' : diff >= 0.05 ? 'np-slow' : ''}" title="その日の馬場・クラス・距離を加味した基準タイムとの差（マイナス＝基準より速い）">基準${diff >= 0 ? '+' : ''}${diff.toFixed(1)}</span>`;
  return `<div class="np-run">
    <div class="np-run-head"><span class="racelink" data-rid="${esc(run.race_id || '')}" data-rd="${esc(run.date || '')}" title="クリックでそのレースへ">${esc(label)} ${mmdd(run.date)}</span><span>${ridTrack && ridTrack !== state.track ? esc(ridTrack) : ''}${run.dist ?? '?'}m${going ? '・' + going : ''}</span></div>
    <div class="np-race-name" title="${esc(rn)}">${rnShort ? `<b>${esc(rnShort)}</b>` : (cb ? `<b>${esc(cb)}</b>` : '')}</div>
    <div class="np-run-sub">${cb && rnShort && !rn.includes(cb) ? `<span class="badge">${esc(cb)}</span>` : ''}${paceLetter(run.pace) ? `<span class="badge">${paceLetter(run.pace)}ペース</span>` : ''}${run.pop != null ? `${run.pop}人気` : ''}</div>
    <div class="np-fin ${finCls}">${run.fin != null ? `${run.fin}<small>着</small>` : '<small>除/取</small>'}</div>
    <div class="np-time">${run.time ? `<b>${esc(run.time)}</b> ` : ''}${diffHtml}</div>
    <div>${run.f3 != null ? `テン${run.f3.toFixed(1)}` : ''} ${run.l3 != null ? `上${run.l3.toFixed(1)}` : ''}${s != null ? ` <span class="np-si" title="この1走の能力指数（50が平均。馬場差・斤量・ペース補正込み）">指${s.toFixed(1)}</span>` : ''}</div>
    <div>${run.passing ? `通過${esc(run.passing)}` : ''}${run.kyaku ? ` <span class="kyaku">${run.kyaku}</span>` : ''}${tripTag(run.date, run.c4)}${equipBadges(run.equip, run._binkFirst)}</div>
    <div class="np-jk">${esc(run.jockey || '')}${run.kin != null ? run.kin : ''}${run.weight ? ` ${run.weight}kg` : ''}</div>
    ${run.comment ? `<div class="np-cmt">${esc(run.comment)}</div>` : ''}
    ${ridTrack && run.race_id ? `<button type="button" class="np-eizo" data-rid="${esc(run.race_id)}" data-rd="${esc(run.date || '')}">▶ 映像</button>` : ''}
  </div>`;
}
// 距離別の着度数 [1着,2着,3着,着外]（新聞型の馬柱に表示。除外/取消は数えない）
function distRecords(runs) {
  const by = new Map();
  for (const r of runs) {
    if (!r.dist || r.fin == null) continue;
    const rec = by.get(r.dist) || [0, 0, 0, 0];
    rec[r.fin === 1 ? 0 : r.fin === 2 ? 1 : r.fin === 3 ? 2 : 3]++;
    by.set(r.dist, rec);
  }
  return by;
}
function distRecordHtml(runs, todayDist) {
  const by = distRecords(runs);
  if (!by.size && !todayDist) return '';
  const fmt = (rec) => rec.join('-');
  const lines = [];
  if (todayDist) {
    const rec = by.get(todayDist);
    lines.push(`<div class="np-dist np-dist-today" title="今回の距離での着度数（1着-2着-3着-着外）">${todayDist}m ${rec ? fmt(rec) : '初'}</div>`);
  }
  const others = [...by.entries()].filter(([d]) => d !== todayDist)
    .sort((a, b) => b[1].reduce((s, v) => s + v, 0) - a[1].reduce((s, v) => s + v, 0))
    .slice(0, 4);
  for (const [d, rec] of others) lines.push(`<div class="np-dist">${d}m ${fmt(rec)}</div>`);
  return lines.join('');
}
// 出馬表の表示モード（通常⇔新聞）。ブラウザに記憶して次回も同じ表示で開く。
function syutubaMode() {
  if (!state.syutubaMode) {
    try { state.syutubaMode = localStorage.getItem('kv_syutuba_mode') || 'normal'; }
    catch (e) { state.syutubaMode = 'normal'; }
  }
  return state.syutubaMode;
}
function setSyutubaMode(m) {
  state.syutubaMode = m;
  try { localStorage.setItem('kv_syutuba_mode', m); } catch (e) { /* プライベートモード等は無視 */ }
  renderRaceView();
}
function syutubaModeBar() {
  const m = syutubaMode();
  return `<div class="np-toggle"><span class="np-meta">表示:</span>
    <button class="${m === 'normal' ? 'active' : ''}" onclick="setSyutubaMode('normal')">通常</button>
    <button class="${m === 'np' ? 'active' : ''}" onclick="setSyutubaMode('np')">新聞</button></div>`;
}

function syutubaHtml(raceMeta, entries, cyokyo, history, nouryoku, danwaByUma) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません（day取得時に --what syutuba を含めてください）</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const nouByUma = {};
  for (const n of (nouryoku || [])) nouByUma[n.umaban] = n;

  // テン偏差=直近5走の最良値 / 指数=直近5走の平均（バックテストで平均の方が的中率が高い）
  const bestOf = (hid, fn) => {
    let best = null;
    for (const r of (history[hid] || []).slice(0, 5)) {
      const v = fn(r);
      if (v != null && (best == null || v > best)) best = v;
    }
    return best;
  };
  const meanOf = (hid, fn) => {
    const vals = (history[hid] || []).slice(0, 5).map(fn).filter((v) => v != null);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  const shisuOf = (hid) => meanOf(hid, runShisu);
  const hensachiOf = (hid) => bestOf(hid, (r) => devValue(r.f3, baseEntry(r.dist, r.going, r.cls), 'first3f'));

  const shisus = entries.map((e) => shisuOf(e.horse_id)).filter((v) => v != null).sort((a, b) => b - a);
  const top3S = shisus.slice(0, 3);
  const hensachis = entries.map((e) => hensachiOf(e.horse_id)).filter((v) => v != null).sort((a, b) => b - a);
  const topH = hensachis[0];

  // 調教偏差値: 直近追切の坂路3F最速（無ければ本馬場「真の3F」）を全期間分布で換算
  const cyoZOf = (umaban) => cyoZFromWorks(cyoByUma[umaban]);
  const cyoZs = entries.map((e) => cyoZOf(e.umaban)).filter((v) => v != null).sort((a, b) => b - a);
  const topC = cyoZs[0];

  // AI予想印（学習モデル順・出馬表にも表示）
  const aiScores = new Map(entries.map((e) => [e.umaban, modelScore(e, history, raceMeta, cyoZOf(e.umaban))]));
  const aiRanked = [...aiScores.entries()].filter(([, v]) => v != null).sort((a, b) => b[1] - a[1]);
  const aiMark = new Map();
  aiRanked.forEach(([um], i) => { if (i < MARKS.length) aiMark.set(um, MARKS[i]); });
  const aiTopUma = aiRanked.length ? aiRanked[0][0] : null;
  const aiConf = aiConfidence(aiRanked.map(([, v]) => v));

  // ---- 新聞型表示: 1馬=1行、近5走を紙面風のマス目（着順大・基準タイム比・通過・短評・映像）で並べる ----
  if (syutubaMode() === 'np') {
    const todayDist = raceMeta.distance_m || raceMeta.dist || null;
    const npRows = entries.map((e) => {
      const allRuns = (history[e.horse_id] || []).filter((r) => r.race_id !== raceMeta.race_id);
      const runs = allRuns.slice(0, 5);
      const s = shisuOf(e.horse_id);
      const runCells = runs.length
        ? [0, 1, 2, 3, 4].map((i) => npRunBox(runs[i], ['前走', '2走前', '3走前', '4走前', '5走前'][i])).join('')
        : `<div class="np-run np-fallback">${[nokenLineHtml(e.horse_id),
            nouRuns(nouByUma, e.umaban, 3).map((r) => nouRunHtml(r) + ' <span class="badge">能力表</span>').join('<br>')]
            .filter(Boolean).join('<br>') || '出走歴なし（初出走）'}</div>`;
      return `<div class="np-row">
        <div class="np-horse">
          <div><span class="waku w${e.waku || 1}">${e.waku ?? ''}</span> <b>${e.umaban ?? ''}</b> <span class="np-mark">${aiMark.get(e.umaban) || ''}</span></div>
          <div><a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}><b>${esc(e.horse_name)}</b></a>${todayBlinkerBadge(e, history)}${kakuBadge(e)}</div>
          <div class="np-meta">${esc(e.sex_age)}${e.genryo ? ` ${esc(e.genryo)}` : ''}　${esc(e.jockey)}${e.kinryo ?? ''}</div>
          <div class="np-meta">${esc(e.trainer)}</div>
          <div class="np-meta">馬体重<span data-live-weight="${e.umaban}">${e.body_weight ?? '-'}${e.weight_diff != null ? `(${fmtDiff(e.weight_diff)})` : ''}</span>　単勝<span data-live-odds="${e.umaban}">${e.win_odds ?? '-'}${e.pop != null ? `(${e.pop})` : ''}</span></div>
          <div class="np-meta">能力点 <b class="${s != null && top3S.includes(s) ? 'best' : ''}">${s != null ? s.toFixed(1) : '-'}</b></div>
          ${distRecordHtml(allRuns, todayDist)}
        </div>
        ${runCells}
      </div>`;
    }).join('');
    return raceHeaderHtml(raceMeta) + syutubaModeBar() + `
    <div class="card"><div style="text-align:right;margin-bottom:4px"><span id="oddsUpdated" class="badge"></span></div>
      <div class="np-wrap"><div class="np-grid np-grid5">${npRows}</div></div>
      <div class="legend">基準±秒＝距離×馬場×クラスの標準タイムに当日の馬場差を加味した基準との差（マイナス＝基準より速い走破時計）。指＝その1走の能力指数（50が平均。馬場差・斤量・ペース補正込み）。馬柱の距離別成績は 1着-2着-3着-着外（枠つき＝今回の距離）。日付タップでそのレースへ、▶映像でレース映像へ。<br>近走の${TRIP_LEGEND}<br>${EQUIP_LEGEND}</div></div>`;
  }

  const rows = entries.map((e) => {
    const cyo = cyoByUma[e.umaban];
    const works = ((cyo && cyo.works) || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      <td class="num" data-live-weight="${e.umaban}">${e.body_weight ?? ''}${e.weight_diff != null ? `(${fmtDiff(e.weight_diff)})` : ''}</td>
      <td class="num" data-live-odds="${e.umaban}">${e.win_odds ?? ''}${e.pop != null ? `(${e.pop})` : ''}</td>

      <td class="small fold"><div class="kv">${(() => {
        const nk = nokenLineHtml(e.horse_id);
        const nkEntry = (state.nokenByHorse || {})[e.horse_id];
        const past = runs.map(pastRunHtml).join('<br>')
          || nouRuns(nouByUma, e.umaban, 3)
              .filter((r) => !nkEntry || r.date !== nkEntry.date)   // 能検と同一走の能力表エントリは重複表示しない
              .map((r) => nouRunHtml(r) + ' <span class="badge">能力表</span>').join('<br>');
        return [nk, past].filter(Boolean).join('<br>') || '-';
      })()}</div></td>
      <td class="small fold"><div class="kv">${(() => {
        // 今回に向けた追切のみ（前走日以降）。新馬など前走が無い馬は全件が今回分。

        return `${head}${latest}<details class="cyo-more"><summary>他${curWorks.length - 1}件</summary>${rest}</details>`;
      })()}</div></td>

  }).join('');

  return raceHeaderHtml(raceMeta) + syutubaModeBar() + `
  <div class="card"><div style="text-align:right;margin-bottom:4px"><span id="oddsUpdated" class="badge"></span></div><div class="tablewrap">

  <div class="legend"><span class="sw b"></span> 能力上位3頭（走破50%＋前半25%＋上がり25%、直近5走平均）　<span class="sw f"></span> 前半の速さトップ（直近5走最良）　<span class="sw a"></span> 調教トップ（50が平均）<br>◎の下の表示は順位差の目安です。的中や利益を保証するものではなく、購入判断には使いません。<br>近走の${TRIP_LEGEND}<br>${EQUIP_LEGEND}</div></div>`;
}

// 単勝期待値セルの表示状態。静的描画とライブ更新(applyHorseEvs)が必ずこの1関数を共有する。
// 閾値は v5 ShadowPolicy.ev_thresholds.win と同値。較正済み下限(win_probability.low)にのみ適用し、
// 較正区間を持たない旧v2ソフトマックス由来の参考値には絶対に当てない（購入候補サインの密輸を防ぐ）。
const EV_CANDIDATE = 1.08;   // 買い目候補ライン（v3の厳しめ計算のみ）
const EV_BREAKEVEN = 1.00;   // 損益分岐
// null/空文字は Number() で 0 になり有限扱いされてしまうため、必ずこの判定を通す。
const evFinite = (v) => v != null && v !== '' && Number.isFinite(+v);
// 馬ごとの確率ソース。レース単位のhasV3で二分するとlowだけ欠けた馬を取りこぼす。
const evModeOf = (r) => (evFinite(r.winPLow) ? 'v3' : (evFinite(r.winP) ? 'reference' : 'none'));
function evCellState(mode, low, mid, odds, isToday) {
  if (mode === 'none' || !evFinite(mid)) return { cls: 'ev-unknown', main: '-', note: '実績なし' };
  if (!(odds > 0)) return { cls: 'ev-unknown', main: '-', note: 'オッズ待ち' };
  if (mode === 'v3' && evFinite(low)) {
    const conservative = +low * odds;
    const cls = conservative >= EV_CANDIDATE ? 'ev-positive' : (conservative >= EV_BREAKEVEN ? 'ev-watch' : 'ev-negative');
    return { cls, main: conservative.toFixed(2), note: `中心 ${(+mid * odds).toFixed(2)}` };
  }
  // 参考モード＝旧v2の中心値のみ。色による買える/買えないの含意は与えない。
  // 発走後は確定に近いオッズが入るため、後知恵の的中演出にならないよう数値を出さない。
  if (!isToday) return { cls: 'ev-unknown', main: '-', note: '発走前のみ' };
  return { cls: 'ev-reference', main: (+mid * odds).toFixed(2), note: '参考' };
}

function yosouHtml(raceMeta, entries, cyokyo, history, nouryoku, danwaByUma) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const nouByUma = {};
  for (const n of (nouryoku || [])) nouByUma[n.umaban] = n;
  const v3Race = state.v3Predictions && state.v3Predictions.races
    ? state.v3Predictions.races[raceMeta.race_id || state.raceId] : null;
  const receiptRunners = (v3Race && v3Race.runners || []);
  const v3ByUma = new Map(receiptRunners.map((r) => [+r.umaban, r]));
  const v5Shadow = v3Race && v3Race.v5_shadow;
  const v5ByUma = new Map((v5Shadow && v5Shadow.runner_signals || []).map((r) => [+r.runner_number, r]));

  const entryNumbers = new Set(entries.map((e) => +e.umaban));
  const receiptContainsScratch = entries.some((entry) =>
    v3ByUma.has(+entry.umaban) && ['取消', '除外'].includes(String(entry.status || ''))
  );
  const receiptMismatch = v3ByUma.size > 0 && (
    receiptRunners.length !== v3ByUma.size
    || [...v3ByUma.keys()].some((number) => !entryNumbers.has(number))
    || receiptContainsScratch
  );
  if (receiptMismatch) {
    return raceHeaderHtml(raceMeta)
      + '<div class="note"><b>予想データを更新中です</b> — 出馬表とAIの有効出走馬が一致しないため、不完全な確率を表示していません。</div>';
  }

  // A signed prediction receipt defines the active choice set at prediction
  // time. This also protects older Supabase schemas that do not yet expose a
  // scratch-status column: a scratched entry cannot force the whole race back
  // to the legacy model merely because it correctly has no v3 probability.
  const forecastEntries = v3ByUma.size
    ? entries.filter((e) => v3ByUma.has(+e.umaban))
    : entries.filter((e) => !['取消', '除外'].includes(String(e.status || '')));

  const hs = forecastEntries.map((e) => ({
    e,
    v3: v3ByUma.get(+e.umaban) || null,
    v5: v5ByUma.get(+e.umaban) || null,
    ai: modelScore(e, history, raceMeta, cyoZFromWorks(cyoByUma[e.umaban])),
    comp: metricOf(history, e.horse_id, runShisu, 'mean'),
    si: metricOf(history, e.horse_id, runSI, 'mean'),
    ten: metricOf(history, e.horse_id, (r) => devValue(r.f3, baseEntry(r.dist, r.going, r.cls), 'first3f'), 'max'),
    cz: cyoZFromWorks(cyoByUma[e.umaban]),
    kyaku: (() => {
      const ks = (history[e.horse_id] || []).slice(0, 5).map((r) => r.kyaku).filter(Boolean);
      if (!ks.length) return null;
      const cnt = {};
      for (const k of ks) cnt[k] = (cnt[k] || 0) + 1;
      return Object.entries(cnt).sort((a, b) => b[1] - a[1])[0][0];
    })(),
  }));

  // 総合スコア = レース内z値の加重和（composite45% + SI30% + 調教15% + テン10%、欠測は再配分）
  const zc = zscoresJs(hs.map((r) => r.comp));
  const zs = zscoresJs(hs.map((r) => r.si));
  const zt = zscoresJs(hs.map((r) => r.ten));
  const zy = zscoresJs(hs.map((r) => r.cz));
  hs.forEach((r, i) => {
    const parts = [[zc[i], 0.45], [zs[i], 0.30], [zy[i], 0.15], [zt[i], 0.10]].filter(([v]) => v != null);
    r.score = parts.length ? parts.reduce((s, [v, w]) => s + v * w, 0) / parts.reduce((s, [, w]) => s + w, 0) : null;
  });
  const rankOf = (key) => {
    const sorted = hs.filter((r) => r[key] != null).map((r) => r[key]).sort((a, b) => b - a);
    return (v) => (v == null ? null : sorted.indexOf(v) + 1);
  };
  const rk = { comp: rankOf('comp'), si: rankOf('si'), ten: rankOf('ten'), cz: rankOf('cz') };
  // AI予想印: 学習モデルのスコア順（モデル未取得や実績なしは総合スコアで代替）
  const hasV3 = hs.length > 0 && hs.every((r) => r.v3 && Number.isFinite(r.v3.win_probability_raw));
  const marketOverlayApproved = !!(v3Race && v3Race.market_overlay
    && v3Race.market_overlay.status === 'shadow');
  const formSignalsAvailable = !!(v3Race && v3Race.market_overlay
    && v3Race.market_overlay.form_reversal_rules
    && v3Race.market_overlay.form_reversal_rules.status === 'outcome_pattern_validated_shadow');
  const hasMarketOverlay = hasV3 && marketOverlayApproved
    && hs.every((r) => Number.isFinite(Number(r.v3.pattern_probability)));
  // Ability rank is immutable with respect to current popularity/odds.  The
  // market overlay belongs only to value flags and the separate ticket tab.
  hs.forEach((r) => {
    r.v3Score = hasV3 ? r.v3.win_probability_raw : null;
  });
  const markKey = hasV3 ? 'v3Score' : (hs.some((r) => r.ai != null) ? 'ai' : 'score');
  const ranked = hs.filter((r) => r[markKey] != null).sort((a, b) => b[markKey] - a[markKey]);
  ranked.forEach((r, i) => { r.mark = MARKS[i] || ''; });
  const aiVals = hs.map((r) => r.ai).filter((v) => v != null).sort((a, b) => b - a);
  const zAi = zscoresJs(hs.map((r) => r.ai));   // 表示用に偏差値化
  hs.forEach((r, i) => { r.aiDev = hasV3 ? r.v3.win_probability_raw * 100 : (zAi[i] != null ? 50 + zAi[i] * 10 : null); });
  // 勝率＝レース内で標準化したAIスコア(zAi)のソフトマックス（T=0.75で較正：◎平均勝率≒実測39.8%・スケール不変）
  const zMax = Math.max(...zAi.filter((v) => v != null), 0);
  const exps = zAi.map((z) => (z != null ? Math.exp((z - zMax) / 0.75) : 0));
  const expSum = exps.reduce((s, v) => s + v, 0) || 1;
  const v3MidMass = hasV3 ? hs.reduce((sum, r) => {
    const value = Number(r.v3 && r.v3.win_probability && r.v3.win_probability.mid);
    return sum + (Number.isFinite(value) && value >= 0 ? value : 0);
  }, 0) || 1 : 1;
  hs.forEach((r, i) => {
    // hasV3 は win_probability_raw しか検査しないため、win_probability を欠くレシートで
    // 予想タブ全体が落ちないよう必ずガード越しに読む。
    const wp = (r.v3 && r.v3.win_probability) || {};
    r.winP = hasV3 ? Number(wp.mid) / v3MidMass
      : (zAi[i] != null ? exps[i] / expSum : null);
    r.top3P = hasV3 ? Number(r.v3.top3_probability) : null;
    const coreLowRaw = hasV3 ? Number(wp.low) : null;
    // Never increase a conservative bound merely because an old receipt's
    // independently calibrated midpoints did not sum to one.
    const coreLow = Number.isFinite(coreLowRaw) ? Math.min(coreLowRaw, r.winP) : null;
    r.winPLow = Number.isFinite(coreLow) ? coreLow : null;
    // 期待値の算出はセル描画時に evCellState が現在オッズで行う（ライブ更新と式を1本化するため
    // ここでは持たない）。
  });
  const siTop = hs.filter((r) => r.si != null).sort((a, b) => b.si - a.si)[0];
  for (const r of hs) r.myomi = siTop && r === siTop && r.e.pop != null && r.e.pop >= 4;

  // 旧v2の影運用モニター。利益保証や購入指示には使わず、v3の不変
  // 予想レシート＋発売時点オッズ＋公式払戻が揃うまで候補表示に限定する。
  const evTop = !hasV3 && markKey === 'ai' && ranked.length ? ranked[0] : null;
  state.evWatch = (evTop && evTop.winP != null)
    ? { rid: raceMeta.race_id || state.raceId, um: evTop.e.umaban, name: evTop.e.horse_name, p: evTop.winP }
    : null;

  // 直近の馬場傾向（過去3開催日）
  const bd = (state.stats && state.stats.bias_daily) || {};
  const recentBias = Object.keys(bd).sort().reverse().slice(0, 3)
    .map((d) => `${d.slice(5)}: <b>${bd[d].label}</b>(${bd[d].rel > 0 ? '+' : ''}${bd[d].rel})`).join('　');

  const disp = hs.slice().sort((a, b) => (b[markKey] ?? -99) - (a[markKey] ?? -99));
  for (const r of disp) {
    const e = r.e;
    r.konkyo = [
      r.comp != null ? `指数${rk.comp(r.comp)}位` : null,
      r.si != null ? `SI${rk.si(r.si)}位` : null,
      r.cz != null ? `調教${rk.cz(r.cz)}位` : null,
      r.ten != null ? `テン${rk.ten(r.ten)}位` : null,
      r.kyaku,
    ].filter(Boolean).join('・');
    if (r.comp == null && r.si == null) {
      const nr = nouRuns(nouByUma, e.umaban, 1)[0];
      r.konkyo = nr ? `${state.track}実績なし（前走: ${nouRunHtml(nr).replace(/<[^>]+>/g, '')}）` : (r.konkyo || '実績なし');
    }
    r.formState = r.v5 && Number(r.v5.form_coverage || 0) >= 0.5 ? r.v5.form_state : null;
  }
  const signalBadges = (r) => {
    const stateClass = r.formState === 'rising' || r.formState === 'rebound_ready' ? 'state-up'

// レース単位の調教ビュー（各馬の最新坂路追切・ラップ判定・調教偏差順）
function cyokyoRaceHtml(raceMeta, entries, cyokyo, history) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const hensachi = (w) => {
    if (!w) return null;
    const isHanro = (w.course || '').includes('坂');
    const base = facilityBase(w.course, isHanro);
    const t = w.times || {};
    const val = isHanro ? hanroRefTime(t) : t.t_3f;
    return (base && base.std && val != null) ? 50 + 10 * (base.mean - val) / base.std : null;
  };
  const cyoZOf = (um) => cyoZFromWorks(cyoByUma[um]);
  const aiRanked = entries.map((e) => [e.umaban, modelScore(e, history, raceMeta, cyoZOf(e.umaban))])
    .filter(([, v]) => v != null).sort((a, b) => b[1] - a[1]);
  const aiMark = new Map();
  aiRanked.forEach(([um], i) => { if (i < MARKS.length) aiMark.set(um, MARKS[i]); });
  // 今回に向けた追切のみ（前走日より後・日付未取得の古いデータ混入を除外）を新しい順に
  const currentCycleWorks = (c, lastRaceDate) => (c && c.works || [])
    .filter((w) => ((w.times || {}).t_half != null || (w.times || {}).t_3f != null) && w.date && (!lastRaceDate || w.date > lastRaceDate))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  // 最終追い＝keibabookの☆(oikiri)マークがあればそれを優先（無ければ直近の1本）
  const pickLatest = (cur) => cur.find((w) => w.mark === '☆') || cur[0] || null;
  const rows = entries.map((e) => {
    const c = cyoByUma[e.umaban];
    const runs = (history[e.horse_id] || []).filter((r) => r.race_id !== raceMeta.race_id).slice(0, 3);
    const lastRaceDate = runs[0] && runs[0].date;
    const cur = currentCycleWorks(c, lastRaceDate);
    const w = pickLatest(cur);
    const mid = cur.filter((x) => x !== w);
    const t = (w && w.times) || {};
    const isHanro = w && (w.course || '').includes('坂');
    const z = hensachi(w);
    return { e, w, mid, isHanro, mark: aiMark.get(e.umaban) || '', best: cyoZOf(e.umaban),
      lap: isHanro ? hanroLapCells(t.t_5f, t.t_half, t.t_3f, t.t_1f, z) : { str: '', tag: '' },
      arrow: c ? c.arrow : null, tanpyo: c ? c.tanpyo : null };
  }).sort((a, b) => (b.best ?? -99) - (a.best ?? -99));
  // 短評セル＝最終追いの短評＋（あれば）▼中間N本を同じマスの下に展開（別列にしない）
  const noteCell = (r) => {
    const head = `${arrowHtml(r.arrow)} ${esc(r.tanpyo || '')}`;
    if (!r.mid.length) return `<td class="small l">${head}</td>`;
    return `<td class="small l">${head}<details class="cyo-more"><summary>▼中間${r.mid.length}本</summary>${r.mid.map((w) => workHtml(w)).join('<br>')}</details></td>`;
  };
  const body = rows.map((r) => {
    const e = r.e, t = (r.w && r.w.times) || {};
    return `<tr>
      <td style="font-size:15px">${r.mark}</td>
      <td><span class="waku w${e.waku || 1}">${e.waku ?? ''}</span></td>
      <td>${e.umaban ?? ''}</td>
      <td class="l"><a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}><b>${esc(e.horse_name)}</b></a>${todayBlinkerBadge(e, history)}${kakuBadge(e)}</td>
      <td class="num ${r.mark === '◎' ? 'best' : ''}">${r.best != null ? r.best.toFixed(1) : '-'}</td>
      <td>${r.w ? mmdd(r.w.date) : ''}</td>
      <td>${r.w ? esc(r.w.course) : '<span class="sub">追切なし</span>'}</td>
      <td class="num">${t.t_5f != null ? t.t_5f.toFixed(1) : ''}</td>
      <td class="num">${t.t_half != null ? t.t_half.toFixed(1) : ''}</td>
      <td class="num">${t.t_3f != null ? t.t_3f.toFixed(1) : ''}</td>
      <td class="num">${t.t_1f != null ? t.t_1f.toFixed(1) : ''}</td>
      <td class="small l">${r.lap.str}${r.lap.tag}</td>
      <td class="l">${esc((r.w && r.w.ashiiro) || '')}</td>
      ${noteCell(r)}
    </tr>`;
  }).join('');
  return raceHeaderHtml(raceMeta) + `
  <div class="note">各馬の最新の追切（最終追いの印☆を優先し、無ければ直近1本。調教評価の良い順）。AI印は過去レースから学習した順です。馬名を押すと全調教履歴を見られます。</div>
  <div class="card tablewrap"><table>
    <tr><th>AI印</th><th>枠</th><th>番</th><th>馬名</th><th>調教評価</th><th>追切日</th><th>コース</th><th>坂4F/本5F</th><th>坂3F/本4F</th><th>坂2F/本3F</th><th>1F</th><th>200mごとの時計（坂路のみ）</th><th>脚色</th><th>短評</th></tr>
    ${body}
  </table>
  <div class="legend">今回に向けた追切のみ（前走日より後）を表示・過去のレース分は含みません。調教偏差＝拠点別基準（大井の時計は大井、小林の時計は小林…と場所ごとに比較）の坂路3F最速（無ければ本馬場「真の3F」）の偏差値（50が平均）。時計欄は坂路コースなら4F/3F/2F/1F、本馬場コースなら5F/4F/3F/1Fとして読む（終い1Fは本馬場ではほぼ記録なし）。短評の<b>▼中間N本</b>＝最終追いより前に行った今回サイクル分の追切（タップで展開）。ラップ・加速/失速判定は坂路のみ対応：<span class="badge conf-S">加速</span>尻上がり／<span class="badge conf-C">失速</span>終い掛かる／<span class="badge conf-S">🔥好走</span>偏差値60+×加速（実測複勝59%）。</div></div>`;
}

// ---- リアルタイムオッズ（keiba.go.jp・門別=馬場コード36、Workerプロキシ経由でCORS回避）----
const ODDS_PROXY = 'https://keiba-proxydeploy.maguronagareboshi.workers.dev/?url=';
const jstToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

// 発走までのカウントダウン（画面上の全.countdown要素を1秒ごとに更新・発走を過ぎたら消す）
function tickCountdowns() {
  const now = new Date();
  for (const el of document.querySelectorAll('.countdown[data-hasso]')) {
    const diff = new Date(el.dataset.hasso) - now;
    if (!(diff > 0)) { el.textContent = ''; continue; }
    const totalSec = Math.floor(diff / 1000);
    const h = Math.floor(totalSec / 3600), m = Math.floor((totalSec % 3600) / 60), s = totalSec % 60;
    el.textContent = h > 0 ? `（発走まで${h}時間${String(m).padStart(2, '0')}分）`
      : `（発走まで${m}分${String(s).padStart(2, '0')}秒）`;
  }
}
setInterval(tickCountdowns, 1000);

async function fetchLiveOdds(raceDate, raceNo) {
  if (!raceDate || !raceNo) return null;
  const url = `https://www.keiba.go.jp/KeibaWeb/TodayRaceInfo/OddsTanFuku?k_raceDate=${raceDate.replace(/-/g, '/')}&k_raceNo=${raceNo}&k_babaCode=${trackCfg().baba}`;
  try {
    const html = await (await fetch(ODDS_PROXY + encodeURIComponent(url))).text();
    if (html.indexOf('odd_popular_table_02') < 0) return null;
    const m = html.match(/odd_popular_table_02[\s\S]*?<tbody>([\s\S]*?)<\/tbody>/);
    const body = m ? m[1] : '';
    const odds = {};
    for (const tr of (body.match(/<tr[^>]*>[\s\S]*?<\/tr>/g) || [])) {
      const tds = [...tr.matchAll(/<td[^>]*>([\s\S]*?)<\/td>/g)].map((x) => x[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim());
      if (tds.length < 4) continue;
      const uma = parseInt(tds[1]), o = parseFloat(tds[3]);
      if (uma >= 1 && uma <= 20 && o > 0) odds[uma] = o;
    }
    if (!Object.keys(odds).length) return null;
    const pop = {};
    Object.entries(odds).sort((a, b) => a[1] - b[1]).forEach(([um], i) => { pop[um] = i + 1; });
    const pm = html.match(/(\d{1,2}):(\d{2})\s*発走/);
    return { odds, pop, postTime: pm ? `${pm[1]}:${pm[2]}` : null };
  } catch (e) { return null; }
}

async function fetchLiveWeights(raceDate, raceNo) {

  const url = `https://www.keiba.go.jp/KeibaWeb/TodayRaceInfo/DebaTable?k_raceDate=${raceDate.replace(/-/g, '/')}&k_raceNo=${raceNo}&k_babaCode=${trackCfg().baba}`;
  try {
    const html = await (await fetch(ODDS_PROXY + encodeURIComponent(url))).text();
    if (html.indexOf('horseNum') < 0) return null;
    const out = {};
    const re = /class="horseNum"[^>]*>\s*(\d+)\s*<\/td>[\s\S]*?class="odds_weight"[^>]*>[\s\S]*?<\/td>\s*[\s\S]*?class="odds_weight"[^>]*>([\s\S]*?)<\/td>/g;
    let m;
    while ((m = re.exec(html))) {
      const um = +m[1];
      const cell = m[2].replace(/<[^>]+>/g, ' ');
      const wm = cell.match(/(\d{3})/), dm = cell.match(/\(([-+±]?\d+)\)/);
      if (um >= 1 && um <= 20 && wm && +wm[1] >= 300 && +wm[1] <= 650) {
        out[um] = { w: +wm[1], d: dm ? dm[1] : null };
      }
    }
    return Object.keys(out).length ? out : null;
  } catch (e) { return null; }
}

function applyLiveWeights(wts) {
  if (!wts) return;
  for (const td of document.querySelectorAll('#raceView [data-live-weight]')) {
    const v = wts[+td.dataset.liveWeight];
    if (v) td.textContent = `${v.w}${v.d != null ? `(${v.d})` : ''}`;
  }
}

// オッズが届くたびに単勝期待値を貼り替える。判定は静的描画と同じ evCellState に必ず委譲する
// （二重実装にすると初回描画と60秒毎の更新で表示が食い違う）。
function applyHorseEvs(oddsMap) {
  const isToday = state.date === jstToday();
  for (const el of document.querySelectorAll('#raceView [data-horse-ev]')) {
    const odds = Number(oddsMap && oddsMap[+el.dataset.horseEv]);
    // 空文字は parseFloat で NaN になり「値なし」を意味する。Number() に変えると 0 になり誤表示。
    const low = parseFloat(el.dataset.probLow);
    const mid = parseFloat(el.dataset.probMid);
    const s = evCellState(el.dataset.evMode || 'none', low, mid, odds, isToday);
    el.classList.remove('ev-positive', 'ev-watch', 'ev-negative', 'ev-reference', 'ev-unknown');
    el.classList.add(s.cls);
    const mainNode = el.querySelector('.ev-main') || el.querySelector('b');
    const noteNode = el.querySelector('.ev-note') || el.querySelector('small');
    if (mainNode) mainNode.textContent = s.main;
    if (noteNode) noteNode.textContent = s.note;
  }
}

function applyLiveOdds(live) {
  if (!live) return;
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const o = live.odds[+td.dataset.liveOdds], p = live.pop[+td.dataset.liveOdds];
    td.textContent = o != null ? `${o}${p ? `(${p})` : ''}` : '-';
  }
  const n = new Date(), badge = $('oddsUpdated');
  if (badge) badge.textContent = `🔴ライブ ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}更新${live.postTime ? `（発走${live.postTime}）` : ''}`;
  applyHorseEvs(live.odds);
  updateEvMonitor(live.odds);
}

// 旧v2の影運用モニター。回収率の点推定だけでは購入ルールを解放しない。
function updateEvMonitor(oddsMap) {
  const el = $('evMonitor');
  const w = state.evWatch;
  if (!el || !w || w.rid !== state.raceId) { if (el) el.hidden = true; return; }
  const o = oddsMap ? oddsMap[w.um] : null;
  if (!o) { el.hidden = true; return; }
  const ev = w.p * o;
  const hit = o >= 5 && o < 10 && ev >= 1.5;
  el.hidden = false;
  el.className = hit ? 'note ev-hit' : 'note ev-idle';
  el.innerHTML = hit
    ? `🧪 <b>記録対象の候補</b>: ◎${w.um}番 ${esc(w.name)}　単勝${o}倍 × 参考勝率${(w.p * 100).toFixed(0)}% = 参考期待値 ${ev.toFixed(2)}　（実際には購入しません）`
    : `記録中: ◎${w.um}番 ${esc(w.name)}　現在${o}倍・参考期待値 ${ev.toFixed(2)}　${(o < 5 || o >= 10) ? '（対象オッズ外）' : '（候補基準未満）'}`;
}

function recordOdds(rid, live) {
  if (!live) return;
  state.oddsHist = state.oddsHist || {};
  const hist = state.oddsHist[rid] = state.oddsHist[rid] || {};
  const n = new Date(), ts = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}`;
  for (const [um, o] of Object.entries(live.odds)) {
    const arr = hist[um] = hist[um] || [];
    if (!arr.length || arr[arr.length - 1].o !== o) arr.push({ t: ts, o });   // 変化した時だけ点を追加
  }
  saveOddsHist();   // リロードしても消えないよう都度保存
}

// ---- オッズ推移の永続化（リロードで消える問題の対策） ----
// localStorage（このブラウザで見ていた分）＋ Supabase記録（5分おきの自動スナップショット）を
// マージして復元する。日付が変わったら自動破棄。
const oddsStoreKey = () => `chihou_odds_hist_v2_${trackCfg().prefix}`;
function saveOddsHist() {
  try {
    if (state.oddsDate) localStorage.setItem(oddsStoreKey(), JSON.stringify({ d: state.oddsDate, h: state.oddsHist || {} }));
  } catch (e) { /* 容量超過等は無視（表示は生きる） */ }
}
function loadOddsHist(rd) {
  try {
    const j = JSON.parse(localStorage.getItem(oddsStoreKey()) || 'null');
    if (j && j.d === rd && j.h) return j.h;
  } catch (e) { /* 壊れていたら無視 */ }
  return null;
}
// 時刻順マージ（'朝'は先頭扱い・同オッズの連続は1点に圧縮）
function mergeOddsSeries(a, b) {
  const keyT = (x) => (x.t === '朝' ? '00:00' : x.t);
  const all = [...(a || []), ...(b || [])].sort((x, y) => (keyT(x) < keyT(y) ? -1 : keyT(x) > keyT(y) ? 1 : 0));
  const out = [];
  for (const p of all) {
    const last = out[out.length - 1];
    if (last && last.o === p.o) continue;
    if (last && last.t === p.t && last.o === p.o) continue;
    out.push(p);
  }
  return out;
}

// 記録済みスナップショット（monbetsu_odds・5分おき自動記録）を取り込む。
// 発走間際に開いても・リロードしても、朝→現在の流れが復元される。未記録なら無害にスキップ。
async function seedRecordedOdds(rd, raceNo, hist) {
  // 旧テーブルには場キーが無い。南関データを門別の履歴として誤結合しない。
  if (state.track !== '門別') return;
  try {
    const rows = await sbGet(`monbetsu_odds?race_date=eq.${rd}&race_no=eq.${raceNo}&order=captured_at.asc&select=uma_ban,odds,captured_at`);
    const srv = {};
    for (const r of rows || []) {
      if (r.odds == null) continue;
      const um = String(r.uma_ban), d = new Date(r.captured_at);
      const t = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
      (srv[um] = srv[um] || []).push({ t, o: r.odds });
    }
    for (const um in srv) hist[um] = mergeOddsSeries(hist[um], srv[um]);
  } catch (e) { /* テーブル未作成/未記録なら朝＋ライブのみで動作 */ }
}

async function startLiveOdds(raceMeta) {
  clearInterval(state.oddsTimer); state.oddsTimer = null;
  // 世代トークン: 再描画で startLiveOdds が入れ子に走った時、古い run() がタイマーを張り直さないように
  const gen = (state.oddsGen = (state.oddsGen || 0) + 1);
  const rd = raceMeta.race_date || raceMeta.date;
  if (rd !== jstToday() || !(state.sub === 'yosou' || state.sub === 'syutuba')) return;
  const rid = raceMeta.race_id || state.raceId;
  state.oddsDate = rd;
  // ① 前回このブラウザで見ていた推移を復元（リロードで消えない）
  state.oddsHist = state.oddsHist || {};
  const stored = loadOddsHist(rd);
  if (stored) {
    for (const srid in stored) {
      const cur = state.oddsHist[srid] = state.oddsHist[srid] || {};
      for (const um in stored[srid]) {
        if (!cur[um] || cur[um].length < stored[srid][um].length) cur[um] = stored[srid][um];
      }
    }
  }
  const hist = state.oddsHist[rid] = state.oddsHist[rid] || {};
  // ② 朝オッズ（Supabase値）を推移の起点として記録
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const um = td.dataset.liveOdds, o = parseFloat(td.textContent);
    if (!hist[um] && !isNaN(o)) hist[um] = [{ t: '朝', o }];
  }
  // ③ 5分おきの自動スナップショット（Supabase記録）をマージ＝別端末で開いても流れが出る
  await seedRecordedOdds(rd, raceMeta.race_no, hist);
  saveOddsHist();
  // EVモニター初期判定（朝オッズベース。以後はライブ更新毎に再判定）
  const domOdds = {};
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const o = parseFloat(td.textContent);
    if (!isNaN(o)) domOdds[td.dataset.liveOdds] = o;
  }
  applyHorseEvs(domOdds);
  updateEvMonitor(domOdds);
  const run = async () => {
    const live = await fetchLiveOdds(rd, raceMeta.race_no);
    // 当日馬体重: 計量発表まで毎回試行→取れたら保持（変わらないので再取得しない）
    state.liveWeights = state.liveWeights || {};
    if (!state.liveWeights[rid]) {
      const wts = await fetchLiveWeights(rd, raceMeta.race_no);
      if (wts) state.liveWeights[rid] = wts;
    }
    if (state.raceId === rid && state.view === 'race') {
      applyLiveOdds(live); applyLiveWeights(state.liveWeights[rid]); recordOdds(rid, live);
      await pickupV3Receipt(rid, gen);
    }
  };
  await run();
  if (state.oddsGen === gen) state.oddsTimer = setInterval(run, 60000);
}

// 予想レシート(v3)は発走30分前ごろに publish される。予想タブに留まったままだと
// 取り込む契機が無く「参考値のまま切り替わらない」ので、ライブ更新に相乗りして1度だけ拾う。
async function pickupV3Receipt(rid, gen) {
  if (state.v3PickupBusy) return;
  const has = state.v3Predictions && state.v3Predictions.races && state.v3Predictions.races[rid];
  if (has || typeof state.provider.loadV3Predictions !== 'function') return;
  state.v3PickupBusy = true;
  try {
    const latest = await state.provider.loadV3Predictions();
    const arrived = latest && latest.races && latest.races[rid];
    if (!arrived) return;
    state.v3Predictions = latest;
    // 世代・表示中レースが変わっていない時だけ描き直す（二重タイマー/誤爆防止）
    if (state.oddsGen === gen && state.raceId === rid && state.view === 'race' && state.sub === 'yosou') {
      const open = $('raceView').querySelector('.prediction-disclosure[open]') ? true : false;
      const view = ($('raceView').querySelector('.forecast-view-toggle:checked') || {}).id;
      await renderRaceView();
      if (view) { const el = document.getElementById(view); if (el) el.checked = true; }
      if (open) { const d = $('raceView').querySelector('.prediction-disclosure'); if (d) d.open = true; }
    }
  } catch (e) { /* 取れなければ次のライブ更新で再試行 */ }
  finally { state.v3PickupBusy = false; }
}

// オッズ推移ポップアップ（クリックしたセルの馬の 朝→現在 の変化をミニグラフ表示）
function showOddsFlow(um, anchor) {
  const arr = ((state.oddsHist || {})[state.raceId] || {})[um] || [];
  let pop = $('oddsFlowPop');
  if (!pop) { pop = document.createElement('div'); pop.id = 'oddsFlowPop'; pop.hidden = true; document.body.appendChild(pop); }
  if (arr.length < 2) { pop.innerHTML = `<b>${um}番</b> 推移データ蓄積中（この画面を開いたまま60秒毎に記録）`; }
  else {
    const os = arr.map((x) => x.o), mn = Math.min(...os), mx = Math.max(...os), W = 180, H = 44;
    const pts = arr.map((x, i) => `${(i / Math.max(arr.length - 1, 1)) * W},${(mx === mn ? H / 2 : H - 4 - (x.o - mn) / (mx - mn) * (H - 8))}`).join(' ');
    const first = os[0], last = os[os.length - 1];
    const trend = last < first * 0.92 ? '<b class="arrow-up">▼人気上昇（妙味減）</b>' : last > first * 1.08 ? '<b class="bias-front">▲人気低下（妙味増）</b>' : '→ ほぼ変わらず';
    pop.innerHTML = `<b>${um}番 単勝オッズ推移</b> ${trend}<br>
      <svg width="${W}" height="${H}" style="margin:3px 0"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/></svg>
      <div class="small">${arr.map((x) => `${x.t} <b>${x.o}</b>`).join(' → ')}</div>`;
  }
  const r = anchor.getBoundingClientRect();
  pop.style.left = `${Math.min(r.left, window.innerWidth - 220)}px`;
  pop.style.top = `${r.bottom + window.scrollY + 4}px`;
  pop.hidden = false;
}

// 固定680px幅の公式映像プレーヤーを画面幅に合わせて縮小表示（transform:scaleで内容ごと縮小。iframeのwidth指定だけでは中身が縮まらず見切れるだけなので必須）
function initVideoScale(container) {
  const wrap = container.querySelector('.vidwrap');
  if (!wrap) return;
  const card = wrap.querySelector('.vidcard');
  const baseW = parseFloat(wrap.dataset.basew), baseH = parseFloat(wrap.dataset.baseh);
  const fit = () => {
    const scale = Math.min(1, wrap.clientWidth / baseW);
    card.style.transform = `scale(${scale})`;
    wrap.style.height = `${baseH * scale}px`;
  };
  fit();
  if (wrap._ro) wrap._ro.disconnect();
  wrap._ro = new ResizeObserver(fit);
  wrap._ro.observe(wrap);
  window.addEventListener('resize', fit);   // 端末回転などResizeObserverが拾い損ねる場合の保険
}

async function renderRaceView() {
  clearInterval(state.oddsTimer); state.oddsTimer = null;
  $('raceView').innerHTML = '<div class="empty">読み込み中…</div>';
  const raceId = state.raceId;
  if (state.sub === 'eizo') {   // NAR公式レース映像（公式プレーヤーを埋め込み）
    const raceNo = parseInt((raceId || '').slice(-6, -4), 10);
    const ymd = (state.date || '').replace(/-/g, '');
    // 過去走の映像ジャンプは他場のレースもあり得るため、場はrace_id内の場コードから決める
    const ridTrack = RACEID_TRACK[(raceId || '').slice(6, 8)];
    const slug = (TRACKS[ridTrack] || trackCfg()).slug;
    const url = `https://keiba-lv-st.jp/movie/player?date=${ymd}&race=${raceNo}&track=${slug}`;
    // 固定680px幅の公式プレーヤーを原寸基準で表示（拡大しない＝歪まない）。
    // 上のロゴ帯(60px)をmargin-topで隠し、下のコピーライトはcardのheight+overflowで切る（操作バーは残す）。
    // 画面幅が680px未満（スマホ）の時はvidwrapがtransform:scaleで中身ごと縮小（initVideoScale）。
    // 新聞型の「▶映像」から飛んで来た時に元のレースへ帰れるよう、映像タブにも戻るボタンを出す
    const backBtn = state.prevRace ? '<div class="backbtn-row"><button class="foldbtn backbtn" onclick="goBackRace()">← 戻る（元のレースへ）</button></div>' : '';
    $('raceView').innerHTML = backBtn + `<div class="vidwrap" data-basew="680" data-baseh="460">
      <div class="vidcard" style="width:680px;height:460px;background:#000;border-radius:8px;overflow:hidden">
        <iframe src="${url}" title="レース映像" loading="lazy" allowfullscreen style="width:100%;height:540px;border:0;display:block;margin-top:-70px"></iframe></div></div>
      <div class="note">${state.date} ${raceNo}R のレース映像（NAR公式）。再生ボタンで再生。発走前・未配信のレースは再生できません。</div>`;
    initVideoScale($('raceView'));
    return;
  }
  if (state.sub === 'sim') {   // このレースの展開シミュレータを埋め込み表示
    $('raceView').innerHTML = `<div class="card" style="padding:0;overflow:hidden;border-radius:8px">
      <iframe src="simulator.html?race=${encodeURIComponent(raceId)}&track=${encodeURIComponent(state.track)}&embed=1" style="width:100%;height:920px;border:0;display:block" title="展開シミュレータ" loading="lazy"></iframe></div>
      <div class="note">このレースで「ハイ・標準・スロー」の流れがどれくらい起こりそうかを過去レースから推定し、それぞれ2,000回試しています。表示する率は展開との相性を見る比較値で、馬券の的中率や期待値ではありません。全画面は上部のシミュレータから。</div>`;
    return;
  }
  try {
    if (state.sub === 'seiseki') {
      const data = await state.provider.loadRace(raceId);
      if (!(data.results || []).length && state.sub === 'seiseki') {
        state.sub = 'syutuba';  // 未発走レースは出馬表へ
        renderSubTabs();
        return renderRaceView();
      }
      // 保存された事前予想だけを表示する。現在モデルによる後付け印は答えを見た再計算と
      // 区別できないため、予想レシートがない過去開催には表示しない。
      const archived = deckArchivedMarks(deckV3Race(raceId));
      const note = archived.archived
        ? 'レース前に保存された予想の印です。'
        : 'このレースは事前予想が保存されていません。結果を見た後にAI印を作り直すことはしていません。';
      $('raceView').innerHTML = seisekiHtml(data, archived.marks, archived.label, note);
    } else {
      const meta = (state.dates[state.date] || []).find((r) => r.race_id === raceId) || {};
      const [raceData, entries, cyokyo, nouryoku, danwa] = await Promise.all([
        state.provider.loadRace(raceId),
        state.provider.loadEntries(raceId),
        state.provider.loadCyokyo(raceId),
        state.provider.loadNouryoku(raceId),
        state.provider.loadDanwa(raceId),
      ]);
      const danwaByUma = {};
      for (const d of danwa) danwaByUma[d.umaban] = d;
      const raceMeta = Object.keys(raceData.race || {}).length > 1 ? raceData.race : { ...meta, date: state.date };
      const ids = entries.map((e) => e.horse_id).filter(Boolean);
      const rawHistory = await state.provider.loadHistory(ids);
      // 振り返り防止: このレースの日付以降の走りは予想に使わない（未来予想には影響なし）
      const tgtDate = raceMeta.date || raceMeta.race_date || state.date;
      const history = {};
      for (const id in rawHistory) history[id] = rawHistory[id].filter((r) => !r.date || !tgtDate || r.date < tgtDate);
      if (state.statsPromise) await state.statsPromise;  // 指数計算に基準タイムが要る
      // 門別2歳戦のみ能検成績を出馬表/予想に出す（能検はホッカイドウ専用・南関では呼ばない）
      if (trackCfg().noken && /2歳|２歳/.test((raceMeta.klass || '') + (raceMeta.name || raceMeta.race_name || '')) && !state.nokenByHorse) {
        try { state.noken = state.noken || await state.provider.loadNoken(); buildNokenIndex(); }
        catch (e) { /* 能検が無くても続行 */ }
      }
      $('raceView').innerHTML = state.sub === 'yosou'
        ? yosouHtml(raceMeta, entries, cyokyo, history, nouryoku, danwaByUma)
        : state.sub === 'cyokyo'
          ? cyokyoRaceHtml(raceMeta, entries, cyokyo, history)
          : state.sub === 'zenkouhan'
            ? zenkouhanTabHtml(raceMeta, entries, history)
            : state.sub === 'danwa'
              ? danwaRaceHtml(raceMeta, entries, danwaByUma, history)
              : syutubaHtml(raceMeta, entries, cyokyo, history, nouryoku, danwaByUma);
      startLiveOdds(raceMeta);   // 当日レースは現在オッズをライブ取得・自動更新
    }
  } catch (e) {
    $('raceView').innerHTML = `<div class="empty">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

// 予想AIの運用成績（chihou_meta → ローカルの順で取得）
async function loadRecord() {
  try {
    const rows = await sbGet('chihou_meta?key=eq.monbetsu_record&select=value');

function recordHtml(rec) {
  if (!rec) return '';
  const o = rec.overall;
  const pct = (a, b) => (b ? `${(a / b * 100).toFixed(1)}%` : '-');
  const roi = (ret, n) => (n ? `${(ret / (n * 100) * 100).toFixed(1)}%` : '-');
  const allMonths = rec.monthly.slice().reverse();
  const rowHtml = (m) => `<tr>
    <td>${m.ym}</td>
    <td class="num"><a class="horse-link" data-rec="${m.ym}" data-kind="hon">${m.races}</a></td>
    <td class="num">${pct(m.hon_win, m.races)}</td><td class="num">${pct(m.hon_top3, m.races)}</td>
    <td class="num ${m.hon_ret >= m.races * 100 ? 'best' : ''}">${roi(m.hon_ret, m.races)}</td>
    <td class="num">${m.myo_bets ? `<a class="horse-link" data-rec="${m.ym}" data-kind="myo">${m.myo_bets}</a>` : 0}</td>
    <td class="num ${m.myo_ret >= m.myo_bets * 100 && m.myo_bets ? 'best' : ''}">${roi(m.myo_ret, m.myo_bets)}</td>
  </tr>`;
  const first12 = allMonths.slice(0, 12).map(rowHtml).join('');
  const rest = allMonths.slice(12).map(rowHtml).join('');
  return `
  <h3 class="sec">🎯 予想AIの運用成績（全過去レースでの答え合わせ・各レース前情報のみ使用）</h3>
  <div class="card tablewrap">
    <div class="note">通算: ◎ ${o.races}Rで勝率 ${pct(o.hon_win, o.races)}・複勝率 ${pct(o.hon_top3, o.races)}・単勝回収率 ${roi(o.hon_ret, o.races)}
    ／ 💰妙味ゾーン ${o.myo_bets}Rで複勝率 ${pct(o.myo_top3, o.myo_bets)}・<b>単勝回収率 ${roi(o.myo_ret, o.myo_bets)}</b></div>
    <table>
      <tr><th>月</th><th>R数</th><th>◎勝率</th><th>◎複勝率</th><th>◎単勝回収</th><th>💰対象</th><th>💰単勝回収</th></tr>
      ${first12}
      <tbody id="recRest" ${rest ? 'hidden' : ''}>${rest}</tbody>
    </table>
    ${rest ? `<button class="foldbtn" id="recFold">▼ 過去の月も表示（残り${allMonths.length - 12}ヶ月）</button>` : ''}
    <div class="legend">R数・💰対象をクリックするとその月の内訳が見られます。緑=回収率100%超え。💰=スピード指数1位×4番人気以下の単勝。</div>
  </div>`;
}

// 運用成績の月別内訳モーダル（◎ or 💰 の各レース結果）
function openRecordDetail(ym, kind) {
  const rec = state.record;
  const m = rec && rec.monthly.find((x) => x.ym === ym);
  if (!m) return;
  const list = (kind === 'myo' ? m.myo_races : m.hon_races) || [];
  const label = kind === 'myo' ? '💰妙味ゾーン' : '◎本命';
  const hit = list.filter((x) => x.fin <= 3).length;
  const win = list.filter((x) => x.fin === 1).length;
  const rows = list.map((x) => {
    const finCls = x.fin >= 1 && x.fin <= 3 ? `fin${x.fin}` : '';
    return `<tr><td>${mmdd(x.date)}</td><td>${x.r}R</td><td>${x.uma}番</td>
      <td class="l">${esc(x.name)}</td><td class="${finCls}">${x.fin}着</td>
      <td class="num">${x.odds ?? '-'}</td>${kind === 'myo' ? `<td class="num">${x.pop ?? ''}人</td>` : ''}</tr>`;
  }).join('');
  $('horseModalTitle').textContent = `${ym} の${label}（${list.length}R 勝${win}・複${hit}）`;
  $('horseModalBody').innerHTML = `<div class="tablewrap"><table>
    <tr><th>日付</th><th>R</th><th>馬番</th><th>${kind === 'myo' ? '💰' : '◎'}馬</th><th>結果</th><th>単勝</th>${kind === 'myo' ? '<th>人気</th>' : ''}</tr>
    ${rows || '<tr><td colspan="7">データなし</td></tr>'}</table></div>`;
  $('horseModal').hidden = false;
}

function analysisHtml(st) {
  if (!st) return '<div class="empty">統計データがありません（scraper/build_stats.py --push を実行してください）</div>';
  const rateBar = (r) => `${(r * 100).toFixed(1)}%`;

  // 馬場バイアス（直近20日・門別平均との相対値）＋4角位置バイアス
  const dates = Object.keys(st.bias_daily).sort().reverse().slice(0, 20);
  const fmtDev = (v) => (v == null ? '-' : `${v > 0 ? '+' : ''}${v.toFixed(2)}`);
  // 4角位置＝能力統制版(corner4_inout・正=外伸び)。逆/恵バッジと同じ指標で統一。
  const c4io = st.corner4_inout || {};
  const c4label = (v) => (v == null ? '-' : v >= 0.10 ? '外有利' : v <= -0.10 ? '内有利' : 'フラット');
  const biasRows = dates.map((d) => {
    const b = st.bias_daily[d];
    const cls = b.label === '前有利' ? 'bias-front' : b.label === '差し有利' ? 'bias-back' : '';
    const c4 = c4io[d];
    const c4cls = c4 == null ? '' : c4 >= 0.10 ? 'bias-front' : c4 <= -0.10 ? 'bias-back' : '';
    const kk = ['逃げ', '先行', '差し', '追込'].map((k) =>
      b.kyaku[k] ? `<td class="num">${rateBar(b.kyaku[k].rate)} <span class="kyaku">${b.kyaku[k].top3}/${b.kyaku[k].n}</span></td>` : '<td>-</td>').join('');
    return `<tr><td>${d}</td><td class="${cls}">${b.label}</td>
      <td class="num">${b.rel != null ? (b.rel > 0 ? '+' : '') + b.rel : '-'}</td>
      <td class="${c4cls}">${c4label(c4)}${c4 != null ? `<span class="kyaku">${fmtDev(c4)}</span>` : ''}</td>
      <td class="num">${fmtDev(b.agari3_dev)}</td>
      <td class="num">${fmtDev(b.agari4_dev)}</td>${kk}</tr>`;
  }).join('');

  // ペース×脚質（内回り1500-1600と外回り1700は分割）
  const bands = ['1000', '1100', '1200', '1500-1600内', '1700外', '1800+'];
  const paces = ['ハイ', 'ミドル', 'スロー'];
  const kyakus = ['逃げ', '先行', '差し', '追込'];
  const pkTables = bands.map((band) => {
    const rows = paces.map((p) => {
      const cells = kyakus.map((k) => {
        const e = st.pace_kyaku[`${band}|${p}|${k}`];
        return e ? `<td class="num">${rateBar(e.rate)} <span class="kyaku">${e.n}</span></td>` : '<td>-</td>';
      }).join('');
      return `<tr><td>${p}</td>${cells}</tr>`;
    }).join('');
    return `<div><h3 class="sec">${band}m ペース×脚質（複勝率）</h3><div class="card tablewrap"><table>
      <tr><th>ペース</th>${kyakus.map((k) => `<th>${k}</th>`).join('')}</tr>${rows}</table></div></div>`;
  }).join('');

  // 枠別成績（距離帯別 複勝率）
  const ws = st.waku_stats || {};
  const wakuRows = bands.map((band) => {
    const cells = [];
    for (let w = 1; w <= 8; w++) {
      const e = ws[`${band}|${w}`];
      if (!e) { cells.push('<td>-</td>'); continue; }
      const rates = [];
      for (let x = 1; x <= 8; x++) if (ws[`${band}|${x}`]) rates.push(ws[`${band}|${x}`].rate);
      const mean = rates.reduce((s, v) => s + v, 0) / rates.length;
      const cls = e.rate >= mean + 0.03 ? 'bias-back' : e.rate <= mean - 0.03 ? 'bias-front' : '';
      cells.push(`<td class="num ${cls}">${rateBar(e.rate)} <span class="kyaku">${e.n}</span></td>`);
    }
    return `<tr><td>${band}m</td>${cells.join('')}</tr>`;
  }).join('');
  const wakuTable = `<h3 class="sec">枠別成績（距離帯×枠番・複勝率）</h3>
    <div class="card tablewrap"><table>
      <tr><th>距離</th>${[1, 2, 3, 4, 5, 6, 7, 8].map((w) => `<th>${w}枠</th>`).join('')}</tr>${wakuRows}
    </table><div class="legend">青=その距離で平均+3%以上有利／オレンジ=平均-3%以上不利。${state.track === '門別' ? '門別1000mは内枠不利の傾向。' : ''}</div></div>`;

  // 血統別成績（父の門別複勝率・砂適性・馬場別・距離帯別）
  const sst = st.sire_stats || {};
  const bandOrder = ['1000', '1100', '1200', '15-16', '1700', '1800+'];
  const pct = (v) => v == null ? '-' : `${Math.round(v * 100)}%`;
  // 延長/短縮は標本20走以上のときだけ数値表示（少数のブレを出さない）
  const pctN = (v, n) => (v == null || !n || n < 20) ? '-' : `${Math.round(v * 100)}%`;
  const pedRow = (type) => ([name, e]) => {
    const bd = bandOrder.filter((b) => e.bands[b]).map((b) => `${b.replace('15-16', '1500/1600')}:${pct(e.bands[b].rate)}`).join('　');
    return `<tr><td class="l stickyname"><a class="pedname" data-pt="${type}" data-pn="${esc(name)}" style="cursor:pointer;color:var(--accent);text-decoration:underline">${esc(name)}</a></td><td class="num">${e.n}</td>
      <td class="num">${pct(e.win)}</td><td class="num">${rateBar(e.rate)}</td>
      <td class="num">${pct(e.good)}</td><td class="num">${pct(e.omo)}</td>
      <td class="num">${pctN(e.ext, e.ext_n)}</td><td class="num">${pctN(e.sht, e.sht_n)}</td>
      <td class="small l fold"><span class="kv">${bd}</span></td></tr>`;
  };
  // 父・母父共通の血統成績テーブル（母父=broodmare sire で母系の適性も掘る）。名タップで産駒一覧。
  const pedTable = (label, type, statsObj, note) => {
    const list = Object.entries(statsObj || {}).filter(([, e]) => e.n >= 25).sort((a, b) => (b[1].rate || 0) - (a[1].rate || 0));
    if (!list.length) return '';
    return `<h3 class="sec">${label}別成績（${state.track}成績／複勝率順・25走以上・${label}名タップで産駒一覧）</h3>
    <div class="card tablewrap"><table>
      <tr><th class="stickyname">${label}</th><th>出走</th><th>勝率</th><th>複勝率</th><th>良</th><th>重</th><th>延長</th><th>短縮</th><th>距離帯別 複勝率</th></tr>
      ${list.slice(0, 30).map(pedRow(type)).join('')}
    </table><div class="legend">${note}</div></div>`;
  };
  const sireTable = pedTable('父', 'sire', sst, `勝率＝1着率／複勝率＝3着内率。良と重で差がある父、距離帯で得意不得意がある父も。<b>延長</b>＝前走より距離を伸ばした時／<b>短縮</b>＝縮めた時の複勝率（20走以上のみ表示）。AI予想にも <b>sire_rate</b>（父の砂適性）として反映済み。`);
  const bmsTable = pedTable('母父', 'bms', st.bms_stats, `<b>母父（母の父＝ブルードメアサイアー）</b>別の${state.track}成績。父だけでなく母系の砂適性・距離適性が見えます。名前が短いのは競馬ブック表記の略称（例: Elusive→Elusive Quality）。父と母父の両面で買い材料を掘れます。`);

  // 基準タイム（クラス別。'全'はフォールバック用なので非表示）
  const clsOrder = { '2歳': 0, '3歳': 1, '3歳以上': 2 };
  // 走破タイムを秒→分秒(M:SS.s)へ（例 73.9→1:13.9）。門別は全て60秒超。
  const mmss = (s) => { if (s == null) return '-'; const m = Math.floor(s / 60); return `${m}:${(s - m * 60).toFixed(1).padStart(4, '0')}`; };
  // クラス別(2歳限定/3歳限定/3歳以上)にセクション分け・馬場は良/重系を横並び
  const clsLabel = { '2歳': '2歳限定', '3歳': '3歳限定' };
  const btByClass = ['2歳', '3歳'].map((cls) => {
    const dists = [...new Set(Object.keys(st.base_times)
      .filter((k) => { const p = k.split('_'); return p[2] === cls; })
      .map((k) => +k.split('_')[0]))].sort((a, b) => a - b);
    if (!dists.length) return '';
    const bt = (d, g) => st.base_times[`${d}_${g}_${cls}`];
    const rows = dists.map((d) => {
      const eR = bt(d, '良'), eH = bt(d, '重系');
      const cell = (e) => e && e.time ? `<b>${mmss(e.time.mean)}</b> <span class="small" style="opacity:.7">±${e.time.std.toFixed(1)}</span>` : '-';
      const seg = (e, fld) => e && e[fld] ? e[fld].mean.toFixed(1) : '-';
      return `<tr><td><b>${d}m</b></td>
        <td class="num">${cell(eR)}</td><td class="num">${cell(eH)}</td>
        <td class="num small">${seg(eR, 'first3f')} / ${seg(eR, 'last3f')}</td>
        <td class="num">${eR && eR.time ? eR.time.n : ''}${eH && eH.time ? '+' + eH.time.n : ''}</td></tr>`;
    }).join('');
    return `<h4 class="sec" style="margin:12px 0 4px;font-size:14px">${clsLabel[cls]}</h4>
      <div class="card tablewrap"><table>
      <tr><th>距離</th><th>走破タイム(良)</th><th>走破タイム(重系)</th><th>良の前半3F/上り3F</th><th>N(良+重)</th></tr>${rows}</table></div>`;
  }).join('');
  // 3歳以上(古馬)はクラス別マトリクス（C4とA級を混ぜない）。行=距離・列=クラス・走破タイム(良)平均
  const koba = st.base_times_koba || {};
  const presentCls = new Set(Object.keys(koba).map((k) => k.split('_')[2]));
  const kobaCls = ['C4', 'C3', 'C2', 'C1', 'B', 'A', 'OP'].filter((c) => presentCls.has(c));
  const kobaDists = [...new Set(Object.keys(koba).map((k) => +k.split('_')[0]))].sort((a, b) => a - b);
  const kobaMatrix = (kobaDists.length && kobaCls.length) ? `<h4 class="sec" style="margin:12px 0 4px;font-size:14px">3歳以上（クラス別・走破タイム 良の平均）</h4>
    <div class="card tablewrap"><table>
      <tr><th>距離</th>${kobaCls.map((c) => `<th>${c}</th>`).join('')}</tr>
      ${kobaDists.map((d) => `<tr><td><b>${d}m</b></td>${kobaCls.map((c) => {
        const e = koba[`${d}_良_${c}`];
        return e && e.time ? `<td class="num"><b>${mmss(e.time.mean)}</b><br><span class="small" style="opacity:.6">n${e.time.n}</span></td>` : '<td class="num" style="opacity:.4">-</td>';
      }).join('')}</tr>`).join('')}
    </table><div class="legend">古馬戦を<b>実クラス（C4〜A・オープン）で分けた</b>走破タイム(良)の平均。C4とA級を混ぜないのでクラス毎の時計水準が分かる（右ほど上位＝速い）。空欄はサンプル不足。母数の少ないB/A/OPは別定・ハンデ混在で振れます。</div></div>` : '';

  // クラス別 平均ラップ（区間200m毎・実測。ラップのある場のみ・表示専用＝予想指数には使っていない）
  const lpc = st.lap_profile_class || {};
  let lapClassHtml = '';
  if (Object.keys(lpc).length) {
    const byDist = {};
    for (const key in lpc) {
      const us = key.lastIndexOf('_');
      const dStr = key.slice(0, us), cls = key.slice(us + 1);
      (byDist[dStr] = byDist[dStr] || {})[cls] = lpc[key];
    }
    const dists = Object.keys(byDist).map(Number).sort((a, b) => a - b);
    const clsOrder2 = ['C4', 'C3', 'C2', 'C1', 'B', 'A', 'OP'];
    const tables = dists.map((d) => {
      const clsPresent = clsOrder2.filter((c) => byDist[d][c]);
      if (!clsPresent.length) return '';
      const maxLen = Math.max(...clsPresent.map((c) => byDist[d][c].laps.length));
      const header = Array.from({ length: maxLen }, (_, i) => `<th>${i + 1}</th>`).join('');
      const rows = clsPresent.map((c) => {
        const e = byDist[d][c];
        const cells = e.laps.map((v) => `<td class="num">${v.toFixed(1)}</td>`).join('');
        return `<tr><td><b>${c}</b> <span class="small" style="opacity:.6">n${e.n}</span></td>${cells}</tr>`;
      }).join('');
      return `<div><h4 class="sec" style="margin:12px 0 4px;font-size:14px">${d}m</h4>
        <div class="card tablewrap"><table><tr><th>クラス</th>${header}</tr>${rows}</table></div></div>`;
    }).join('');
    lapClassHtml = `<h3 class="sec">クラス別 平均ラップ（区間200m毎・実測・表示専用）</h3>
      <div class="grid2">${tables}</div>
      <div class="legend">列は1本目(スタート直後)〜最終本(ゴール前)の区間タイム秒。距離が200mの倍数でない場合、1本目だけ200m未満の端数区間になります。<b>上のクラスほど全区間で一貫して速い</b>傾向（絶対的な速さの差）。ただし前傾/後傾＝ペースの流れ方自体はクラスでほぼ変わらないため（検証済）、この差はモデルの予想指数には使わず<b>クラスごとの流れの目安</b>として表示のみ。n=15未満のクラスは非表示。</div>`;
  }

  // 前半タイムと成績（距離×クラス別・表示専用＝予想指数には使っていない）
  const pzc = st.pace_zone_class || {};
  let paceZoneHtml = '';
  if (Object.keys(pzc).length) {
    const byDist2 = {};
    for (const key in pzc) {
      const us = key.lastIndexOf('_');
      const dStr = key.slice(0, us), cls = key.slice(us + 1);
      (byDist2[dStr] = byDist2[dStr] || {})[cls] = pzc[key];
    }
    const dists2 = Object.keys(byDist2).map(Number).sort((a, b) => a - b);
    const clsOrder3 = ['2歳', '3歳', 'C4', 'C3', 'C2', 'C1', 'B', 'A', 'OP'];
    const placeColor = (p) => p >= 0.4 ? 'var(--accent)' : p < 0.2 ? 'var(--sub)' : 'inherit';
    const tables2 = dists2.map((d) => {
      const clsPresent = clsOrder3.filter((c) => byDist2[d][c]);
      if (!clsPresent.length) return '';
      const allTimes = [...new Set(clsPresent.flatMap((c) => byDist2[d][c].zones.map((z) => z.t)))].sort((a, b) => a - b);
      const header = allTimes.map((t) => `<th>${t.toFixed(1)}</th>`).join('');
      const rows = clsPresent.map((c) => {
        const e = byDist2[d][c];
        const byT = new Map(e.zones.map((z) => [z.t, z]));
        const cells = allTimes.map((t) => {
          const z = byT.get(t);
          if (!z) return '<td class="num"></td>';
          return `<td class="num" style="color:${placeColor(z.place)}" title="勝率${(z.win * 100).toFixed(1)}%・n${z.n}">${(z.place * 100).toFixed(0)}%</td>`;
        }).join('');
        return `<tr><td><b>${esc(c)}</b> <span class="small" style="opacity:.6">n${e.n}</span></td>${cells}</tr>`;
      }).join('');
      return `<div><h4 class="sec" style="margin:12px 0 4px;font-size:14px">${d}m</h4>
        <div class="card tablewrap"><table><tr><th>クラス</th>${header}</tr>${rows}</table></div></div>`;
    }).join('');
    paceZoneHtml = `<h3 class="sec">前半タイムと成績（距離×クラス別・複勝率・表示専用）</h3>
      <div class="grid2">${tables2}</div>
      <div class="legend">列は前半（距離1200m以上は前半3F・1200m未満は距離-600mの前半タイム）の実測タイム(秒・0.5秒刻み)。セルは<b>その前半タイム帯で走った馬の複勝率</b>（カーソルを乗せると勝率とサンプル数）。<span style="color:var(--accent)">水色</span>=複勝率40%以上　<span style="color:var(--sub)">グレー</span>=複勝率20%未満。前半が速い馬は総じて能力も高く人気にもなっているため、これは「儲かる隙間」ではなく<b>このクラス・距離では前半何秒がどのくらいの立ち位置か</b>を読むための目安表です（予想指数には使っていません）。組み合わせ全体でn=150未満・各マスn=15未満は非表示。</div>`;
  }

  // 騎手・厩舎（勝率順）
  const rankTable = (obj, label) => {
    const rows = Object.entries(obj).sort((a, b) => b[1].win_rate - a[1].win_rate).slice(0, 30)
      .map(([n, e], i) => `<tr><td>${i + 1}</td><td class="l">${esc(n)}</td><td class="num">${e.starts}</td>
        <td class="num">${e.wins}</td><td class="num">${rateBar(e.win_rate)}</td><td class="num">${rateBar(e.top3_rate)}</td></tr>`).join('');
    return `<div><h3 class="sec">${label}（勝率順・10走以上）</h3><div class="card tablewrap"><table>
      <tr><th>#</th><th>${label}</th><th>騎乗/出走</th><th>勝利</th><th>勝率</th><th>複勝率</th></tr>${rows}</table></div></div>`;
  };

  return `
  <div class="note">対象: ${st.n_races}レース（〜${esc(st.generated)}）。前残り度は「その日の(前複勝率−後複勝率) − ${state.track}平均ギャップ${st.overall_gap != null ? `(+${st.overall_gap})` : ''}」の相対値。上がり偏差は基準タイム比（負＝上がりが速い＝差しが利く馬場）。</div>
  <h3 class="sec">開催日ごとの馬場バイアス（直近20日・${state.track}平均との相対評価）</h3>
  <div class="card tablewrap"><table>
    <tr><th>開催日</th><th>判定</th><th>前残り度<br>(対平均)</th><th>4角<br>位置</th><th>勝ち馬<br>上がり3F偏差</th><th>レース<br>上がり4F偏差</th><th>逃げ</th><th>先行</th><th>差し</th><th>追込</th></tr>
    ${biasRows}
  </table></div>
  <div class="grid2">${pkTables}</div>
  ${wakuTable}
  ${sireTable}
  ${bmsTable}
  <h3 class="sec">基準タイム（クラス別・走破タイムは分秒の平均。偏差値/指数の土台）</h3>
  ${btByClass}
  ${kobaMatrix}
  ${lapClassHtml}
  ${paceZoneHtml}
  <div class="grid2">${rankTable(st.jockeys, '騎手')}${rankTable(st.trainers, '厩舎')}</div>`;
}
