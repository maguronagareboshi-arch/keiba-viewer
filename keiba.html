const cyokyoState = { data: null, date: null, year: null, twoOnly: false, byYear: {}, years: [], base: null, baseHonba: null, local: null };
const cyoAge = (s) => { const m = String(s || '').match(/(\d+)/); return m ? +m[1] : null; };

// 指定年の調教日データを取得（既定メタ＝最新年、過去年はキー別に遅延ロード、ローカルは全期間から抽出）
async function cyoLoadYear(y) {
  if (cyokyoState.byYear[y]) return cyokyoState.byYear[y];
  if (cyokyoState.local) {
    const dd = {};
    for (const d in cyokyoState.local) if (d.slice(0, 4) === y) dd[d] = cyokyoState.local[d];
    return (cyokyoState.byYear[y] = dd);
  }
  try {
    const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_cyokyo_${y}&select=value`);
    return (cyokyoState.byYear[y] = (rows.length && rows[0].value && rows[0].value.dates) || {});
  } catch (e) { return (cyokyoState.byYear[y] = {}); }
}

async function renderCyokyo() {
  const root = $('cyokyoRoot');
  if (!cyokyoState.data) {
    root.innerHTML = '<div class="empty">読み込み中…（調教データ）</div>';
    // Supabase（既定＝最新年＋年リスト）→ ローカル全期間 の順で取得
    try {
      const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_cyokyo&select=value`);
      if (rows.length && rows[0].value && rows[0].value.dates) cyokyoState.data = rows[0].value;
    } catch (e) { /* 次へ */ }
    if (!cyokyoState.data) {
      try { cyokyoState.data = await jsonGet('data/cyokyo_works.json'); cyokyoState.local = cyokyoState.data.dates; }
      catch (e) {
        root.innerHTML = `<div class="empty">調教データを読み込めませんでした（${esc(e.message)}）。<br>
          <button onclick="renderCyokyo()">↻ 再試行</button></div>`;
        return;
      }
    }
    cyokyoState.base = cyokyoState.data.base;
    cyokyoState.baseHonba = cyokyoState.data.base_honba;
    cyokyoState.years = cyokyoState.data.years
      || [...new Set(Object.keys(cyokyoState.data.dates).map((d) => d.slice(0, 4)))].sort().reverse();
    cyokyoState.year = cyokyoState.years[0];
    cyokyoState.byYear[cyokyoState.year] = cyokyoState.data.dates;   // 既定メタ＝最新年
  }

  root.innerHTML = '<div class="empty">読み込み中…（調教データ）</div>';
  const yearDates = await cyoLoadYear(cyokyoState.year);
  const two = cyokyoState.twoOnly;
  const filt = (ws) => two ? ws.filter((w) => cyoAge(w.sex) === 2) : ws;
  // その年の調教日（2歳フィルタ時は2歳追切がある日だけ）を新しい順に
  const dateKeys = Object.keys(yearDates).sort().reverse().filter((d) => filt(yearDates[d]).length);
  const youbiOf = (d) => (yearDates[d][0] || {}).youbi || '';
  if (!cyokyoState.date || !dateKeys.includes(cyokyoState.date)) cyokyoState.date = dateKeys[0];
  if (!cyokyoState.date) { root.innerHTML = `<div class="empty">${esc(cyokyoState.year)}年${two ? 'の2歳' : ''}の調教データがありません。</div>`; return; }
  const works = filt(yearDates[cyokyoState.date] || []);
  const finCell = (w) => {
    if (w.fin == null) return '<td></td>';
    const cls = w.fin >= 1 && w.fin <= 3 ? `fin${w.fin}` : '';
    return `<td class="${cls}">${w.fin}着</td>`;
  };
  // 対象レース（この追切が向けられた次走）を race_id から 月/日 R番 に復元
  // race_id: YYYY[4] 回[2] 場[2] 日次[2] R[2] 月日[4] → [10:12]=R, [12:14]=月, [14:16]=日
  const targetRace = (rid) => (!rid || rid.length < 16) ? '' : `${+rid.slice(12, 14)}/${+rid.slice(14, 16)} ${+rid.slice(10, 12)}R`;
  const sortBy = cyokyoState.sort || '3f';   // 3f=3F順 / 1f=終い1F最速順
  // 偏差値: 拠点別基準（大井の時計は大井、小林の時計は小林…）。標本不足の拠点は場全体基準へフォールバック。
  // 坂路はt3(=t_half)優先、無ければt2(=t_3f)にフォールバック（小林坂はコースが短くt3がほぼ記録されない）。
  const hanroVal = (w) => w.t3 != null ? w.t3 : w.t2;
  const hensachiOf = (w) => {
    const base = facilityBase(w.course, w.hanro);
    const val = w.hanro ? hanroVal(w) : w.t2;
    return (base && base.std && val != null) ? 50 + 10 * (base.mean - val) / base.std : null;
  };
  const sortVal = (w) => w.hanro ? hanroVal(w) : w.t2;
  // 最終追いバッジ＋対象レース（いつ・何レースに向けた追切か）
  const finalCell = (w) => `<td class="small l">${w.final ? '<span class="badge arrow-up">最終追い</span> ' : ''}${targetRace(w.rid)}</td>`;
  // 拠点（大井/小林/牧場/門別 等）ごとにグループ化。場所が違う時計を混ぜて見せない。
  // 優先順位＝自場(state.track) → 小林（大井の主要提携厩舎）→ 牧場（外厩）→ 残りは件数順
  const usable = works.filter((w) => (w.hanro && (w.t3 != null || w.t2 != null)) || (w.honba && w.t2 != null));
  const groups = new Map();
  for (const w of usable) {
    const f = courseFacility(w.course);
    if (!groups.has(f)) groups.set(f, []);
    groups.get(f).push(w);
  }
  const priority = [state.track, '小林', '牧場'];
  const facilities = [...groups.keys()].sort((a, b) => {
    const pa = priority.indexOf(a), pb = priority.indexOf(b);
    if (pa !== -1 || pb !== -1) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
    return groups.get(b).length - groups.get(a).length;
  });
  const other = works.length - usable.length;
  // 門別坂（坂路）は実測ではt4(4F系)がほぼ存在せず(1907本中30本=1.6%)、脚色もほぼ記録されない(1.7%)。
  // 本馬場は5F(t4)が7割・脚色は100%記録される。坂路と本馬場を別表に分けた以上、
  // 存在しない列を出し続けるのは無意味なので表側で分岐して落とす（データは元のまま・表示だけ調整）。
  const rowHtml = (w, i, kind) => {
    const z = hensachiOf(w);
    const lap = w.hanro ? hanroLapCells(w.t4, w.t3, w.t2, w.t1, z) : { str: '', tag: '' };
    const pb = w.hanro ? w.pb : w.pb_honba;
    const timeCells = kind === 'hanro'
      ? `<td class="num ${sortBy === '3f' && i < 3 ? 'f1' : ''}">${w.t3 != null ? w.t3.toFixed(1) : ''}</td>
         <td class="num">${w.t2 != null ? w.t2.toFixed(1) : ''}</td>
         <td class="num ${sortBy === '1f' && i < 3 ? 'f1' : ''}">${w.t1 != null ? w.t1.toFixed(1) : ''}</td>
         <td class="small l">${lap.str}${lap.tag}</td>`
      : `<td class="num">${w.t4 != null ? w.t4.toFixed(1) : ''}</td>
         <td class="num ${sortBy === '3f' && i < 3 ? 'f1' : ''}">${w.t3 != null ? w.t3.toFixed(1) : ''}</td>
         <td class="num">${w.t2 != null ? w.t2.toFixed(1) : ''}</td>
         <td class="num ${sortBy === '1f' && i < 3 ? 'f1' : ''}">${w.t1 != null ? w.t1.toFixed(1) : ''}</td>`;
    return `<tr>
      <td>${i + 1}</td>
      <td class="l"><a class="horse-link" data-horse="${esc(w.name)}">${esc(w.name)}</a>${pb ? ' <span class="badge arrow-up">自己ベスト</span>' : ''}${w.cls ? ` <span class="badge">${esc(w.cls)}</span>` : ''}</td>
      <td>${esc(w.sex || '')}</td><td class="l small">${esc(w.trainer || '')}</td><td>${esc(w.course)}</td><td>${esc(w.baba || '')}</td>
      ${timeCells}
      <td class="num">${z != null ? z.toFixed(1) : ''}</td>
      ${finCell(w)}${finalCell(w)}${kind === 'honba' ? `<td>${esc(w.ashiiro || '')}</td>` : ''}<td class="l">${esc(w.tanpyo || '')}</td>
    </tr>`;
  };
  const facAnchor = (f, i) => `cyo-fac-${i}`;
  // 拠点が複数ある日はワンタップで各表へ飛べるボタン（本数入り）を出す。1拠点だけの日は不要。
  const jumpButtons = facilities.length > 1 ? `<div class="controls">拠点
    <div class="racetabs">${facilities.map((f, i) => `<button onclick="document.getElementById('${facAnchor(f, i)}').scrollIntoView({behavior:'smooth',block:'start'})" style="width:auto;padding:6px 10px">${esc(f)} <b>${groups.get(f).length}</b>本</button>`).join('')}</div>
  </div>` : '';
  // 坂路と本馬場は時計の単位（測る距離）が全く違うため、同じ表で数値順に混ぜない（本馬場が坂路の後ろに埋もれて見えなくなる不具合の修正）。
  const sortFn = (a, b) => sortBy === '1f'
    ? (a.t1 == null ? 99 : a.t1) - (b.t1 == null ? 99 : b.t1)
    : (sortVal(a) == null ? 99 : sortVal(a)) - (sortVal(b) == null ? 99 : sortVal(b));
  const subTableHtml = (label, list, kind) => !list.length ? '' : `
    <div class="small" style="margin:8px 0 2px;opacity:.75">${esc(label)}（${list.length}本）</div>
    <table>
      <tr><th>#</th><th>馬名</th><th>馬齢</th><th>厩舎</th><th>コース</th><th>馬場</th>${
        kind === 'hanro'
          ? '<th>3F</th><th>2F</th><th>1F</th><th>ラップ</th>'
          : '<th>5F</th><th>4F</th><th>3F</th><th>1F</th>'
      }<th>偏差値</th><th>着順</th><th>最終追い/対象R</th>${kind === 'honba' ? '<th>脚色</th>' : ''}<th>短評</th></tr>
      ${list.map((w, i) => rowHtml(w, i, kind)).join('')}
    </table>`;
  const facilityBlocks = facilities.map((f, i) => {
    const grp = groups.get(f);
    const hanroList = grp.filter((w) => w.hanro).sort(sortFn);
    const honbaList = grp.filter((w) => w.honba).sort(sortFn);
    const isHome = f === state.track;
    return `<div class="card tablewrap" id="${facAnchor(f, i)}"${isHome ? ' style="border:1px solid var(--accent)"' : ''}>
      <b${isHome ? ' style="color:var(--accent)"' : ''}>${isHome ? '🏇 ' : ''}${esc(f)}（${cyokyoState.date}）${grp.length}本</b>
      ${subTableHtml('坂路', hanroList, 'hanro')}
      ${subTableHtml('本馬場', honbaList, 'honba')}
    </div>`;
  }).join('');

  root.innerHTML = `
  <div class="controls">
    <span>年</span>
    <div class="racetabs">${cyokyoState.years.map((y) => `<button data-cyear="${y}" class="${cyokyoState.year === y ? 'active' : ''}" style="width:auto;padding:6px 12px">${y}</button>`).join('')}</div>
    <button data-cyo-two class="${two ? 'active' : ''}" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);cursor:pointer">2歳限定${two ? ' ✓' : ''}</button>
    <span style="margin-left:10px">並び</span>
    <div class="racetabs">
      <button data-cyo-sort="3f" class="${sortBy === '3f' ? 'active' : ''}" style="width:auto;padding:6px 12px">3F順</button>
      <button data-cyo-sort="1f" class="${sortBy === '1f' ? 'active' : ''}" style="width:auto;padding:6px 12px">終い1F順</button>
    </div>
  </div>
  <div class="controls">調教日
    <div class="racetabs">${dateKeys.map((d) => `<button data-cdate="${d}" class="${cyokyoState.date === d ? 'active' : ''}" style="width:auto;padding:6px 8px">${d.slice(5).replace('-', '.')}(${youbiOf(d)})</button>`).join('')}</div>
  </div>
  <div class="note">${cyokyoState.date}${youbiOf(cyokyoState.date) ? `(${youbiOf(cyokyoState.date)})` : ''} の追切：${facilities.map((f) => `${esc(f)} <b>${groups.get(f).length}</b>本`).join(' ・ ') || 'なし'}${other ? ` ・ 他${other}本（時計未記録）` : ''}${two ? '（2歳限定）' : ''}　※終い1F順で並べ替え可</div>
  ${jumpButtons}
  ${facilityBlocks || '<div class="empty">この日の調教データがありません。</div>'}
  <div class="legend">時計欄は坂路コースなら4F/3F/2F/1F、本馬場系コースなら5F/4F/3F/1Fとして読む（終い1Fは本馬場ではほぼ未記録）。偏差値は<b>拠点別基準</b>（大井の時計は大井、小林の時計は小林…と場所ごとに比較・標本が少ない拠点は場全体基準へフォールバック）・50が平均。着順は各馬の次走結果。<span class="badge arrow-up">最終追い</span>＝その次走前で最後の追切（拠点を問わず最後の1本）。ラップ・加速/失速判定は坂路のみ：<span class="badge conf-S">加速</span>尻上がり／<span class="badge conf-C">失速</span>終い掛かる／<span class="badge conf-S">🔥好走</span>偏差値60+×加速（実測 次走複勝率59%・坂路の最終追い分析）。</div>`;
}

  new Promise((_, rej) => setTimeout(() => rej(new Error('タイムアウト（通信が遅い可能性）')), ms))]);

// 父/母父タップ → その血統の産駒一覧（既存の馬モーダルを流用）。産駒名タップで各馬詳細へ。
function openPedModal(type, name) {
  const st = state.stats || {};
  const list = ((type === 'bms' ? st.bms_horses : st.sire_horses) || {})[name] || [];
  $('horseModal').hidden = false;
  $('horseModalTitle').textContent = `${type === 'bms' ? '母父' : '父'} ${name} の産駒（${state.track}・${list.length}頭）`;

    <td class="num">${n}</td>
    <td class="num small">${c1}-${c2}-${c3}-${out}</td>
    <td class="num ${n && c1 / n >= 0.15 ? 'best' : ''}">${n ? Math.round(c1 / n * 100) : 0}%</td>
    <td class="num ${n && t3 / n >= 0.4 ? 'best' : ''}">${n ? Math.round(t3 / n * 100) : 0}%</td></tr>`;
  }).join('');

    <tr><th>産駒</th><th>走数</th><th>着別(1-2-3-着外)</th><th>勝率</th><th>複勝率</th></tr>${rows || '<tr><td colspan="5">データなし</td></tr>'}</table>
    <div class="legend">走数の多い順。着別＝1着-2着-3着-着外の度数。産駒名をタップでその馬の成績・調教。${state.track}出走のある産駒のみ。</div></div>`;
}

async function openHorseModal(nameOrId, byId, displayName) {
  const modal = $('horseModal');
  modal.hidden = false;
  $('horseModalTitle').textContent = (displayName || (byId ? '' : nameOrId) || '') + ' の成績・調教';
  $('horseModalBody').innerHTML = '<div class="empty">読み込み中…</div>';
  try {
    const sel = 'horse_name,umaban,finish,pop,win_odds,time_str,first3f,last3f,passing,corner4_pos,comment,sex_age,jockey,body_weight,weight_diff,race_id,chihou_races(race_date,track,race_no,klass,race_name,distance_m,going,soubi:extra->>馬装具)';
    const filt = byId ? `horse_id=eq.${encodeURIComponent(nameOrId)}` : `horse_name=eq.${encodeURIComponent(nameOrId)}`;
    const results = await withTimeout(sbGet(`chihou_results?${filt}&select=${sel}&order=race_id.desc&limit=40`), 10000);
    const name = displayName || (results[0] && results[0].horse_name) || (byId ? null : nameOrId);

  }
}

function renderHorseModal(results, cyokyo) {
  markFirstBlinker(results, (r) => equipOfRun((r.chihou_races || {}).soubi, r.umaban));   // 初ブリンカー判定
  const ymd = (d) => (d ? d.slice(2).replace(/-/g, '/') : '');   // 26/06/25（年度も表示）
  // クラス＝race_name(条件)から級を抽出（C4-2組/オープン/未勝利…）＋特別名(klassがサラ以外の時)
  const classLabel = (ra) => {
    const toks = (ra.race_name || '').split(/[,、]/).map((t) => t.trim()).filter(Boolean);
    const cls = toks.find((t) => /組|オープン|未勝利|新馬|認定/.test(t)) || toks.find((t) => !/^サラ|歳/.test(t)) || (ra.race_name || ra.klass || '');
    const sp = (ra.klass && !/^サラ|歳/.test(ra.klass)) ? ra.klass : '';
    return esc(sp ? `${cls}・${sp}` : cls);
  };
  const resRowHtml = (r, rest) => {
    const ra = r.chihou_races || {};
    const finCls = r.finish >= 1 && r.finish <= 3 ? `fin${r.finish}` : '';
    return `<tr class="${rest ? 'res-rest' : ''}"${rest ? ' hidden' : ''}>
      <td class="vlink" data-vd="${ra.race_date || ''}" data-vr="${ra.race_no ?? ''}" data-vt="${esc(ra.track || '')}" title="クリックで映像">▶${ymd(ra.race_date)}</td><td class="racelink" data-rid="${esc(r.race_id || '')}" data-rd="${ra.race_date || ''}" title="クリックでそのレースの出馬表・成績へ">${esc(ra.track)}${ra.race_no ?? ''}R</td>
      <td>${esc(r.sex_age || '')}</td><td class="l">${classLabel(ra)}</td>
      <td class="l">${equipBadges(equipOfRun(ra.soubi, r.umaban), r._binkFirst) || '<span class="sub">-</span>'}</td>
      <td>${ra.distance_m ?? ''}m</td><td>${esc(ra.going || '')}</td>
      <td class="${finCls}">${r.finish != null ? r.finish + '着' : '-'}</td>
      <td class="l">${esc(r.jockey || '')}</td><td class="num">${esc(r.time_str || '')}</td>
      <td class="num">${r.first3f != null ? r.first3f.toFixed(1) : ''}</td>
      <td class="num">${r.last3f != null ? r.last3f.toFixed(1) : ''}</td>
      <td class="num">${esc(r.passing || '')}</td><td>${esc(r.corner4_pos || '')}${tripTag(ra.race_date, r.corner4_pos)}</td>
      <td class="num">${r.pop != null ? r.pop + '人' : ''}</td>
      <td class="num">${r.win_odds ?? ''}</td>
      <td class="num">${r.body_weight ?? ''}${r.weight_diff != null ? `(${fmtDiff(r.weight_diff)})` : ''}</td>
    </tr>`;
  };
  const resRows = results.slice(0, 10).map((r) => resRowHtml(r, false)).join('')
    + results.slice(10).map((r) => resRowHtml(r, true)).join('')
    + (results.length > 10 ? `<tr><td colspan="17" style="text-align:center;padding:6px"><button class="foldbtn" onclick="const rs=this.closest('table').querySelectorAll('.res-rest');const show=rs[0].hidden;rs.forEach(e=>e.hidden=!show);this.textContent=show?'▲ 閉じる':'▼ 残り${results.length - 10}件を表示'">▼ 残り${results.length - 10}件を表示</button></td></tr>` : '');

  // ---- 条件別成績（距離・馬場・時間帯=レース番号）着別度数と複勝率 ----
  const rr = results.filter((r) => r.finish != null && r.chihou_races);
  const tally = (rs) => {
    const t = [0, 0, 0, 0];
    for (const r of rs) { const f = r.finish; t[f === 1 ? 0 : f === 2 ? 1 : f === 3 ? 2 : 3]++; }
    const n = rs.length, top3 = t[0] + t[1] + t[2];
    return { n, chaku: `${t[0]}-${t[1]}-${t[2]}-${t[3]}`, fuku: n ? top3 / n : 0 };
  };
  const groupBy = (keyFn) => {
    const m = new Map();
    for (const r of rr) { const k = keyFn(r); if (k == null) continue; (m.get(k) || m.set(k, []).get(k)).push(r); }
    return m;
  };
  const bdRows = (m, order) => (order || [...m.keys()]).filter((k) => m.has(k)).map((k) => {
    const t = tally(m.get(k));
    return `<tr><td class="l">${esc(String(k))}</td><td class="num">${t.n}</td><td class="num">${t.chaku}</td><td class="num ${t.fuku >= 0.5 ? 'best' : ''}">${(t.fuku * 100).toFixed(0)}%</td></tr>`;
  }).join('');
  const bdTable = (title, rows) => `<div><h4 style="margin:8px 0 2px;font-size:13px">${title}</h4><table>
    <tr><th>条件</th><th>数</th><th>着別(1-2-3-着外)</th><th>複勝率</th></tr>${rows || '<tr><td colspan="4">-</td></tr>'}</table></div>`;
  const distM = groupBy((r) => (r.chihou_races.distance_m ? r.chihou_races.distance_m + 'm' : null));
  const goingM = groupBy((r) => r.chihou_races.going);
  const rnoM = groupBy((r) => { const n = r.chihou_races.race_no; return n == null ? null : n <= 4 ? '1-4R(前半)' : n <= 8 ? '5-8R(中盤)' : '9-12R(後半)'; });
  const distOrder = [...distM.keys()].sort((a, b) => parseInt(a) - parseInt(b));
  const bdHtml = rr.length ? `
    <h3 class="sec">条件別成績（着別度数・複勝率）</h3>
    <div class="grid2">${bdTable('距離別', bdRows(distM, distOrder))}${bdTable('馬場状態別', bdRows(goingM, ['良', '稍重', '重', '不良']))}</div>
    ${bdTable('レース番号別（前半/中盤/後半）※検証: 同一クラスでは後半が速い傾向は無し＝後半は上級条件が多いための見かけ。この馬がどの時間帯に強いかの目安', bdRows(rnoM, ['1-4R(前半)', '5-8R(中盤)', '9-12R(後半)']))}` : '';

  // 調教履歴（全レースの works を日付降順に統合・重複除去）
  const seen = new Set();
  const works = [];
  for (const c of cyokyo) for (const w of (c.works || [])) {
    const key = `${w.date}_${(w.times || {}).t_half}`;
    if (w.date && !seen.has(key)) { seen.add(key); works.push(w); }
  }
  works.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  // 自己ベスト（坂路3F=t_half優先、無ければ本馬場「真の3F」=t_3fの最速とその日付）
  const hanroWorks = works.filter((w) => (w.course || '').includes('坂') && (w.times || {}).t_half != null);
  let bestW = null;
  for (const w of hanroWorks) if (!bestW || w.times.t_half < bestW.times.t_half) bestW = w;
  let bestLine;
  if (bestW) {
    bestLine = `坂路3F 自己ベスト <b>${bestW.times.t_half.toFixed(1)}秒</b>（${bestW.date.slice(0, 4)}/${mmdd(bestW.date)}${bestW.youbi ? `(${bestW.youbi})` : ''} ${esc(bestW.course)}）`;
  } else {
    const honbaWorks = works.filter((w) => !(w.course || '').includes('坂') && (w.times || {}).t_3f != null);
    let bestO = null;
    for (const w of honbaWorks) if (!bestO || w.times.t_3f < bestO.times.t_3f) bestO = w;
    bestLine = bestO
      ? `本馬場3F 自己ベスト <b>${bestO.times.t_3f.toFixed(1)}秒</b>（${bestO.date.slice(0, 4)}/${mmdd(bestO.date)}${bestO.youbi ? `(${bestO.youbi})` : ''} ${esc(bestO.course)}）`
      : '調教データなし';
  }
  // 各レースの最終追い（そのレース直前で最も新しい追切日）を特定
  const finalDates = {};   // 追切日 → その追切が最終追いだったレース日リスト
  const workDates = [...new Set(works.map((w) => w.date).filter(Boolean))].sort();
  for (const r of results) {
    const rd = (r.chihou_races || {}).race_date;
    if (!rd) continue;
    let last = null;
    for (const wd of workDates) if (wd < rd) last = wd; else break;
    if (last && (new Date(rd) - new Date(last)) <= 20 * 86400000) {
      (finalDates[last] = finalDates[last] || []).push(rd);
    }
  }
  const cyoYears = [...new Set(works.map((w) => (w.date || '').slice(0, 4)).filter(Boolean))].sort().reverse();
  const cyoDefYr = cyoYears[0] || '';
  const cyoYrBtns = cyoYears.length > 1
    ? `<div class="cyo-yr-tabs">${cyoYears.map((y) => `<button class="cyo-yr-btn${y === cyoDefYr ? ' active' : ''}" data-yr="${y}">${y}年</button>`).join('')}<button class="cyo-yr-btn" data-yr="all">全て</button></div>`
    : '';
  const cyoRows = works.map((w) => {
    const t = w.times || {};
    const fd = finalDates[w.date];
    const finalBadge = fd ? ` <span class="badge arrow-up">最終追い→${mmdd(fd[fd.length - 1])}</span>` : '';
    const yr = (w.date || '').slice(0, 4);
    return `<tr class="cyo-row" data-yr="${yr}"${(cyoDefYr && yr !== cyoDefYr) ? ' hidden' : ''}><td>${mmdd(w.date)}${w.youbi ? `(${w.youbi})` : ''}${finalBadge}</td><td>${esc(w.course || '')}</td>
      <td>${esc(w.baba || '')}</td>
      <td class="num">${t.t_5f != null ? t.t_5f.toFixed(1) : ''}</td>
      <td class="num">${t.t_half != null ? t.t_half.toFixed(1) : ''}</td>
      <td class="num">${t.t_3f != null ? t.t_3f.toFixed(1) : ''}</td>
      <td class="num">${t.t_1f != null ? t.t_1f.toFixed(1) : ''}</td>
      <td>${esc(w.ashiiro || '')}</td><td class="l">${esc(w.tanpyo || '')}</td></tr>`;
  }).join('');

  $('horseModalBody').innerHTML = `
    <h3 class="sec">成績（新しい順）</h3>
    <div class="tablewrap"><table>
      <tr><th>日付</th><th>場R</th><th>馬齢</th><th>クラス</th><th>装備</th><th>距離</th><th>馬場</th><th>着</th><th>騎手</th><th>タイム</th><th>前3F</th><th>上3F</th><th>通過</th><th>4角</th><th>人気</th><th>単勝</th><th>馬体重</th></tr>
      ${resRows || '<tr><td colspan="17">成績なし</td></tr>'}
    </table></div>
    <div class="legend">${EQUIP_LEGEND}</div>
    <div class="legend">4角の${TRIP_LEGEND}</div>
    ${bdHtml}
    <h3 class="sec">調教履歴（新しい順）</h3>
    <div class="note">${bestLine}</div>
    ${cyoYrBtns}
    <div class="tablewrap"><table>
      <tr><th>日付</th><th>コース</th><th>馬場</th><th>坂4F/本5F</th><th>坂3F/本4F</th><th>坂2F/本3F</th><th>1F</th><th>脚色</th><th>短評</th></tr>
      ${cyoRows || '<tr><td colspan="9">調教データなし</td></tr>'}
    </table></div>`;
}

// 制御
// ============================================================
function switchView(v) {
  state.view = v;
  if (v === 'deck' && location.hash) history.replaceState(null, '', location.pathname + location.search);
  if (v !== 'race') { clearInterval(state.oddsTimer); state.oddsTimer = null; }  // レース以外はライブオッズ停止
  if (v !== 'deck') { clearInterval(state.deckTimer); state.deckTimer = null; }
  $('deckRoot').hidden = v !== 'deck';
  $('raceRoot').hidden = v !== 'race';
  $('analysisRoot').hidden = v !== 'analysis';
  $('cyokyoRoot').hidden = v !== 'cyokyo';
  $('nokenRoot').hidden = v !== 'noken';
  renderViewTabs();   // アクティブ状態を反映して再構築（場で能検/シミュレータの有無も変わる）
  if (v === 'deck') {
    renderDeck();
    clearInterval(state.deckTimer);
    state.deckTimer = setInterval(() => { if (state.view === 'deck') refreshDeckData(); }, 60000);
  }
  if (v === 'race' && !state.raceId) {
    const races = state.dates[state.date] || [];
    const target = deckFocusRace(races, state.date) || races[0];
    if (target) selectRace(target.race_id, 'yosou');
  }
  if (v === 'analysis') renderAnalysis();
  if (v === 'cyokyo') renderCyokyo();
  if (v === 'noken') renderNoken();
}

// ---- 能検ゾーン（能力検査：2歳馬の資格試験）。動画=ホッカイドウ公式 / 成績=競馬ブック ----
// タイム文字列 → 秒。"50.8"→50.8 / "1.02.9"→62.9
function nkSec(t) {
  if (!t) return null;
  const p = String(t).trim().split('.');
  if (p.length === 2) return +p[0] + +p[1] / 10;
  if (p.length === 3) return +p[0] * 60 + +p[1] + +p[2] / 10;
  return null;
}
// テン1F = タイム − 上がり3F（800m=4Fなら先頭1F・1000m=5Fなら先頭2F相当）
function nkTen(h) {
  const a = nkSec(h.time), b = nkSec(h.last3f);
  return (a != null && b != null) ? (a - b).toFixed(1) : '';
}
const nkOkCls = (v) => v === '合格' ? 'nk-ok' : v === '不合格' ? 'nk-ng' : '';

// その後の成績（能検日より後の出走）を着順/馬体重/距離/タイムで。無ければ未出走。
function nkAfterHtml(hid, afterDate) {
  const hist = state.nokenHist || {};
  const runs = (hist[hid] || []).filter((r) => r.date && r.date > afterDate)
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  if (!hid || !(hid in hist)) return '<span class="sub">…</span>';
  if (!runs.length) return '<span class="nk-unraced">未出走</span>';
  return runs.map((r) => {
    const fin = r.fin != null ? `${r.fin}着` : '-';
    const finCls = r.fin >= 1 && r.fin <= 3 ? `fin${r.fin}` : '';
    return `<span class="nk-after"><b class="${finCls}">${fin}</b> ${mmdd(r.date)} ${r.dist || '?'}m ${esc(r.time || '')}${r.weight ? ` ${r.weight}kg` : ''}</span>`;
  }).join('<br>');
}

function nkRowHtml(h, afterDate, extra) {
  return `<tr>
    ${extra || ''}
    <td class="${h.fin >= 1 && h.fin <= 3 ? 'fin' + h.fin : ''}">${esc(h.fin)}</td>
    <td>${esc(h.umaban)}</td>
    <td class="l">${h.horse_id
      ? `<a class="horse-link" data-hid="${esc(h.horse_id)}">${esc(h.name)}</a>`
      : esc(h.name)}</td>
    <td>${esc(h.sexage)}</td>
    <td class="num"><b>${esc(h.time)}</b></td>
    <td class="num">${nkTen(h)}</td>
    <td class="num">${esc(h.last3f)}</td>
    <td class="l">${esc(h.comment)}</td>
    <td class="num">${esc(h.weight)}</td>
    <td class="${nkOkCls(h.ok)}">${esc(h.ok)}</td>
    <td class="l small nk-aftercell">${nkAfterHtml(h.horse_id, afterDate)}</td>
  </tr>`;
}

function nokenRaceCard(r, afterDate, hasDayVideo) {
  const rows = (r.rows || []).map((h) => nkRowHtml(h, afterDate)).join('');
  const table = (r.rows || []).length ? `
    <div class="tablewrap"><table class="nk-table">
      <tr><th>着</th><th>番</th><th>馬名</th><th>性齢</th><th>タイム</th><th>テン1F</th><th>上3F</th><th>寸評</th><th>馬体重</th><th>合否</th><th>その後の成績</th></tr>
      ${rows}
    </table></div>` : '<div class="note">成績データなし</div>';
  const meta = [r.dist ? `${r.dist}m` : '', r.weather && r.going ? `${r.weather}・${r.going}` : (r.going || '')]
    .filter(Boolean).join('　');
  // 動画: 門別=レース単位のmp4、大井等=開催日単位のYouTube（下のnk-day-head側で1本表示・ここでは重複案内しない）
  const videoBlock = r.mp4
    ? `<details class="nk-vid"><summary>▶ 動画を見る</summary>
        <video class="nk-video" controls preload="none" playsinline src="${esc(r.mp4)}#t=0.1"></video></details>`
    : (hasDayVideo ? '' : '<div class="note nk-novid">動画なし（2歳馬以外・未配信）</div>');
  return `
    <div class="nk-card">
      <div class="nk-cardhead"><b>${r.no}R${meta ? ` <span class="sub">${esc(meta)}</span>` : ''}</b>
        ${r.pdf ? `<a href="${esc(r.pdf)}" target="_blank" rel="noopener" class="nk-pdf">📄 成績表PDF</a>` : ''}</div>
      ${videoBlock}
      ${table}
    </div>`;
}

// タイム順（日別・全レース横断で最速順）
function nokenTimeCard(day) {
  const all = [];
  for (const r of day.races) for (const h of (r.rows || [])) all.push({ ...h, no: r.no, dist: r.dist });
  all.sort((a, b) => (nkSec(a.time) ?? 999) - (nkSec(b.time) ?? 999));
  const rows = all.map((h, i) => `<tr>
    <td class="num">${i + 1}</td>
    <td>${h.no}R</td>
    <td class="num">${h.dist || '?'}m</td>
    <td>${esc(h.umaban)}</td>
    <td class="l">${h.horse_id
      ? `<a class="horse-link" data-hid="${esc(h.horse_id)}">${esc(h.name)}</a>`
      : esc(h.name)}</td>
    <td>${esc(h.sexage)}</td>
    <td class="num"><b>${esc(h.time)}</b></td>
    <td class="num">${nkTen(h)}</td>
    <td class="num">${esc(h.last3f)}</td>
    <td class="l">${esc(h.comment)}</td>
    <td class="num">${esc(h.weight)}</td>
    <td class="${nkOkCls(h.ok)}">${esc(h.ok)}</td>
    <td class="l small nk-aftercell">${nkAfterHtml(h.horse_id, day.date)}</td>
  </tr>`).join('');
  return `<div class="nk-card"><div class="tablewrap"><table class="nk-table">
    <tr><th>順</th><th>R</th><th>距離</th><th>番</th><th>馬名</th><th>性齢</th><th>タイム</th><th>テン1F</th><th>上3F</th><th>寸評</th><th>馬体重</th><th>合否</th><th>その後の成績</th></tr>
    ${rows}
  </table></div>
  <div class="note">※距離をまたいで純タイム最速順（800mと1000mが混在。距離列でご確認を）。2歳と古馬は同条件で走っても体力差でタイムが比較にならないため、上の「2歳限定」で絞り込み可。</div></div>`;
}

// 性齢文字列（牡2/牝3等）から馬齢を取り出す。2歳限定フィルタで使用。
const nkAge = (sexage) => { const m = String(sexage || '').match(/(\d+)/); return m ? +m[1] : null; };

async function renderNoken() {
  const root = $('nokenRoot');
  if (!state.noken) {
    root.innerHTML = '<div class="empty">読み込み中…</div>';
    try { state.noken = await state.provider.loadNoken(); }
    catch (e) { state.noken = null; }
    buildNokenIndex();
  }
  const nk = state.noken;
  if (!nk || !(nk.days || []).length) {
    root.innerHTML = '<div class="empty">能検データがありません</div>';
    return;
  }
  const days = nk.days;
  if (!state.nokenDate || !days.some((d) => d.date === state.nokenDate)) state.nokenDate = days[0].date;
  const dayRaw = days.find((d) => d.date === state.nokenDate) || days[0];
  const twoOnly = !!state.nokenTwoOnly;
  // 2歳限定: 古馬の調教試験と2歳の能力試験が同じ距離設定で混在しタイム順で紛れるための絞り込み
  const day = twoOnly
    ? { ...dayRaw, races: dayRaw.races.map((r) => ({ ...r, rows: (r.rows || []).filter((h) => nkAge(h.sexage) === 2) })) }
    : dayRaw;
  const dateBtns = days.map((d) =>
    `<button class="nk-date-btn${d.date === state.nokenDate ? ' active' : ''}" data-nkdate="${d.date}">${mmdd(d.date)}</button>`).join('');
  const hasDayVideo = !!day.video;   // 大井等: レース単位ではなく開催日単位のYouTube動画
  const nvid = hasDayVideo ? 1 : day.races.filter((r) => r.mp4).length;
  const sort = state.nokenSort || 'race';
  const racesShown = twoOnly ? day.races.filter((r) => (r.rows || []).length) : day.races;
  const body = sort === 'time' ? nokenTimeCard(day) : racesShown.map((r) => nokenRaceCard(r, day.date, hasDayVideo)).join('');
  const videoSrc = state.track === '門別' ? 'ホッカイドウ競馬公式' : '南関競馬公式(nankankeiba.com)';
  const dayVideoBlock = hasDayVideo ? `<details class="nk-vid"><summary>▶ 能試映像を見る（${dayRaw.races.length}R分・1本）</summary>
    <iframe width="100%" height="400" style="border:0;max-width:640px;aspect-ratio:16/9;height:auto" loading="lazy"
      src="https://www.youtube.com/embed/${esc(day.video.split('/').pop())}" allowfullscreen></iframe></details>` : '';
  root.innerHTML = `
    <div class="card">
      <h2 style="margin:0 0 4px">🎓 能力検査（能検）</h2>
      <div class="note">2歳馬の競走資格を確認する試験走（古馬の調教試験も同じ日に混在）。合格が新馬・未勝利への出走資格。動画=${videoSrc}／成績（タイム・上り3F・寸評・合否）=競馬ブック。「その後の成績」=能検後の実戦（着順/距離/タイム/馬体重）。馬名タップで詳細へ。${nk.updated ? `${esc(nk.updated)}更新。` : ''}</div>
      <div class="nk-dates">${dateBtns}</div>
      <div class="nk-day-head">${dayRaw.date}（${dayRaw.races.length}R・動画${nvid}）
        <span class="nk-sort">
          <button class="nk-sort-btn${sort === 'race' ? ' active' : ''}" data-nksort="race">レース別</button>
          <button class="nk-sort-btn${sort === 'time' ? ' active' : ''}" data-nksort="time">タイム順</button>
        </span>
        <button class="nk-sort-btn${twoOnly ? ' active' : ''}" data-nktwoonly style="margin-left:6px">2歳限定${twoOnly ? ' ✓' : ''}</button>
        ${day.all_pdf ? `<a href="${esc(day.all_pdf)}" target="_blank" rel="noopener" class="nk-pdf">📄 全レース成績表PDF</a>` : ''}</div>
      ${dayVideoBlock}
    </div>
    <div class="nk-grid${sort === 'time' ? ' nk-grid-1' : ''}">${body || '<div class="empty">この開催日のデータがありません</div>'}</div>`;
  loadNokenHist(dayRaw);   // その後の成績を裏で取得して該当セルを更新（絞り込み前の全馬分をキャッシュ）
}

// 能検を horse_id で引ける索引（新馬出馬表・その後成績用）
function buildNokenIndex() {
  const idx = {};
  for (const d of ((state.noken && state.noken.days) || [])) {
    for (const r of d.races) for (const h of (r.rows || [])) {
      if (!h.horse_id) continue;
      const prev = idx[h.horse_id];
      if (!prev || d.date > prev.date) {
        idx[h.horse_id] = { date: d.date, no: r.no, dist: r.dist, going: r.going,
          time: h.time, last3f: h.last3f, ten: nkTen(h), ok: h.ok, comment: h.comment, fin: h.fin };
      }
    }
  }
  state.nokenByHorse = idx;
}

// 表示中の開催日の全馬の「その後の成績」をまとめて取得（1バッチ）→セル差し替え
async function loadNokenHist(day) {
  const ids = [];
  for (const r of day.races) for (const h of (r.rows || [])) if (h.horse_id) ids.push(h.horse_id);
  const need = ids.filter((id) => !state.nokenHist || !(id in state.nokenHist));
  if (!need.length) { refreshNokenAfterCells(day.date); return; }
  try {
    const raw = await state.provider.loadHistory([...new Set(need)]);
    state.nokenHist = state.nokenHist || {};
    for (const id of need) state.nokenHist[id] = raw[id] || [];   // 出走なしも空配列で確定
  } catch (e) { /* 取得失敗時は…のまま */ return; }
  if (state.view === 'noken' && state.nokenDate === day.date) refreshNokenAfterCells(day.date);
}

function refreshNokenAfterCells(afterDate) {
  for (const cell of $('nokenRoot').querySelectorAll('.nk-aftercell')) {
    const a = cell.closest('tr').querySelector('a.horse-link');
    if (a && a.dataset.hid) cell.innerHTML = nkAfterHtml(a.dataset.hid, afterDate);
  }
}

async function selectRace(raceId, sub) {
  state.raceId = raceId;
  const meta = (state.dates[state.date] || []).find((r) => r.race_id === raceId);
  state.sub = sub || (meta && meta.entries_only ? 'yosou' : state.sub || 'seiseki');
  renderTabs();
  renderSubTabs();
  location.hash = `${state.date}/${raceId}`;
  await renderRaceView();
}

function goHome() {
  // ブランドタップ→今日のレースデッキ（開催が無ければ最新開催日）へ
  $('horseModal').hidden = true;
  state.prevRace = null;
  const dates = Object.keys(state.dates);
  const today = jstToday();
  const target = state.dates[today] ? today : [...dates].sort().reverse()[0];
  if (!target) return;
  history.replaceState(null, '', location.pathname + location.search);
  state.raceId = null;
  setDeckDate(target);
  switchView('deck');
}

async function openHistoricalRace(raceId, date, sub) {
  // 馬モーダルの成績「場R」タップ→そのレースの出馬表・成績ページへ移動（sub指定で映像等へ直行）
  if (state.raceId && state.raceId !== raceId) {
    state.prevRace = { date: state.date, raceId: state.raceId, sub: state.sub, view: state.view };
  }
  $('horseModal').hidden = true;
  switchView('race');
  if (date && state.date !== date) {
    state.date = date;
    state.month = date.slice(0, 7);
    try { localStorage.setItem('mb_last_date', date); } catch (e) { /* プライベートモード等は無視 */ }
    renderMonths();
    renderDates();
  }
  await selectRace(raceId, sub);
}

async function goBackRace() {
  // 「← 戻る」ボタン: openHistoricalRaceで飛ぶ直前の状態へ一段階だけ戻す
  const p = state.prevRace;
  if (!p) return;
  state.prevRace = null;
  if (p.date && p.date !== state.date) {
    state.date = p.date;
    state.month = p.date.slice(0, 7);
    try { localStorage.setItem('mb_last_date', p.date); } catch (e) { /* プライベートモード等は無視 */ }
    renderMonths();
    renderDates();
  }
  if (p.view && p.view !== 'race') { switchView(p.view); return; }
  if (p.raceId) await selectRace(p.raceId, p.sub);
}

function selectDate(d) {
  state.date = d;
  state.month = d.slice(0, 7);
  try { localStorage.setItem(`nk_last_date_${trackCfg().prefix}`, d); } catch (e) { /* プライベートモード等は無視 */ }
  renderMonths();
  renderDates();
  const races = state.dates[d] || [];
  if (races.length) selectRace(races[0].race_id);
  else { renderTabs(); $('raceView').innerHTML = '<div class="empty">レースなし</div>'; }
}

// 場切替（門別/大井/船橋/川崎/浦和）。場ごとに別のstats/model/日程を読み直す。
function renderTrackSwitch() {
  $('trackSwitch').innerHTML = Object.keys(TRACKS).map((t) =>
    `<button class="${t === state.track ? 'active' : ''}" data-track="${t}">${t}</button>`).join('');
}

async function selectTrack(track) {
  if (track === state.track || !TRACKS[track]) return;
  state.track = track;
  state.stats = null; state.model = null; state.v3Predictions = null; state.dates = {}; state.raceId = null; state.prevRace = null;
  state.deckDataCheckedAt = null; state.deckRefreshError = null;
  state.noken = null; state.nokenByHorse = null;   // 能検は門別専用＝場切替でクリア
  cyokyoState.data = null; cyokyoState.date = null; cyokyoState.year = null; cyokyoState.byYear = {};
  cyokyoState.years = []; cyokyoState.base = null; cyokyoState.baseHonba = null; cyokyoState.local = null;   // 調教データも場ごとに読み直す
  state.view = 'deck';  // 場を変えたら、その場の今日を起点にする
  if (state.sub === 'sim') state.sub = 'seiseki';   // シミュレータsubからも離脱
  renderTrackSwitch();
  renderViewTabs();
  $('raceView').innerHTML = '<div class="empty">読み込み中…</div>';
  try { state.dates = await state.provider.listDates(); } catch (e) { state.dates = {}; }
  state.kakuPoints = null;
  state.statsPromise = Promise.all([
    state.provider.loadStats().then((s) => { state.stats = s; }),
    state.provider.loadModel().then((mo) => { state.model = mo; }),
    state.provider.loadV3Predictions().then((v) => { state.v3Predictions = v; state.deckDataCheckedAt = new Date(); }),
    state.provider.loadPoints().then((p) => { state.kakuPoints = p; }),
  ]);
  state.statsPromise.then(() => { if (state.view === 'deck' && state.track === track) renderDeck(); });
  const ds = Object.keys(state.dates).sort().reverse();
  const today = jstToday();
  if (ds.length) { setDeckDate(state.dates[today] ? today : ds[0]); switchView('deck'); }
  else { renderMonths(); renderDates(); renderTabs(); switchView('deck'); }
  // 全期間分は裏で取得して月/日セレクトへ反映
  if (state.provider === providers.supabase) {
    providers.supabase.listDatesFull().then((full) => {
      if (full && state.track === track) { state.dates = full; renderMonths(); renderDates(); if (state.view === 'deck') renderDeck(); }
    }).catch(() => {});
  }
}

async function init() {
  // ?track=大井 等で初期場を指定可（monbetsu.html/nankan.htmlのリダイレクト用）。既定は門別。
  const qtrack = new URLSearchParams(location.search).get('track');
  if (qtrack && TRACKS[qtrack]) state.track = qtrack;
  renderTrackSwitch();
  renderViewTabs();
  for (const name of ['supabase', 'local']) {
    try {
      state.dates = await providers[name].listDates();
      state.provider = providers[name];
      break;
    } catch (e) { /* 次のプロバイダへ */ }
  }
  if (!state.provider) {
    $('raceView').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }
  $('trackSwitch').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-track]');
    if (b) selectTrack(b.dataset.track);
  });
  // 起動は直近分だけで即表示→全期間分は裏で追って取得し月/日セレクトへ反映（表示中のレースは邪魔しない）
  if (state.provider === providers.supabase) {
    providers.supabase.listDatesFull().then((full) => {
      if (!full) return;
      state.dates = full;
      renderMonths(); renderDates();
      if (state.view === 'deck') renderDeck();
    }).catch(() => { /* 直近分のみで継続 */ });
  }
  // 統計は裏で読み込み（指数・テン偏差値に使う）
  state.statsPromise = Promise.all([
    state.provider.loadPoints().then((p) => { state.kakuPoints = p; }),
    state.provider.loadStats().then((s) => { state.stats = s; }),
    state.provider.loadModel().then((mo) => { state.model = mo; }),
    state.provider.loadV3Predictions().then((v) => { state.v3Predictions = v; state.deckDataCheckedAt = new Date(); }),
  ]);
  state.statsPromise.then(() => { if (state.view === 'deck') renderDeck(); });

  $('monthSel').addEventListener('change', (e) => {
    state.month = e.target.value;
    const ds = Object.keys(state.dates).filter((d) => d.startsWith(state.month));
    if (ds.length) selectDate(ds[0]);
  });
  $('dateSel').addEventListener('change', (e) => selectDate(e.target.value));
  $('raceTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-id]');
    if (b) selectRace(b.dataset.id);
  });
  $('subTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-sub]');
    if (b) { state.sub = b.dataset.sub; renderSubTabs(); renderRaceView(); }
  });
  $('viewTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-view]');
    if (b) switchView(b.dataset.view);
  });
  $('cyokyoRoot').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');
    if (hl) { e.preventDefault(); openHorseModal(hl.dataset.horse); return; }
    const y = e.target.closest('button[data-cyear]');
    if (y) { cyokyoState.year = y.dataset.cyear; cyokyoState.date = null; renderCyokyo(); return; }
    const t = e.target.closest('button[data-cyo-two]');
    if (t) { cyokyoState.twoOnly = !cyokyoState.twoOnly; renderCyokyo(); return; }  // 日付は保持
    const so = e.target.closest('button[data-cyo-sort]');
    if (so) { cyokyoState.sort = so.dataset.cyoSort; renderCyokyo(); return; }
    const d = e.target.closest('button[data-cdate]');
    if (d) { cyokyoState.date = d.dataset.cdate; renderCyokyo(); }
  });
  $('nokenRoot').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');
    if (hl && hl.dataset.hid) { e.preventDefault(); openHorseModal(hl.dataset.hid, true, hl.textContent.trim()); return; }
    const s = e.target.closest('button[data-nksort]');
    if (s) { state.nokenSort = s.dataset.nksort; renderNoken(); return; }
    const two = e.target.closest('button[data-nktwoonly]');
    if (two) { state.nokenTwoOnly = !state.nokenTwoOnly; renderNoken(); return; }
    const b = e.target.closest('button[data-nkdate]');
    if (b) { state.nokenDate = b.dataset.nkdate; renderNoken(); }
  });
  // 馬名リンク（レース各ビュー）と モーダルを閉じる
  $('raceView').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');
    if (hl) { e.preventDefault(); const nm = hl.textContent.trim();
      hl.dataset.hid ? openHorseModal(hl.dataset.hid, true, nm) : openHorseModal(hl.dataset.horse, false, nm); return; }
    const od = e.target.closest('[data-live-odds]');
    if (od) { e.stopPropagation(); showOddsFlow(od.dataset.liveOdds, od); return; }
    const ne = e.target.closest('.np-eizo');   // 新聞型: 過去走の「▶映像」→そのレースの映像タブへ直行
    if (ne && ne.dataset.rid) { openHistoricalRace(ne.dataset.rid, ne.dataset.rd, 'eizo'); return; }
    const rl = e.target.closest('.racelink');   // 前後半タイムの日付タップ→そのレースへ
    if (rl && rl.dataset.rid) { openHistoricalRace(rl.dataset.rid, rl.dataset.rd); return; }
    const de = e.target.closest('.danwa-expand');   // 厩舎の話「▼過去のコメント」展開
    if (de) { toggleDanwaPast(de); return; }
    const dea = e.target.closest('.danwa-expand-all');   // 厩舎の話「全馬の過去コメントを開く/閉じる」
    if (dea) { toggleDanwaPastAll(dea); return; }
    const kk = e.target.closest('td.fold');   // スマホ: 長い列（根拠/寸評/近3走/調教）をタップで展開
    if (kk) kk.classList.toggle('open');
  });
  // オッズ推移ポップアップを画面クリックで閉じる
  document.addEventListener('click', (e) => {
    const p = $('oddsFlowPop');
    if (p && !p.hidden && !e.target.closest('[data-live-odds]') && !e.target.closest('#oddsFlowPop')) p.hidden = true;
  });
  // 逆/恵バッジ・装備バッジ: タップで説明ポップアップ（キャプチャ段階＝行の展開より先に処理）
  document.addEventListener('click', (e) => {
    const tag = e.target.closest('.triptag, .eqp');
    if (tag && tag.getAttribute('data-tip')) { e.stopPropagation(); e.preventDefault(); showTripPop(tag); }
  }, true);
  document.addEventListener('click', (e) => {
    const tp = document.getElementById('tripPop');
    if (tp && !tp.hidden && !e.target.closest('.triptag, .eqp')) tp.hidden = true;
  });
  $('horseModalClose').addEventListener('click', () => { $('horseModal').hidden = true; });
  $('horseModal').addEventListener('click', (e) => {
    const vl = e.target.closest('.vlink');   // 成績の日付クリック→そのレース映像
    if (vl && vl.dataset.vd && vl.dataset.vr) { openRaceVideoModal(vl.dataset.vd, vl.dataset.vr, vl.dataset.vt); return; }
    const rl = e.target.closest('.racelink');   // 成績の場Rクリック→そのレースの出馬表・成績ページへ
    if (rl && rl.dataset.rid) { openHistoricalRace(rl.dataset.rid, rl.dataset.rd); return; }
    const yb = e.target.closest('.cyo-yr-btn');   // 調教履歴の年切替
    if (yb) { filterCyoYear(yb.dataset.yr); return; }
    const hl = e.target.closest('a.horse-link');   // 産駒一覧などモーダル内の馬名タップ→その馬詳細へ
    if (hl) { e.preventDefault(); const nm = hl.textContent.trim();
      hl.dataset.hid ? openHorseModal(hl.dataset.hid, true, nm) : openHorseModal(hl.dataset.horse, false, nm); return; }
    if (e.target.id === 'horseModal') $('horseModal').hidden = true;
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') $('horseModal').hidden = true; });
  $('analysisRoot').addEventListener('click', (e) => {
    const pn = e.target.closest('.pedname');   // 父/母父名タップ→産駒一覧モーダル
    if (pn) { e.preventDefault(); openPedModal(pn.dataset.pt, pn.dataset.pn); return; }
    const rc = e.target.closest('a[data-rec]');
    if (rc) { e.preventDefault(); openRecordDetail(rc.dataset.rec, rc.dataset.kind); return; }
    if (e.target.id === 'recFold') {
      const rest = $('recRest'); rest.hidden = !rest.hidden;
      e.target.textContent = rest.hidden ? '▼ 過去の月も表示' : '▲ 閉じる';
    }
  });

  const dates = Object.keys(state.dates);
  if (!(await applyHash())) {
    // 初期日付: 前回選択（場別に記憶） → 今日 → 最新 の優先順
    let saved = null;
    try { saved = localStorage.getItem(`nk_last_date_${trackCfg().prefix}`); } catch (e) { /* 無視 */ }
    const today = jstToday();
    setDeckDate((saved && state.dates[saved]) ? saved : (state.dates[today] ? today : dates[0]));
    switchView('deck');
  }
  // ブラウザの戻る/進むボタンでレース間を移動できるように
  window.addEventListener('hashchange', () => {
    if (!location.hash) { goHome(); return; }
    if (state.view !== 'race') switchView('race');
    applyHash();
  });
}

// URLハッシュ(#日付/race_id)から表示状態を復元。ブラウザの戻る/進むボタン対応の共通処理
async function applyHash() {
  const [hd, hr] = location.hash.slice(1).split('/');
  if (!hd || !state.dates[hd]) return false;
  if (state.date === hd && state.raceId === hr) return true;   // 自分で書き換えたhashは無視（無限ループ防止）
  state.prevRace = null;   // ブラウザの戻る/進むで移動した時点で「戻る」ボタンの行き先は無効化
  state.date = hd;
  state.month = hd.slice(0, 7);
  renderMonths();
  renderDates();
  if (hr && state.dates[hd].some((r) => r.race_id === hr)) { switchView('race'); renderTabs(); await selectRace(hr); return true; }
  setDeckDate(hd);
  switchView('deck');
  return true;
}
init();
</script>
</body>
</html>
