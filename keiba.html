<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KEIBA PULSE｜地方競馬ビューア</title>
<style>
/* 色は必ずCSS変数で定義する（ダークモード上書き漏れ防止・インライン色禁止） */
:root {
  --bg: #f4f5f7;
  --panel: #ffffff;
  --text: #1c2330;
  --sub: #66707f;
  --border: #d9dee6;
  --accent: #1a6fb5;
  --accent-text: #ffffff;
  --chip-bg: #e8eef5;
  --row-alt: #f7f9fb;
  --gold: #c9a227;
  --silver: #8b97a5;
  --bronze: #b0722d;
  --hl-first3f: #d7ecff;
  --hl-last3f: #ffe3e3;
  --hl-best: #dff5e1;
  --note: #8a6d00;
  --note-bg: #fff7dd;
  --bias-front: #b95e12;
  --bias-back: #1a6fb5;
  --arrow-up: #1f9c3f;
  --arrow-down: #d63c3c;
  --waku1-bg:#ffffff; --waku1-tx:#333333;
  --waku2-bg:#222222; --waku2-tx:#ffffff;
  --waku3-bg:#d63c3c; --waku3-tx:#ffffff;
  --waku4-bg:#2e63c4; --waku4-tx:#ffffff;
  --waku5-bg:#e8c62b; --waku5-tx:#333333;
  --waku6-bg:#2f9c50; --waku6-tx:#ffffff;
  --waku7-bg:#e07f2a; --waku7-tx:#ffffff;
  --waku8-bg:#e88fb0; --waku8-tx:#333333;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14181f;
    --panel: #1d232d;
    --text: #e6eaf0;
    --sub: #97a1af;
    --border: #333c49;
    --accent: #4d9fe0;
    --accent-text: #10151c;
    --chip-bg: #26303d;
    --row-alt: #202733;
    --hl-first3f: #17405e;
    --hl-last3f: #55272c;
    --hl-best: #1e4226;
    --note: #e3c65b;
    --note-bg: #33301c;
    --bias-front: #e8964d;
    --bias-back: #4d9fe0;
    --waku1-bg:#e9e9e9; --waku1-tx:#222222;
  }
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }  /* display:flex等のクラス指定にhidden属性が負けないよう保証 */
body { margin: 0; background: var(--bg); color: var(--text);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, system-ui, sans-serif; font-size: 14px; }
header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
header h1 { font-size: 17px; margin: 0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--chip-bg); color: var(--sub); }
.conf-S { background: var(--hl-best); color: var(--arrow-up); font-weight: bold; }
.conf-A { background: var(--hl-first3f); color: var(--bias-back); font-weight: bold; }
.conf-C { background: var(--note-bg); color: var(--note); font-weight: bold; }
#oddsFlowPop { position: absolute; z-index: 200; background: var(--panel); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.4); max-width: 230px; font-size: 12px; }
td[data-live-odds] { cursor: pointer; }
td[data-live-odds]:hover { text-decoration: underline; }
#evMonitor.ev-hit { background: rgba(46,160,67,.16); border: 1px solid rgba(46,160,67,.55); border-radius: 8px; font-size: 13px; }
#evMonitor.ev-idle { opacity: .75; }
.trackswitch { display: flex; gap: 4px; margin-left: 14px; flex-wrap: wrap; }
.trackswitch button { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; font-weight: bold; }
.trackswitch button.active { background: #7a5cc0; color: #fff; border-color: #7a5cc0; }
.viewtabs { display: flex; gap: 4px; margin-left: auto; }
.viewtabs button, .subtabs button {
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; }
.viewtabs button.active, .subtabs button.active {
  background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
main { padding: 10px 14px 40px; max-width: 1280px; margin: 0 auto; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); font-size: 14px; }
.racetabs { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.racetabs button { padding: 6px 0; width: 44px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; }
.racetabs button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
.raceinfo h2 { font-size: 15px; margin: 0 0 6px; }
.raceinfo .meta { color: var(--sub); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
.raceinfo .pacebar { margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; }
.raceinfo .pacebar span b { color: var(--accent); }
.note { font-size: 11px; color: var(--note); background: var(--note-bg); border-radius: 4px; padding: 2px 6px; display: inline-block; margin-top: 6px; }
.subtabs { display: flex; gap: 4px; margin: 8px 0; }
.tablewrap { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; white-space: nowrap; }
th, td { border: 1px solid var(--border); padding: 4px 6px; text-align: center; font-size: 12.5px; }
th { background: var(--chip-bg); color: var(--sub); font-weight: normal; }
tr:nth-child(even) td { background: var(--row-alt); }
td.l { text-align: left; }
td.num { font-variant-numeric: tabular-nums; }
td.small { font-size: 11px; line-height: 1.5; text-align: left; }
/* スマホ(≤760px)のみ: ①馬名列を左端固定 ③根拠をタップ展開（デスクトップは一切変えない） */
@media (max-width: 760px) {
  td.stickyname, th.stickyname { position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,.18); }
  td.stickyname { background: var(--panel); }
  tr:nth-child(even) td.stickyname { background: var(--row-alt); }
  th.stickyname { z-index: 3; background: var(--chip-bg); }
  td.fold { max-width: 116px; cursor: pointer; }
  td.fold .kv { display: block; white-space: normal; max-height: 3em; overflow: hidden; line-height: 1.4; }
  td.fold::after { content: '⋯'; color: var(--accent); font-weight: bold; font-size: 12px; }
  td.fold.open { max-width: 72vw; }
  td.fold.open .kv { max-height: none; }
  td.fold.open::after { content: '▴'; }
}
.waku { display: inline-block; width: 20px; border-radius: 4px; font-weight: bold; }
.w1 { background: var(--waku1-bg); color: var(--waku1-tx); border: 1px solid var(--border); }
.w2 { background: var(--waku2-bg); color: var(--waku2-tx); }
.w3 { background: var(--waku3-bg); color: var(--waku3-tx); }
.w4 { background: var(--waku4-bg); color: var(--waku4-tx); }
.w5 { background: var(--waku5-bg); color: var(--waku5-tx); }
.w6 { background: var(--waku6-bg); color: var(--waku6-tx); }
.w7 { background: var(--waku7-bg); color: var(--waku7-tx); }
.w8 { background: var(--waku8-bg); color: var(--waku8-tx); }
td.f1 { background: var(--hl-first3f) !important; font-weight: bold; }
td.a1 { background: var(--hl-last3f) !important; font-weight: bold; }
td.best { background: var(--hl-best) !important; font-weight: bold; }
.fin1 { color: var(--gold); font-weight: bold; }
.fin2 { color: var(--silver); font-weight: bold; }
.fin3 { color: var(--bronze); font-weight: bold; }
.empty { color: var(--sub); text-align: center; padding: 30px 0; }
.legend { font-size: 11px; color: var(--sub); margin-top: 6px; }
.legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: -2px; }
.legend .sw.f { background: var(--hl-first3f); }
.legend .sw.a { background: var(--hl-last3f); }
.legend .sw.b { background: var(--hl-best); }
.arrow-up { color: var(--arrow-up); font-weight: bold; }
.arrow-down { color: var(--arrow-down); font-weight: bold; }
.bias-front { color: var(--bias-front); font-weight: bold; }
.bias-back { color: var(--bias-back); font-weight: bold; }
.kyaku { display: inline-block; font-size: 10px; padding: 0 4px; border-radius: 3px; background: var(--chip-bg); color: var(--sub); }
.triptag { display: inline-block; font-size: 10px; font-weight: 700; padding: 0 4px; border-radius: 3px; margin-left: 2px; line-height: 1.6; cursor: pointer; }
.tg-gyaku { background: rgba(204,138,46,0.16); color: #cc8a2e; }
.tg-megumi { background: rgba(106,143,208,0.15); color: #6a8fd0; }
.tg-kaku { background: rgba(216,120,64,0.18); color: #d87840; }
.tippop { position: absolute; z-index: 1000; max-width: 240px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.5; box-shadow: 0 4px 16px rgba(0,0,0,0.28); }
.eqp { display: inline-block; font-size: 9px; font-weight: 700; padding: 0 3px; border-radius: 3px; margin-left: 2px; line-height: 1.5; cursor: pointer; }
.eq-bink { background: rgba(220,80,80,0.16); color: #d05050; }
.eq-cheek { background: rgba(120,170,90,0.16); color: #6a9f4a; }
.eq-shadow { background: rgba(150,120,200,0.16); color: #8a6ac0; }
.eq-first { background: #d84040; color: #fff; }
.vlink { cursor: pointer; color: var(--accent); white-space: nowrap; }
.vlink:hover { text-decoration: underline; }
.racelink { cursor: pointer; white-space: nowrap; }
.racelink:hover { text-decoration: underline; }
.backbtn-row { text-align: right; }
.backbtn { margin: 0 0 4px; }
.hometitle { cursor: pointer; }
.hometitle:hover { opacity: 0.8; text-decoration: underline; }
.countdown { color: var(--accent); font-weight: bold; }
.vidwrap { max-width: 680px; margin: 0 auto; overflow: hidden; }
.vidcard { transform-origin: top left; }
.nk-dates { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0 4px; }
.nk-date-btn { border: 1px solid var(--border); background: var(--chip-bg); color: var(--text);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
.nk-date-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.nk-day-head { margin-top: 6px; font-weight: bold; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.nk-pdf { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: normal; }
.nk-pdf:hover { text-decoration: underline; }
.nk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 12px; margin-top: 12px; }
@media (max-width: 520px) { .nk-grid { grid-template-columns: 1fr; } }
.nk-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px; min-width: 0; }
.nk-cardhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.nk-cardhead .sub { font-weight: normal; color: var(--sub); font-size: 12px; }
.nk-video { width: 100%; border-radius: 6px; background: #000; display: block; aspect-ratio: 4 / 3; }
.nk-novid { text-align: center; padding: 10px; background: var(--chip-bg); border-radius: 6px; }
.nk-table { font-size: 12px; margin-top: 6px; }
.nk-table th { background: var(--chip-bg); color: var(--sub); font-weight: normal; white-space: nowrap; }
.nk-table td, .nk-table th { padding: 3px 5px; }
.nk-ok { color: #2f9c50; font-weight: bold; }
.nk-ng { color: #d84040; font-weight: bold; }
.nk-grid-1 { grid-template-columns: 1fr !important; }
.nk-vid { margin-bottom: 6px; }
.nk-vid > summary { cursor: pointer; list-style: none; display: inline-block; padding: 4px 12px;
  border-radius: 6px; background: var(--chip-bg); border: 1px solid var(--border); font-size: 13px; user-select: none; }
.nk-vid > summary::-webkit-details-marker { display: none; }
.nk-vid[open] > summary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.nk-vid .nk-video { margin-top: 6px; }
.nk-sort { display: inline-flex; gap: 3px; }
.nk-sort-btn { border: 1px solid var(--border); background: var(--chip-bg); color: var(--text);
  border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
.nk-sort-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.nk-unraced { color: var(--sub); }
.nk-aftercell { white-space: nowrap; }
.nk-after { display: inline-block; }
.nk-badge { background: #7a5cc0; color: #fff; }
.cyo-more { margin-top: 2px; }
.cyo-more > summary { cursor: pointer; color: var(--accent); font-size: 11px; list-style: none; }
.cyo-more > summary::-webkit-details-marker { display: none; }
.cyo-more > summary::before { content: '▸ '; }
.cyo-more[open] > summary::before { content: '▾ '; }
.cyo-yr-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 8px; }
.cyo-yr-btn { font-size: 12px; padding: 3px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--chip-bg); color: var(--sub); cursor: pointer; }
.cyo-yr-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
h3.sec { font-size: 14px; margin: 16px 0 6px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
a.horse-link { color: var(--accent); text-decoration: none; cursor: pointer; }
a.horse-link:hover { text-decoration: underline; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex;
  align-items: flex-start; justify-content: center; padding: 20px; z-index: 50; overflow-y: auto; }
.modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  max-width: 920px; width: 100%; padding: 12px 14px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.modal-head button { border: 1px solid var(--border); background: var(--panel); color: var(--text);
  border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 15px; }
.foldbtn { border: 1px solid var(--border); background: var(--chip-bg); color: var(--text);
  border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; margin: 6px 0; }
.foldbtn:disabled { opacity: .5; cursor: default; }
/* 出馬表の新聞型表示（通常⇔新聞の切替。新聞は1馬=1行で近3走を紙面風のマス目に展開） */
.np-toggle { display: flex; gap: 6px; align-items: center; margin: 10px 0 8px; }
.np-toggle button { border: 1px solid var(--border); background: var(--chip-bg); color: var(--text); border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 12px; }
.np-toggle button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.np-wrap { overflow-x: auto; }
.np-grid { display: flex; flex-direction: column; gap: 8px; min-width: 1150px; }
.np-row { display: grid; grid-template-columns: 176px repeat(5, 1fr); gap: 6px; }
.np-horse { border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; font-size: 12px; line-height: 1.6; background: var(--panel); }
.np-mark { font-size: 15px; }
.np-meta { color: var(--sub); font-size: 11px; }
.np-run { border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 11px; line-height: 1.55; background: var(--row-alt); }
.np-run-head { display: flex; justify-content: space-between; color: var(--sub); }
.np-run-sub { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.np-fin { font-size: 21px; font-weight: 800; text-align: center; margin: 2px 0; }
.np-fin small { font-size: 11px; font-weight: normal; }
.np-time b { font-size: 12px; }
.np-fast { color: var(--arrow-up); font-weight: bold; }
.np-slow { color: var(--arrow-down); }
.np-si { border: 1px solid var(--border); border-radius: 5px; padding: 0 4px; background: var(--chip-bg); }
.np-jk { color: var(--sub); }
.np-cmt { color: var(--sub); border-top: 1px dashed var(--border); margin-top: 3px; padding-top: 2px; }
.np-run-empty { display: flex; align-items: center; justify-content: center; color: var(--sub); }
.np-fallback { grid-column: 2 / -1; padding: 8px 10px; }
.np-race-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-eizo { border: 1px solid var(--border); background: var(--chip-bg); color: var(--accent); border-radius: 5px;
  padding: 1px 8px; cursor: pointer; font-size: 10px; margin-top: 3px; }
.np-dist { font-size: 11px; color: var(--sub); }
.np-dist-today { color: var(--text); font-weight: bold; border: 1px solid var(--border); border-radius: 5px;
  padding: 0 4px; display: inline-block; background: var(--chip-bg); }
tr.clickable { cursor: pointer; }
tr.clickable:hover td { background: var(--chip-bg); }

/* 今日の判断を最短距離で見せるレースデッキ */
:root {
  --brand: #2448d8;
  --brand-deep: #11236f;
  --brand-soft: #edf1ff;
  --positive: #07845b;
  --positive-soft: #e5f7f0;
  --danger: #c44545;
  --danger-soft: #fff0ef;
  --ink-on-dark: #f8faff;
  --deck-shadow: 0 12px 32px rgba(24, 38, 82, .10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --brand: #7694ff;
    --brand-deep: #182759;
    --brand-soft: #263154;
    --positive: #58d6aa;
    --positive-soft: #183b32;
    --danger: #ff8f8f;
    --danger-soft: #48282c;
    --ink-on-dark: #f8faff;
    --deck-shadow: 0 12px 32px rgba(0, 0, 0, .28);
  }
}
header.appbar {
  position: sticky; top: 0; z-index: 40; min-height: 64px; padding: 9px max(14px, calc((100vw - 1280px) / 2));
  background: color-mix(in srgb, var(--panel) 92%, transparent); backdrop-filter: blur(14px);
  box-shadow: 0 1px 0 var(--border);
}
.brand { display: flex; align-items: center; gap: 9px; cursor: pointer; min-width: max-content; }
.brand:hover { opacity: .88; }
.brand-mark { display: grid; place-items: center; width: 37px; height: 37px; border-radius: 12px;
  color: #fff; background: linear-gradient(145deg, #3159f5, #17277c); font-size: 17px; font-weight: 900;
  box-shadow: 0 7px 18px rgba(39, 73, 213, .27); }
.brand-copy { display: flex; flex-direction: column; line-height: 1.05; }
.brand-copy h1 { font-size: 16px; letter-spacing: .06em; }
.brand-copy small { color: var(--sub); font-size: 9px; letter-spacing: .09em; margin-top: 4px; }
.deck-shell { padding: 8px 0 30px; }
.deck-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 2px 0 12px; }
.deck-date { display: flex; align-items: center; gap: 7px; }
.deck-date button, .deck-cta, .deck-secondary { border: 0; border-radius: 10px; cursor: pointer; font-weight: 700; }
.deck-date button { width: 34px; height: 34px; background: var(--chip-bg); color: var(--text); font-size: 18px; }
.deck-date button:disabled { opacity: .3; cursor: default; }
.deck-date strong { min-width: 116px; text-align: center; font-size: 14px; }
.deck-mode { color: var(--sub); font-size: 11px; display: flex; align-items: center; gap: 6px; }
.deck-mode::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--positive); box-shadow: 0 0 0 4px var(--positive-soft); }
.deck-hero { position: relative; overflow: hidden; display: grid; grid-template-columns: 1.35fr .65fr; gap: 20px;
  min-height: 220px; padding: clamp(22px, 4vw, 38px); border-radius: 22px; color: var(--ink-on-dark);
  background: radial-gradient(circle at 86% 18%, rgba(110, 139, 255, .55), transparent 31%),
    linear-gradient(135deg, #101a43 0%, #14296e 58%, #234ed1 100%); box-shadow: var(--deck-shadow); }
.deck-hero::after { content: ''; position: absolute; right: -70px; bottom: -120px; width: 320px; height: 320px;
  border: 1px solid rgba(255,255,255,.13); border-radius: 50%; box-shadow: 0 0 0 54px rgba(255,255,255,.035), 0 0 0 108px rgba(255,255,255,.025); }
.deck-kicker { color: #aebeff; font-size: 11px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
.deck-hero h2 { margin: 11px 0 7px; font-size: clamp(24px, 4vw, 37px); line-height: 1.15; letter-spacing: .01em; }
.deck-hero .hero-meta { color: rgba(255,255,255,.72); display: flex; gap: 12px; flex-wrap: wrap; }
.deck-hero .countdown { display: block; color: #fff; margin-top: 13px; min-height: 19px; }
.deck-hero .countdown:empty { display: none; }
.hero-actions { margin-top: 22px; display: flex; gap: 8px; flex-wrap: wrap; }
.deck-cta { padding: 11px 17px; background: #fff; color: #172a74; }
.deck-secondary { padding: 11px 15px; color: #fff; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); }
.hero-decision { position: relative; z-index: 1; align-self: stretch; display: flex; flex-direction: column; justify-content: center;
  padding: 18px; border: 1px solid rgba(255,255,255,.17); border-radius: 16px; background: rgba(8, 15, 44, .34); backdrop-filter: blur(8px); }
.hero-decision small { color: rgba(255,255,255,.65); }
.hero-decision b { margin-top: 8px; font-size: 21px; }
.hero-decision .hero-ai { margin-top: 15px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.14); }
.hero-decision .hero-ai span { display: block; color: rgba(255,255,255,.65); font-size: 11px; }
.hero-decision .hero-ai strong { display: block; margin-top: 4px; font-size: 15px; }
.deck-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0 18px; }
.summary-chip { padding: 11px 13px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); }
.summary-chip span { display: block; color: var(--sub); font-size: 10px; }
.summary-chip b { display: block; margin-top: 3px; font-size: 16px; }
.deck-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin: 18px 2px 9px; }
.deck-section-head h3 { margin: 0; font-size: 15px; }
.deck-section-head span { color: var(--sub); font-size: 11px; }
.deck-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.race-deck-card { position: relative; overflow: hidden; display: grid; grid-template-columns: 82px 1fr; min-height: 160px;
  border: 1px solid var(--border); border-radius: 16px; background: var(--panel); box-shadow: 0 4px 15px rgba(30,45,80,.04); }
.race-deck-card.is-next { border-color: color-mix(in srgb, var(--brand) 60%, var(--border)); box-shadow: 0 8px 25px rgba(43,75,205,.13); }
.race-deck-card.is-finished { opacity: 1; }
.race-deck-card.is-finished .race-time-rail { color: var(--sub); }
.race-time-rail { padding: 17px 10px; text-align: center; background: color-mix(in srgb, var(--chip-bg) 66%, transparent); }
.race-time-rail b { display: block; font-size: 22px; font-variant-numeric: tabular-nums; }
.race-time-rail span { display: inline-block; margin-top: 5px; color: var(--sub); font-size: 10px; font-weight: 700; }
.race-deck-card.is-next .race-time-rail { background: var(--brand-soft); color: var(--brand); }
.race-card-main { min-width: 0; padding: 15px 16px 13px; }
.race-card-head { display: flex; align-items: center; gap: 7px; }
.race-card-head h4 { min-width: 0; overflow: hidden; margin: 0; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; }
.race-no { flex: 0 0 auto; color: var(--brand); font-weight: 900; }
.race-card-meta { color: var(--sub); font-size: 11px; margin-top: 5px; }
.decision-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 12px; }
.decision-cell { min-width: 0; padding: 8px 9px; border-radius: 9px; background: var(--chip-bg); }
.decision-cell span { display: block; color: var(--sub); font-size: 9px; }
.decision-cell b { display: block; overflow: hidden; margin-top: 3px; white-space: nowrap; text-overflow: ellipsis; font-size: 12px; }
.decision-cell.buy { background: var(--positive-soft); color: var(--positive); }
.decision-cell.pass { background: var(--danger-soft); color: var(--danger); }
.decision-cell.result { background: var(--positive-soft); color: var(--positive); }
.decision-cell.missing { background: var(--note-bg); color: var(--note); }
.deck-mode.is-error::before { background: var(--danger); box-shadow: 0 0 0 4px var(--danger-soft); }
.race-card-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 11px; }
.race-card-actions small { color: var(--sub); font-size: 9px; }
.race-open { border: 0; padding: 7px 11px; border-radius: 8px; background: var(--brand); color: #fff; font-weight: 700; cursor: pointer; }
.deck-ended { padding: 27px; border-radius: 18px; color: var(--text); background: var(--panel); border: 1px solid var(--border); }
.deck-ended h2 { margin: 0 0 6px; }

@media (max-width: 760px) {
  body { padding-bottom: 72px; }
  header.appbar { position: sticky; min-height: 54px; padding: 7px 10px; gap: 7px; }
  .brand-mark { width: 34px; height: 34px; border-radius: 11px; }
  .brand-copy small { display: none; }
  .trackswitch { order: 3; width: 100%; margin: 0; overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; }
  .trackswitch::-webkit-scrollbar, .racetabs::-webkit-scrollbar, .subtabs::-webkit-scrollbar, .viewtabs::-webkit-scrollbar { display: none; }
  .trackswitch button { flex: 0 0 auto; }
  .viewtabs { position: fixed; z-index: 60; left: 0; right: 0; bottom: 0; height: 64px; margin: 0; padding: 7px 8px max(7px, env(safe-area-inset-bottom));
    gap: 3px; overflow-x: auto; background: color-mix(in srgb, var(--panel) 95%, transparent); border-top: 1px solid var(--border); backdrop-filter: blur(14px); }
  .viewtabs button { flex: 1 0 64px; min-width: 64px; padding: 5px 6px; border: 0; background: transparent; color: var(--sub); font-size: 11px; }
  .viewtabs button.active { color: var(--brand); background: var(--brand-soft); }
  main { padding: 8px 10px 25px; }
  .deck-shell { padding-top: 3px; }
  .deck-toolbar { margin-bottom: 8px; }
  .deck-mode { display: none; }
  .deck-hero { grid-template-columns: 1fr; min-height: 0; padding: 23px 20px; border-radius: 18px; }
  .deck-hero h2 { font-size: 26px; }
  .hero-decision { padding: 13px 14px; }
  .hero-decision b { font-size: 17px; }
  .hero-decision .hero-ai { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; gap: 8px; }
  .hero-decision .hero-ai strong { text-align: right; }
  .deck-summary { gap: 5px; margin: 8px 0 15px; }
  .summary-chip { padding: 9px 8px; }
  .summary-chip b { font-size: 14px; }
  .deck-grid { grid-template-columns: 1fr; }
  .race-deck-card { grid-template-columns: 72px 1fr; min-height: 154px; border-radius: 14px; }
  .race-time-rail b { font-size: 19px; }
  .race-card-main { padding: 13px 12px 11px; }
  .controls, .racetabs, .subtabs { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  .controls { padding-bottom: 2px; }
  .controls label { flex: 0 0 auto; }
  .racetabs button, .subtabs button { flex: 0 0 auto; }
  .subtabs { position: sticky; top: 101px; z-index: 25; padding: 6px 0; background: var(--bg); }
  .card { border-radius: 12px; }
  .tablewrap { margin-left: -4px; margin-right: -4px; padding: 0 4px; }
}

/* ============================================================
   Race Intelligence Workspace
   詳細画面は「判断 → 上位馬 → 期待値 → 詳細」の順に読む。
   スマホでは横長テーブルをカードへ置き換える。
   ============================================================ */
:root {
  --surface-2: color-mix(in srgb, var(--panel) 82%, var(--chip-bg));
  --surface-3: color-mix(in srgb, var(--panel) 64%, var(--chip-bg));
  --glow: color-mix(in srgb, var(--brand) 22%, transparent);
  --hairline: color-mix(in srgb, var(--border) 74%, transparent);
}
body {
  background:
    radial-gradient(circle at 50% -180px, color-mix(in srgb, var(--brand) 9%, transparent), transparent 430px),
    var(--bg);
  letter-spacing: .005em;
}
main { max-width: 1320px; }
#raceRoot { padding-bottom: 18px; }
.race-navigation {
  margin: 6px 0 12px; padding: 10px 12px 8px; border: 1px solid var(--hairline);
  border-radius: 16px; background: color-mix(in srgb, var(--panel) 88%, transparent);
  box-shadow: 0 8px 30px rgba(20, 35, 75, .05); backdrop-filter: blur(14px);
}
.race-navigation .controls { margin: 0 0 7px; }
.race-navigation .controls::before {
  content: '開催'; color: var(--sub); font-size: 10px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase;
}
.race-navigation select { min-height: 38px; border-radius: 10px; border-color: var(--hairline); font-weight: 700; }
.race-navigation .racetabs { margin: 3px 0 7px; gap: 5px; }
.race-navigation .racetabs button {
  position: relative; width: 47px; min-height: 38px; border-radius: 10px; border-color: var(--hairline);
  background: var(--surface-2); font-weight: 800; transition: transform .16s ease, box-shadow .16s ease;
}
.race-navigation .racetabs button:hover { transform: translateY(-1px); }
.race-navigation .racetabs button.active {
  background: linear-gradient(145deg, color-mix(in srgb, var(--brand) 86%, #fff), var(--brand));
  color: #fff; box-shadow: 0 7px 18px var(--glow);
}
.race-navigation .subtabs { margin: 0; padding-top: 7px; border-top: 1px solid var(--hairline); }
.race-navigation .subtabs button {
  min-height: 39px; padding: 7px 15px; border-radius: 10px; border-color: transparent;
  background: transparent; color: var(--sub); font-weight: 750;
}
.race-navigation .subtabs button.active { color: var(--brand); background: var(--brand-soft); }

.race-hero-card {
  position: relative; overflow: hidden; margin: 12px 0; padding: clamp(18px, 3vw, 28px);
  border: 1px solid color-mix(in srgb, var(--brand) 23%, var(--border)); border-radius: 22px;
  background:
    radial-gradient(circle at 92% 4%, color-mix(in srgb, var(--brand) 17%, transparent), transparent 37%),
    linear-gradient(145deg, var(--panel), color-mix(in srgb, var(--panel) 91%, var(--brand-soft)));
  box-shadow: 0 18px 44px rgba(18, 31, 72, .08);
}
.race-hero-card::before {
  content: ''; position: absolute; inset: 0 auto 0 0; width: 4px;
  background: linear-gradient(var(--brand), color-mix(in srgb, var(--positive) 80%, var(--brand)));
}
.race-hero-top { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.race-identity { display: flex; align-items: center; gap: 15px; min-width: 0; }
.race-number-orb {
  flex: 0 0 auto; display: grid; place-items: center; width: 68px; height: 68px; border-radius: 21px;
  color: #fff; background: linear-gradient(145deg, #3159f5, #14277b); box-shadow: 0 12px 26px var(--glow);
  font-size: 23px; font-weight: 900; letter-spacing: -.04em;
}
.race-eyebrow { color: var(--brand); font-size: 10px; font-weight: 850; letter-spacing: .12em; text-transform: uppercase; }
.race-title-block { min-width: 0; }
.race-title-block h2 { margin: 5px 0 0; font-size: clamp(19px, 2.6vw, 29px); line-height: 1.2; }
.race-title-block p { margin: 6px 0 0; color: var(--sub); font-size: 12px; }
.race-start-panel {
  flex: 0 0 auto; min-width: 140px; padding: 12px 16px; border: 1px solid var(--hairline);
  border-radius: 15px; background: color-mix(in srgb, var(--panel) 73%, transparent); text-align: right;
}
.race-start-panel span { display: block; color: var(--sub); font-size: 9px; font-weight: 800; letter-spacing: .1em; }
.race-start-panel b { display: block; margin-top: 2px; font-size: 25px; font-variant-numeric: tabular-nums; }
.race-start-panel .countdown { margin-top: 3px; font-size: 11px; }
.race-facts { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
.race-fact {
  display: inline-flex; align-items: center; gap: 5px; min-height: 31px; padding: 6px 10px;
  border: 1px solid var(--hairline); border-radius: 10px; background: var(--surface-2); color: var(--sub); font-size: 11px;
}
.race-fact b { color: var(--text); font-size: 12px; }
.race-hero-card .pacebar { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
.race-hero-card .pacebar span { padding: 5px 9px; border-radius: 9px; background: var(--brand-soft); color: var(--sub); font-size: 10px; }
.race-hero-card .pacebar b { color: var(--brand); }
.race-hero-card .backbtn-row { position: absolute; right: 16px; top: 14px; }

.forecast-overview {
  position: relative; overflow: hidden; display: grid; grid-template-columns: minmax(270px, .78fr) 1.22fr;
  gap: 12px; margin: 12px 0; padding: 12px; border: 1px solid color-mix(in srgb, var(--brand) 25%, var(--border));
  border-radius: 20px; background: var(--panel); box-shadow: 0 16px 40px rgba(20, 34, 74, .07);
}
.forecast-overview::after {
  content: ''; position: absolute; width: 170px; height: 170px; right: -95px; top: -105px;
  border-radius: 50%; background: var(--glow); filter: blur(4px); pointer-events: none;
}
.forecast-leader {
  position: relative; z-index: 1; min-height: 208px; padding: 20px; border-radius: 15px; color: var(--ink-on-dark);
  background: radial-gradient(circle at 90% 10%, rgba(122,148,255,.5), transparent 35%), linear-gradient(145deg, #101a43, #1e43ba);
}
.forecast-kicker { color: #b8c7ff; font-size: 10px; font-weight: 850; letter-spacing: .14em; }
.forecast-mark { display: inline-grid; place-items: center; width: 34px; height: 34px; margin-top: 17px; border-radius: 11px; background: rgba(255,255,255,.14); font-size: 19px; }
.forecast-leader h3 { margin: 9px 0 0; font-size: 22px; line-height: 1.25; }
.forecast-leader .leader-number { color: #bac8ff; font-size: 12px; }
.probability-label { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-top: 18px; }
.probability-label span { color: rgba(255,255,255,.68); font-size: 10px; }
.probability-label b { font-size: 25px; }
.probability-track { height: 6px; margin-top: 7px; overflow: hidden; border-radius: 99px; background: rgba(255,255,255,.16); }
.probability-track i { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #74a3ff, #65e4c1); }
.leader-foot { display: flex; gap: 8px; margin-top: 12px; color: rgba(255,255,255,.76); font-size: 10px; }
.forecast-side { min-width: 0; padding: 5px 5px 3px; }
.forecast-side-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin: 1px 2px 9px; }
.forecast-side-head b { font-size: 14px; }
.forecast-side-head span { color: var(--sub); font-size: 10px; }
.contender-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
.contender-card {
  min-width: 0; padding: 13px; border: 1px solid var(--hairline); border-radius: 13px;
  background: linear-gradient(160deg, var(--surface-2), var(--panel));
}
.contender-top { display: flex; align-items: center; justify-content: space-between; gap: 7px; }
.contender-mark { color: var(--brand); font-size: 18px; font-weight: 900; }
.contender-card h4 { overflow: hidden; margin: 8px 0 2px; white-space: nowrap; text-overflow: ellipsis; font-size: 13px; }
.contender-card small { color: var(--sub); }
.contender-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
.contender-metrics span { padding: 6px; border-radius: 8px; background: var(--surface-3); color: var(--sub); font-size: 9px; }
.contender-metrics b { display: block; margin-top: 2px; color: var(--text); font-size: 12px; }
.forecast-insight {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 8px; padding: 11px 12px;
  border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface-2);
}
.forecast-insight span { color: var(--sub); font-size: 10px; }
.forecast-insight b { display: block; margin-top: 2px; font-size: 12px; }

.signal-strip {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 10px 0;
  padding: 10px 12px; border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface-2);
  color: var(--sub); font-size: 11px;
}
.signal-strip b { color: var(--text); }
.signal-live { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.signal-live::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--positive); box-shadow: 0 0 0 4px var(--positive-soft); }

.ev-board {
  margin: 12px 0; padding: 15px; border: 1px solid color-mix(in srgb, var(--positive) 28%, var(--border));
  border-radius: 18px; background: linear-gradient(145deg, var(--panel), color-mix(in srgb, var(--panel) 90%, var(--positive-soft)));
  box-shadow: 0 12px 34px rgba(16, 74, 57, .06);
}
.ev-board-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ev-title small { display: block; color: var(--positive); font-size: 9px; font-weight: 850; letter-spacing: .12em; }
.ev-title b { display: block; margin-top: 3px; font-size: 15px; }
.ev-audit-badge { padding: 6px 9px; border-radius: 10px; background: var(--positive-soft); color: var(--positive); font-size: 10px; font-weight: 800; }
.ev-spotlight { display: grid; grid-template-columns: 1.15fr repeat(3, .62fr); gap: 7px; margin: 12px 0; }
.ev-spotlight > div { min-width: 0; padding: 10px; border-radius: 11px; background: var(--surface-2); }
.ev-spotlight span { display: block; color: var(--sub); font-size: 9px; }
.ev-spotlight b { display: block; overflow: hidden; margin-top: 3px; white-space: nowrap; text-overflow: ellipsis; font-size: 13px; }
.ev-spotlight .ev-primary { background: var(--positive-soft); color: var(--positive); }
.ev-ticket-mobile { display: none; }
.ev-board .tablewrap { border: 1px solid var(--hairline); border-radius: 12px; }
.ev-board table { background: var(--panel); }
.ev-board th, .ev-board td { border-width: 0 0 1px; border-color: var(--hairline); padding: 7px 8px; }
.ev-board tr:last-child td { border-bottom: 0; }

.forecast-table-card { margin-top: 12px; padding: 0; overflow: hidden; border-radius: 18px; }
.forecast-table-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 15px 9px; }
.forecast-table-head b { font-size: 14px; }
.forecast-table-head span { color: var(--sub); font-size: 10px; }
.forecast-table-card .tablewrap { padding: 0 12px 12px; }
.forecast-table-card table { border: 1px solid var(--hairline); border-radius: 12px; overflow: hidden; }
.forecast-table-card th, .forecast-table-card td { padding: 7px 6px; border-color: var(--hairline); }
.forecast-table-card tbody tr:hover td { background: var(--brand-soft); }
.forecast-mobile-list { display: none; }
.prediction-disclosure { margin: 0 15px 14px; color: var(--sub); font-size: 11px; }
.prediction-disclosure summary { cursor: pointer; color: var(--brand); font-weight: 750; }
.prediction-disclosure p { margin: 7px 0 0; line-height: 1.7; }
.state-up { color: var(--positive); }
.state-down { color: var(--danger); }
.state-flat { color: var(--sub); }

.forecast-workspace { margin: 12px 0; }
.forecast-view-toggle {
  position: absolute; width: 1px; height: 1px; overflow: hidden; opacity: 0; pointer-events: none;
}
.forecast-view-tabs {
  position: sticky; top: 62px; z-index: 8; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 5px; margin-bottom: 8px; padding: 5px; border: 1px solid var(--hairline); border-radius: 14px;
  background: color-mix(in srgb, var(--panel) 94%, transparent); box-shadow: 0 8px 24px rgba(17,31,68,.07);
  backdrop-filter: blur(16px);
}
.forecast-view-tabs label {
  display: flex; align-items: center; justify-content: center; gap: 7px; min-height: 42px; padding: 8px 12px;
  border-radius: 10px; color: var(--sub); cursor: pointer; font-size: 12px; font-weight: 800; transition: .16s ease;
}
.forecast-view-tabs label:hover { color: var(--text); background: var(--surface-2); }
.forecast-view-tabs label span { padding: 3px 6px; border-radius: 7px; background: var(--surface-3); font-size: 9px; }
.forecast-panel { display: none; }
#forecast-view-runners:checked ~ .forecast-view-tabs label[for="forecast-view-runners"],
#forecast-view-value:checked ~ .forecast-view-tabs label[for="forecast-view-value"],
#forecast-view-summary:checked ~ .forecast-view-tabs label[for="forecast-view-summary"] {
  color: #fff; background: linear-gradient(135deg, var(--brand), #526fda); box-shadow: 0 7px 18px var(--glow);
}
#forecast-view-runners:checked ~ .forecast-panel-runners,
#forecast-view-value:checked ~ .forecast-panel-value,
#forecast-view-summary:checked ~ .forecast-panel-summary { display: block; }
.forecast-panel .forecast-table-card,
.forecast-panel .ev-board,
.forecast-panel .forecast-overview { margin-top: 0; }
.horse-ev { min-width: 68px; font-variant-numeric: tabular-nums; }
.horse-ev b { display: block; font-size: 12px; }
.horse-ev small { display: block; margin-top: 2px; color: var(--sub); font-size: 8px; white-space: nowrap; }
.horse-ev.ev-positive b { color: var(--positive); }
.horse-ev.ev-watch b { color: #d8a514; }
.horse-ev.ev-negative b { color: var(--sub); }
/* 参考値（旧方式の中心値）。太字・色による「買える」の含意を与えない中立表示にする。 */
.horse-ev.ev-reference b { color: var(--sub); font-weight: 500; }
.horse-ev.ev-reference small { color: var(--sub); }
.horse-ev.ev-unknown b { color: var(--sub); font-weight: 500; }
.ev-ticket-card .ev-allocation { color: var(--sub); font-size: 9px; }

@media (max-width: 760px) {
  main { padding-left: 8px; padding-right: 8px; }
  .race-navigation { margin-top: 3px; padding: 8px; border-radius: 14px; }
  .race-navigation .controls { gap: 6px; }
  .race-navigation .controls::before { display: none; }
  .race-navigation .controls label { display: inline-flex; align-items: center; gap: 4px; color: var(--sub); font-size: 10px; }
  .race-navigation select { min-height: 42px; max-width: 138px; padding: 7px 9px; font-size: 13px; }
  .race-navigation .racetabs { margin: 4px -8px 7px; padding: 0 8px 3px; scroll-snap-type: x proximity; }
  .race-navigation .racetabs button { flex-basis: 50px; width: 50px; min-height: 42px; scroll-snap-align: start; }
  .race-navigation .subtabs {
    position: sticky; top: 100px; margin: 0 -8px -8px; padding: 6px 8px 7px; border-top: 1px solid var(--hairline);
    background: color-mix(in srgb, var(--panel) 95%, transparent); backdrop-filter: blur(14px);
  }
  .race-navigation .subtabs button { min-height: 42px; padding: 8px 14px; }
  .race-hero-card { margin: 10px 0; padding: 17px 15px; border-radius: 18px; }

<script>
'use strict';
// ============================================================
// Supabase（読み取りはanonキー・RLSでselectのみ許可）

const SUPABASE_URL = 'https://jcrcftvrsgmsewwdkqha.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmNmdHZyc2dtc2V3d2RrcWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MDY0NjgsImV4cCI6MjA5NjM4MjQ2OH0.UED2rJNsuTPqofrhhNhQ2RM0NKc2eJ6qHllfbnebMe0';

// ============================================================
// 統合ビューアの場設定（門別＋南関4場を1枚で・場切替）
// prefix=Supabase chihou_metaキー接頭辞 / baba=keiba.go.jpライブオッズ馬場コード / slug=NAR映像プレーヤー
// noken=能検タブ有 / sim=シミュレータ(トラック描画がその場専用)
// ============================================================
const TRACKS = {
  '門別': { prefix: 'monbetsu', baba: '36', slug: 'monbetsu', noken: true, sim: true },
  '大井': { prefix: 'ooi', baba: '20', slug: 'ooi', noken: true, sim: true },

  '川崎': { prefix: 'kawasaki', baba: '21', slug: 'kawasaki' },
  '浦和': { prefix: 'urawa', baba: '18', slug: 'urawa' },
};
const trackCfg = () => TRACKS[state.track] || TRACKS['門別'];
// race_id内の場コード（[6:8]・競馬ブック採番）→ 場名。過去走の映像ジャンプ等で他場レースの場を特定する
const RACEID_TRACK = { '42': '門別', '10': '大井', '11': '川崎', '12': '船橋', '13': '浦和' };

async function sbGet(pathq) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${pathq}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`supabase ${res.status}`);
  return res.json();
}
async function jsonGet(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${path} ${res.status}`);
  return res.json();
}

// ============================================================
// データプロバイダ（Supabase優先 → ローカルJSON）
// ============================================================
const providers = {
  supabase: {
    label: 'Supabase',
    _rowsToDates(rows) {
      const dates = {};
      for (const r of rows) {
        (dates[r.race_date] = dates[r.race_date] || []).push({
          race_id: r.race_id, race_no: r.race_no, track: r.track, klass: r.klass,
          name: r.race_name, distance_m: r.distance_m, going: r.going, weather: r.weather,
          hasso_time: r.hasso_time, pace: r.pace,
        });
      }
      return dates;
    },
    // 起動を速くするため直近分だけ先に取得（全期間分は裏でlistDatesFullが追って読み込む）
    // ※このビューアは門別専用。他場(大井等)データが同テーブルに入っても track=門別 で必ず絞る。
    async listDates() {
      const cut = new Date(); cut.setDate(cut.getDate() - 60);
      const cutStr = `${cut.getFullYear()}-${String(cut.getMonth() + 1).padStart(2, '0')}-${String(cut.getDate()).padStart(2, '0')}`;
      const rows = await sbGet(`chihou_races?select=race_id,race_date,race_no,track,klass,race_name,distance_m,going,weather,hasso_time,pace&track=eq.${encodeURIComponent(state.track)}&race_date=gte.${cutStr}&order=race_date.desc,race_no.asc&limit=3000`);
      if (!rows.length) throw new Error('empty');
      return this._rowsToDates(rows);
    },
    // 全期間分（過去の月をさかのぼる用）。バックグラウンドで呼ぶ想定。
    async listDatesFull() {
      const rows = await sbGet(`chihou_races?select=race_id,race_date,race_no,track,klass,race_name,distance_m,going,weather,hasso_time,pace&track=eq.${encodeURIComponent(state.track)}&order=race_date.desc,race_no.asc&limit=10000`);
      return rows.length ? this._rowsToDates(rows) : null;
    },
    async loadRace(raceId) {
      const [races, results] = await Promise.all([
        sbGet(`chihou_races?race_id=eq.${raceId}&select=*`),
        sbGet(`chihou_results?race_id=eq.${raceId}&select=*&order=finish.asc.nullslast`),
      ]);
      return { race: races[0] || {}, results };
    },
    async loadDayResults(raceIds) {
      if (!raceIds.length) return {};
      const ids = raceIds.map(encodeURIComponent).join(',');
      const rows = await sbGet(`chihou_results?race_id=in.(${ids})&select=race_id,umaban,horse_name,finish,finish_note,pop,win_odds,time_str&order=race_id.asc,finish.asc.nullslast&limit=1000`);
      const byRace = {};
      for (const row of rows) (byRace[row.race_id] = byRace[row.race_id] || []).push(row);
      return byRace;
    },
    async loadEntries(raceId) {
      try { return await sbGet(`chihou_entries?race_id=eq.${raceId}&select=*&order=umaban.asc`); }
      catch (e) { return []; }
    },
    async loadCyokyo(raceId) {
      try {
        const rows = await sbGet(`chihou_cyokyo?race_id=eq.${raceId}&select=*&order=umaban.asc`);
        if (rows.length) return rows;
      } catch (e) { /* テーブル未作成 → ローカルへ */ }
      return providers.local.loadCyokyo(raceId);
    },
    async loadNouryoku(raceId) {
      try {
        const rows = await sbGet(`chihou_nouryoku?race_id=eq.${raceId}&select=*&order=umaban.asc`);
        if (rows.length) return rows;
      } catch (e) { /* 次へ */ }
      return providers.local.loadNouryoku(raceId);
    },
    async loadDanwa(raceId) {
      try {
        const rows = await sbGet(`chihou_danwa?race_id=eq.${raceId}&select=*&order=umaban.asc`);
        if (rows.length) return rows;
      } catch (e) { /* テーブル未作成 → ローカルへ */ }
      return providers.local.loadDanwa(raceId);
    },
    async loadHistory(horseIds) {
      if (!horseIds.length) return {};
      const idlist = horseIds.map(encodeURIComponent).join(',');
      const rows = await sbGet(`chihou_results?horse_id=in.(${idlist})&select=horse_id,umaban,finish,pop,first3f,last3f,time_sec,kinryo,sex_age,passing,corner4_pos,comment,time_str,body_weight,jockey,race_id,chihou_races(race_date,distance_m,going,pace,klass,race_name,soubi:extra->>馬装具,laps:extra->laps)&order=race_id.desc&limit=2000`);
      const map = {};
      for (const r of rows) {
        const ra = r.chihou_races || {};
        (map[r.horse_id] = map[r.horse_id] || []).push({
          date: ra.race_date, race_id: r.race_id, dist: ra.distance_m, going: ra.going,
          pace: ra.pace, cls: classGroup((ra.klass || '') + (ra.race_name || '')), race_name: ra.race_name, fin: r.finish, pop: r.pop, sex: r.sex_age,
          f3: r.first3f, l3: r.last3f, tsec: r.time_sec, kin: r.kinryo,
          kyaku: kyakuFromPassing(r.passing), passing: r.passing, c4: r.corner4_pos,
          comment: r.comment, time: r.time_str, weight: r.body_weight, jockey: r.jockey,
          equip: equipOfRun(ra.soubi, r.umaban), laps: ra.laps,
        });
      }
      for (const k in map) {
        map[k].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        markFirstBlinker(map[k], (run) => run.equip);
      }
      return map;
    },
    async loadStats() {
      try {
        const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_stats&select=value`);
        if (rows.length) return rows[0].value;
      } catch (e) { /* テーブル未作成 → ローカルへ */ }
      return providers.local.loadStats();
    },
    async loadModel() {
      try {
        const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_model&select=value`);
        if (rows.length) return rows[0].value;
      } catch (e) { /* 次へ */ }
      return providers.local.loadModel();
    },
    async loadV3Predictions() {
      try {
        const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_v3_predictions&select=value`);
        if (rows.length) return rows[0].value;
      } catch (e) { /* ローカルへ */ }
      return providers.local.loadV3Predictions();
    },
    async loadNoken() {
      try {
        const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_noken&select=value`);
        if (rows.length) return rows[0].value;
      } catch (e) { /* ローカルへ */ }
      return providers.local.loadNoken();
    },
    async loadPoints() {   // 南関の格付ポイント(馬名→{p,k,asof})。無い場はnull
      try {
        const rows = await sbGet(`chihou_meta?key=eq.${trackCfg().prefix}_points&select=value`);
        if (rows.length) return rows[0].value;
      } catch (e) { /* 無しでOK */ }
      return null;
    },
  },
  local: {
    label: 'ローカルJSON',
    _horses: null,
    async listDates() { return (await jsonGet('data/index.json')).dates; },
    async loadRace(raceId) {
      try { return await jsonGet(`data/json/seiseki/${raceId}.json`); }
      catch (e) { return { race: {}, results: [] }; }
    },
    async loadDayResults(raceIds) {
      const pairs = await Promise.all(raceIds.map(async (raceId) => [raceId, (await this.loadRace(raceId)).results || []]));
      return Object.fromEntries(pairs);
    },
    async loadEntries(raceId) {
      try { return (await jsonGet(`data/json/syutuba/${raceId}.json`)).entries; }
      catch (e) { return []; }
    },
    async loadCyokyo(raceId) {
      try {
        const d = await jsonGet(`data/json/cyokyo/${raceId}.json`);
        return d.horses.map((h) => ({ ...h, race_id: d.race_id }));
      } catch (e) { return []; }
    },
    async loadNouryoku(raceId) {
      try {
        const d = await jsonGet(`data/json/nouryoku/${raceId}.json`);
        return d.horses.map((h) => ({ umaban: h.umaban, horse_name: h.name, rt: h.rt,
          data: { pedigree: h.pedigree, stable: h.stable, seiseki: h.seiseki, runs: h.runs } }));
      } catch (e) { return []; }
    },
    async loadDanwa(raceId) {
      try {
        const d = await jsonGet(`data/json/danwa/${raceId}.json`);
        return d.horses.map((h) => ({ ...h, race_id: d.race_id }));
      } catch (e) { return []; }
    },
    async loadHistory(horseIds) {
      if (this._horses === null) {
        try { this._horses = await jsonGet('data/horses.json'); } catch (e) { this._horses = {}; }
      }
      const map = {};
      for (const id of horseIds) if (this._horses[id]) map[id] = this._horses[id];
      return map;
    },
    async loadStats() {
      try { return await jsonGet('data/stats.json'); } catch (e) { return null; }
    },
    async loadModel() {
      try { return await jsonGet('data/model.json'); } catch (e) { return null; }
    },
    async loadV3Predictions() {
      if (state.track !== '門別') return null;
      try { return await jsonGet('data/monbetsu_v3_predictions.json'); } catch (e) { return null; }
    },
    async loadNoken() {
      try { return await jsonGet('data/noken.json'); } catch (e) { return null; }
    },
    async loadPoints() { return null; },
  },
};

const state = { provider: null, dates: {}, month: null, date: null, raceId: null, track: '門別',
  sub: 'yosou', stats: null, model: null, view: 'deck', prevRace: null,
  noken: null, nokenDate: null, nokenSort: 'race', nokenTwoOnly: false, nokenHist: null, nokenByHorse: null,
  v3Predictions: null, deckDataCheckedAt: null, deckRefreshBusy: false, deckRefreshError: null,
  dayResults: {}, dayResultsFetchedAt: {}, dayResultsLoading: new Set() };

// ============================================================
// ユーティリティ
// ============================================================
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDiff = (v) => (v == null ? '' : v > 0 ? `+${v}` : `${v}`);
const mmdd = (iso) => (iso ? `${+iso.slice(5, 7)}/${+iso.slice(8, 10)}` : '');

// 通過順位は区切り付き（例 '5-7-4-4', '11-11-11'）。
// 旧区切りなし形式は1-1と11を判別できないので、推測せず不明扱いにする。
function kyakuFromPassing(passing) {
  if (!passing) return null;
  const text = String(passing).trim();
  const first = text[0] || '';
  const cp = first.codePointAt(0);
  let p = cp >= 0x2460 && cp <= 0x2473 ? cp - 0x2460 + 1 : null; // ①〜⑳
  if (p == null && /[^0-9]/.test(text)) {
    const match = text.match(/\d+/);
    p = match ? Number(match[0]) : null;
  } else if (p == null && /^\d$/.test(text) && text !== '0') {
    p = Number(text);
  }
  if (p == null) return null;
  if (p === 1) return '逃げ';
  if (p <= 3) return '先行';
  if (p <= 7) return '差し';
  return '追込';
}

// クラス条件を 2歳/3歳/3歳以上 に正規化（build_stats.py と同じ規則）
function classGroup(klass) {
  const k = String(klass || '').replace(/２/g, '2').replace(/３/g, '3').replace(/４/g, '4');
  if (k.includes('2歳')) return '2歳';
  if (k.includes('3歳以上') || k.includes('4歳以上')) return '3歳以上';
  if (k.includes('3歳')) return '3歳';
  return '3歳以上';
}
// race_name(条件)からクラス格(C4-C1/B/A/OP)を抽出（build_stats.pyのclass_majorと同じ規則）
function classMajor(raceName) {
  if (!raceName) return null;
  const trans = { '１': '1', '２': '2', '３': '3', '４': '4', 'Ａ': 'A', 'Ｂ': 'B', 'Ｃ': 'C' };
  const n = String(raceName).replace(/[１２３４ＡＢＣ]/g, (c) => trans[c]);
  if (n.includes('オープン') || n.includes('重賞')) return 'OP';
  for (const t of n.split(/[,、]/)) {
    const m = t.match(/([ABC])\s?([1-4])/);
    if (m) return m[1] === 'C' ? `C${m[2]}` : m[1];
  }
  return null;
}
// 過去走レコード(hist要素)からクラス表示文言（C/B/A格が無ければ2歳/3歳にフォールバック）
function classBadge(h) {
  return classMajor(h.race_name) || (h.cls && h.cls !== '3歳以上' ? h.cls : '') || '';
}
// レースのペース区分をH/M/Sの1文字に短縮（keibabook表記に合わせる）
function paceLetter(p) {
  return p === 'ハイ' ? 'H' : p === 'ミドル' ? 'M' : p === 'スロー' ? 'S' : '';
}

// 基準タイム参照: 距離×馬場×クラス（無ければ全クラス→良にフォールバック）
function baseEntry(dist, going, cls) {
  const bt = state.stats && state.stats.base_times;
  if (!bt || !dist) return null;
  const g = going === '良' || !going ? '良' : '重系';
  return bt[`${dist}_${g}_${cls || '全'}`] || bt[`${dist}_${g}_全`] || bt[`${dist}_良_全`] || null;
}
// 偏差値（速いほど高い）
function devValue(value, e, fld) {
  if (value == null || !e || !e[fld] || !e[fld].std) return null;
  return 50 + 10 * (e[fld].mean - value) / e[fld].std;
}
// 1走分の総合指数: 走破タイム50% + テン3F25% + 上がり3F25%（欠測は重み再配分）
// v2新基準: タイムは日別馬場差+斤量、上がりはレース前半ペースで補正
// （検証: duel_final.py 古馬2025-26ホールドアウト t=3.73有意・◎複勝+1.1pt）
function runShisu(run) {
  const e = baseEntry(run.dist, run.going, run.cls);
  const da = ((state.stats && state.stats.shisu_day_adj) || {})[run.date] || 0;   // 馬場差(z)
  const rp = (state.stats && state.stats.race_pace) || {};
  const pz = (run.race_id != null && rp[run.race_id] != null) ? rp[run.race_id] : 0;  // 前半ペース(z)
  const kin = run.kin != null ? run.kin : 55;
  let t = devValue(run.tsec, e, 'time');
  if (t != null) t = t - 10 * da + 0.5 * (kin - 55);
  let l = devValue(run.l3, e, 'last3f');
  if (l != null) l = l - 5 * pz;
  const parts = [[t, 0.5],
                 [devValue(run.f3, e, 'first3f'), 0.25],
                 [l, 0.25]].filter(([v]) => v != null);
  if (!parts.length) return null;
  const wsum = parts.reduce((s, [, w]) => s + w, 0);
  return parts.reduce((s, [v, w]) => s + v * w, 0) / wsum;
}

// スピード指数（門別適合版・妙味ゾーン検出用）
function distIndexJs(d) {
  const pts = [[1600, 1.02], [2000, 0.79], [3000, 0.50]];
  const [[x1, y1], [x2, y2]] = d <= 2000 ? [pts[0], pts[1]] : [pts[1], pts[2]];
  return y1 + (y2 - y1) * (d - x1) / (x2 - x1);
}
function runSI(run) {
  const sb = state.stats && state.stats.si_base;
  const bb = (state.stats && state.stats.baba_daily) || {};
  if (!sb || !run.dist || sb[String(run.dist)] == null || run.tsec == null) return null;
  const kin = run.kin != null ? run.kin : 55;
  return (sb[String(run.dist)] - run.tsec) * distIndexJs(run.dist) * 10 + (bb[run.date] || 0) + (kin - 55) * 2 + 80;
}
// 直近5走の指標（mean/max）
function metricOf(history, hid, fn, mode) {
  const vals = (history[hid] || []).slice(0, 5).map(fn).filter((v) => v != null);
  if (!vals.length) return null;
  return mode === 'max' ? Math.max(...vals) : vals.reduce((s, v) => s + v, 0) / vals.length;
}
function zscoresJs(vals) {
  const xs = vals.filter((v) => v != null);
  if (xs.length < 2) return vals.map(() => null);
  const m = xs.reduce((s, v) => s + v, 0) / xs.length;
  const sd = Math.sqrt(xs.reduce((s, v) => s + (v - m) ** 2, 0) / (xs.length - 1)) || 1e-9;
  return vals.map((v) => (v == null ? null : (v - m) / sd));
}
// ===== 学習モデル（リッジ回帰）による勝ちやすさ予測 =====
const POS4 = { '最内': -2, '内': -1, '中': 0, '外': 1, '大外': 2 };
const clsRank = (klass) => ({ '2歳': 0, '3歳': 1, '3歳以上': 2 }[classGroup(klass)] ?? 2);
function daysBetween(d1, d2) {
  return Math.round((new Date(d1) - new Date(d2)) / 86400000);
}
const MODEL_FEATS = ['time_mean', 'time_best', 'time_last', 'f3_best', 'l3_best', 'n_runs',
  'days_off', 'dist_change', 'same_band_z', 'cls_up', 'cls_down', 'wt_change', 'draw_bias',
  'jockey_r', 'trainer_r', 'trip_adj', 'exact_dist_r', 'waku_rate', 'sire_rate', 'cyo_z',
  'rento', 'fresh', 'layoff'];   // 休み明け非線形（build_model.py FEATSと同順）
const dbandOf = (d) => !d ? null : d <= 1000 ? '1000' : d <= 1100 ? '1100' : d <= 1200 ? '1200'
  : d <= 1600 ? '15-16' : d <= 1700 ? '1700' : '1800+';

// 予想対象レースでの各馬の予測スコア（高いほど勝ちやすい）
function modelScore(e, history, race, cyoZ) {
  const m = state.model;
  if (!m) return null;
  const runs = (history[e.horse_id] || []).filter((r) => r.race_id !== race.race_id);
  if (!runs.length) return null;
  // 不利run判定（出遅れ/不利語）。build_model.py TROUBLE_WORDS と厳密一致（訓練/推論一致）。
  const TROUBLE_WORDS = ['出遅', '不利', '詰ま', '躓', 'ふらつ', '挟ま', '包ま', '行き場', '接触', 'ヨレ', 'ササ'];
  const cbias = (state.stats && state.stats.corner4_daily) || {};
  const sda = (state.stats && state.stats.shisu_day_adj) || {};
  const rpz = (state.stats && state.stats.race_pace) || {};
  // 各過去走を z 値化（新しい順→計算では最新を last に）
  // 学習と同一のzスケール（旧実装は偏差値のまま渡していてスケール不一致だった）
  // ＋v2補正: タイムz=馬場差+斤量 / 上がりz=レース前半ペース（build_model.py v2と厳密一致）
  const P = runs.slice(0, 8).map((r) => {
    const be = baseEntry(r.dist, r.going, r.cls);
    const d = r.dist || 1000;
    const pos = POS4[r.c4];
    const trip = (pos != null && cbias[r.date] != null) ? cbias[r.date] * Math.max(-1, Math.min(1, pos)) : 0;
    const z = (v, fld) => { const dv = devValue(v, be, fld); return dv == null ? null : (dv - 50) / 10; };
    const da = sda[r.date] || 0;
    const pv = (r.race_id != null && rpz[r.race_id] != null) ? rpz[r.race_id] : 0;
    const kin = r.kin != null ? r.kin : 55;
    let tz = z(r.tsec, 'time');
    if (tz != null) tz = tz - da + 0.05 * (kin - 55);
    let lz = z(r.l3, 'last3f');
    if (lz != null) lz = lz - 0.5 * pv;
    return {
      tz, fz: z(r.f3, 'first3f'), lz,
      date: r.date, dist: d, band: d <= 1100 ? 1 : d <= 1200 ? 2 : 3, clsRank: clsRank(r.cls === '2歳' ? '2歳' : r.cls), trip,
      clsR: { '2歳': 0, '3歳': 1, '3歳以上': 2 }[r.cls] ?? 2,
      trouble: TROUBLE_WORDS.some((w) => (r.comment || '').indexOf(w) >= 0),
    };
  });
  const tz = P.map((p) => p.tz).filter((v) => v != null);
  if (!tz.length) return null;
  // 実力タイム集約は不利run(出遅れ等)を除外。全走が不利なら全走で代替（新→古順）。
  const tzc0 = P.filter((p) => p.tz != null && !p.trouble).map((p) => p.tz);
  const tzClean = tzc0.length ? tzc0 : tz;
  const fz = P.map((p) => p.fz).filter((v) => v != null);
  const lz = P.map((p) => p.lz).filter((v) => v != null);
  const last = P[0];  // 最新走
  const d = race.distance_m || race.dist || 1000;
  const band = d <= 1100 ? 1 : d <= 1200 ? 2 : 3;
  const sameBand = P.filter((p) => p.band === band && p.tz != null).map((p) => p.tz);
  const mean = (a) => a.reduce((s, v) => s + v, 0) / a.length;
  // time_mean は新しい走りほど重い加重平均（半減期3走・build_model.py recency_meanと厳密一致）。
  // tz は新しい→古い順なので j=0(最新)の重みが1。
  const wmean = (a) => {
    let num = 0, den = 0;
    for (let j = 0; j < a.length; j++) { const wgt = Math.pow(0.5, j / 3.0); num += wgt * a[j]; den += wgt; }
    return den ? num / den : 0;
  };
  const tRank = clsRank(race.klass);
  const f = {
    time_mean: wmean(tzClean), time_best: Math.max(...tzClean), time_last: tzClean[0],
    f3_best: fz.length ? Math.max(...fz) : 0, l3_best: lz.length ? Math.max(...lz) : 0,
    n_runs: Math.min(P.length, 8) / 8,
    days_off: last.date ? Math.min(daysBetween(race.date || race.race_date, last.date), 90) / 90 : 0.3,
    dist_change: Math.max(-1, Math.min(1, (d - (last.dist || d)) / 400)),
    same_band_z: sameBand.length ? mean(sameBand) : mean(tz),
    cls_up: tRank > last.clsR ? 1 : 0, cls_down: tRank < last.clsR ? 1 : 0,
    wt_change: Math.max(-1, Math.min(1, (e.weight_diff || 0) / 15)),
    draw_bias: ((e.waku || 4) - 4.5) / 3.5,
    jockey_r: (m.jockey_r && m.jockey_r[e.jockey]) ?? 0.28,
    trainer_r: (m.trainer_r && m.trainer_r[e.trainer]) ?? 0.28,
    trip_adj: mean(P.map((p) => p.trip)),
    exact_dist_r: (() => {  // 同距離ちょうどの複勝率（直近8走内・2走以上）
      const exd = runs.slice(0, 8).filter((r) => r.dist === d && r.fin != null);
      return exd.length >= 2 ? exd.filter((r) => r.fin <= 3).length / exd.length : 0.28;
    })(),
    waku_rate: (m.waku_r && m.waku_r[`${dbandOf(d)}|${e.waku}`]) ?? 0.28,  // 距離帯×枠の複勝率
    sire_rate: (m.sire_r && m.horse_sire && m.sire_r[m.horse_sire[e.horse_id]]) ?? (m.sire_mean ?? 0.30),  // 父の門別複勝率（砂適性）
    cyo_z: (cyoZ != null ? cyoZ : 50) / 50,  // 直前追切 坂路3F最速の偏差値（状態）
    // 休み明け非線形（build_model.py と厳密一致）。gap=前走からの日数。
    rento: (() => { const g = last.date ? daysBetween(race.date || race.race_date, last.date) : 20; return g <= 9 ? 1 : 0; })(),
    fresh: (() => { const g = last.date ? daysBetween(race.date || race.race_date, last.date) : 20; return (g >= 22 && g <= 45) ? 1 : 0; })(),
    layoff: (() => { const g = last.date ? daysBetween(race.date || race.race_date, last.date) : 20; return g >= 60 ? 1 : 0; })(),
  };
  let s = m.b;
  for (let i = 0; i < MODEL_FEATS.length; i++) {
    s += ((f[MODEL_FEATS[i]] - m.mu[i]) / m.sd[i]) * m.w[i];
  }
  return s;
}

// ◎信頼度：レース内で予測1位が2位をどれだけ引き離しているか（レース内stdで正規化）。
// しきい値は過去4年の時系列5分割CVで検証（高信頼>低信頼＝5/5fold）。複勝率 S81%/A73%/B65%/C62%。
const CONF_TIERS = { S: '順位差大', A: '順位差中', B: '順位差小', C: '接戦' };
function aiConfidence(scores) {
  const v = scores.filter((x) => x != null);
  if (v.length < 2) return null;
  const sorted = [...v].sort((a, b) => b - a);
  const mean = sorted.reduce((s, x) => s + x, 0) / sorted.length;
  const std = Math.sqrt(sorted.reduce((s, x) => s + (x - mean) ** 2, 0) / sorted.length) || 1;
  const gap = (sorted[0] - sorted[1]) / std;
  const tier = gap >= 0.70 ? 'S' : gap >= 0.40 ? 'A' : gap >= 0.15 ? 'B' : 'C';
  return { gap, tier, label: CONF_TIERS[tier] };
}

// コースの拠点名（大井外/大井内→大井、小林外/小林坂→小林、牧場坂→牧場 等）。表示グループ化・拠点別基準の両方で使用。
const FACILITY_SUFFIX = ['外', '内', '坂', '本', '調教場'];
function courseFacility(course) {
  if (!course) return 'その他';
  for (const suf of FACILITY_SUFFIX) {
    if (course.length > suf.length && course.endsWith(suf)) return course.slice(0, -suf.length);
  }
  return course;
}
// 拠点別の調教偏差基準（大井の時計は大井基準、小林の時計は小林基準…と場所ごとに比べる）。
// 標本が少ない拠点はその場全体のhanro/honba基準にフォールバック。
function facilityBase(course, isHanro) {
  const st = state.stats;
  if (!st) return null;
  const fac = courseFacility(course);
  const fb = st.facility_base && st.facility_base[fac];
  const specific = fb && fb[isHanro ? 'hanro' : 'honba'];
  return specific || (isHanro ? st.hanro : st.honba);
}
// 坂路の基準タイム＝t_half優先、無ければt_3fにフォールバック。
// 小林坂はコースが短くt_half(4段階目)がほぼ記録されない(0.04%)ための救済（門別坂/牧場坂等は通常t_half有り）。
function hanroRefTime(t) {
  return t.t_half != null ? t.t_half : t.t_3f;
}

// 調教偏差＝拠点別基準の坂路3F最速（終いの加速/失速を0.49倍で加味）。坂路の追切が無い馬・場（大井等は本馬場主体）は
// 本馬場「真の3F」（終い1Fがほぼ未収録のため3Fのみ）でフォールバック評価する。複数の追切があれば最良z値を採用。
// 検証: 同じ3F合計でも終い1Fが中間より速い（加速）か遅い（バテ）かで複勝率±6〜7pt（坂路のみ）
function cyoZFromWorks(cyo) {
  if (!cyo) return null;
  const fb = state.stats && state.stats.hanro_finish;
  let bestZ = null;
  for (const w of (cyo.works || [])) {
    const t = w.times || {};
    const isHanro = (w.course || '').includes('坂');
    const base = facilityBase(w.course, isHanro);
    if (!base || !base.std) continue;
    const val = isHanro ? hanroRefTime(t) : t.t_3f;
    if (val == null) continue;
    let z = 50 + 10 * (base.mean - val) / base.std;
    if (isHanro && t.t_half != null && fb && fb.std && t.t_3f != null && t.t_1f != null) {   // 終い加速 = (中間F − 終いF)。t_halfのある4段階の坂路のみ
      const accel = (t.t_3f - t.t_1f) - t.t_1f;
      z += 4.9 * Math.max(-2, Math.min(2, (accel - fb.mean) / fb.std));
    }
    if (bestZ == null || z > bestZ) bestZ = z;
  }
  return bestZ;
}

// 坂路の200m毎ラップ＋加速/失速/好走判定（t4/t3/t2/t1=累計・zは偏差値）。カレンダーと調教タブで共用。
function hanroLapCells(t4, t3, t2, t1, z) {
  const L = [];
  if (t4 != null && t3 != null) L.push(t4 - t3);
  if (t3 != null && t2 != null) L.push(t3 - t2);
  if (t2 != null && t1 != null) L.push(t2 - t1);
  if (t1 != null) L.push(t1);
  if (L.length < 2) return { str: '', tag: '' };
  const last = L[L.length - 1], best = Math.min(...L.slice(0, -1));
  const up = last <= best + 0.1, down = last >= best + 0.5;      // 尻上がり / 終い掛かる
  const strong = up && z != null && z >= 60;                     // 好走: 偏差値60+×加速（複勝59%）
  const tag = strong ? ' <span class="badge conf-S">🔥好走</span>'
    : up ? ' <span class="badge conf-S">加速</span>' : down ? ' <span class="badge conf-C">失速</span>' : '';
  const cls = up ? 'arrow-up' : down ? 'bias-front' : '';
  const str = L.map((v, k) => k === L.length - 1 ? `<b class="${cls}">${v.toFixed(1)}</b>` : v.toFixed(1)).join('-');
  return { str, tag };
}

function deckPostTime(date, race) {

  if (!date || !m) return null;

function deckDateLabel(date) {

  const d = new Date(`${date}T12:00:00+09:00`);
  return `${d.getMonth() + 1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;

function deckV3Race(raceId) {
  return state.v3Predictions && state.v3Predictions.races
    ? state.v3Predictions.races[raceId] : null;
}

function deckAiLeader(v3Race) {
  const runners = (v3Race && v3Race.runners || []).filter((r) => r && r.umaban != null);
  if (!runners.length) return null;
  const archivedMass = runners.reduce((sum, r) => {
    const value = Number(r.win_probability && r.win_probability.mid);
    return sum + (Number.isFinite(value) && value >= 0 ? value : 0);
  }, 0) || 1;
  const rawScore = (r) => Number(r.win_probability_raw);
  const displayScore = (r) => Number.isFinite(Number(r.win_probability && r.win_probability.mid)) ? Number(r.win_probability.mid) / archivedMass
    : rawScore(r);
  const top = runners.filter((r) => Number.isFinite(rawScore(r))).sort((a, b) => rawScore(b) - rawScore(a))[0];
  if (!top) return null;
  return {
    name: top.horse_name || top.name || `${top.umaban}番`,
    umaban: top.umaban,
    label: 'オッズ非使用のAI勝率',
    value: `${(displayScore(top) * 100).toFixed(0)}%`,
  };
}

function deckArchivedMarks(v3Race) {
  const marks = new Map();
  const runners = (v3Race && v3Race.runners || []).filter((r) => r && r.umaban != null);
  if (!runners.length) return { marks, archived: false, label: '予想履歴' };
  const score = (r) => Number(r.win_probability_raw);
  runners.filter((r) => Number.isFinite(score(r))).sort((a, b) => score(b) - score(a))
    .forEach((r, i) => { if (i < MARKS.length) marks.set(+r.umaban, MARKS[i]); });
  return { marks, archived: marks.size > 0, label: 'オッズ非使用の事前予想印' };
}

function deckDecision(v3Race) {
  const shadow = v3Race && v3Race.v5_shadow;
  if (!shadow) return { kind: 'wait', label: '判定待ち', detail: '購入候補は発走前オッズ取得後' };
  const tickets = (Array.isArray(shadow.tickets) ? shadow.tickets : [])
    .slice().sort((a, b) => Number(b.conservative_ev || 0) - Number(a.conservative_ev || 0));
  if (!tickets.length) return { kind: 'pass', label: '見送り', detail: '安全基準未達' };
  const t = tickets[0];
  return {
    kind: 'buy',
    label: `${V5_TICKET_LABELS[t.ticket_type] || t.ticket_type} ${t.combination || ''}`.trim(),
    detail: Number.isFinite(Number(t.conservative_ev)) ? `厳しめ期待値 ${Number(t.conservative_ev).toFixed(2)}` : '候補あり',
  };
}

const deckDayKey = (track, date) => `${track}|${date}`;

function deckResultSummary(rows) {
  const finished = (rows || []).filter((r) => Number.isFinite(Number(r.finish)) && Number(r.finish) > 0)
    .slice().sort((a, b) => Number(a.finish) - Number(b.finish));
  const winner = finished.find((r) => Number(r.finish) === 1) || null;
  const top3 = finished.filter((r) => Number(r.finish) <= 3);
  return {
    available: finished.length > 0,
    winner,
    top3: top3.map((r) => r.umaban).filter((v) => v != null).join('-'),
    detail: winner ? [
      winner.pop != null ? `${winner.pop}人気` : null,
      winner.win_odds != null ? `単勝${winner.win_odds}倍` : null,
      winner.time_str || null,
    ].filter(Boolean).join(' · ') : '',
  };
}

function deckFreshnessText() {
  if (state.deckRefreshError) return 'AIデータの再確認に失敗 · 1分後に再試行';
  const key = deckDayKey(state.track, state.date);
  const resultAt = state.dayResultsFetchedAt[key];
  if (state.date < jstToday() && resultAt) {
    return `結果データ取得 ${new Date(resultAt).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}`;
  }
  if (state.deckDataCheckedAt) {
    return `AIデータ確認 ${state.deckDataCheckedAt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  }
  const created = state.v3Predictions && state.v3Predictions.created_at;
  return created ? `予想データ ${new Date(created).toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit' })}`
    : 'レース前に保存した予想';
}

function updateDeckFreshness() {
  const el = $('deckFreshness');
  if (!el) return;
  el.textContent = deckFreshnessText();
  el.classList.toggle('is-error', !!state.deckRefreshError);
}

async function ensureDayResults(date, races, force = false) {
  if (!state.provider || !date || !races.length || typeof state.provider.loadDayResults !== 'function') return;
  const track = state.track;
  const key = deckDayKey(track, date);
  const fetchedAt = state.dayResultsFetchedAt[key] || 0;
  const ttl = date === jstToday() ? 45000 : 86400000;
  if (state.dayResultsLoading.has(key) || (!force && fetchedAt && Date.now() - fetchedAt < ttl)) return;
  state.dayResultsLoading.add(key);
  try {
    const byRace = await state.provider.loadDayResults(races.map((r) => r.race_id));
    state.dayResults[key] = byRace || {};
    state.dayResultsFetchedAt[key] = Date.now();
    if (state.view === 'deck' && state.track === track && state.date === date) renderDeck();
  } catch (e) {
    state.dayResults[key] = state.dayResults[key] || {};
  } finally {
    state.dayResultsLoading.delete(key);
  }
}

async function refreshDeckData() {
  if (!state.provider || state.deckRefreshBusy) return;
  state.deckRefreshBusy = true;
  const track = state.track;
  try {
    const before = state.v3Predictions && (state.v3Predictions.card_hash || state.v3Predictions.created_at);
    const latest = await state.provider.loadV3Predictions();
    if (state.track !== track) return;
    state.v3Predictions = latest;
    state.deckDataCheckedAt = new Date();
    state.deckRefreshError = null;
    const after = latest && (latest.card_hash || latest.created_at);
    if (state.view === 'deck' && before !== after) renderDeck();
    else updateDeckFreshness();
    if (state.view === 'deck') await ensureDayResults(state.date, state.dates[state.date] || [], state.date === jstToday());
  } catch (e) {
    if (state.track === track) {
      state.deckDataCheckedAt = new Date();
      state.deckRefreshError = String(e && e.message || e);
      updateDeckFreshness();
    }
  } finally {
    state.deckRefreshBusy = false;
  }
}

function deckFocusRace(races, date) {
  if (!races.length) return null;
  const now = new Date();
  const dated = races.map((r) => ({ r, t: deckPostTime(date, r) }));
  if (date > jstToday()) return dated[0].r;
  if (date < jstToday()) return null;
  return (dated.find((x) => x.t && x.t > new Date(now - 5 * 60000)) || {}).r || null;
}

function setDeckDate(date) {
  if (!date || !state.dates[date]) return;
  if (state.date !== date) state.raceId = null;
  state.date = date;
  state.month = date.slice(0, 7);
  try { localStorage.setItem(`nk_last_date_${trackCfg().prefix}`, date); } catch (e) { /* 無視 */ }
  renderMonths(); renderDates(); renderTabs();
  renderDeck();
}

function openDeckRace(raceId, sub = 'yosou') {
  if (!raceId) return;
  state.raceId = raceId;
  switchView('race');
  selectRace(raceId, sub);
}

function renderDeck() {
  const root = $('deckRoot');
  if (!root) return;

    const isLive = state.date === today && t && now >= new Date(t.getTime() - 2 * 60000) && now <= new Date(t.getTime() + 5 * 60000);

    const result = deckResultSummary(dayResults[r.race_id]);
    const decisionBlock = isFinished ? (result.available ? `

          <div class="decision-cell result"><span>1着</span><b>${result.winner.umaban != null ? `${result.winner.umaban}番 ` : ''}${esc(result.winner.horse_name || '')}</b></div>
          <div class="decision-cell ${ai ? '' : 'missing'}"><span>${ai ? '予想最上位' : '事前予想'}</span><b>${ai ? `${ai.umaban}番 ${esc(ai.name)} · ${ai.value}` : '事前予想の保存なし'}</b></div>
        </div>
        <div class="race-card-actions"><small>${result.top3 ? `3着内 ${esc(result.top3)} · ` : ''}${esc(result.detail || '公式成績あり')}</small><button class="race-open" onclick="openDeckRace('${esc(r.race_id)}','seiseki')">結果を見る</button></div>` : `
        <div class="decision-row">
          <div class="decision-cell missing"><span>公式成績</span><b>${resultsFetched ? '結果未取得' : '読み込み中…'}</b></div>

    </article>`;
  }).join('');

  root.innerHTML = `<div class="deck-shell">
    <div class="deck-toolbar">
      <div class="deck-date"><button ${dateIndex <= 0 ? 'disabled' : ''} onclick="setDeckDate('${dates[dateIndex - 1] || ''}')" aria-label="前の開催日">‹</button><strong>${deckDateLabel(state.date)}</strong><button ${dateIndex < 0 || dateIndex >= dates.length - 1 ? 'disabled' : ''} onclick="setDeckDate('${dates[dateIndex + 1] || ''}')" aria-label="次の開催日">›</button></div>
      <div class="deck-mode${state.deckRefreshError ? ' is-error' : ''}" id="deckFreshness">${esc(deckFreshnessText())}</div>
    </div>
    ${hero}
    <div class="deck-summary">
      <div class="summary-chip"><span>全レース</span><b>${races.length}R</b></div>
      <div class="summary-chip"><span>進行</span><b>${finished}/${races.length}</b></div>
      ${isPastDay ? `<div class="summary-chip"><span>結果取得</span><b>${resultRaceCount}/${races.length}</b></div>` : `<div class="summary-chip"><span>候補 / 見送り</span><b>${candidates} / ${passes}</b></div>`}
    </div>
    <div class="deck-section-head"><h3>レースタイムライン</h3><span>${isPastDay ? '着順・人気・単勝オッズは公式成績から取得' : 'AI判断は最新データを1分ごとに再取得'}</span></div>

  const title = race.name || race.race_name || race.klass || 'レース';
