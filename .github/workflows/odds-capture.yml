name: Odds capture

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 5-12 * * *'

concurrency:
  group: kochi-odds-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Capture and validate result
        env:
          CAPTURE_TOKEN: ${{ secrets.CAPTURE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CAPTURE_TOKEN"
          response=$(curl --fail-with-body --silent --show-error --max-time 90 \
            --request POST \
            --header "Authorization: Bearer $CAPTURE_TOKEN" \
            --header "Content-Type: application/json" \
            "https://keiba-proxydeploy.maguronagareboshi.workers.dev/capture")
          node -e 'const r=JSON.parse(process.argv[1]); if(!r.kochi || r.kochi.ok===false || !r.received_at) process.exit(1)' "$response"
