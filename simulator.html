<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>門別 展開シミュレータ</title>
<style>
/* 色は必ずCSS変数で定義する */
:root {
  --bg: #f4f5f7; --panel: #ffffff; --text: #1c2330; --sub: #66707f;
  --border: #d9dee6; --accent: #1a6fb5; --accent-text: #ffffff;
  --chip-bg: #e8eef5;
  --turf: #ffffff; --track-dirt: #c4b593; --track-dirt-dim: #ded4bc;
  --rail: #9a9a9a; --goal: #d63c3c; --label: #333333; --stand: #e8eef5;
  --waku1-bg:#ffffff; --waku1-tx:#333333; --waku2-bg:#222222; --waku2-tx:#ffffff;
  --waku3-bg:#d63c3c; --waku3-tx:#ffffff; --waku4-bg:#2e63c4; --waku4-tx:#ffffff;
  --waku5-bg:#e8c62b; --waku5-tx:#333333; --waku6-bg:#2f9c50; --waku6-tx:#ffffff;
  --waku7-bg:#e07f2a; --waku7-tx:#ffffff; --waku8-bg:#e88fb0; --waku8-tx:#333333;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14181f; --panel: #1d232d; --text: #e6eaf0; --sub: #97a1af;
    --border: #333c49; --accent: #4d9fe0; --accent-text: #10151c; --chip-bg: #26303d;
    --turf: #1d232d; --track-dirt: #6e6350; --track-dirt-dim: #3d3830;
    --rail: #97a1af; --label: #e6eaf0; --stand: #26303d;
    --waku1-bg:#e9e9e9; --waku1-tx:#222222;
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, system-ui, sans-serif; font-size: 14px; }
header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
header h1 { font-size: 16px; margin: 0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--chip-bg); color: var(--sub); }
.badge.live { background: #d84040; color: #fff; }
main { max-width: 1200px; margin: 0 auto; padding: 10px 14px 30px; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
select, button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); font-size: 14px; cursor: pointer; }
button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.racebtns { display: flex; gap: 4px; flex-wrap: wrap; }
.racebtns button { width: 62px; padding: 4px 0; font-size: 12px; line-height: 1.3; }
.racebtns button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.racebtns button small { display: block; font-size: 10px; opacity: 0.75; }
.layout { display: grid; grid-template-columns: 1fr 280px; gap: 12px; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
canvas { width: 100%; height: auto; display: block; border-radius: 6px; }
#order { font-size: 13px; }
#order .row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
#order .pos { width: 26px; color: var(--sub); text-align: right; }
.waku { display: inline-block; width: 22px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 12px; }
.w1 { background: var(--waku1-bg); color: var(--waku1-tx); border: 1px solid var(--border); }
.w2 { background: var(--waku2-bg); color: var(--waku2-tx); }
.w3 { background: var(--waku3-bg); color: var(--waku3-tx); }
.w4 { background: var(--waku4-bg); color: var(--waku4-tx); }
.w5 { background: var(--waku5-bg); color: var(--waku5-tx); }
.w6 { background: var(--waku6-bg); color: var(--waku6-tx); }
.w7 { background: var(--waku7-bg); color: var(--waku7-tx); }
.w8 { background: var(--waku8-bg); color: var(--waku8-tx); }
.phase { font-weight: bold; color: var(--accent); }
.mtime { font-variant-numeric: tabular-nums; color: var(--sub); font-size: 12px; }
.note { font-size: 11px; color: var(--sub); margin-top: 6px; }
table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 12px; }
th, td { border: 1px solid var(--border); padding: 3px 6px; text-align: center; }
th { background: var(--chip-bg); color: var(--sub); font-weight: normal; }
td.l { text-align: left; }
</style>
</head>
<body>
<header>
  <h1 id="simTitle">展開シミュレータ</h1>
  <span class="badge" id="raceLabel">-</span>
  <!-- ローカルは index.html＝門別ビューア / 公開サイトは monbetsu.html（index.htmlは高知ビューア） -->
  <button id="to3d">🎥 3D版で観る</button>
  <button id="backToViewer" style="margin-left:auto">📋 ビューアへ戻る</button>
</header>
<main>
  <div class="controls">
    <label>開催日 <select id="dateSel"></select></label>
  </div>
  <div class="controls">
    <div class="racebtns" id="raceBtns"></div>
  </div>
  <div class="controls">
    <button class="primary" id="startBtn">▶ スタート</button>
    <button id="speedBtn">速度 x6</button>
    <span id="clock" class="phase"></span>
  </div>
  <div class="layout">
    <div class="card">
      <canvas id="track" width="900" height="480"></canvas>
      <canvas id="strip" width="900" height="210"></canvas>
      <div class="note">↑ 拡大ビュー: 1馬身（2.4m）単位の正確な差で表示（表示幅は最小10馬身まで拡大・馬群が広がると自動フィット・馬体の大きさも実寸1馬身に連動）。先頭の位置は走行方向に連動 — 向正面では右端、正面（ゴール前）では左端に自動反転。ゴールが近づくと赤線が現れます。</div>
      <div class="note" id="courseNote"></div>
    </div>
    <div class="card">
      <b>隊列（リアルタイム）</b>
      <div id="order"></div>
    </div>
  </div>
  <div class="card">
    <b>🧭 展開シナリオ・シミュレーション</b>
    <button id="mcBtn" style="margin-left:10px">各展開2,000回で耐性を解析</button>
    <span class="badge" style="margin-left:8px">時系列検証済み pace-v2</span>
    <div id="mcResult"></div>
  </div>
  <div class="card">
    <b>推定パラメータ（平均予測）</b>
    <div id="params"></div>
  </div>
</main>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---------------- データ読み込み（ローカルJSON） ----------------
let statsDb = null;   // 基準タイム（距離×馬場×クラス）— 偏差値換算に使う
async function jget(p) { const r = await fetch(p); if (!r.ok) throw new Error(p); return r.json(); }
function isActiveEntry(e) {
  const status = `${e && (e.status || e.finish_note || e.note) || ''} ${e && e.horse_name || ''}`;
  return e && e.umaban != null && !/取消|除外|中止/.test(status);
}

// Supabase（公開サイト用）
const SUPABASE_URL = 'https://jcrcftvrsgmsewwdkqha.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmNmdHZyc2dtc2V3d2RrcWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MDY0NjgsImV4cCI6MjA5NjM4MjQ2OH0.UED2rJNsuTPqofrhhNhQ2RM0NKc2eJ6qHllfbnebMe0';
async function sbGet(pathq) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${pathq}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`supabase ${res.status}`);
  return res.json();
}

// ---- 場設定（?track= で切替・既定は門別）----
// straight=最終直線m / R=外カーブ半径m / shift=内回りの右ターン前倒しm / hasInner=内回りコース有
// hasChutes=引き込み線を描画 / chuteBackMax・chuteTopMax=各ポケットの最大長m / topDiag=向正面ポケットが斜め(大井1400)
// 値はsim3d.html（立体シミュレーター）と同一（大井=公式図: 外1600m/内1400m・1400mは斜めポケット・2000mは小ポケット）
const SIM_TRACKS = {
  '門別': { prefix: 'monbetsu', baba: '36', label: 'MOMBETSU RACECOURSE', straight: 330, R: 136, shift: 112,
    hasInner: true, hasChutes: true, chuteBackMax: 160, chuteTopMax: 200, topDiag: false },
  '大井': { prefix: 'ooi', baba: '44', label: 'OI RACECOURSE', straight: 386, R: 100, shift: 100,
    hasInner: true, hasChutes: true, chuteBackMax: 40, chuteTopMax: 260, topDiag: true },
};
const TRACK = (() => { const t = new URLSearchParams(location.search).get('track'); return SIM_TRACKS[t] ? t : '門別'; })();
const tcfg = SIM_TRACKS[TRACK];

// データ源（Supabase優先 → ローカルJSON）
const sources = {
  supabase: {
    label: 'Supabase',
    async listDates() {
      const rows = await sbGet(`chihou_races?select=race_date&track=eq.${encodeURIComponent(TRACK)}&order=race_date.desc&limit=5000`);
      if (!rows.length) throw new Error('empty');
      return [...new Set(rows.map((r) => r.race_date))];
    },
    async listRaces(date) {
      const races = await sbGet(`chihou_races?race_date=eq.${date}&track=eq.${encodeURIComponent(TRACK)}&select=race_id,race_no,klass,race_name,distance_m&order=race_no.asc`);
      return races.map((r) => ({ race_id: r.race_id, race_no: r.race_no, klass: r.klass, name: r.race_name, distance_m: r.distance_m }));
    },
    async loadEntries(raceId) {
      const [races, entries] = await Promise.all([
        sbGet(`chihou_races?race_id=eq.${raceId}&select=*`),
        sbGet(`chihou_entries?race_id=eq.${raceId}&select=*&order=umaban.asc`),
      ]);
      const race = races[0] || {};
      return { race: { ...race, date: race.race_date, distance_m: race.distance_m, klass: race.klass },
               entries: entries.filter(isActiveEntry) };
    },
    async loadHistories(ids) {
      if (!ids.length) return {};
      const idlist = ids.map(encodeURIComponent).join(',');
      const rows = await sbGet(`chihou_results?horse_id=in.(${idlist})&select=horse_id,first3f,last3f,time_sec,kinryo,pop,win_odds,passing,race_id,chihou_races(race_date,distance_m,going,klass)&order=race_id.desc&limit=3000`);
      const map = {};
      for (const r of rows) {
        const ra = r.chihou_races || {};
        (map[r.horse_id] = map[r.horse_id] || []).push({ date: ra.race_date, dist: ra.distance_m, going: ra.going,
          cls: classGroup(ra.klass), f3: r.first3f, l3: r.last3f, tsec: r.time_sec, kin: r.kinryo,
          passing: r.passing });
      }
      for (const k in map) map[k].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      return map;
    },
    async loadStats() {
      const rows = await sbGet(`chihou_meta?key=eq.${tcfg.prefix}_stats&select=value`);
      return rows.length ? rows[0].value : null;
    },
  },
  local: {
    label: 'ローカル', _horses: null, _idx: null,
    async _index() { if (!this._idx) this._idx = await jget('data/index.json'); return this._idx; },
    async listDates() { return Object.keys((await this._index()).dates); },
    async listRaces(date) { return (await this._index()).dates[date] || []; },
    async loadEntries(raceId) {
      const syu = await jget(`data/json/syutuba/${raceId}.json`);
      return { race: syu.race || {}, entries: syu.entries.filter(isActiveEntry) };
    },
    async loadHistories(ids) {
      if (this._horses === null) { try { this._horses = await jget('data/horses.json'); } catch (e) { this._horses = {}; } }
      const map = {}; for (const id of ids) if (this._horses[id]) map[id] = this._horses[id]; return map;
    },
    async loadStats() { try { return await jget('data/stats.json'); } catch (e) { return null; } },
  },
};

// ---- ライブ単勝オッズ（当日レースのみ・60秒毎。index.htmlと同じWorkerプロキシ経由） ----
const ODDS_PROXY = 'https://keiba-proxydeploy.maguronagareboshi.workers.dev/?url=';
const jstToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };
async function fetchLiveOdds(raceDate, raceNo) {
  if (!raceDate || !raceNo) return null;
  const url = `https://www.keiba.go.jp/KeibaWeb/TodayRaceInfo/OddsTanFuku?k_raceDate=${raceDate.replace(/-/g, '/')}&k_raceNo=${raceNo}&k_babaCode=${tcfg.baba}`;
  try {
    const html = await (await fetch(ODDS_PROXY + encodeURIComponent(url))).text();
    if (html.indexOf('odd_popular_table_02') < 0) return null;
    const m = html.match(/odd_popular_table_02[\s\S]*?<tbody>([\s\S]*?)<\/tbody>/);
    const body = m ? m[1] : '';
    const odds = {};
    for (const tr of (body.match(/<tr[^>]*>[\s\S]*?<\/tr>/g) || [])) {
      const tds = [...tr.matchAll(/<td[^>]*>([\s\S]*?)<\/td>/g)].map((x) => x[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim());
      if (tds.length < 4) continue;
      const uma = parseInt(tds[1]), o = parseFloat(tds[3]);
      if (uma >= 1 && uma <= 20 && o > 0) odds[uma] = o;
    }
    if (!Object.keys(odds).length) return null;
    const pop = {};
    Object.entries(odds).sort((a, b) => a[1] - b[1]).forEach(([um], i) => { pop[um] = i + 1; });
    return { odds, pop };
  } catch (e) { return null; }
}

function frontSeg(dist) { return dist >= 1200 ? 600 : dist - 600; }  // 前半3F列の実距離

function classGroup(klass) {
  const k = String(klass || '').replace(/２/g, '2').replace(/３/g, '3').replace(/４/g, '4');
  if (k.includes('2歳')) return '2歳';
  if (k.includes('3歳以上') || k.includes('4歳以上')) return '3歳以上';
  if (k.includes('3歳')) return '3歳';
  return '3歳以上';
}

function classLevel(klass) {
  const k = String(klass || '').replace(/Ａ/g, 'A').replace(/Ｂ/g, 'B').replace(/Ｃ/g, 'C');
  if (k.includes('A')) return 1.0;
  if (k.includes('B')) return 0.7;
  if (k.includes('C')) return 0.4;
  if (k.includes('2歳')) return 0.1;
  return 0.0;
}

function firstCorner(passing) {
  for (const ch of String(passing || '')) {
    const cp = ch.codePointAt(0);
    if (cp >= 0x2460 && cp <= 0x2473) return cp - 0x2460 + 1;
    if (/[1-9]/.test(ch)) return Number(ch);
  }
  return null;
}

function historyStyle(run) {
  const direct = String(run && (run.kyaku || run.style) || '');
  if (/逃/.test(direct)) return '逃げ';
  if (/先/.test(direct)) return '先行';
  if (/差/.test(direct)) return '差し';
  if (/追/.test(direct)) return '追込';
  const pos = firstCorner(run && run.passing);
  if (pos == null) return null;
  if (pos === 1) return '逃げ';
  if (pos <= 3) return '先行';
  if (pos <= 7) return '差し';
  return '追込';
}
function baseOf(dist, going, cls) {
  const bt = statsDb && statsDb.base_times;
  if (!bt || !dist) return null;
  const g = going === '良' || !going ? '良' : '重系';
  return bt[`${dist}_${g}_${cls || '全'}`] || bt[`${dist}_${g}_全`] || bt[`${dist}_良_全`] || null;
}

// 過去5走を「その走の距離×馬場×クラス基準に対する偏差(z)」に換算して平均。
// → 距離が変わっても「基準よりどれだけ速いか」で能力を持ち越す（1200m巧者の
//    生スピードを長距離に直接持ち込まない = 距離延長で速度そのまま、を防ぐ）
function estimate(hist) {
  const runs = (hist || []).slice(0, 5);
  const zf = [], zl = [], rawF = [], rawL = [], corners = [];
  const styles = { '逃げ': 0, '先行': 0, '差し': 0, '追込': 0 };
  for (const r of runs) {
    const e = baseOf(r.dist, r.going, r.cls);
    if (e && e.first3f && e.first3f.std && r.f3 != null) zf.push((e.first3f.mean - r.f3) / e.first3f.std);
    if (e && e.last3f && e.last3f.std && r.l3 != null) zl.push((e.last3f.mean - r.l3) / e.last3f.std);
    if (r.f3 && r.dist) rawF.push(frontSeg(r.dist) / r.f3);
    if (r.l3) rawL.push(600 / r.l3);
    const corner = firstCorner(r.passing);
    if (corner != null) corners.push(Math.max(0, Math.min(1, (corner - 1) / 11)));
    const style = historyStyle(r);
    if (style) styles[style]++;
  }
  const mean = (a) => a.length ? a.reduce((x, y) => x + y, 0) / a.length : null;
  const sd = (a) => {
    if (a.length < 2) return null;
    const m = mean(a);
    return Math.sqrt(a.reduce((s, v) => s + (v - m) ** 2, 0) / (a.length - 1));
  };
  const styleN = Object.values(styles).reduce((a, b) => a + b, 0);
  const styleDen = Math.max(runs.length, 1);  // 学習時と同じ。通過順欠損は確率質量を残さず欠損として扱う
  return { zf: mean(zf), zl: mean(zl), zfSd: sd(zf), zlSd: sd(zl),
           vFrontRaw: mean(rawF), vLastRaw: mean(rawL),
           cornerMean: mean(corners), styleN,
           nigeP: styles['逃げ'] / styleDen,
           senkoP: styles['先行'] / styleDen,
           sashiP: styles['差し'] / styleDen,
           oikomiP: styles['追込'] / styleDen };
}

// 正規乱数（Box-Muller）
function randn(rng = Math.random) {
  let u = 0, v = 0;
  while (!u) u = rng();
  while (!v) v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function hash32(text) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < String(text).length; i++) { h ^= String(text).charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
}
const clampSd = (sd) => sd == null ? 0.7 : Math.max(0.35, Math.min(1.2, sd));

// ---------------- コース形状（場ごとの実寸比・右回り・sim3d.htmlと同じ導出） ----------------
// 1周1600mを基準に、外カーブ半径R_M(実m)から直線長L_M=(1600-2πR_M)/2を求める（門別R=136m/大井R=100m）。
// 門別は従来の見た目(R=160px/L=432px)をそのまま維持、大井はこの実寸比を同じ描画幅に収めて描く。
const H = 480, CY = 225;
const GEOM = {
  '門別': { R: 160, L: 432 },
  '大井': (() => {
    const R_M = tcfg.R, L_M = (1600 - 2 * Math.PI * R_M) / 2;
    const span = 432 + 2 * 160;                      // 門別と同じ描画幅（直線+両カーブ）に収める
    const scale = span / (L_M + 2 * R_M);
    return { R: R_M * scale, L: L_M * scale };
  })(),
};
const { R, L } = GEOM[TRACK] || GEOM['門別'];         // 両端カーブ半径(px) / 直線長(px)
const PXPM = (2 * L + 2 * Math.PI * R) / 1600;        // px/m（外回り基準）
const SHIFT = tcfg.shift * PXPM;                      // 内回りの右ターン前倒し量（実mから換算）
const DIAG = { c: Math.cos(0.5), s: Math.sin(0.5) };  // 大井1400ポケットの斜度≈30°（sim3d.htmlと同一）
// 左右の余白＝カーブの張り出し(R)とポケットの到達幅の大きい方＋見た目の隙間24px
// （斜めポケットは水平成分のみ・門別のような水平ポケットはchuteTopMax/chuteBackMaxそのもの）
const leftReach = tcfg.topDiag ? tcfg.chuteTopMax * PXPM * DIAG.c : Math.max(R, tcfg.chuteTopMax * PXPM);
const rightReach = Math.max(R, tcfg.chuteBackMax * PXPM);
const CXL = leftReach + 24, CXR = CXL + L;            // 左右カーブの中心x（外回り）
const W = Math.round(CXR + rightReach + 24);
const GOAL_X = CXR - tcfg.straight * PXPM;            // ゴール位置: 最終コーナー出口から直線m（門別330/大井386）
                                     // → 内回りは自動的に短縮直線相当になる（幾何学的に整合）
const bottomY = CY + R, topY = CY - R;

function lapMeters(inner) { return inner ? 1600 - 2 * tcfg.shift : 1600; }
function lapPx(inner) { return 2 * (L - (inner ? SHIFT : 0)) + 2 * Math.PI * R; }

// 引き込み線（ポケット）: 向正面延長＝1200m/1400m系（大井1400は斜めポケット） / ホームストレッチ延長＝2000m系
// 該当レースはオーバルを回らず、ポケット直線からコースに合流する
function chuteInfo(D, inner) {
  if (inner || !tcfg.hasChutes) return { len: 0, type: null };
  const back = D % 1600;
  const R_M = tcfg.R, L_M = (1600 - 2 * Math.PI * R_M) / 2;   // 実mでの半径・直線（しきい値の判定は実mで行う）
  const b1 = tcfg.straight;                 // ゴール→(逆走)右カーブ入口
  const b3 = b1 + Math.PI * R_M + L_M;      // 向正面の起点
  if (back > b1 && back <= b1 + tcfg.chuteBackMax) return { len: back - b1, type: 'bottom' };
  if (back > b3 && back <= b3 + tcfg.chuteTopMax) return { len: back - b3, type: 'top' };
  return { len: 0, type: null };
}

// レース内の位置: s = スタートからの走行距離(m) → canvas座標
function racePos(D, inner, s, lane) {
  const ch = chuteInfo(D, inner);
  if (s < ch.len) {  // ポケット内（直線）
    const remain = (ch.len - s) * PXPM;
    if (ch.type === 'top') {
      if (tcfg.topDiag) return { x: CXL - remain * DIAG.c, y: topY - lane + remain * DIAG.s };  // 大井1400=斜めポケット
      return { x: CXL - remain, y: topY - lane };
    }
    return { x: CXR + remain, y: bottomY + lane };
  }
  const segA = GOAL_X - CXL;
  let startArc;
  if (ch.type === 'top') startArc = segA + Math.PI * R;                                  // 向正面の起点に合流
  else if (ch.type === 'bottom') startArc = segA + Math.PI * R + (CXR - CXL) + Math.PI * R;  // 最終直線の起点に合流
  else startArc = lapPx(inner) - (D % lapMeters(inner)) * PXPM;
  return posOnTrack(startArc + (s - ch.len) * PXPM, lane, inner);
}

// 進行方向: ゴール(下の直線)を左向きに通過する右回り。arcはゴール=0からの走行px
function posOnTrack(arcPx, lane, inner) {
  const shift = inner ? SHIFT : 0;
  const cxr = CXR - shift;
  const P = lapPx(inner);
  let a = ((arcPx % P) + P) % P;
  const off = lane;
  // A: ゴール → 下直線を左へ → 左カーブ手前
  const segA = GOAL_X - CXL;
  if (a < segA) return { x: GOAL_X - a, y: bottomY + off };
  a -= segA;
  // B: 左カーブ（下→上）
  if (a < Math.PI * R) {
    const t = a / R;
    return { x: CXL - Math.sin(t) * (R + off), y: CY + Math.cos(t) * (R + off) };
  }
  a -= Math.PI * R;
  // C: 上直線（左→右）
  const segC = (cxr - CXL);
  if (a < segC) return { x: CXL + a, y: topY - off };
  a -= segC;
  // D: 右カーブ（上→下）
  if (a < Math.PI * R) {
    const t = a / R;
    return { x: cxr + Math.sin(t) * (R + off), y: CY - Math.cos(t) * (R + off) };
  }
  a -= Math.PI * R;
  // E: 下直線（右→ゴール）
  return { x: cxr - a, y: bottomY + off };
}

// ---------------- シミュレーション ----------------
const state = { horses: [], dist: 1100, inner: false, t: 0, running: false, speed: 6, timer: null, raceId: null,
  oddsTimer: null, mcRows: null, paceProbs: [0.29, 0.62, 0.09], raceGoing: '', raceKlass: '' };

function isInnerCourse(dist) { return tcfg.hasInner && (dist === 1500 || dist === 1600); }  // 門別/大井とも内回りは1500m・1600m

function buildHorses(entries, D, klass, going, histories) {
  const tb = baseOf(D, going, classGroup(klass));
  state.tb = tb;
  const est = entries.map((e) => ({ e, p: estimate((histories || {})[e.horse_id]) }));
  // フォールバック用（統計未読込時のみ）: 生スピード平均
  const okF = est.filter((x) => x.p.vFrontRaw).map((x) => x.p.vFrontRaw);
  const okL = est.filter((x) => x.p.vLastRaw).map((x) => x.p.vLastRaw);
  const avgF = okF.length ? okF.reduce((a, b) => a + b) / okF.length : 15.5;
  const avgL = okL.length ? okL.reduce((a, b) => a + b) / okL.length : 15.2;
  return est.map(({ e, p }) => {
    let vFront, vLast, f3sec = null, l3sec = null;
    const zf = p.zf != null ? p.zf : -0.25;      // 実績なしはやや平均以下と仮定
    const zl = p.zl != null ? p.zl : -0.25;
    if (tb && tb.first3f && tb.last3f) {
      // この距離の標準タイム ± 能力偏差 で区間タイムを予測
      f3sec = tb.first3f.mean - zf * tb.first3f.std;
      l3sec = tb.last3f.mean - zl * tb.last3f.std;
      vFront = frontSeg(D) / f3sec;
      vLast = 600 / l3sec;
    } else {
      vFront = p.vFrontRaw || avgF * 0.995;
      vLast = p.vLastRaw || avgL * 0.995;
    }
    return {
      umaban: e.umaban, waku: e.waku || 1, name: e.horse_name || `#${e.umaban}`,
      vFront, vLast, f3sec, l3sec,
      zf, zl,
      zfSd: clampSd(p.zfSd == null && p.zf == null ? null : p.zfSd),  // 実績なしはブレ大
      zlSd: clampSd(p.zlSd == null && p.zl == null ? null : p.zlSd),
      odds: e.win_odds, pop: e.pop,
      nigeP: p.nigeP, senkoP: p.senkoP, sashiP: p.sashiP, oikomiP: p.oikomiP,
      styleN: p.styleN, cornerMean: p.cornerMean,
      stylePos: p.styleN ? (0.32 * p.senkoP + 0.68 * p.sashiP + p.oikomiP) : null,
      noData: p.zf == null && p.zl == null,
      s: 0, lane: (e.umaban - 1) * 0.55, finTime: null,
    };
  });
}

// 1試行分の速度をサンプリング（能力の中心値 ± 実績のブレ）
function sampleSpeeds(h, D, tb, rng = Math.random) {
  if (!(tb && tb.first3f && tb.last3f)) return { vFront: h.vFront, vLast: h.vLast };
  const zf = h.zf + randn(rng) * h.zfSd;
  const zl = h.zl + randn(rng) * h.zlSd;
  const f3 = tb.first3f.mean - zf * tb.first3f.std;
  const l3 = tb.last3f.mean - zl * tb.last3f.std;
  return { vFront: frontSeg(D) / Math.max(f3, 1), vLast: 600 / Math.max(l3, 1) };
}

// ---------------- ペース×脚質×スタミナ モデル ----------------
// 門別（南関）は前有利がベース。ハイペースで差しがやや台頭、スローは前残り、
// 距離が延びるほどスタミナ消耗（特に先行馬）。実データの傾向 [[kochi-yoso-ai-pace-bias]] に整合。
const PACE = {
  contendRatio: 0.985, // 先頭前速のこの比率以上＝先行争いに加わる（頭数でペースを判定）
  frontFatigue: 0.045, // ハイペースで先行馬が上がりを失速する強さ
  closerSwing: 0.022,  // ペース×脚質スイング（ハイ→差し／スロー→前残り、前有利ゆえ控えめ）
  distFatigue: 0.004,  // 100m延長ごとの上がり消耗（先行ほど大きい＝スタミナ）。基準タイム自体が距離別なので、ここは「同距離クラス平均に対し先行馬がさらに相対消耗する分」のみの小さい残差（旧0.012は距離別基準タイムと二重計上になり1700m級が実タイムより5秒前後遅く出る不具合の原因だった）
  widePenalty: 0.45,   // 後方馬が外を回るロスの最大（秒・上がり600mに加算）
};
const paceLabelOf = (z) => z >= 0.7 ? 'ハイ' : z <= -0.5 ? 'スロー' : 'ミドル';

// ---- 展開エンジンv2 ----
// 門別3,345Rを時系列順に構築し、前半能力・実測コーナー脚質・距離・頭数・馬場から
// H/M/Sを推定する多項ロジット。後半1,004Rは正答率68.6%（常時ミドル62.0%）、
// log-loss 0.635（事前分布だけ0.888）。係数は2026-07-16時点の全期間で再学習。
const PACE_ENGINE = {
  version: 'pace-v2-20260716', labels: ['ハイ', 'ミドル', 'スロー'],
  mean: [-0.3023418037,-0.0051320379,0.4753363229,0.5246636771,0.0195814649,-0.0061347469,0.5951670222,0.928472122,0.773908025,0.6537367517,0.4705280486,0.2662067633,0.0953944362,0.1791206579,0.637797708,0.2202690583,0.1839895163,2.6279464375,0.8325761312,0.3532962191,0.1281854991],
  scale: [0.4387055328,0.3000834242,0.4993913326,0.4993913326,0.1329749452,0.4549762792,0.249763726,0.6005083931,0.5508973297,0.524779388,0.2783455972,0.2290498539,0.1321605516,0.1027637168,0.3106061274,0.2334853815,0.1022539877,1.3049417533,0.2488027853,0.0887116856,0.2676362893],
  weights: [[0.6244840135,1.4207150142,-2.0451990277],[-0.4761883876,-0.5628510951,1.0390394827],[0.281926447,0.0557651945,-0.3376916415],[-0.058855554,-0.0077123897,0.0665679438],[0.058855554,0.0077123897,-0.0665679438],[0.0040648285,0.020057117,-0.0241219455],[0.3911418209,-0.1130225062,-0.2781193148],[-0.0504639124,-0.0337179972,0.0841819096],[0.0149757838,0.0818075935,-0.0967833773],[0.2312431697,-0.0519622005,-0.1792809692],[0.2767273064,-0.0025981665,-0.2741291399],[0.0444140262,-0.1425393371,0.0981253109],[-0.0129167077,-0.0479830765,0.0608997842],[-0.0234957501,0.0031127492,0.0203830009],[0.0290244122,-0.0410124251,0.0119880129],[0.0094713237,-0.0092847905,-0.0001865332],[-0.0011682353,0.0476403725,-0.0464721372],[0.0191493855,0.0468612475,-0.0660106331],[0.1156773185,-0.0493664228,-0.0663108957],[-0.0864358984,0.0923294431,-0.0058935447],[0.05788368,-0.0077413028,-0.0501423773],[0.428824362,-0.0833257243,-0.3454986377]],
};

function paceFeatureVector(horses, D, going, klass) {
  const n = Math.max(horses.length, 1);
  const mean = (a) => a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0;
  const sd = (a) => { const m = mean(a); return Math.sqrt(mean(a.map((v) => (v - m) ** 2))); };
  const zf = horses.map((h) => h.zf == null ? -0.25 : h.zf);
  const zs = [...zf].sort((a, b) => b - a);
  const nige = horses.map((h) => h.nigeP || 0), senko = horses.map((h) => h.senkoP || 0);
  const styleTotals = [nige.reduce((a,b)=>a+b,0), senko.reduce((a,b)=>a+b,0),
    horses.reduce((a,h)=>a+(h.sashiP||0),0), horses.reduce((a,h)=>a+(h.oikomiP||0),0)];
  const styleSum = styleTotals.reduce((a,b)=>a+b,0) || 1;
  const styleProb = styleTotals.map((v) => v / styleSum);
  const entropy = -styleProb.reduce((s,p) => s + (p > 0 ? p * Math.log(p) : 0), 0) / Math.log(4);
  const sortedNige = [...nige].sort((a,b)=>b-a);
  const pressure = styleTotals[0] + 0.45 * styleTotals[1];
  return [(D-1400)/600,(n-10)/6,Number(going==='良'),Number(/重|不/.test(String(going||''))),classLevel(klass),
    mean(zf),sd(zf),Math.max(...zf),mean(zs.slice(0,2)),mean(zs.slice(0,3)),
    zf.filter(v=>v>=0).length/n,zf.filter(v=>v>=0.5).length/n,zf.filter(v=>v>=1).length/n,
    styleTotals[0]/n,Math.max(...nige,0),(sortedNige[0]||0)-(sortedNige[1]||0),styleTotals[1]/n,pressure,entropy,
    mean(horses.map(h=>h.cornerMean == null ? 0.55 : h.cornerMean)),horses.filter(h=>h.zf==null).length/n];
}

function predictPace(horses, D, going, klass) {
  const x = paceFeatureVector(horses, D, going, klass);
  const logits = [...PACE_ENGINE.weights[0]];
  for (let i=0;i<x.length;i++) {
    const z = (x[i]-PACE_ENGINE.mean[i]) / PACE_ENGINE.scale[i];
    for (let k=0;k<3;k++) logits[k] += z * PACE_ENGINE.weights[i+1][k];
  }
  const mx = Math.max(...logits), ex = logits.map(v=>Math.exp(v-mx)), den=ex.reduce((a,b)=>a+b,0);
  return ex.map(v=>v/den);
}

function fieldPositions(vF, horses) {
  const n = vF.length;
  const speedOrder = vF.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]);
  const speedRank = new Array(n);
  speedOrder.forEach(([,i],r)=>{ speedRank[i]=n>1?r/(n-1):0; });
  const blend = speedRank.map((r,i)=>0.75*r+0.25*(horses[i].stylePos==null?r:horses[i].stylePos));
  const order = blend.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]);
  const eNorm = new Array(n);
  order.forEach(([,i],r)=>{ eNorm[i]=n>1?r/(n-1):0; });
  return eNorm;
}

function samplePaceScenario(rng) {
  const u=rng(), p=state.paceProbs;
  const idx=u<p[0]?0:u<p[0]+p[1]?1:2;
  const centers=[0.95,0.05,-0.75], bounds=[[0.7,1.5],[-0.49,0.69],[-1.2,-0.5]];
  const z=Math.max(bounds[idx][0],Math.min(bounds[idx][1],centers[idx]+0.16*randn(rng)));
  return { idx, paceZ:z };
}

function dispPaceLabel() { return PACE_ENGINE.labels[state.paceProbs.indexOf(Math.max(...state.paceProbs))]; }

// 上がり速度の補正係数（スタミナ＋ペース×脚質）。1.0が基準。
function lateMod(paceZ, eNorm, D) {
  const front = 1 - eNorm;   // 先行度（1=逃げ）
  const distF = PACE.distFatigue * Math.max(0, (D - 1000) / 100);
  const m = 1
    - PACE.frontFatigue * Math.max(0, paceZ) * front   // 先行馬：ハイペースで失速
    + PACE.closerSwing * paceZ * eNorm                 // ハイ→差し台頭／スロー→差し不利(前残り)
    - distF * (0.5 + 0.5 * front);                     // 距離：先行ほど消耗
  return Math.max(0.80, Math.min(1.08, m));
}

// ペース補正後の 中間速度v2 と 実効上がり速度vLastEff（外回りロスを速度へ織り込む）
// 中間区間の速度比を距離別の実測ラップ平均から較正（stats.lap_profile・南関のみ存在・無ければ1.0）
// = 前後600mの平均速度に対する道中の実測速度比。門別の「仮定の中間速度」を実測形状に置き換える。
const _midRatioCache = {};
function midRatio(D) {
  if (D in _midRatioCache) return _midRatioCache[D];
  let r = 1.0;
  const prof = statsDb && statsDb.lap_profile && statsDb.lap_profile[String(D)];
  const laps = prof && prof.laps;
  if (laps && laps.length >= 7) {   // 前3+中1以上+後3が要る（1200m=6本は中間なし→1.0）
    const front = laps.slice(0, 3), back = laps.slice(-3), mid = laps.slice(3, -3);
    const vF = 600 / front.reduce((a, b) => a + b, 0);
    const vB = 600 / back.reduce((a, b) => a + b, 0);
    const vM = (200 * mid.length) / mid.reduce((a, b) => a + b, 0);
    r = Math.max(0.9, Math.min(1.1, vM / ((vF + vB) / 2)));
  }
  _midRatioCache[D] = r;
  return r;
}

function paceAdjust(vFront, vLast, D, paceZ, eNorm) {
  const vLastBase = vLast * lateMod(paceZ, eNorm, D);
  const wide = PACE.widePenalty * eNorm * (D / 1600);      // 後方は外を回るロス（秒）
  const vLastEff = 600 / (600 / vLastBase + wide);          // ロスを上がり速度に反映
  const v2 = (vFront + vLastEff) / 2 * (1.0 + 0.02 * paceZ) * midRatio(D);  // ハイなら道中も速い（旧0.96固定は約4%遅く出るバグだった）。midRatio=実測ラップ較正（南関のみ・門別1.0）
  return { vLastEff, v2 };
}

function segTime(vFront, v2, vLastEff, D) {
  const seg1 = frontSeg(D), seg2 = D - seg1 - 600;
  return seg1 / vFront + (seg2 > 0 ? seg2 / v2 : 0) + 600 / vLastEff;
}

// アニメ用：現在の平均速度からフィールドのペースを計算し、各馬に実効速度を焼き込む
function applyPaceMean(paceOverride = null) {
  const D = state.dist;
  const eNorm = fieldPositions(state.horses.map((h) => h.vFront), state.horses);
  const centers = [0.95, 0.05, -0.75];
  state.paceZ = paceOverride == null ? state.paceProbs.reduce((s,p,i)=>s+p*centers[i],0) : paceOverride;
  state.contenders = state.horses.reduce((s,h)=>s+(h.nigeP||0)+0.45*(h.senkoP||0),0);
  state.horses.forEach((h, i) => {
    const a = paceAdjust(h.vFront, h.vLast, D, state.paceZ, eNorm[i]);
    h.v2 = a.v2; h.vLastEff = a.vLastEff; h.eNorm = eNorm[i];
  });
}

// 同じ入力なら同じ結果になる決定的シミュレーション。H/M/Sを学習確率からサンプルし、
// 各馬の前半能力と過去の実測位置を合わせて隊列を作る。購入確率ではなく展開耐性を返す。
function monteCarlo(nPerScenario = 2000) {
  const D = state.dist, tb = state.tb;
  const rng = mulberry32(hash32(`${PACE_ENGINE.version}|${state.raceId}|${nPerScenario}|${state.horses.map(h=>h.umaban).join(',')}`));
  const arr = () => [0,0,0];
  const res = state.horses.map(() => ({ win:arr(), top3:arr(), lead:arr(), front:arr(), ft:arr(), f3:arr(), l3:arr() }));
  const paceSum=[0,0,0], centers=[0.95,0.05,-0.75], bounds=[[0.7,1.5],[-0.49,0.69],[-1.2,-0.5]];
  for (let scenarioIdx=0;scenarioIdx<3;scenarioIdx++) {
    for (let t=0;t<nPerScenario;t++) {
      const sp=state.horses.map((h)=>sampleSpeeds(h,D,tb,rng));
      const eNorm=fieldPositions(sp.map((s)=>s.vFront),state.horses);
      const paceZ=Math.max(bounds[scenarioIdx][0],Math.min(bounds[scenarioIdx][1],centers[scenarioIdx]+0.16*randn(rng)));
      paceSum[scenarioIdx]+=paceZ;
      const fts=sp.map((s,i)=>{
        const a=paceAdjust(s.vFront,s.vLast,D,paceZ,eNorm[i]);
        if(eNorm[i]===0) res[i].lead[scenarioIdx]++;
        if(eNorm[i]<0.45) res[i].front[scenarioIdx]++;
        res[i].f3[scenarioIdx]+=frontSeg(D)/s.vFront;
        res[i].l3[scenarioIdx]+=600/a.vLastEff;
        return segTime(s.vFront,a.v2,a.vLastEff,D);
      });
      const order=fts.map((ft,i)=>[ft,i]).sort((a,b)=>a[0]-b[0]);
      res[order[0][1]].win[scenarioIdx]++;
      for(let k=0;k<Math.min(3,order.length);k++) res[order[k][1]].top3[scenarioIdx]++;
      fts.forEach((ft,i)=>{res[i].ft[scenarioIdx]+=ft;});
    }
  }
  const weighted=(values)=>values.reduce((s,v,k)=>s+state.paceProbs[k]*v/nPerScenario,0);
  state.mcPaceZ=state.paceProbs.reduce((s,p,k)=>s+p*paceSum[k]/nPerScenario,0);
  return state.horses.map((h, i) => ({
    h, winP:weighted(res[i].win), top3P:weighted(res[i].top3),
    leadP:weighted(res[i].lead), frontP:weighted(res[i].front),
    scenarioTop3P:res[i].top3.map(v=>v/nPerScenario),
    avgTime:weighted(res[i].ft), avgF3:weighted(res[i].f3), avgL3:weighted(res[i].l3),
  })).sort((a, b) => b.top3P - a.top3P || b.winP - a.winP);
}

function renderMcTable(rows, ms) {
  const timing = ms != null ? `各展開2,000回・計6,000回・決定的シード（${ms}ms）・` : '';
  const fp = (v) => v == null ? 'データ薄' : `${(v*100).toFixed(1)}%`;
  const pp = state.paceProbs.map(v=>`${(v*100).toFixed(1)}%`);
  $('mcResult').innerHTML = `<table>

function updateOddsLiveBadge() {

  const n = new Date();
  el.innerHTML = `<span class="badge live">🔴ライブ ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}更新（60秒毎）</span>`;

// ライブオッズ: 当日レースのみ60秒毎に取得→h.odds/pop更新→表示中ならテーブル再描画（勝率は再計算しない＝軽い）
async function startLiveOdds(raceDate, raceNo) {
  clearInterval(state.oddsTimer); state.oddsTimer = null;
  state.oddsLiveActive = raceDate === jstToday();
  if (!state.oddsLiveActive) { if ($('oddsLive')) $('oddsLive').textContent = ''; return; }
  const rid = state.raceId;
  const run = async () => {
    const live = await fetchLiveOdds(raceDate, raceNo);
    if (!live || state.raceId !== rid) return;
    for (const h of state.horses) {
      if (live.odds[h.umaban] != null) { h.odds = live.odds[h.umaban]; h.pop = live.pop[h.umaban]; }
    }
    if (state.mcRows) renderMcTable(state.mcRows);
    updateOddsLiveBadge();
  };
  await run();
  state.oddsTimer = setInterval(run, 60000);
}

function distanceAt(h, t, D) {
  const seg1 = frontSeg(D), seg2 = D - seg1 - 600;
  const v2 = h.v2 != null ? h.v2 : (h.vFront + h.vLast) / 2 * 0.96;
  const vLast = h.vLastEff != null ? h.vLastEff : h.vLast;
  const t1 = seg1 / h.vFront, t2 = seg2 > 0 ? seg2 / v2 : 0;
  if (t <= t1) return h.vFront * t;
  if (t <= t1 + t2) return seg1 + v2 * (t - t1);
  return Math.min(D, seg1 + seg2 + vLast * (t - t1 - t2));
}

function finishTime(h, D) {
  const v2 = h.v2 != null ? h.v2 : (h.vFront + h.vLast) / 2 * 0.96;
  const vLast = h.vLastEff != null ? h.vLastEff : h.vLast;
  return segTime(h.vFront, v2, vLast, D);
}

// ---------------- 描画 ----------------
const cv = $('track'), ctx = cv.getContext('2d');
cv.width = W; cv.height = H;   // 場によってポケットのはみ出し幅が違うため実寸幅を動的に設定
const css = {};
function loadCss() {
  for (const n of ['--turf','--track-dirt','--track-dirt-dim','--rail','--goal','--label','--stand','--border','--sub',
    '--waku1-bg','--waku1-tx','--waku2-bg','--waku2-tx','--waku3-bg','--waku3-tx','--waku4-bg','--waku4-tx',
    '--waku5-bg','--waku5-tx','--waku6-bg','--waku6-tx','--waku7-bg','--waku7-tx','--waku8-bg','--waku8-tx'])
    css[n] = getComputedStyle(document.documentElement).getPropertyValue(n).trim();
}

function strokeLoop(inner, laneOff, color, width) {
  ctx.strokeStyle = color; ctx.lineWidth = width;
  ctx.beginPath();
  const P = lapPx(inner);
  for (let a = 0; a <= P; a += 5) {
    const p = posOnTrack(a, laneOff, inner);
    if (a === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.stroke();
}

function gateMarker(distM, inner, label, dy = 0) {
  const p = racePos(distM, inner, 0, 16);     // 発走地点（ポケット対応）
  const q = racePos(distM, inner, 0, -6);
  ctx.strokeStyle = css['--label']; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(q.x, q.y); ctx.lineTo(p.x, p.y); ctx.stroke();
  // 進行方向の矢印（走路の接線方向）
  const p2 = racePos(distM, inner, 7, 5);
  const p1 = racePos(distM, inner, 0, 5);
  const dxv = p2.x - p1.x, dyv = p2.y - p1.y;
  const len = Math.hypot(dxv, dyv) || 1;
  const ux = dxv / len, uy = dyv / len;
  ctx.fillStyle = css['--label'];
  ctx.beginPath();
  ctx.moveTo(p1.x + ux * 12, p1.y + uy * 12);
  ctx.lineTo(p1.x - uy * 4, p1.y + ux * 4);
  ctx.lineTo(p1.x + uy * 4, p1.y - ux * 4);
  ctx.closePath();
  ctx.fill();
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  const above = p.y < CY;
  ctx.fillText(label, p.x, (above ? p.y - 5 : p.y + 14) + dy);
}

function drawTrack() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = css['--turf'];
  ctx.fillRect(0, 0, W, H);
  // 走路の帯（外回り・内回り。使っていない方は薄く。内回り/引き込み線は門別のみ）
  strokeLoop(false, 4, state.inner ? css['--track-dirt-dim'] : css['--track-dirt'], 30);
  if (tcfg.hasInner) strokeLoop(true, 4, state.inner ? css['--track-dirt'] : css['--track-dirt-dim'], 30);
  if (tcfg.hasChutes) {
    const outerColor = state.inner ? css['--track-dirt-dim'] : css['--track-dirt'];
    ctx.strokeStyle = outerColor; ctx.lineWidth = 30; ctx.lineCap = 'round';
    // 向正面(上)延長ポケット（大井1400は斜め・門別は水平）
    const topLen = tcfg.chuteTopMax * PXPM;
    ctx.beginPath();
    if (tcfg.topDiag) { ctx.moveTo(CXL + 8, topY - 4); ctx.lineTo(CXL - topLen * DIAG.c, topY - 4 + topLen * DIAG.s); }
    else { ctx.moveTo(CXL - topLen, topY - 4); ctx.lineTo(CXL + 8, topY - 4); }
    ctx.stroke();
    // ホーム(下)延長ポケット
    ctx.beginPath(); ctx.moveTo(CXR - 8, bottomY + 4); ctx.lineTo(CXR + tcfg.chuteBackMax * PXPM, bottomY + 4); ctx.stroke();
    ctx.lineCap = 'butt';
  }
  // 内ラチ
  strokeLoop(state.inner, -12, css['--rail'], 1.5);
  // ゴール線・スタンド
  ctx.strokeStyle = css['--goal']; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(GOAL_X, bottomY - 12); ctx.lineTo(GOAL_X, bottomY + 20); ctx.stroke();
  ctx.fillStyle = css['--label'];
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('ゴール', GOAL_X, bottomY + 36);
  ctx.fillStyle = css['--stand'];
  ctx.fillRect(GOAL_X - 55, bottomY + 44, 110, 24);
  ctx.strokeStyle = css['--border']; ctx.lineWidth = 1;
  ctx.strokeRect(GOAL_X - 55, bottomY + 44, 110, 24);
  ctx.fillStyle = css['--label'];
  ctx.fillText('スタンド', GOAL_X, bottomY + 60);
  // 場名（インフィールド）
  ctx.fillStyle = css['--track-dirt-dim'];
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText(tcfg.label, CXL + L / 2, CY + 6);
  if (TRACK === '門別') {
    // 門別: 発走地点（公式コース図と同じ配置・引き込み線含む）
    gateMarker(1200, false, '1200m(外)');
    gateMarker(1100, false, '1100m(外)');
    gateMarker(1000, false, '1000m(外)');
    gateMarker(2600, false, '2600m(外)', -13);   // 1000m地点+1周（同地点・ラベルを上段に）
    gateMarker(1700, false, '1700m(外)');
    gateMarker(1800, false, '1800m(外)');
    gateMarker(2000, false, '2000m(外)');
    gateMarker(1500, true, '1500m(内)', 13);
    gateMarker(1600, true, '1600m(内)', 13);
    if (![1000, 1100, 1200, 1500, 1600, 1700, 1800, 2000, 2600].includes(state.dist))
      gateMarker(state.dist, state.inner, `${state.dist}m`);
  } else if (TRACK === '大井') {
    // 大井: 公式図の発走地点（1400m=向正面斜めポケット・2000m=ホーム小ポケット・1600m=内回り）
    gateMarker(1200, false, '1200m');
    gateMarker(1400, false, '1400m');
    gateMarker(1650, false, '1650m');
    gateMarker(1800, false, '1800m');
    gateMarker(2000, false, '2000m');
    gateMarker(1600, true, '1600m(内)', 13);
    if (![1200, 1400, 1600, 1650, 1800, 2000].includes(state.dist))
      gateMarker(state.dist, state.inner, `${state.dist}m`);
  } else {
    // その他の場: 概略図＝選択レースの発走地点だけをオーバル上に表示
    gateMarker(state.dist, false, `${state.dist}m発走`);
  }
}

// ---------------- ギャロップ馬の描画（PILプロトタイプから移植） ----------------
const COATS = ['#96643c', '#6e4628', '#a97a50', '#8f8f94', '#5a3d24', '#7d5533'];  // 鹿毛/黒鹿/栗毛/芦毛…
const coatOf = (h) => COATS[(h.umaban * 7 + 3) % COATS.length];
const STRIDE_M = 7.2;                                    // 1完歩≒7.2m（位相の周期）
const phaseOf = (h) => (h.s / STRIDE_M) * Math.PI * 2 + h.umaban * 0.61;

function gallopLeg(g, ox, oy, phase, off, L, front, color) {
  // 2セグメント脚: 付け根スイング±0.9rad・位相で膝/飛節が曲がる
  const a = 0.9 * Math.sin(phase + off);
  const knee = 0.9 * Math.max(0, Math.sin(phase + off + (front ? 1.0 : 0.6)));
  const k = front ? knee : -knee;
  const s1 = 0.22 * L, s2 = 0.20 * L;
  const x1 = ox + s1 * Math.sin(a), y1 = oy + s1 * Math.cos(a);
  const x2 = x1 + s2 * Math.sin(a + k), y2 = y1 + s2 * Math.cos(a + k);
  g.strokeStyle = color; g.lineCap = 'round';
  g.lineWidth = Math.max(1.5, L * 0.055);
  g.beginPath(); g.moveTo(ox, oy); g.lineTo(x1, y1); g.stroke();
  g.lineWidth = Math.max(1.2, L * 0.045);
  g.beginPath(); g.moveTo(x1, y1); g.lineTo(x2, y2); g.stroke();
  return [x2, y2];   // 蹄の位置（砂埃用）
}

function drawGallopHorse(g, cx, cy, L, phase, dir, wakuBg, wakuTx, num, coat) {
  const X = (x) => cx + dir * x;
  const dark = '#4a331f';
  const bob = -0.05 * L * Math.max(0, Math.sin(phase));
  const st = 1.0 + 0.06 * Math.cos(phase);
  const by = cy + bob;
  // 尻尾（なびき）
  const sway = 0.06 * L * Math.sin(phase + 1.2);
  g.strokeStyle = dark; g.lineWidth = Math.max(1.5, L * 0.05); g.lineCap = 'round';
  g.beginPath();
  g.moveTo(X(-0.34 * L * st), by - 0.10 * L);
  g.quadraticCurveTo(X(-0.50 * L * st), by - 0.02 * L + sway, X(-0.58 * L * st), by + 0.10 * L + sway * 1.5);
  g.stroke();
  // 脚（後2・前2、位相ずらしでロータリーギャロップ風）
  const hoofs = [];
  hoofs.push(gallopLeg(g, X(-0.24 * L * st), by + 0.06 * L, phase, 0.0, L, false, dark));
  hoofs.push(gallopLeg(g, X(-0.20 * L * st), by + 0.06 * L, phase, 0.5, L, false, coat));
  hoofs.push(gallopLeg(g, X(0.22 * L * st), by + 0.06 * L, phase, Math.PI * 0.95, L, true, dark));
  hoofs.push(gallopLeg(g, X(0.26 * L * st), by + 0.06 * L, phase, Math.PI * 1.30, L, true, coat));
  // 胴体
  g.fillStyle = coat;
  g.beginPath(); g.ellipse(cx, by - 0.02 * L, 0.36 * L * st, 0.14 * L, 0, 0, Math.PI * 2); g.fill();
  // 首（前傾・位相で上下）
  const nd = 0.03 * L * Math.sin(phase + 0.8);
  g.beginPath();
  g.moveTo(X(0.18 * L), by - 0.14 * L); g.lineTo(X(0.34 * L), by + 0.02 * L);
  g.lineTo(X(0.56 * L), by - 0.26 * L + nd); g.lineTo(X(0.46 * L), by - 0.34 * L + nd);
  g.closePath(); g.fill();
  // 頭＋耳
  const hx = X(0.56 * L), hy = by - 0.30 * L + nd;
  g.fillStyle = dark;
  g.beginPath(); g.ellipse(hx + dir * 0.05 * L, hy, 0.10 * L, 0.055 * L, dir * 0.35, 0, Math.PI * 2); g.fill();
  g.beginPath();
  g.moveTo(hx - dir * 0.01 * L, hy - 0.05 * L); g.lineTo(hx + dir * 0.02 * L, hy - 0.12 * L); g.lineTo(hx + dir * 0.05 * L, hy - 0.05 * L);
  g.closePath(); g.fill();
  // たてがみ
  g.strokeStyle = dark; g.lineWidth = Math.max(1.5, L * 0.05);
  g.beginPath(); g.moveTo(X(0.46 * L), by - 0.30 * L + nd); g.lineTo(X(0.30 * L), by - 0.16 * L); g.stroke();
  // 騎手（背に密着・モンキー乗り）
  const sx = X(0.02 * L), sy = by - 0.15 * L;
  g.strokeStyle = '#1e1e24'; g.lineWidth = Math.max(1.5, L * 0.05);
  g.beginPath(); g.moveTo(sx, sy); g.lineTo(X(0.10 * L), by + 0.02 * L); g.stroke();   // 脚
  g.fillStyle = wakuBg;
  g.beginPath();
  g.moveTo(sx - dir * 0.02 * L, sy); g.lineTo(X(0.10 * L), sy - 0.14 * L);
  g.lineTo(X(0.20 * L), sy - 0.10 * L); g.lineTo(X(0.08 * L), sy + 0.03 * L);
  g.closePath(); g.fill();
  g.fillStyle = '#f4f4f4';
  g.beginPath(); g.arc(X(0.19 * L), sy - 0.14 * L, 0.045 * L, 0, Math.PI * 2); g.fill();  // ヘルメット
  g.strokeStyle = 'rgba(230,230,230,.8)'; g.lineWidth = 1;
  g.beginPath(); g.moveTo(X(0.20 * L), sy - 0.08 * L); g.lineTo(hx, hy + 0.02 * L); g.stroke();  // 手綱
  // ゼッケン（枠色＋馬番）
  const zx = X(-0.16 * L), z0 = Math.min(zx, zx + dir * 0.24 * L), zw = 0.24 * L;
  g.fillStyle = wakuBg; g.fillRect(z0, by - 0.10 * L, zw, 0.19 * L);
  g.strokeStyle = 'rgba(255,255,255,.85)'; g.lineWidth = 1; g.strokeRect(z0, by - 0.10 * L, zw, 0.19 * L);
  g.fillStyle = wakuTx;
  g.font = `bold ${Math.max(8, L * 0.30)}px sans-serif`;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(num, z0 + zw / 2, by - 0.005 * L);
  g.textBaseline = 'alphabetic';
  return hoofs;
}

function drawHorses() {
  const D = state.dist, inner = state.inner;
  const ranked = [...state.horses].sort((a, b) => b.s - a.s);
  ranked.forEach((h, i) => { h.targetLane = i * 0.62; });
  for (const h of state.horses) {
    h.lane += ((h.targetLane ?? h.lane) - h.lane) * 0.04;
    const p = racePos(D, inner, h.s, -8 + h.lane * 1.4);
    // 進行方向を向いた馬体（上から見たカプセル・ギャロップで長軸が脈動）
    const p2 = racePos(D, inner, Math.min(h.s + 3, D), -8 + h.lane * 1.4);
    const ang = Math.atan2(p2.y - p.y, p2.x - p.x);
    const ph = phaseOf(h);
    const rx = 11 * (1 + 0.05 * Math.sin(ph));
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(ang);
    ctx.fillStyle = coatOf(h);
    ctx.beginPath(); ctx.ellipse(0, 0, rx, 5.5, 0, 0, Math.PI * 2); ctx.fill();   // 馬体
    ctx.fillStyle = '#4a331f';
    ctx.beginPath(); ctx.ellipse(rx * 0.85, 0, 4, 2.6, 0, 0, Math.PI * 2); ctx.fill();  // 頭
    ctx.restore();
    // ゼッケン（回転させず水平のまま＝読みやすさ優先）
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6.5, 0, Math.PI * 2);
    ctx.fillStyle = css[`--waku${h.waku}-bg`];
    ctx.fill();
    ctx.strokeStyle = css['--border']; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = css[`--waku${h.waku}-tx`];
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(h.umaban, p.x, p.y);
  }
  ctx.textBaseline = 'alphabetic';
}

const BASHIN = 2.4;  // 1馬身 = 約2.4m

function gapBashin(prev, h) {
  if (prev == null) return null;
  if (prev.finTime != null && h.finTime != null)
    return (h.finTime - prev.finTime) * h.vLast / BASHIN;  // ゴール後はタイム差×上がり速度
  return (prev.s - h.s) / BASHIN;
}

// 秒 → "1.03.7" 表記（ビューアの成績タイム表記に統一）
function fmtTime(sec) {
  if (sec == null) return '';
  const m = Math.floor(sec / 60);
  const s = sec - m * 60;
  return `${m}.${s < 10 ? '0' : ''}${s.toFixed(1)}`;
}

// 着差（馬身）→ 競馬の慣用表記（ハナ/クビ/1馬身…）
function marginLabel(b) {
  if (b == null) return '';
  const bins = [
    [0.05, 'ハナ'], [0.12, 'アタマ'], [0.25, 'クビ'], [0.65, '1/2'], [0.9, '3/4'],
    [1.15, '1'], [1.4, '1.1/4'], [1.65, '1.1/2'], [1.9, '1.3/4'], [2.3, '2'],
    [2.8, '2.1/2'], [3.3, '3'], [3.8, '3.1/2'], [4.5, '4'], [5.5, '5'],
    [6.5, '6'], [7.5, '7'], [8.5, '8'], [11, '10'],
  ];
  for (const [th, label] of bins) if (b < th) return label;
  return '大差';
}

function renderOrder() {
  const ranked = [...state.horses].sort((a, b) => (a.finTime ?? 99) - (b.finTime ?? 99) || b.s - a.s);
  $('order').innerHTML = ranked.map((h, i) => {
    const g = gapBashin(ranked[i - 1], h);
    const gtxt = g == null ? '' : `<span class="badge">${marginLabel(g)}</span>`;
    const ttxt = h.finTime != null ? `<span class="mtime">${fmtTime(h.finTime)}</span>` : '';
    return `
    <div class="row"><span class="pos">${h.finTime != null ? i + 1 + '着' : i + 1}</span>
    <span class="waku w${h.waku}">${h.umaban}</span> ${esc(h.name)} ${ttxt} ${gtxt}${h.noData ? ' <span class="badge">実績なし</span>' : ''}</div>`;
  }).join('');
}

// 拡大ビュー: 馬身スケール表示。先頭のアンカーは走行方向に連動
// （向正面=左→右なら先頭が右端、正面=右→左なら先頭が左端。コーナー中は直前の向きを維持）
const sv = $('strip'), sctx = sv.getContext('2d');
function drawStrip() {
  const SW = sv.width, SH = sv.height;
  sctx.clearRect(0, 0, SW, SH);
  sctx.fillStyle = css['--turf'];
  sctx.fillRect(0, 0, SW, SH);
  const ranked = [...state.horses].sort((a, b) => b.s - a.s);
  if (!ranked.length) return;
  const leader = ranked[0].s;
  // 進行方向の検出（6m先の画面x移動量。カーブ中は小さいので前回の向きを保持）
  const pA = racePos(state.dist, state.inner, Math.min(leader, state.dist - 1), 0);
  const pB = racePos(state.dist, state.inner, Math.min(leader + 6, state.dist), 0);
  const dxv = pB.x - pA.x;
  if (Math.abs(dxv) > 3.5) state.stripDir = dxv > 0 ? 1 : -1;
  const dir = state.stripDir || 1;
  const spreadB = (leader - ranked[ranked.length - 1].s) / BASHIN;
  const usable = SW - 90;
  const pxPerB = usable / Math.max(spreadB + 1.5, 10);  // 表示幅は最小10馬身（馬群が広がればフィットに自動拡大）
  const anchorX = dir > 0 ? SW - 45 : 45;
  // 馬体サイズを馬身スケールに連動（鼻先〜尻尾≒1.24L ≒ 実寸1馬身 → L≒0.8×pxPerB）
  const L = Math.max(20, Math.min(0.8 * pxPerB, 62));
  const bandTop = 12, bandBot = SH - 22;
  // 3段レーン（馬サイズに応じた間隔・帯の中で上下センタリング）
  const laneStep = Math.min((bandBot - bandTop - 0.9 * L) / 2, 1.1 * L + 14);
  const y0 = bandTop + 0.42 * L + Math.max(0, (bandBot - bandTop - 0.9 * L - 2 * laneStep) / 2);
  // 走路帯
  sctx.fillStyle = css['--track-dirt'];
  sctx.fillRect(0, bandTop, SW, bandBot - bandTop);
  // 進行方向インジケータ
  sctx.fillStyle = css['--sub'];
  sctx.font = 'bold 11px sans-serif'; sctx.textAlign = dir > 0 ? 'right' : 'left';
  sctx.fillText(dir > 0 ? '進行方向 ▶' : '◀ 進行方向', dir > 0 ? SW - 6 : 6, 9);
  // 目盛り（ズームに応じて2馬身/5馬身刻み）
  const stepB = pxPerB >= 30 ? 2 : 5;
  sctx.strokeStyle = css['--rail']; sctx.lineWidth = 1;
  sctx.fillStyle = css['--sub']; sctx.font = '10px sans-serif'; sctx.textAlign = 'center';
  for (let b = 1; b * stepB * pxPerB < usable; b++) {
    const x = anchorX - dir * b * stepB * pxPerB;
    sctx.beginPath(); sctx.moveTo(x, bandTop); sctx.lineTo(x, bandTop + 6); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(x, bandBot - 6); sctx.lineTo(x, bandBot); sctx.stroke();
    sctx.fillText(`${b * stepB}馬身`, x, SH - 8);
  }
  // ゴール線（先頭の前方が視界に入ったら）
  const dtgPx = (state.dist - leader) / BASHIN * pxPerB;
  const gx = anchorX + dir * dtgPx;
  if (gx > -20 && gx < SW + 20) {
    sctx.strokeStyle = css['--goal']; sctx.lineWidth = 3;
    sctx.beginPath(); sctx.moveTo(gx, bandTop - 4); sctx.lineTo(gx, bandBot + 4); sctx.stroke();
    sctx.fillStyle = css['--goal'];
    sctx.fillText('GOAL', Math.max(18, Math.min(gx, SW - 18)), SH - 8);
  }
  // 砂埃（走行中に蹄付近から発生・後方へ流れて消える）
  state.dust = state.dust || [];
  if (state.running) {
    for (const pt of state.dust) { pt.x += pt.vx; pt.y += pt.vy; pt.age += 1; }
    state.dust = state.dust.filter((pt) => pt.age < pt.max);
  }
  for (const pt of state.dust) {
    const a = 1 - pt.age / pt.max;
    sctx.fillStyle = `rgba(196,176,146,${(a * 0.5).toFixed(2)})`;
    sctx.beginPath(); sctx.arc(pt.x, pt.y, 1.2 + (1 - a) * 3.5, 0, Math.PI * 2); sctx.fill();
  }
  // 馬（順位で3段・ギャロップアニメーション・馬体は1馬身スケール）
  // レーンの向き: 先頭勢=ラチ沿いなので、向正面(→)はラチが手前＝先頭を下段に、
  // 正面(←・ゴール前)はラチが奥＝先頭を上段に（スタンドから見た遠近と一致させる）
  const entries = ranked.map((h, i) => {
    const laneIdx = dir > 0 ? 2 - (i % 3) : (i % 3);
    return { h, x: anchorX - dir * (leader - h.s) / BASHIN * pxPerB, y: y0 + laneIdx * laneStep };
  });
  entries.sort((a, b) => a.y - b.y);   // 奥(上)から描いて手前(下)を前面に
  for (const e of entries) {
    const h = e.h;
    const hoofs = drawGallopHorse(sctx, e.x, e.y, L, phaseOf(h), dir,
      css[`--waku${h.waku}-bg`], css[`--waku${h.waku}-tx`], h.umaban, coatOf(h));
    if (state.running && h.s < state.dist && Math.random() < 0.35 && state.dust.length < 140) {
      const hf = hoofs[Math.floor(Math.random() * 2)];   // 後脚の蹄から
      state.dust.push({ x: hf[0], y: Math.min(hf[1], bandBot - 2), vx: -dir * (1.2 + Math.random() * 1.6), vy: -(0.2 + Math.random() * 0.5), age: 0, max: 14 + Math.random() * 8 });
    }
  }
  sctx.textBaseline = 'alphabetic';
}

function phaseLabel() {
  const lead = Math.max(...state.horses.map((h) => h.s));
  const D = state.dist;
  if (lead >= D) return 'ゴール！';
  if (lead >= D - 600) return `直線の攻防（残り${Math.max(0, Math.round(D - lead))}m）`;
  if (lead <= frontSeg(D)) return `テン3Fの隊列形成（${Math.round(lead)}m）`;
  return `道中（${Math.round(lead)}m）`;
}

// requestAnimationFrameは非表示タブで止まるためタイマー駆動
let lastTs = null;
function tick() {
  if (!state.running) return;
  const now = performance.now();
  if (lastTs == null) lastTs = now;
  const dt = Math.min(1.0, (now - lastTs) / 1000) * state.speed;
  lastTs = now;
  state.t += dt;
  let allDone = true;
  for (const h of state.horses) {
    h.s = distanceAt(h, state.t, state.dist);
    if (h.s >= state.dist && h.finTime == null) h.finTime = finishTime(h, state.dist);
    if (h.s < state.dist) allDone = false;
  }
  drawTrack();
  drawHorses();
  drawStrip();
  renderOrder();
  $('clock').textContent = `${state.t.toFixed(1)}秒 — ${phaseLabel()}`;
  if (allDone) {
    state.running = false;
    clearInterval(state.timer);
    state.timer = null;
    $('startBtn').textContent = '↺ もう一度';
  }
}

// ---------------- 初期化 ----------------
async function loadRace(raceId, meta) {
  const { race, entries } = await state.source.loadEntries(raceId);
  state.raceId = raceId;
  state.dist = race.distance_m || meta.distance_m || 1100;
  state.inner = isInnerCourse(state.dist);
  const ids = entries.map((e) => e.horse_id).filter(Boolean);
  const rawHist = await state.source.loadHistories(ids);
  // 振り返り防止: このレースの日付以降の走りは使わない（未来レースには影響なし）
  const tgtDate = race.date || race.race_date || meta.date;
  const histories = {};
  for (const id in rawHist) histories[id] = rawHist[id].filter((r) => !r.date || !tgtDate || r.date < tgtDate);
  state.raceGoing = race.going || '';
  state.raceKlass = race.klass || meta.klass || '';
  state.horses = buildHorses(entries, state.dist, state.raceKlass, state.raceGoing, histories);
  state.paceProbs = predictPace(state.horses, state.dist, state.raceGoing, state.raceKlass);
  applyPaceMean();   // 想定ペースと各馬の実効速度を算出
  state.t = 0; state.running = false; lastTs = null; state.stripDir = null; state.dust = [];
  state.mcRows = null; $('mcResult').innerHTML = '';   // レース切替で前レースの結果を残さない
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  // 展開専用化したためオッズ監視は開始しない（期待値・購入判断には使わない）
  $('raceLabel').textContent = `${race.date || ''} ${TRACK}${meta.race_no}R ${state.dist}m（${state.inner ? '内回り' : '外回り'}）${state.horses.length}頭`;
  $('startBtn').textContent = '▶ スタート';
  $('clock').textContent = '';
  drawTrack(); drawHorses(); drawStrip(); renderOrder();
  const posLabel = (e) => e == null ? '' : e < 0.2 ? '逃げ' : e < 0.45 ? '先行' : e < 0.75 ? '差し' : '追込';
  const pz = state.paceZ ?? 0;
  const dispPace = dispPaceLabel();
  const pacePct = state.paceProbs.map((p)=>`${(p*100).toFixed(1)}%`);
  $('params').innerHTML =
    `<div class="note">想定ペース: <b>${dispPace}</b>（H ${pacePct[0]} / M ${pacePct[1]} / S ${pacePct[2]}・逃げ圧力 ${(state.contenders ?? 0).toFixed(2)}・pace ${pz >= 0 ? '+' : ''}${pz.toFixed(2)}）—
      ${dispPace === 'ハイ' ? 'ハイなら差し・先行がやや台頭' : dispPace === 'スロー' ? 'スローは前残り濃厚' : '標準的な流れ'}。
      隊列は前半能力75%＋実測コーナー脚質25%で推定。ペース確率は未来情報を除いた時系列検証済みモデル。</div>` +
    `<table><tr><th>馬番</th><th>馬名</th><th>隊列</th><th>予測テン3F</th><th>予測上がり3F</th><th>実績</th></tr>` +
    state.horses.map((h) => `<tr><td><span class="waku w${h.waku}">${h.umaban}</span></td><td class="l">${esc(h.name)}</td>` +
      `<td>${posLabel(h.eNorm)}</td>` +
      `<td>${h.f3sec != null ? h.f3sec.toFixed(1) + '秒' : h.vFront.toFixed(2) + ' m/s'}</td>` +
      `<td>${h.l3sec != null ? h.l3sec.toFixed(1) + '秒' : h.vLast.toFixed(2) + ' m/s'}</td>` +
      `<td>${h.noData ? '無し（平均以下と仮定）' : 'あり'}</td></tr>`).join('') + '</table>';
}

async function init() {
  $('simTitle').textContent = `${TRACK} 展開シミュレータ`;
  document.title = `${TRACK} 展開シミュレータ`;
  $('backToViewer').onclick = () => { location.href = `keiba.html?track=${encodeURIComponent(TRACK)}`; };
  $('to3d').onclick = () => { location.href = `sim3d.html?track=${encodeURIComponent(TRACK)}&race=${encodeURIComponent(state.raceId || '')}`; };
  const innerLap = lapMeters(true);
  const pocketNote = tcfg.hasChutes
    ? `・${TRACK === '大井' ? '1200m/1400m(斜め)/2000m' : '1200m/2000m'}は引き込み線から発走` : '';
  $('courseNote').innerHTML = `${TRACK}競馬場実寸比: 1周1,600m(外)/${innerLap}m(内)・直線${tcfg.straight}m(外)・右回り${pocketNote}。
    過去5走のテン区間・上がり3Fを<b>距離×馬場×クラスの基準タイムに対する偏差値</b>へ換算し、実測コーナー位置から脚質履歴を復元。
    <b>展開モデルv2</b>: 前半能力・逃げ/先行圧力・単騎度・脚質分散・距離・頭数・当日馬場から<b>H/M/S確率</b>を算出し、各展開を独立に2,000回検証。隊列は前半能力75%＋実測位置25%、ハイの先行消耗・スローの前残り・距離スタミナ・外ロスを反映。`;
  loadCss();
  drawTrack();
  try {
    let dates = null;
    for (const name of ['supabase', 'local']) {
      try { dates = await sources[name].listDates(); state.source = sources[name]; state.sourceName = name; break; }
      catch (e) { /* 次の源へ */ }
    }
    if (!dates || !dates.length) throw new Error('データ源が見つかりません');
    statsDb = await state.source.loadStats().catch(() => null);
    await initMain(dates);
  } catch (e) {
    $('raceLabel').textContent = '⚠ データ読み込み失敗';
    $('params').innerHTML = `<div class="note">⚠ 読み込みエラー: ${esc(e.message)}</div>`;
  }
}

async function initMain(dates) {
  state.races = [];
  const renderRaceBtns = () => {
    $('raceBtns').innerHTML = state.races.map((r) =>
      `<button data-id="${r.race_id}" class="${r.race_id === state.raceId ? 'active' : ''}"
        title="${esc(r.klass || '')} ${esc(r.name || '')}">${r.race_no}R<small>${r.distance_m || '?'}m</small></button>`).join('');
  };
  const loadDate = async (date, targetRid) => {
    try { localStorage.setItem(`mb_sim_date_${tcfg.prefix}`, date); } catch (e) { /* プライベートモード等は無視 */ }
    state.races = await state.source.listRaces(date);
    if (state.races.length) {
      const meta = state.races.find((r) => r.race_id === targetRid) || state.races[0];
      await loadRace(meta.race_id, meta);
    }
    renderRaceBtns();
  };
  state.renderRaceBtns = renderRaceBtns;
  $('dateSel').innerHTML = dates.map((d) => `<option value="${d}">${d}</option>`).join('');
  $('dateSel').addEventListener('change', (e) => loadDate(e.target.value));
  $('raceBtns').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-id]');
    if (!b) return;
    const meta = state.races.find((r) => r.race_id === b.dataset.id);
    loadRace(meta.race_id, meta).then(renderRaceBtns);
  });
  $('startBtn').addEventListener('click', () => {
    if (state.running) return;
    if (state.horses.every((h) => h.finTime != null) || state.t > 0) {
      for (const h of state.horses) { h.s = 0; h.finTime = null; h.lane = (h.umaban - 1) * 0.55; }
      state.t = 0;
    }
    // 毎回、能力のブレをサンプリング（▶のたびに展開が変わる）
    for (const h of state.horses) {
      const sp = sampleSpeeds(h, state.dist, state.tb);
      h.vFront = sp.vFront; h.vLast = sp.vLast;
    }
    const scenario = samplePaceScenario(Math.random);
    state.animationScenario = PACE_ENGINE.labels[scenario.idx];
    applyPaceMean(scenario.paceZ);   // この試行で抽選したH/M/Sと実効速度を反映
    state.running = true; lastTs = null;
    $('startBtn').textContent = `走行中（${state.animationScenario}）…`;
    if (state.timer) clearInterval(state.timer);
    state.timer = setInterval(tick, 33);
  });
  $('mcBtn').addEventListener('click', () => {
    const t0 = performance.now();
    state.mcRows = monteCarlo(2000);
    const ms = Math.round(performance.now() - t0);
    renderMcTable(state.mcRows, ms);
  });
  $('speedBtn').addEventListener('click', () => {
    const SPEEDS = [1, 3, 6, 12];   // x1=実時間（1000mを約63秒かけて観る）
    state.speed = SPEEDS[(SPEEDS.indexOf(state.speed) + 1) % SPEEDS.length];
    $('speedBtn').textContent = `速度 x${state.speed}`;
  });
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { loadCss(); drawTrack(); drawHorses(); });
  // URL ?race=<race_id> でそのレースを直接読み込む（ビューアからの埋め込み用）。?embed=1 でヘッダ非表示。
  const params = new URLSearchParams(location.search);
  const reqRace = params.get('race');
  if (params.get('embed')) {
    document.body.classList.add('embed');
    const hd = document.querySelector('header'); if (hd) hd.style.display = 'none';
    const ds = $('dateSel').closest('.controls'); if (ds) ds.style.display = 'none';   // 日付選択を隠す
    const rb = $('raceBtns').closest('.controls'); if (rb) rb.style.display = 'none';   // レースはビューア側タブで切替（重複防止）
  }
  // 初期日付: URL指定レース → 前回選択（記憶） → 今日 → 最新 の優先順
  let initDate = null;
  if (reqRace && reqRace.length >= 16) {
    const rd = `${reqRace.slice(0, 4)}-${reqRace.slice(12, 14)}-${reqRace.slice(14, 16)}`;
    if (dates.includes(rd)) initDate = rd;
  }
  if (!initDate) {
    try { initDate = localStorage.getItem(`mb_sim_date_${tcfg.prefix}`); } catch (e) { /* 無視 */ }
  }
  if (!initDate || !dates.includes(initDate)) {
    const n = new Date();
    const today = `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
    initDate = dates.includes(today) ? today : dates[0];
  }
  $('dateSel').value = initDate;
  await loadDate(initDate, reqRace);
}
init();
</script>
