const cyokyoState = { data: null, date: null, year: null, twoOnly: false, byYear: {}, years: [], base: null, local: null };
const cyoAge = (s) => { const m = String(s || '').match(/(\d+)/); return m ? +m[1] : null; };

// 指定年の調教日データを取得（既定メタ＝最新年、過去年はキー別に遅延ロード、ローカルは全期間から抽出）
async function cyoLoadYear(y) {
  if (cyokyoState.byYear[y]) return cyokyoState.byYear[y];
  if (cyokyoState.local) {
    const dd = {};
    for (const d in cyokyoState.local) if (d.slice(0, 4) === y) dd[d] = cyokyoState.local[d];
    return (cyokyoState.byYear[y] = dd);
  }
  try {
    const rows = await sbGet(`chihou_meta?key=eq.monbetsu_cyokyo_${y}&select=value`);
    return (cyokyoState.byYear[y] = (rows.length && rows[0].value && rows[0].value.dates) || {});
  } catch (e) { return (cyokyoState.byYear[y] = {}); }
}

async function renderCyokyo() {
  const root = $('cyokyoRoot');
  if (!cyokyoState.data) {
    root.innerHTML = '<div class="empty">読み込み中…（調教データ）</div>';
    // Supabase（既定＝最新年＋年リスト）→ ローカル全期間 の順で取得
    try {
      const rows = await sbGet('chihou_meta?key=eq.monbetsu_cyokyo&select=value');
      if (rows.length && rows[0].value && rows[0].value.dates) cyokyoState.data = rows[0].value;
    } catch (e) { /* 次へ */ }
    if (!cyokyoState.data) {
      try { cyokyoState.data = await jsonGet('data/cyokyo_works.json'); cyokyoState.local = cyokyoState.data.dates; }
      catch (e) {
        root.innerHTML = `<div class="empty">調教データを読み込めませんでした（${esc(e.message)}）。<br>
          <button onclick="renderCyokyo()">↻ 再試行</button></div>`;
        return;
      }
    }
    cyokyoState.base = cyokyoState.data.base;
    cyokyoState.years = cyokyoState.data.years
      || [...new Set(Object.keys(cyokyoState.data.dates).map((d) => d.slice(0, 4)))].sort().reverse();
    cyokyoState.year = cyokyoState.years[0];
    cyokyoState.byYear[cyokyoState.year] = cyokyoState.data.dates;   // 既定メタ＝最新年
  }

  root.innerHTML = '<div class="empty">読み込み中…（調教データ）</div>';
  const yearDates = await cyoLoadYear(cyokyoState.year);
  const hb = cyokyoState.base;
  const hensachi = (t3) => (hb && hb.std ? 50 + 10 * (hb.mean - t3) / hb.std : null);
  const two = cyokyoState.twoOnly;
  const filt = (ws) => two ? ws.filter((w) => cyoAge(w.sex) === 2) : ws;
  // その年の調教日（2歳フィルタ時は2歳追切がある日だけ）を新しい順に
  const dateKeys = Object.keys(yearDates).sort().reverse().filter((d) => filt(yearDates[d]).length);
  const youbiOf = (d) => (yearDates[d][0] || {}).youbi || '';
  if (!cyokyoState.date || !dateKeys.includes(cyokyoState.date)) cyokyoState.date = dateKeys[0];
  if (!cyokyoState.date) { root.innerHTML = `<div class="empty">${esc(cyokyoState.year)}年${two ? 'の2歳' : ''}の調教データがありません。</div>`; return; }
  const works = filt(yearDates[cyokyoState.date] || []);
  const finCell = (w) => {
    if (w.fin == null) return '<td></td>';
    const cls = w.fin >= 1 && w.fin <= 3 ? `fin${w.fin}` : '';
    return `<td class="${cls}">${w.fin}着</td>`;
  };
  // 対象レース（この追切が向けられた次走）を race_id から 月/日 R番 に復元
  // race_id: YYYY[4] 回[2] 場[2] 日次[2] R[2] 月日[4] → [10:12]=R, [12:14]=月, [14:16]=日
  const targetRace = (rid) => (!rid || rid.length < 16) ? '' : `${+rid.slice(12, 14)}/${+rid.slice(14, 16)} ${+rid.slice(10, 12)}R`;
  const sortBy = cyokyoState.sort || '3f';   // 3f=3F順 / 1f=終い1F最速順
  // 坂路: t3=3F, 本馬場: t2=真の3F。1Fソート時は終い(t1)で並べる
  const hanro = works.filter((w) => w.hanro && w.t3 != null)
    .sort((a, b) => sortBy === '1f' ? (a.t1 == null ? 99 : a.t1) - (b.t1 == null ? 99 : b.t1) : a.t3 - b.t3);
  const honba = works.filter((w) => w.honba && w.t2 != null)
    .sort((a, b) => sortBy === '1f' ? (a.t1 == null ? 99 : a.t1) - (b.t1 == null ? 99 : b.t1) : a.t2 - b.t2);
  const other = works.length - hanro.length - honba.length;
  // 最終追いバッジ＋対象レース（いつ・何レースに向けた追切か）
  const finalCell = (w) => `<td class="small l">${w.final ? '<span class="badge arrow-up">最終追い</span> ' : ''}${targetRace(w.rid)}</td>`;
  // 坂路の200m毎ラップ＋終いの加速/失速/好走（共通関数）
  const lapCell = (w) => {
    const { str, tag } = hanroLapCells(w.t4, w.t3, w.t2, w.t1, hensachi(w.t3));
    return str ? `<td class="small l">${str}${tag}</td>` : '<td></td>';
  };
  const hanroRows = hanro.map((w, i) => `<tr>
    <td>${i + 1}</td>
    <td class="l"><a class="horse-link" data-horse="${esc(w.name)}">${esc(w.name)}</a>${w.pb ? ' <span class="badge arrow-up">自己ベスト</span>' : ''}</td>
    <td>${esc(w.sex || '')}</td><td class="l small">${esc(w.trainer || '')}</td><td>${esc(w.course)}</td><td>${esc(w.baba || '')}</td>
    <td class="num">${w.t4 != null ? w.t4.toFixed(1) : ''}</td>
    <td class="num ${sortBy === '3f' && i < 3 ? 'f1' : ''}">${w.t3.toFixed(1)}</td>
    <td class="num">${w.t2 != null ? w.t2.toFixed(1) : ''}</td>
    <td class="num ${sortBy === '1f' && i < 3 ? 'f1' : ''}">${w.t1 != null ? w.t1.toFixed(1) : ''}</td>
    ${lapCell(w)}
    <td class="num">${hensachi(w.t3) != null ? hensachi(w.t3).toFixed(1) : ''}</td>
    ${finCell(w)}${finalCell(w)}<td class="l">${esc(w.tanpyo || '')}</td>
  </tr>`).join('');
  const honbaRows = honba.map((w, i) => `<tr>
    <td>${i + 1}</td>
    <td class="l"><a class="horse-link" data-horse="${esc(w.name)}">${esc(w.name)}</a></td>
    <td>${esc(w.sex || '')}</td><td class="l small">${esc(w.trainer || '')}</td><td>${esc(w.course)}</td><td>${esc(w.baba || '')}</td>
    <td class="num">${w.t4 != null ? w.t4.toFixed(1) : ''}</td>
    <td class="num">${w.t3 != null ? w.t3.toFixed(1) : ''}</td>
    <td class="num ${sortBy === '3f' && i < 3 ? 'f1' : ''}">${w.t2.toFixed(1)}</td>
    <td class="num ${sortBy === '1f' && i < 3 ? 'f1' : ''}">${w.t1 != null ? w.t1.toFixed(1) : ''}</td>
    ${finCell(w)}${finalCell(w)}<td>${esc(w.ashiiro || '')}</td><td class="l">${esc(w.tanpyo || '')}</td>
  </tr>`).join('');

  root.innerHTML = `
  <div class="controls">
    <span>年</span>
    <div class="racetabs">${cyokyoState.years.map((y) => `<button data-cyear="${y}" class="${cyokyoState.year === y ? 'active' : ''}" style="width:auto;padding:6px 12px">${y}</button>`).join('')}</div>
    <button data-cyo-two class="${two ? 'active' : ''}" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);cursor:pointer">2歳限定${two ? ' ✓' : ''}</button>
    <span style="margin-left:10px">並び</span>
    <div class="racetabs">
      <button data-cyo-sort="3f" class="${sortBy === '3f' ? 'active' : ''}" style="width:auto;padding:6px 12px">3F順</button>
      <button data-cyo-sort="1f" class="${sortBy === '1f' ? 'active' : ''}" style="width:auto;padding:6px 12px">終い1F順</button>
    </div>
  </div>
  <div class="controls">調教日
    <div class="racetabs">${dateKeys.map((d) => `<button data-cdate="${d}" class="${cyokyoState.date === d ? 'active' : ''}" style="width:auto;padding:6px 8px">${d.slice(5).replace('-', '.')}(${youbiOf(d)})</button>`).join('')}</div>
  </div>
  <div class="note">${cyokyoState.date}${youbiOf(cyokyoState.date) ? `(${youbiOf(cyokyoState.date)})` : ''} の追切：坂路 <b>${hanro.length}</b>本 ・ <b style="color:var(--accent)">本馬場 ${honba.length}本</b>${other ? ` ・ 他 ${other}本` : ''}${two ? '（2歳限定）' : ''}　※終い1F順で並べ替え可</div>
  <div class="card tablewrap">
    <b>坂路（${cyokyoState.date}）${hanro.length}本</b>
    <table>
      <tr><th>#</th><th>馬名</th><th>馬齢</th><th>厩舎</th><th>コース</th><th>馬場</th><th>4F</th><th>3F</th><th>2F</th><th>1F</th><th>ラップ(200m毎)</th><th>偏差値</th><th>着順</th><th>最終追い/対象R</th><th>短評</th></tr>
      ${hanroRows || '<tr><td colspan="15">この日の坂路追切はありません</td></tr>'}
    </table>
    <div class="legend"><span class="sw f"></span> 3F上位3本。偏差値は全期間の坂路3F分布（${hb ? `${hb.mean}±${hb.std}秒・n=${hb.n.toLocaleString()}本` : '-'}）基準・50が平均。着順は各馬の次走結果。<span class="badge arrow-up">最終追い</span>＝その次走前で最後の追切（本馬場を含め最後の1本）。ラップ＝200m毎の実測（累計から算出・左が入り→右が終い）。<span class="badge conf-S">加速</span>＝終いが最速級＝尻上がり／<span class="badge conf-C">失速</span>＝終いが明確に掛かる（入りが速くてもバテ気配）。<span class="badge conf-S">🔥好走</span>＝偏差値60+×加速（実測 次走複勝率59%・全26,409本の最終追い分析）。</div>
  </div>
  ${honba.length ? `<div class="card tablewrap" style="border:1px solid var(--accent)">
    <b style="color:var(--accent)">🏇 本馬場（${cyokyoState.date}）${honba.length}本</b>
    <table>
      <tr><th>#</th><th>馬名</th><th>馬齢</th><th>厩舎</th><th>コース</th><th>馬場</th><th>5F</th><th>4F</th><th>3F</th><th>1F</th><th>着順</th><th>最終追い/対象R</th><th>脚色</th><th>短評</th></tr>
      ${honbaRows}
    </table>
    <div class="legend">本馬場（門別本）の時計。<span class="sw f"></span> ${sortBy === '1f' ? '終い1F' : '3F'}上位3本。${other ? `他コース${other}本は非表示。` : ''}</div>
  </div>` : (other ? `<div class="note">この日は本馬場の追切はありません（他コース${other}本）。</div>` : `<div class="note">この日は本馬場の追切はありません。</div>`)}`;
}

// ============================================================
// 馬詳細モーダル（成績＋調教履歴）
// ============================================================
const withTimeout = (p, ms) => Promise.race([p,
  new Promise((_, rej) => setTimeout(() => rej(new Error('タイムアウト（通信が遅い可能性）')), ms))]);

// 父/母父タップ → その血統の産駒一覧（既存の馬モーダルを流用）。産駒名タップで各馬詳細へ。
function openPedModal(type, name) {
  const st = state.stats || {};
  const list = ((type === 'bms' ? st.bms_horses : st.sire_horses) || {})[name] || [];
  $('horseModal').hidden = false;
  $('horseModalTitle').textContent = `${type === 'bms' ? '母父' : '父'} ${name} の産駒（門別・${list.length}頭）`;
  const rows = list.map(([hn, n, c1, c2, c3]) => {
    const t3 = c1 + c2 + c3, out = n - t3;
    return `<tr>
    <td class="l"><a class="horse-link" data-horse="${esc(hn)}"><b>${esc(hn)}</b></a></td>
    <td class="num">${n}</td>
    <td class="num small">${c1}-${c2}-${c3}-${out}</td>
    <td class="num ${n && c1 / n >= 0.15 ? 'best' : ''}">${n ? Math.round(c1 / n * 100) : 0}%</td>
    <td class="num ${n && t3 / n >= 0.4 ? 'best' : ''}">${n ? Math.round(t3 / n * 100) : 0}%</td></tr>`;
  }).join('');
  $('horseModalBody').innerHTML = `<div class="card tablewrap"><table>
    <tr><th>産駒</th><th>走数</th><th>着別(1-2-3-着外)</th><th>勝率</th><th>複勝率</th></tr>${rows || '<tr><td colspan="5">データなし</td></tr>'}</table>
    <div class="legend">走数の多い順。着別＝1着-2着-3着-着外の度数。産駒名をタップでその馬の成績・調教。門別出走のある産駒のみ。</div></div>`;
}

async function openHorseModal(nameOrId, byId, displayName) {
  const modal = $('horseModal');
  modal.hidden = false;
  $('horseModalTitle').textContent = (displayName || (byId ? '' : nameOrId) || '') + ' の成績・調教';
  $('horseModalBody').innerHTML = '<div class="empty">読み込み中…</div>';
  try {
    const sel = 'horse_name,finish,pop,win_odds,time_str,first3f,last3f,passing,corner4_pos,comment,sex_age,jockey,body_weight,weight_diff,race_id,chihou_races(race_date,track,race_no,klass,race_name,distance_m,going)';
    const filt = byId ? `horse_id=eq.${encodeURIComponent(nameOrId)}` : `horse_name=eq.${encodeURIComponent(nameOrId)}`;
    const results = await withTimeout(sbGet(`chihou_results?${filt}&select=${sel}&order=race_id.desc&limit=40`), 10000);
    const name = displayName || (results[0] && results[0].horse_name) || (byId ? null : nameOrId);
    const cyokyo = name
      ? await withTimeout(sbGet(`chihou_cyokyo?horse_name=eq.${encodeURIComponent(name)}&select=race_id,works&order=race_id.desc&limit=20`), 10000).catch(() => [])
      : [];
    if (name) $('horseModalTitle').textContent = name + ' の成績・調教';
    renderHorseModal(results, cyokyo);
  } catch (e) {
    $('horseModalBody').innerHTML = `<div class="empty">読み込み失敗: ${esc(e.message)}<br><button class="foldbtn" onclick="document.getElementById('horseModal').hidden=true">閉じる</button></div>`;
  }
}

function renderHorseModal(results, cyokyo) {
  const ymd = (d) => (d ? d.slice(2).replace(/-/g, '/') : '');   // 26/06/25（年度も表示）
  // クラス＝race_name(条件)から級を抽出（C4-2組/オープン/未勝利…）＋特別名(klassがサラ以外の時)
  const classLabel = (ra) => {
    const toks = (ra.race_name || '').split(/[,、]/).map((t) => t.trim()).filter(Boolean);
    const cls = toks.find((t) => /組|オープン|未勝利|新馬|認定/.test(t)) || toks.find((t) => !/^サラ|歳/.test(t)) || (ra.race_name || ra.klass || '');
    const sp = (ra.klass && !/^サラ|歳/.test(ra.klass)) ? ra.klass : '';
    return esc(sp ? `${cls}・${sp}` : cls);
  };
  const resRowHtml = (r, rest) => {
    const ra = r.chihou_races || {};
    const finCls = r.finish >= 1 && r.finish <= 3 ? `fin${r.finish}` : '';
    return `<tr class="${rest ? 'res-rest' : ''}"${rest ? ' hidden' : ''}>
      <td>${ymd(ra.race_date)}</td><td>${esc(ra.track)}${ra.race_no ?? ''}R</td>
      <td>${esc(r.sex_age || '')}</td><td class="l">${classLabel(ra)}</td>
      <td>${ra.distance_m ?? ''}m</td><td>${esc(ra.going || '')}</td>
      <td class="${finCls}">${r.finish != null ? r.finish + '着' : '-'}</td>
      <td class="l">${esc(r.jockey || '')}</td><td class="num">${esc(r.time_str || '')}</td>
      <td class="num">${r.first3f != null ? r.first3f.toFixed(1) : ''}</td>
      <td class="num">${r.last3f != null ? r.last3f.toFixed(1) : ''}</td>
      <td class="num">${esc(r.passing || '')}</td><td>${esc(r.corner4_pos || '')}${tripTag(ra.race_date, r.corner4_pos)}</td>
      <td class="num">${r.pop != null ? r.pop + '人' : ''}</td>
      <td class="num">${r.win_odds ?? ''}</td>
      <td class="num">${r.body_weight ?? ''}${r.weight_diff != null ? `(${fmtDiff(r.weight_diff)})` : ''}</td>
    </tr>`;
  };
  const resRows = results.slice(0, 10).map((r) => resRowHtml(r, false)).join('')
    + results.slice(10).map((r) => resRowHtml(r, true)).join('')
    + (results.length > 10 ? `<tr><td colspan="16" style="text-align:center;padding:6px"><button class="foldbtn" onclick="const rs=this.closest('table').querySelectorAll('.res-rest');const show=rs[0].hidden;rs.forEach(e=>e.hidden=!show);this.textContent=show?'▲ 閉じる':'▼ 残り${results.length - 10}件を表示'">▼ 残り${results.length - 10}件を表示</button></td></tr>` : '');

  // ---- 条件別成績（距離・馬場・時間帯=レース番号）着別度数と複勝率 ----
  const rr = results.filter((r) => r.finish != null && r.chihou_races);
  const tally = (rs) => {
    const t = [0, 0, 0, 0];
    for (const r of rs) { const f = r.finish; t[f === 1 ? 0 : f === 2 ? 1 : f === 3 ? 2 : 3]++; }
    const n = rs.length, top3 = t[0] + t[1] + t[2];
    return { n, chaku: `${t[0]}-${t[1]}-${t[2]}-${t[3]}`, fuku: n ? top3 / n : 0 };
  };
  const groupBy = (keyFn) => {
    const m = new Map();
    for (const r of rr) { const k = keyFn(r); if (k == null) continue; (m.get(k) || m.set(k, []).get(k)).push(r); }
    return m;
  };
  const bdRows = (m, order) => (order || [...m.keys()]).filter((k) => m.has(k)).map((k) => {
    const t = tally(m.get(k));
    return `<tr><td class="l">${esc(String(k))}</td><td class="num">${t.n}</td><td class="num">${t.chaku}</td><td class="num ${t.fuku >= 0.5 ? 'best' : ''}">${(t.fuku * 100).toFixed(0)}%</td></tr>`;
  }).join('');
  const bdTable = (title, rows) => `<div><h4 style="margin:8px 0 2px;font-size:13px">${title}</h4><table>
    <tr><th>条件</th><th>数</th><th>着別(1-2-3-着外)</th><th>複勝率</th></tr>${rows || '<tr><td colspan="4">-</td></tr>'}</table></div>`;
  const distM = groupBy((r) => (r.chihou_races.distance_m ? r.chihou_races.distance_m + 'm' : null));
  const goingM = groupBy((r) => r.chihou_races.going);
  const rnoM = groupBy((r) => { const n = r.chihou_races.race_no; return n == null ? null : n <= 4 ? '1-4R(前半)' : n <= 8 ? '5-8R(中盤)' : '9-12R(後半)'; });
  const distOrder = [...distM.keys()].sort((a, b) => parseInt(a) - parseInt(b));
  const bdHtml = rr.length ? `
    <h3 class="sec">条件別成績（着別度数・複勝率）</h3>
    <div class="grid2">${bdTable('距離別', bdRows(distM, distOrder))}${bdTable('馬場状態別', bdRows(goingM, ['良', '稍重', '重', '不良']))}</div>
    ${bdTable('レース番号別（前半/中盤/後半）※検証: 同一クラスでは後半が速い傾向は無し＝後半は上級条件が多いための見かけ。この馬がどの時間帯に強いかの目安', bdRows(rnoM, ['1-4R(前半)', '5-8R(中盤)', '9-12R(後半)']))}` : '';

  // 調教履歴（全レースの works を日付降順に統合・重複除去）
  const seen = new Set();
  const works = [];
  for (const c of cyokyo) for (const w of (c.works || [])) {
    const key = `${w.date}_${(w.times || {}).t_half}`;
    if (w.date && !seen.has(key)) { seen.add(key); works.push(w); }
  }
  works.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  // 自己ベスト（坂路3F=t_half の最速とその日付）
  const hanroWorks = works.filter((w) => (w.course || '').includes('坂') && (w.times || {}).t_half != null);
  let bestW = null;
  for (const w of hanroWorks) if (!bestW || w.times.t_half < bestW.times.t_half) bestW = w;
  const bestLine = bestW
    ? `坂路3F 自己ベスト <b>${bestW.times.t_half.toFixed(1)}秒</b>（${mmdd(bestW.date)}${bestW.youbi ? `(${bestW.youbi})` : ''} ${esc(bestW.course)}）`
    : '坂路の追切データなし';
  // 各レースの最終追い（そのレース直前で最も新しい追切日）を特定
  const finalDates = {};   // 追切日 → その追切が最終追いだったレース日リスト
  const workDates = [...new Set(works.map((w) => w.date).filter(Boolean))].sort();
  for (const r of results) {
    const rd = (r.chihou_races || {}).race_date;
    if (!rd) continue;
    let last = null;
    for (const wd of workDates) if (wd < rd) last = wd; else break;
    if (last && (new Date(rd) - new Date(last)) <= 20 * 86400000) {
      (finalDates[last] = finalDates[last] || []).push(rd);
    }
  }
  const cyoRows = works.slice(0, 20).map((w) => {
    const t = w.times || {};
    const fd = finalDates[w.date];
    const finalBadge = fd ? ` <span class="badge arrow-up">最終追い→${mmdd(fd[fd.length - 1])}</span>` : '';
    return `<tr><td>${mmdd(w.date)}${w.youbi ? `(${w.youbi})` : ''}${finalBadge}</td><td>${esc(w.course || '')}</td>
      <td>${esc(w.baba || '')}</td>
      <td class="num">${t.t_5f != null ? t.t_5f.toFixed(1) : ''}</td>
      <td class="num">${t.t_half != null ? t.t_half.toFixed(1) : ''}</td>
      <td class="num">${t.t_3f != null ? t.t_3f.toFixed(1) : ''}</td>
      <td class="num">${t.t_1f != null ? t.t_1f.toFixed(1) : ''}</td>
      <td>${esc(w.ashiiro || '')}</td><td class="l">${esc(w.tanpyo || '')}</td></tr>`;
  }).join('');

  $('horseModalBody').innerHTML = `
    <h3 class="sec">成績（新しい順）</h3>
    <div class="tablewrap"><table>
      <tr><th>日付</th><th>場R</th><th>馬齢</th><th>クラス</th><th>距離</th><th>馬場</th><th>着</th><th>騎手</th><th>タイム</th><th>前3F</th><th>上3F</th><th>通過</th><th>4角</th><th>人気</th><th>単勝</th><th>馬体重</th></tr>
      ${resRows || '<tr><td colspan="16">成績なし</td></tr>'}
    </table></div>
    <div class="legend">4角の${TRIP_LEGEND}</div>
    ${bdHtml}
    <h3 class="sec">調教履歴（新しい順）</h3>
    <div class="note">${bestLine}</div>
    <div class="tablewrap"><table>
      <tr><th>日付</th><th>コース</th><th>馬場</th><th>坂4F/本5F</th><th>坂3F/本4F</th><th>坂2F/本3F</th><th>1F</th><th>脚色</th><th>短評</th></tr>
      ${cyoRows || '<tr><td colspan="9">調教データなし</td></tr>'}
    </table></div>`;
}

// ============================================================
// 制御
// ============================================================
function switchView(v) {
  state.view = v;
  if (v !== 'race') { clearInterval(state.oddsTimer); state.oddsTimer = null; }  // レース以外はライブオッズ停止
  $('raceRoot').hidden = v !== 'race';
  $('analysisRoot').hidden = v !== 'analysis';
  $('cyokyoRoot').hidden = v !== 'cyokyo';
  for (const b of $('viewTabs').querySelectorAll('button'))
    b.classList.toggle('active', b.dataset.view === v);
  if (v === 'analysis') renderAnalysis();
  if (v === 'cyokyo') renderCyokyo();
}

async function selectRace(raceId, sub) {
  state.raceId = raceId;
  const meta = (state.dates[state.date] || []).find((r) => r.race_id === raceId);
  state.sub = sub || (meta && meta.entries_only ? 'yosou' : state.sub || 'seiseki');
  renderTabs();
  renderSubTabs();
  location.hash = `${state.date}/${raceId}`;
  await renderRaceView();
}

function selectDate(d) {
  state.date = d;
  state.month = d.slice(0, 7);
  try { localStorage.setItem('mb_last_date', d); } catch (e) { /* プライベートモード等は無視 */ }
  renderMonths();
  renderDates();
  const races = state.dates[d] || [];
  if (races.length) selectRace(races[0].race_id);
  else { renderTabs(); $('raceView').innerHTML = '<div class="empty">レースなし</div>'; }
}

async function init() {
  for (const name of ['supabase', 'local']) {
    try {
      state.dates = await providers[name].listDates();
      state.provider = providers[name];
      break;
    } catch (e) { /* 次のプロバイダへ */ }
  }
  if (!state.provider) {
    $('raceView').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }
  // 統計は裏で読み込み（指数・テン偏差値に使う）
  state.statsPromise = Promise.all([
    state.provider.loadStats().then((s) => { state.stats = s; }),
    state.provider.loadModel().then((mo) => { state.model = mo; }),
  ]);

  $('monthSel').addEventListener('change', (e) => {
    state.month = e.target.value;
    const ds = Object.keys(state.dates).filter((d) => d.startsWith(state.month));
    if (ds.length) selectDate(ds[0]);
  });
  $('dateSel').addEventListener('change', (e) => selectDate(e.target.value));
  $('raceTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-id]');
    if (b) selectRace(b.dataset.id);
  });
  $('subTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-sub]');
    if (b) { state.sub = b.dataset.sub; renderSubTabs(); renderRaceView(); }
  });
  $('viewTabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-view]');
    if (b) switchView(b.dataset.view);
  });
  $('cyokyoRoot').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');
    if (hl) { e.preventDefault(); openHorseModal(hl.dataset.horse); return; }
    const y = e.target.closest('button[data-cyear]');
    if (y) { cyokyoState.year = y.dataset.cyear; cyokyoState.date = null; renderCyokyo(); return; }
    const t = e.target.closest('button[data-cyo-two]');
    if (t) { cyokyoState.twoOnly = !cyokyoState.twoOnly; renderCyokyo(); return; }  // 日付は保持
    const so = e.target.closest('button[data-cyo-sort]');
    if (so) { cyokyoState.sort = so.dataset.cyoSort; renderCyokyo(); return; }
    const d = e.target.closest('button[data-cdate]');
    if (d) { cyokyoState.date = d.dataset.cdate; renderCyokyo(); }
  });
  // 馬名リンク（レース各ビュー）と モーダルを閉じる
  $('raceView').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');
    if (hl) { e.preventDefault(); const nm = hl.textContent.trim();
      hl.dataset.hid ? openHorseModal(hl.dataset.hid, true, nm) : openHorseModal(hl.dataset.horse, false, nm); return; }
    const od = e.target.closest('[data-live-odds]');
    if (od) { e.stopPropagation(); showOddsFlow(od.dataset.liveOdds, od); return; }
    const kk = e.target.closest('td.fold');   // スマホ: 長い列（根拠/寸評/近3走/調教）をタップで展開
    if (kk) kk.classList.toggle('open');
  });
  // オッズ推移ポップアップを画面クリックで閉じる
  document.addEventListener('click', (e) => {
    const p = $('oddsFlowPop');
    if (p && !p.hidden && !e.target.closest('[data-live-odds]') && !e.target.closest('#oddsFlowPop')) p.hidden = true;
  });
  // 逆/恵バッジ: タップで説明ポップアップ（キャプチャ段階＝行の展開より先に処理）
  document.addEventListener('click', (e) => {
    const tag = e.target.closest('.triptag');
    if (tag) { e.stopPropagation(); e.preventDefault(); showTripPop(tag); }
  }, true);
  document.addEventListener('click', (e) => {
    const tp = document.getElementById('tripPop');
    if (tp && !tp.hidden && !e.target.closest('.triptag')) tp.hidden = true;
  });
  $('horseModalClose').addEventListener('click', () => { $('horseModal').hidden = true; });
  $('horseModal').addEventListener('click', (e) => {
    const hl = e.target.closest('a.horse-link');   // 産駒一覧などモーダル内の馬名タップ→その馬詳細へ
    if (hl) { e.preventDefault(); const nm = hl.textContent.trim();
      hl.dataset.hid ? openHorseModal(hl.dataset.hid, true, nm) : openHorseModal(hl.dataset.horse, false, nm); return; }
    if (e.target.id === 'horseModal') $('horseModal').hidden = true;
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') $('horseModal').hidden = true; });
  $('analysisRoot').addEventListener('click', (e) => {
    const pn = e.target.closest('.pedname');   // 父/母父名タップ→産駒一覧モーダル
    if (pn) { e.preventDefault(); openPedModal(pn.dataset.pt, pn.dataset.pn); return; }
    const rc = e.target.closest('a[data-rec]');
    if (rc) { e.preventDefault(); openRecordDetail(rc.dataset.rec, rc.dataset.kind); return; }
    if (e.target.id === 'recFold') {
      const rest = $('recRest'); rest.hidden = !rest.hidden;
      e.target.textContent = rest.hidden ? '▼ 過去の月も表示' : '▲ 閉じる';
    }
  });

  const dates = Object.keys(state.dates);
  const [hd, hr] = location.hash.slice(1).split('/');
  if (hd && state.dates[hd]) {
    state.date = hd;
    state.month = hd.slice(0, 7);
    renderMonths();
    renderDates();
    if (hr && state.dates[hd].some((r) => r.race_id === hr)) { renderTabs(); await selectRace(hr); return; }
    selectDate(hd);
  } else {
    // 初期日付: 前回選択（タブを閉じても記憶） → 今日 → 最新 の優先順
    let saved = null;
    try { saved = localStorage.getItem('mb_last_date'); } catch (e) { /* 無視 */ }
    const today = jstToday();
    selectDate((saved && state.dates[saved]) ? saved : (state.dates[today] ? today : dates[0]));
  }
}
init();
</script>

</html>
