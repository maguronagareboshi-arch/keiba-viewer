<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>門別ビューア</title>
<style>
/* 色は必ずCSS変数で定義する（ダークモード上書き漏れ防止・インライン色禁止） */
:root {
  --bg: #f4f5f7;
  --panel: #ffffff;
  --text: #1c2330;
  --sub: #66707f;
  --border: #d9dee6;
  --accent: #1a6fb5;
  --accent-text: #ffffff;
  --chip-bg: #e8eef5;
  --row-alt: #f7f9fb;
  --gold: #c9a227;
  --silver: #8b97a5;
  --bronze: #b0722d;
  --hl-first3f: #d7ecff;
  --hl-last3f: #ffe3e3;
  --hl-best: #dff5e1;
  --note: #8a6d00;
  --note-bg: #fff7dd;
  --bias-front: #b95e12;
  --bias-back: #1a6fb5;
  --arrow-up: #1f9c3f;
  --arrow-down: #d63c3c;
  --waku1-bg:#ffffff; --waku1-tx:#333333;
  --waku2-bg:#222222; --waku2-tx:#ffffff;
  --waku3-bg:#d63c3c; --waku3-tx:#ffffff;
  --waku4-bg:#2e63c4; --waku4-tx:#ffffff;
  --waku5-bg:#e8c62b; --waku5-tx:#333333;
  --waku6-bg:#2f9c50; --waku6-tx:#ffffff;
  --waku7-bg:#e07f2a; --waku7-tx:#ffffff;
  --waku8-bg:#e88fb0; --waku8-tx:#333333;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14181f;
    --panel: #1d232d;
    --text: #e6eaf0;
    --sub: #97a1af;
    --border: #333c49;
    --accent: #4d9fe0;
    --accent-text: #10151c;
    --chip-bg: #26303d;
    --row-alt: #202733;
    --hl-first3f: #17405e;
    --hl-last3f: #55272c;
    --hl-best: #1e4226;
    --note: #e3c65b;
    --note-bg: #33301c;
    --bias-front: #e8964d;
    --bias-back: #4d9fe0;
    --waku1-bg:#e9e9e9; --waku1-tx:#222222;
  }
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }  /* display:flex等のクラス指定にhidden属性が負けないよう保証 */
body { margin: 0; background: var(--bg); color: var(--text);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, system-ui, sans-serif; font-size: 14px; }
header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
header h1 { font-size: 17px; margin: 0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--chip-bg); color: var(--sub); }
.conf-S { background: var(--hl-best); color: var(--arrow-up); font-weight: bold; }
.conf-A { background: var(--hl-first3f); color: var(--bias-back); font-weight: bold; }
.conf-C { background: var(--note-bg); color: var(--note); font-weight: bold; }
#oddsFlowPop { position: absolute; z-index: 200; background: var(--panel); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.4); max-width: 230px; font-size: 12px; }
td[data-live-odds] { cursor: pointer; }
td[data-live-odds]:hover { text-decoration: underline; }
#evMonitor.ev-hit { background: rgba(46,160,67,.16); border: 1px solid rgba(46,160,67,.55); border-radius: 8px; font-size: 13px; }
#evMonitor.ev-idle { opacity: .75; }
.viewtabs { display: flex; gap: 4px; margin-left: auto; }
.viewtabs button, .subtabs button {
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; }
.viewtabs button.active, .subtabs button.active {
  background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
main { padding: 10px 14px 40px; max-width: 1280px; margin: 0 auto; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); font-size: 14px; }
.racetabs { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.racetabs button { padding: 6px 0; width: 44px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; }
.racetabs button.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: bold; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
.raceinfo h2 { font-size: 15px; margin: 0 0 6px; }
.raceinfo .meta { color: var(--sub); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
.raceinfo .pacebar { margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; }
.raceinfo .pacebar span b { color: var(--accent); }
.note { font-size: 11px; color: var(--note); background: var(--note-bg); border-radius: 4px; padding: 2px 6px; display: inline-block; margin-top: 6px; }
.subtabs { display: flex; gap: 4px; margin: 8px 0; }
.tablewrap { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; white-space: nowrap; }
th, td { border: 1px solid var(--border); padding: 4px 6px; text-align: center; font-size: 12.5px; }
th { background: var(--chip-bg); color: var(--sub); font-weight: normal; }
tr:nth-child(even) td { background: var(--row-alt); }
td.l { text-align: left; }
td.num { font-variant-numeric: tabular-nums; }
td.small { font-size: 11px; line-height: 1.5; text-align: left; }
/* スマホ(≤760px)のみ: ①馬名列を左端固定 ③根拠をタップ展開（デスクトップは一切変えない） */
@media (max-width: 760px) {
  td.stickyname, th.stickyname { position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,.18); }
  td.stickyname { background: var(--panel); }
  tr:nth-child(even) td.stickyname { background: var(--row-alt); }
  th.stickyname { z-index: 3; background: var(--chip-bg); }
  td.fold { max-width: 116px; cursor: pointer; }
  td.fold .kv { display: block; white-space: normal; max-height: 3em; overflow: hidden; line-height: 1.4; }
  td.fold::after { content: '⋯'; color: var(--accent); font-weight: bold; font-size: 12px; }
  td.fold.open { max-width: 72vw; }
  td.fold.open .kv { max-height: none; }
  td.fold.open::after { content: '▴'; }
}
.waku { display: inline-block; width: 20px; border-radius: 4px; font-weight: bold; }
.w1 { background: var(--waku1-bg); color: var(--waku1-tx); border: 1px solid var(--border); }
.w2 { background: var(--waku2-bg); color: var(--waku2-tx); }
.w3 { background: var(--waku3-bg); color: var(--waku3-tx); }
.w4 { background: var(--waku4-bg); color: var(--waku4-tx); }
.w5 { background: var(--waku5-bg); color: var(--waku5-tx); }
.w6 { background: var(--waku6-bg); color: var(--waku6-tx); }
.w7 { background: var(--waku7-bg); color: var(--waku7-tx); }
.w8 { background: var(--waku8-bg); color: var(--waku8-tx); }
td.f1 { background: var(--hl-first3f) !important; font-weight: bold; }
td.a1 { background: var(--hl-last3f) !important; font-weight: bold; }
td.best { background: var(--hl-best) !important; font-weight: bold; }
.fin1 { color: var(--gold); font-weight: bold; }
.fin2 { color: var(--silver); font-weight: bold; }
.fin3 { color: var(--bronze); font-weight: bold; }
.empty { color: var(--sub); text-align: center; padding: 30px 0; }
.legend { font-size: 11px; color: var(--sub); margin-top: 6px; }
.legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: -2px; }
.legend .sw.f { background: var(--hl-first3f); }
.legend .sw.a { background: var(--hl-last3f); }
.legend .sw.b { background: var(--hl-best); }
.arrow-up { color: var(--arrow-up); font-weight: bold; }
.arrow-down { color: var(--arrow-down); font-weight: bold; }
.bias-front { color: var(--bias-front); font-weight: bold; }
.bias-back { color: var(--bias-back); font-weight: bold; }
.kyaku { display: inline-block; font-size: 10px; padding: 0 4px; border-radius: 3px; background: var(--chip-bg); color: var(--sub); }
.triptag { display: inline-block; font-size: 10px; font-weight: 700; padding: 0 4px; border-radius: 3px; margin-left: 2px; line-height: 1.6; cursor: pointer; }
.tg-gyaku { background: rgba(204,138,46,0.16); color: #cc8a2e; }
.tg-megumi { background: rgba(106,143,208,0.15); color: #6a8fd0; }
.tippop { position: absolute; z-index: 1000; max-width: 240px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.5; box-shadow: 0 4px 16px rgba(0,0,0,0.28); }
h3.sec { font-size: 14px; margin: 16px 0 6px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
a.horse-link { color: var(--accent); text-decoration: none; cursor: pointer; }
a.horse-link:hover { text-decoration: underline; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex;
  align-items: flex-start; justify-content: center; padding: 20px; z-index: 50; overflow-y: auto; }
.modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  max-width: 920px; width: 100%; padding: 12px 14px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.modal-head button { border: 1px solid var(--border); background: var(--panel); color: var(--text);
  border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 15px; }
.foldbtn { border: 1px solid var(--border); background: var(--chip-bg); color: var(--text);
  border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; margin: 6px 0; }
tr.clickable { cursor: pointer; }
tr.clickable:hover td { background: var(--chip-bg); }
</style>
</head>
<body>
<header>
  <h1>門別ビューア</h1>
  <div class="viewtabs" id="viewTabs">
    <button data-view="race" class="active">レース</button>
    <button data-view="analysis">分析</button>
    <button data-view="cyokyo">調教</button>
    <button onclick="location.href='simulator.html'">🎲 シミュレータ</button>
  </div>
</header>
<main>
  <div id="raceRoot">
    <div class="controls">
      <label>月 <select id="monthSel"></select></label>
      <label>日 <select id="dateSel"></select></label>
    </div>
    <div class="racetabs" id="raceTabs"></div>
    <div class="subtabs" id="subTabs" hidden>
      <button data-sub="yosou">🎯 予想</button>
      <button data-sub="syutuba">出馬表</button>
      <button data-sub="cyokyo">調教</button>
      <button data-sub="seiseki">成績</button>
      <button data-sub="sim">🎲 シミュレータ</button>
    </div>
    <div id="raceView"><div class="empty">読み込み中…</div></div>
  </div>
  <div id="analysisRoot" hidden><div class="empty">読み込み中…</div></div>
  <div id="cyokyoRoot" hidden><div class="empty">読み込み中…</div></div>
</main>
<div id="horseModal" class="modal" hidden onclick="if(event.target.id==='horseModal')this.hidden=true">
  <div class="modal-box">
    <div class="modal-head"><b id="horseModalTitle">-</b><button id="horseModalClose" onclick="document.getElementById('horseModal').hidden=true">✕ 閉じる</button></div>
    <div id="horseModalBody"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<script>
'use strict';
// ============================================================
// Supabase（読み取りはanonキー・RLSでselectのみ許可）
// ============================================================
const SUPABASE_URL = 'https://jcrcftvrsgmsewwdkqha.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmNmdHZyc2dtc2V3d2RrcWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MDY0NjgsImV4cCI6MjA5NjM4MjQ2OH0.UED2rJNsuTPqofrhhNhQ2RM0NKc2eJ6qHllfbnebMe0';

async function sbGet(pathq) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${pathq}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`supabase ${res.status}`);
  return res.json();
}
async function jsonGet(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${path} ${res.status}`);
  return res.json();
}

// ============================================================
// データプロバイダ（Supabase優先 → ローカルJSON）
// ============================================================
const providers = {
  supabase: {
    label: 'Supabase',
    async listDates() {
      const rows = await sbGet('chihou_races?select=race_id,race_date,race_no,track,klass,race_name,distance_m,going,pace&order=race_date.desc,race_no.asc&limit=10000');
      if (!rows.length) throw new Error('empty');
      const dates = {};
      for (const r of rows) {
        (dates[r.race_date] = dates[r.race_date] || []).push({
          race_id: r.race_id, race_no: r.race_no, track: r.track, klass: r.klass,
          name: r.race_name, distance_m: r.distance_m, going: r.going, pace: r.pace,
        });
      }
      return dates;
    },
    async loadRace(raceId) {
      const [races, results] = await Promise.all([
        sbGet(`chihou_races?race_id=eq.${raceId}&select=*`),
        sbGet(`chihou_results?race_id=eq.${raceId}&select=*&order=finish.asc.nullslast`),
      ]);
      return { race: races[0] || {}, results };
    },
    async loadEntries(raceId) {
      try { return await sbGet(`chihou_entries?race_id=eq.${raceId}&select=*&order=umaban.asc`); }
      catch (e) { return []; }
    },
    async loadCyokyo(raceId) {
      try {
        const rows = await sbGet(`chihou_cyokyo?race_id=eq.${raceId}&select=*&order=umaban.asc`);
        if (rows.length) return rows;
      } catch (e) { /* テーブル未作成 → ローカルへ */ }
      return providers.local.loadCyokyo(raceId);
    },
    async loadNouryoku(raceId) {
      try {
        const rows = await sbGet(`chihou_nouryoku?race_id=eq.${raceId}&select=*&order=umaban.asc`);
        if (rows.length) return rows;
      } catch (e) { /* 次へ */ }
      return providers.local.loadNouryoku(raceId);
    },
    async loadHistory(horseIds) {
      if (!horseIds.length) return {};
      const idlist = horseIds.map(encodeURIComponent).join(',');
      const rows = await sbGet(`chihou_results?horse_id=in.(${idlist})&select=horse_id,finish,pop,first3f,last3f,time_sec,kinryo,sex_age,passing,corner4_pos,comment,time_str,body_weight,jockey,race_id,chihou_races(race_date,distance_m,going,pace,klass)&order=race_id.desc&limit=2000`);
      const map = {};
      for (const r of rows) {
        const ra = r.chihou_races || {};
        (map[r.horse_id] = map[r.horse_id] || []).push({
          date: ra.race_date, race_id: r.race_id, dist: ra.distance_m, going: ra.going,
          pace: ra.pace, cls: classGroup(ra.klass), fin: r.finish, pop: r.pop, sex: r.sex_age,
          f3: r.first3f, l3: r.last3f, tsec: r.time_sec, kin: r.kinryo,
          kyaku: kyakuFromPassing(r.passing), passing: r.passing, c4: r.corner4_pos,
          comment: r.comment, time: r.time_str, weight: r.body_weight, jockey: r.jockey,
        });
      }
      for (const k in map) map[k].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      return map;
    },
    async loadStats() {
      try {
        const rows = await sbGet('chihou_meta?key=eq.monbetsu_stats&select=value');
        if (rows.length) return rows[0].value;
      } catch (e) { /* テーブル未作成 → ローカルへ */ }
      return providers.local.loadStats();
    },
    async loadModel() {
      try {
        const rows = await sbGet('chihou_meta?key=eq.monbetsu_model&select=value');
        if (rows.length) return rows[0].value;
      } catch (e) { /* 次へ */ }
      return providers.local.loadModel();
    },
  },
  local: {
    label: 'ローカルJSON',
    _horses: null,
    async listDates() { return (await jsonGet('data/index.json')).dates; },
    async loadRace(raceId) {
      try { return await jsonGet(`data/json/seiseki/${raceId}.json`); }
      catch (e) { return { race: {}, results: [] }; }
    },
    async loadEntries(raceId) {
      try { return (await jsonGet(`data/json/syutuba/${raceId}.json`)).entries; }
      catch (e) { return []; }
    },
    async loadCyokyo(raceId) {
      try {
        const d = await jsonGet(`data/json/cyokyo/${raceId}.json`);
        return d.horses.map((h) => ({ ...h, race_id: d.race_id }));
      } catch (e) { return []; }
    },
    async loadNouryoku(raceId) {
      try {
        const d = await jsonGet(`data/json/nouryoku/${raceId}.json`);
        return d.horses.map((h) => ({ umaban: h.umaban, horse_name: h.name, rt: h.rt,
          data: { pedigree: h.pedigree, stable: h.stable, seiseki: h.seiseki, runs: h.runs } }));
      } catch (e) { return []; }
    },
    async loadHistory(horseIds) {
      if (this._horses === null) {
        try { this._horses = await jsonGet('data/horses.json'); } catch (e) { this._horses = {}; }
      }
      const map = {};
      for (const id of horseIds) if (this._horses[id]) map[id] = this._horses[id];
      return map;
    },
    async loadStats() {
      try { return await jsonGet('data/stats.json'); } catch (e) { return null; }
    },
    async loadModel() {
      try { return await jsonGet('data/model.json'); } catch (e) { return null; }
    },
  },
};

const state = { provider: null, dates: {}, month: null, date: null, raceId: null,
  sub: 'seiseki', stats: null, model: null, view: 'race' };

// ============================================================
// ユーティリティ
// ============================================================
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDiff = (v) => (v == null ? '' : v > 0 ? `+${v}` : `${v}`);
const mmdd = (iso) => (iso ? `${+iso.slice(5, 7)}/${+iso.slice(8, 10)}` : '');

// 通過順位は各コーナー位置の連結（例 '5744' = 5→7→4→4）。10以上は丸数字（⑩⑪…）
function kyakuFromPassing(passing) {
  if (!passing) return null;
  let p = null;
  for (const ch of String(passing)) {
    const cp = ch.codePointAt(0);
    if (cp >= 0x2460 && cp <= 0x2473) { p = cp - 0x2460 + 1; break; }  // ①〜⑳
    if (ch >= '1' && ch <= '9') { p = +ch; break; }
  }
  if (p == null) return null;
  if (p === 1) return '逃げ';
  if (p <= 3) return '先行';
  if (p <= 7) return '差し';
  return '追込';
}

// クラス条件を 2歳/3歳/3歳以上 に正規化（build_stats.py と同じ規則）
function classGroup(klass) {
  const k = String(klass || '').replace(/２/g, '2').replace(/３/g, '3').replace(/４/g, '4');
  if (k.includes('2歳')) return '2歳';
  if (k.includes('3歳以上') || k.includes('4歳以上')) return '3歳以上';
  if (k.includes('3歳')) return '3歳';
  return '3歳以上';
}

// 基準タイム参照: 距離×馬場×クラス（無ければ全クラス→良にフォールバック）
function baseEntry(dist, going, cls) {
  const bt = state.stats && state.stats.base_times;
  if (!bt || !dist) return null;
  const g = going === '良' || !going ? '良' : '重系';
  return bt[`${dist}_${g}_${cls || '全'}`] || bt[`${dist}_${g}_全`] || bt[`${dist}_良_全`] || null;
}
// 偏差値（速いほど高い）
function devValue(value, e, fld) {
  if (value == null || !e || !e[fld] || !e[fld].std) return null;
  return 50 + 10 * (e[fld].mean - value) / e[fld].std;
}
// 1走分の総合指数: 走破タイム50% + テン3F25% + 上がり3F25%（欠測は重み再配分）
// v2新基準: タイムは日別馬場差+斤量、上がりはレース前半ペースで補正
// （検証: duel_final.py 古馬2025-26ホールドアウト t=3.73有意・◎複勝+1.1pt）
function runShisu(run) {
  const e = baseEntry(run.dist, run.going, run.cls);
  const da = ((state.stats && state.stats.shisu_day_adj) || {})[run.date] || 0;   // 馬場差(z)
  const rp = (state.stats && state.stats.race_pace) || {};
  const pz = (run.race_id != null && rp[run.race_id] != null) ? rp[run.race_id] : 0;  // 前半ペース(z)
  const kin = run.kin != null ? run.kin : 55;
  let t = devValue(run.tsec, e, 'time');
  if (t != null) t = t - 10 * da + 0.5 * (kin - 55);
  let l = devValue(run.l3, e, 'last3f');
  if (l != null) l = l - 5 * pz;
  const parts = [[t, 0.5],
                 [devValue(run.f3, e, 'first3f'), 0.25],
                 [l, 0.25]].filter(([v]) => v != null);
  if (!parts.length) return null;
  const wsum = parts.reduce((s, [, w]) => s + w, 0);
  return parts.reduce((s, [v, w]) => s + v * w, 0) / wsum;
}

// スピード指数（門別適合版・妙味ゾーン検出用）
function distIndexJs(d) {
  const pts = [[1600, 1.02], [2000, 0.79], [3000, 0.50]];
  const [[x1, y1], [x2, y2]] = d <= 2000 ? [pts[0], pts[1]] : [pts[1], pts[2]];
  return y1 + (y2 - y1) * (d - x1) / (x2 - x1);
}
function runSI(run) {
  const sb = state.stats && state.stats.si_base;
  const bb = (state.stats && state.stats.baba_daily) || {};
  if (!sb || !run.dist || sb[String(run.dist)] == null || run.tsec == null) return null;
  const kin = run.kin != null ? run.kin : 55;
  return (sb[String(run.dist)] - run.tsec) * distIndexJs(run.dist) * 10 + (bb[run.date] || 0) + (kin - 55) * 2 + 80;
}
// 直近5走の指標（mean/max）
function metricOf(history, hid, fn, mode) {
  const vals = (history[hid] || []).slice(0, 5).map(fn).filter((v) => v != null);
  if (!vals.length) return null;
  return mode === 'max' ? Math.max(...vals) : vals.reduce((s, v) => s + v, 0) / vals.length;
}
function zscoresJs(vals) {
  const xs = vals.filter((v) => v != null);
  if (xs.length < 2) return vals.map(() => null);
  const m = xs.reduce((s, v) => s + v, 0) / xs.length;
  const sd = Math.sqrt(xs.reduce((s, v) => s + (v - m) ** 2, 0) / (xs.length - 1)) || 1e-9;
  return vals.map((v) => (v == null ? null : (v - m) / sd));
}
// ===== 学習モデル（リッジ回帰）による勝ちやすさ予測 =====
const POS4 = { '最内': -2, '内': -1, '中': 0, '外': 1, '大外': 2 };
const clsRank = (klass) => ({ '2歳': 0, '3歳': 1, '3歳以上': 2 }[classGroup(klass)] ?? 2);
function daysBetween(d1, d2) {
  return Math.round((new Date(d1) - new Date(d2)) / 86400000);
}
const MODEL_FEATS = ['time_mean', 'time_best', 'time_last', 'f3_best', 'l3_best', 'n_runs',
  'days_off', 'dist_change', 'same_band_z', 'cls_up', 'cls_down', 'wt_change', 'draw_bias',
  'jockey_r', 'trainer_r', 'trip_adj', 'exact_dist_r', 'waku_rate', 'sire_rate', 'cyo_z'];
const dbandOf = (d) => !d ? null : d <= 1000 ? '1000' : d <= 1100 ? '1100' : d <= 1200 ? '1200'
  : d <= 1600 ? '15-16' : d <= 1700 ? '1700' : '1800+';

// 予想対象レースでの各馬の予測スコア（高いほど勝ちやすい）
function modelScore(e, history, race, cyoZ) {
  const m = state.model;
  if (!m) return null;
  const runs = (history[e.horse_id] || []).filter((r) => r.race_id !== race.race_id);
  if (!runs.length) return null;
  // 不利run判定（出遅れ/不利語）。build_model.py TROUBLE_WORDS と厳密一致（訓練/推論一致）。
  const TROUBLE_WORDS = ['出遅', '不利', '詰ま', '躓', 'ふらつ', '挟ま', '包ま', '行き場', '接触', 'ヨレ', 'ササ'];
  const cbias = (state.stats && state.stats.corner4_daily) || {};
  const sda = (state.stats && state.stats.shisu_day_adj) || {};
  const rpz = (state.stats && state.stats.race_pace) || {};
  // 各過去走を z 値化（新しい順→計算では最新を last に）
  // 学習と同一のzスケール（旧実装は偏差値のまま渡していてスケール不一致だった）
  // ＋v2補正: タイムz=馬場差+斤量 / 上がりz=レース前半ペース（build_model.py v2と厳密一致）
  const P = runs.slice(0, 8).map((r) => {
    const be = baseEntry(r.dist, r.going, r.cls);
    const d = r.dist || 1000;
    const pos = POS4[r.c4];
    const trip = (pos != null && cbias[r.date] != null) ? cbias[r.date] * Math.max(-1, Math.min(1, pos)) : 0;
    const z = (v, fld) => { const dv = devValue(v, be, fld); return dv == null ? null : (dv - 50) / 10; };
    const da = sda[r.date] || 0;
    const pv = (r.race_id != null && rpz[r.race_id] != null) ? rpz[r.race_id] : 0;
    const kin = r.kin != null ? r.kin : 55;
    let tz = z(r.tsec, 'time');
    if (tz != null) tz = tz - da + 0.05 * (kin - 55);
    let lz = z(r.l3, 'last3f');
    if (lz != null) lz = lz - 0.5 * pv;
    return {
      tz, fz: z(r.f3, 'first3f'), lz,
      date: r.date, dist: d, band: d <= 1100 ? 1 : d <= 1200 ? 2 : 3, clsRank: clsRank(r.cls === '2歳' ? '2歳' : r.cls), trip,
      clsR: { '2歳': 0, '3歳': 1, '3歳以上': 2 }[r.cls] ?? 2,
      trouble: TROUBLE_WORDS.some((w) => (r.comment || '').indexOf(w) >= 0),
    };
  });
  const tz = P.map((p) => p.tz).filter((v) => v != null);
  if (!tz.length) return null;
  // 実力タイム集約は不利run(出遅れ等)を除外。全走が不利なら全走で代替（新→古順）。
  const tzc0 = P.filter((p) => p.tz != null && !p.trouble).map((p) => p.tz);
  const tzClean = tzc0.length ? tzc0 : tz;
  const fz = P.map((p) => p.fz).filter((v) => v != null);
  const lz = P.map((p) => p.lz).filter((v) => v != null);
  const last = P[0];  // 最新走
  const d = race.distance_m || race.dist || 1000;
  const band = d <= 1100 ? 1 : d <= 1200 ? 2 : 3;
  const sameBand = P.filter((p) => p.band === band && p.tz != null).map((p) => p.tz);
  const mean = (a) => a.reduce((s, v) => s + v, 0) / a.length;
  // time_mean は新しい走りほど重い加重平均（半減期3走・build_model.py recency_meanと厳密一致）。
  // tz は新しい→古い順なので j=0(最新)の重みが1。
  const wmean = (a) => {
    let num = 0, den = 0;
    for (let j = 0; j < a.length; j++) { const wgt = Math.pow(0.5, j / 3.0); num += wgt * a[j]; den += wgt; }
    return den ? num / den : 0;
  };
  const tRank = clsRank(race.klass);
  const f = {
    time_mean: wmean(tzClean), time_best: Math.max(...tzClean), time_last: tzClean[0],
    f3_best: fz.length ? Math.max(...fz) : 0, l3_best: lz.length ? Math.max(...lz) : 0,
    n_runs: Math.min(P.length, 8) / 8,
    days_off: last.date ? Math.min(daysBetween(race.date || race.race_date, last.date), 90) / 90 : 0.3,
    dist_change: Math.max(-1, Math.min(1, (d - (last.dist || d)) / 400)),
    same_band_z: sameBand.length ? mean(sameBand) : mean(tz),
    cls_up: tRank > last.clsR ? 1 : 0, cls_down: tRank < last.clsR ? 1 : 0,
    wt_change: Math.max(-1, Math.min(1, (e.weight_diff || 0) / 15)),
    draw_bias: ((e.waku || 4) - 4.5) / 3.5,
    jockey_r: (m.jockey_r && m.jockey_r[e.jockey]) ?? 0.28,
    trainer_r: (m.trainer_r && m.trainer_r[e.trainer]) ?? 0.28,
    trip_adj: mean(P.map((p) => p.trip)),
    exact_dist_r: (() => {  // 同距離ちょうどの複勝率（直近8走内・2走以上）
      const exd = runs.slice(0, 8).filter((r) => r.dist === d && r.fin != null);
      return exd.length >= 2 ? exd.filter((r) => r.fin <= 3).length / exd.length : 0.28;
    })(),
    waku_rate: (m.waku_r && m.waku_r[`${dbandOf(d)}|${e.waku}`]) ?? 0.28,  // 距離帯×枠の複勝率
    sire_rate: (m.sire_r && m.horse_sire && m.sire_r[m.horse_sire[e.horse_id]]) ?? (m.sire_mean ?? 0.30),  // 父の門別複勝率（砂適性）
    cyo_z: (cyoZ != null ? cyoZ : 50) / 50,  // 直前追切 坂路3F最速の偏差値（状態）
  };
  let s = m.b;
  for (let i = 0; i < MODEL_FEATS.length; i++) {
    s += ((f[MODEL_FEATS[i]] - m.mu[i]) / m.sd[i]) * m.w[i];
  }
  return s;
}

// ◎信頼度：レース内で予測1位が2位をどれだけ引き離しているか（レース内stdで正規化）。
// しきい値は過去4年の時系列5分割CVで検証（高信頼>低信頼＝5/5fold）。複勝率 S81%/A73%/B65%/C62%。
const CONF_TIERS = { S: '鉄板', A: '有力', B: '標準', C: '波乱' };
function aiConfidence(scores) {
  const v = scores.filter((x) => x != null);
  if (v.length < 2) return null;
  const sorted = [...v].sort((a, b) => b - a);
  const mean = sorted.reduce((s, x) => s + x, 0) / sorted.length;
  const std = Math.sqrt(sorted.reduce((s, x) => s + (x - mean) ** 2, 0) / sorted.length) || 1;
  const gap = (sorted[0] - sorted[1]) / std;
  const tier = gap >= 0.70 ? 'S' : gap >= 0.40 ? 'A' : gap >= 0.15 ? 'B' : 'C';
  return { gap, tier, label: CONF_TIERS[tier] };
}

// 坂路調教偏差（3F最速＋終いの加速/失速を0.49倍で加味）
// 検証: 同じ3F合計でも終い1Fが中間より速い（加速）か遅い（バテ）かで複勝率±6〜7pt
function cyoZFromWorks(cyo) {
  const hb = state.stats && state.stats.hanro;
  const fb = state.stats && state.stats.hanro_finish;
  if (!cyo || !hb || !hb.std) return null;
  let best = null;  // 3F最速の坂路追切
  for (const w of (cyo.works || [])) {
    const th = w.times && w.times.t_half;
    if (th && (w.course || '').includes('坂') && (best == null || th < best.th))
      best = { th, t3: w.times.t_3f, t1: w.times.t_1f };
  }
  if (best == null) return null;
  let z = 50 + 10 * (hb.mean - best.th) / hb.std;
  if (fb && fb.std && best.t3 && best.t1) {   // 終い加速 = (中間F − 終いF)
    const accel = (best.t3 - best.t1) - best.t1;
    z += 4.9 * Math.max(-2, Math.min(2, (accel - fb.mean) / fb.std));
  }
  return z;
}

// 坂路の200m毎ラップ＋加速/失速/好走判定（t4/t3/t2/t1=累計・zは偏差値）。カレンダーと調教タブで共用。
function hanroLapCells(t4, t3, t2, t1, z) {
  const L = [];
  if (t4 != null && t3 != null) L.push(t4 - t3);
  if (t3 != null && t2 != null) L.push(t3 - t2);
  if (t2 != null && t1 != null) L.push(t2 - t1);
  if (t1 != null) L.push(t1);
  if (L.length < 2) return { str: '', tag: '' };
  const last = L[L.length - 1], best = Math.min(...L.slice(0, -1));
  const up = last <= best + 0.1, down = last >= best + 0.5;      // 尻上がり / 終い掛かる
  const strong = up && z != null && z >= 60;                     // 好走: 偏差値60+×加速（複勝59%）
  const tag = strong ? ' <span class="badge conf-S">🔥好走</span>'
    : up ? ' <span class="badge conf-S">加速</span>' : down ? ' <span class="badge conf-C">失速</span>' : '';
  const cls = up ? 'arrow-up' : down ? 'bias-front' : '';
  const str = L.map((v, k) => k === L.length - 1 ? `<b class="${cls}">${v.toFixed(1)}</b>` : v.toFixed(1)).join('-');
  return { str, tag };
}

// その走の「馬場逆行/恵まれ」バッジ。内外バイアス(corner4_inout・正=外伸び)×自分の4角レーン。
// 逆行=その日と逆のレーンで力を出せず過小評価かも / 恵=有利なレーンで実力以上に見えるかも。表示専用。
function tripTag(date, c4) {
  const b = (state.stats && state.stats.corner4_inout) || {};
  const bias = b[date], lane = POS4[c4];
  if (bias == null || lane == null) return '';
  const tf = bias * (lane / 2);
  const dir = bias > 0 ? '外伸び' : '内伸び';
  if (tf <= -0.06) return ` <span class="triptag tg-gyaku" data-tip="この日は${dir}傾向。${c4}を通り不利な巡り＝力を出し切れず過小評価かも（次走で見直せる）">逆</span>`;
  if (tf >= 0.06) return ` <span class="triptag tg-megumi" data-tip="この日は${dir}傾向。${c4}を通り恵まれた巡り＝実力以上に見えているかも">恵</span>`;
  return '';
}

// 能力表の過去走（他場・中央含む）の1行表示
function nouRunHtml(r) {
  const fin = r.fin != null ? `${r.fin}着` : (r.fin_note || '?');
  return `${mmdd(r.date)} <b>${esc(r.track || '?')}</b>${esc(r.surface || '')}${r.dist || ''} ${fin}` +
    (r.f3 != null ? ` テン${r.f3.toFixed(1)}` : '') + (r.l3 != null ? ` 上${r.l3.toFixed(1)}` : '');
}
// 直近走（能力表・最新順）
function nouRuns(nouByUma, umaban, n) {
  const d = nouByUma[umaban];
  const runs = (d && d.data && d.data.runs) || [];
  return runs.slice(-n).reverse();
}

function syutubaHtml(raceMeta, entries, cyokyo, history, nouryoku) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません（day取得時に --what syutuba を含めてください）</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const nouByUma = {};
  for (const n of (nouryoku || [])) nouByUma[n.umaban] = n;

  // テン偏差=直近5走の最良値 / 指数=直近5走の平均（バックテストで平均の方が的中率が高い）
  const bestOf = (hid, fn) => {
    let best = null;
    for (const r of (history[hid] || []).slice(0, 5)) {
      const v = fn(r);
      if (v != null && (best == null || v > best)) best = v;
    }
    return best;
  };
  const meanOf = (hid, fn) => {
    const vals = (history[hid] || []).slice(0, 5).map(fn).filter((v) => v != null);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  const shisuOf = (hid) => meanOf(hid, runShisu);
  const hensachiOf = (hid) => bestOf(hid, (r) => devValue(r.f3, baseEntry(r.dist, r.going, r.cls), 'first3f'));

  const shisus = entries.map((e) => shisuOf(e.horse_id)).filter((v) => v != null).sort((a, b) => b - a);
  const top3S = shisus.slice(0, 3);
  const hensachis = entries.map((e) => hensachiOf(e.horse_id)).filter((v) => v != null).sort((a, b) => b - a);
  const topH = hensachis[0];

  // 調教偏差値: 直近追切の坂路3F最速を全期間分布で換算
  const hb = state.stats && state.stats.hanro;
  const cyoZOf = (umaban) => {
    const cyo = cyoByUma[umaban];
    if (!cyo || !hb || !hb.std) return null;
    let best = null;
    for (const w of (cyo.works || [])) {
      const t3 = w.times && w.times.t_half;
      if (t3 && (w.course || '').includes('坂')) best = best == null || t3 < best ? t3 : best;
    }
    return best == null ? null : 50 + 10 * (hb.mean - best) / hb.std;
  };
  const cyoZs = entries.map((e) => cyoZOf(e.umaban)).filter((v) => v != null).sort((a, b) => b - a);
  const topC = cyoZs[0];

  // AI予想印（学習モデル順・出馬表にも表示）
  const aiScores = new Map(entries.map((e) => [e.umaban, modelScore(e, history, raceMeta, cyoZOf(e.umaban))]));
  const aiRanked = [...aiScores.entries()].filter(([, v]) => v != null).sort((a, b) => b[1] - a[1]);
  const aiMark = new Map();
  aiRanked.forEach(([um], i) => { if (i < MARKS.length) aiMark.set(um, MARKS[i]); });
  const aiTopUma = aiRanked.length ? aiRanked[0][0] : null;
  const aiConf = aiConfidence(aiRanked.map(([, v]) => v));

  const rows = entries.map((e) => {
    const cyo = cyoByUma[e.umaban];
    const works = ((cyo && cyo.works) || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    const runs = (history[e.horse_id] || []).filter((r) => r.race_id !== raceMeta.race_id).slice(0, 3);
    const h = hensachiOf(e.horse_id);
    const s = shisuOf(e.horse_id);
    const cz = cyoZOf(e.umaban);
    return `<tr>
      <td><span class="waku w${e.waku || 1}">${e.waku ?? ''}</span></td>
      <td>${e.umaban ?? ''}</td>
      <td style="font-size:15px">${aiMark.get(e.umaban) || ''}${(e.umaban === aiTopUma && aiConf) ? `<br><span class="badge conf-${aiConf.tier}" title="◎信頼度：予測1位が2位をどれだけ引き離しているか（複勝率の目安 S81%/A73%/B65%/C62%）">${aiConf.label}</span>` : ''}</td>
      <td class="l stickyname"><a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}><b>${esc(e.horse_name)}</b></a></td>
      <td>${esc(e.sex_age)}</td>
      <td>${esc(e.genryo || '')}</td>
      <td class="l">${esc(e.jockey)}</td>
      <td class="num">${e.kinryo ?? ''}</td>
      <td class="l">${esc(e.trainer)}</td>
      <td class="num" data-live-weight="${e.umaban}">${e.body_weight ?? ''}${e.weight_diff != null ? `(${fmtDiff(e.weight_diff)})` : ''}</td>
      <td class="num" data-live-odds="${e.umaban}">${e.win_odds ?? ''}${e.pop != null ? `(${e.pop})` : ''}</td>
      <td class="num ${s != null && top3S.includes(s) ? 'best' : ''}">${s != null ? s.toFixed(1) : '-'}</td>
      <td class="num ${h != null && h === topH ? 'f1' : ''}">${h != null ? h.toFixed(1) : '-'}</td>
      <td class="num ${cz != null && cz === topC ? 'a1' : ''}">${cz != null ? cz.toFixed(1) : '-'}</td>
      <td class="small fold"><div class="kv">${runs.map(pastRunHtml).join('<br>')
        || nouRuns(nouByUma, e.umaban, 3).map((r) => nouRunHtml(r) + ' <span class="badge">能力表</span>').join('<br>')
        || '-'}</div></td>
      <td class="small fold"><div class="kv">${cyo ? `${arrowHtml(cyo.arrow)} ${esc(cyo.tanpyo || '')}<br>` : ''}${works.length ? workHtml(works[0]) : '-'}</div></td>
    </tr>`;
  }).join('');

  return raceHeaderHtml(raceMeta) + `
  <div class="card"><div style="text-align:right;margin-bottom:4px"><span id="oddsUpdated" class="badge"></span></div><div class="tablewrap">
    <table>
      <tr><th>枠</th><th>番</th><th>AI印</th>
      <th class="stickyname">馬名</th><th>性齢</th><th>減</th><th>騎手</th><th>斤量</th><th>厩舎</th><th>馬体重</th><th>単勝(人気)</th>
      <th>指数</th><th>テン偏差</th><th>調教偏差</th><th>近3走（テン3F/上り3F/脚質）</th><th>調教（最新追切）</th></tr>
      ${rows}
    </table>
  </div>
  <div class="legend"><span class="sw b"></span> 指数上位3頭（走破50%＋テン25%＋上がり25%、直近5走平均）　<span class="sw f"></span> テン偏差トップ（直近5走最良）　<span class="sw a"></span> 調教偏差トップ（直近追切の坂路3F最速を全期間分布で換算・50が平均）<br>◎の下のバッジ＝AI信頼度（予測1位と2位のスコア差・過去4年CV検証済）：<span class="badge conf-S">鉄板</span>複勝81%　<span class="badge conf-A">有力</span>73%　<span class="badge conf-B">標準</span>65%　<span class="badge conf-C">波乱</span>62%<br>近走の${TRIP_LEGEND}</div></div>`;
}

// ---- 予想サブビュー（A3: 自動印＋根拠＋妙味ゾーン） ----
const MARKS = ['◎', '○', '▲', '△', '△'];

function yosouHtml(raceMeta, entries, cyokyo, history, nouryoku) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const nouByUma = {};
  for (const n of (nouryoku || [])) nouByUma[n.umaban] = n;

  const hs = entries.map((e) => ({
    e,
    ai: modelScore(e, history, raceMeta, cyoZFromWorks(cyoByUma[e.umaban])),
    comp: metricOf(history, e.horse_id, runShisu, 'mean'),
    si: metricOf(history, e.horse_id, runSI, 'mean'),
    ten: metricOf(history, e.horse_id, (r) => devValue(r.f3, baseEntry(r.dist, r.going, r.cls), 'first3f'), 'max'),
    cz: cyoZFromWorks(cyoByUma[e.umaban]),
    kyaku: (() => {
      const ks = (history[e.horse_id] || []).slice(0, 5).map((r) => r.kyaku).filter(Boolean);
      if (!ks.length) return null;
      const cnt = {};
      for (const k of ks) cnt[k] = (cnt[k] || 0) + 1;
      return Object.entries(cnt).sort((a, b) => b[1] - a[1])[0][0];
    })(),
  }));

  // 総合スコア = レース内z値の加重和（composite45% + SI30% + 調教15% + テン10%、欠測は再配分）
  const zc = zscoresJs(hs.map((r) => r.comp));
  const zs = zscoresJs(hs.map((r) => r.si));
  const zt = zscoresJs(hs.map((r) => r.ten));
  const zy = zscoresJs(hs.map((r) => r.cz));
  hs.forEach((r, i) => {
    const parts = [[zc[i], 0.45], [zs[i], 0.30], [zy[i], 0.15], [zt[i], 0.10]].filter(([v]) => v != null);
    r.score = parts.length ? parts.reduce((s, [v, w]) => s + v * w, 0) / parts.reduce((s, [, w]) => s + w, 0) : null;
  });
  const rankOf = (key) => {
    const sorted = hs.filter((r) => r[key] != null).map((r) => r[key]).sort((a, b) => b - a);
    return (v) => (v == null ? null : sorted.indexOf(v) + 1);
  };
  const rk = { comp: rankOf('comp'), si: rankOf('si'), ten: rankOf('ten'), cz: rankOf('cz') };
  // AI予想印: 学習モデルのスコア順（モデル未取得や実績なしは総合スコアで代替）
  const markKey = hs.some((r) => r.ai != null) ? 'ai' : 'score';
  const ranked = hs.filter((r) => r[markKey] != null).sort((a, b) => b[markKey] - a[markKey]);
  ranked.forEach((r, i) => { r.mark = MARKS[i] || ''; });
  const aiVals = hs.map((r) => r.ai).filter((v) => v != null).sort((a, b) => b - a);
  const zAi = zscoresJs(hs.map((r) => r.ai));   // 表示用に偏差値化
  hs.forEach((r, i) => { r.aiDev = zAi[i] != null ? 50 + zAi[i] * 10 : null; });
  // 勝率＝レース内で標準化したAIスコア(zAi)のソフトマックス（T=0.75で較正：◎平均勝率≒実測39.8%・スケール不変）
  const zMax = Math.max(...zAi.filter((v) => v != null), 0);
  const exps = zAi.map((z) => (z != null ? Math.exp((z - zMax) / 0.75) : 0));
  const expSum = exps.reduce((s, v) => s + v, 0) || 1;
  hs.forEach((r, i) => { r.winP = zAi[i] != null ? exps[i] / expSum : null; });
  const siTop = hs.filter((r) => r.si != null).sort((a, b) => b.si - a.si)[0];
  for (const r of hs) r.myomi = siTop && r === siTop && r.e.pop != null && r.e.pop >= 4;

  // EVモニター用に保存: AI◎×単勝5-10倍×EV≥1.5（全年WF検証 2024:130%/2025:112%/2026:100%・計119.7%）
  const evTop = markKey === 'ai' && ranked.length ? ranked[0] : null;
  state.evWatch = (evTop && evTop.winP != null)
    ? { rid: raceMeta.race_id || state.raceId, um: evTop.e.umaban, name: evTop.e.horse_name, p: evTop.winP }
    : null;

  // 直近の馬場傾向（過去3開催日）
  const bd = (state.stats && state.stats.bias_daily) || {};
  const recentBias = Object.keys(bd).sort().reverse().slice(0, 3)
    .map((d) => `${d.slice(5)}: <b>${bd[d].label}</b>(${bd[d].rel > 0 ? '+' : ''}${bd[d].rel})`).join('　');

  const disp = hs.slice().sort((a, b) => (b[markKey] ?? -99) - (a[markKey] ?? -99));
  const rows = disp.map((r) => {
    const e = r.e;
    let konkyo = [
      r.comp != null ? `指数${rk.comp(r.comp)}位` : null,
      r.si != null ? `SI${rk.si(r.si)}位` : null,
      r.cz != null ? `調教${rk.cz(r.cz)}位` : null,
      r.ten != null ? `テン${rk.ten(r.ten)}位` : null,
      r.kyaku,
    ].filter(Boolean).join('・');
    if (r.comp == null && r.si == null) {
      const nr = nouRuns(nouByUma, e.umaban, 1)[0];
      konkyo = nr ? `門別実績なし（前走: ${nouRunHtml(nr).replace(/<[^>]+>/g, '')}）` : (konkyo || '実績なし');
    }
    return `<tr>
      <td style="font-size:16px">${r.mark || ''}</td>
      <td><span class="waku w${e.waku || 1}">${e.waku ?? ''}</span></td>
      <td>${e.umaban ?? ''}</td>
      <td class="l stickyname"><a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}><b>${esc(e.horse_name)}</b></a></td>
      <td class="num ${r.mark === '◎' ? 'best' : ''}">${r.aiDev != null ? r.aiDev.toFixed(1) : '-'}</td>
      <td class="num ${r.mark === '◎' ? 'best' : ''}">${r.winP != null ? (r.winP * 100).toFixed(0) + '%' : '-'}</td>
      <td class="num">${r.score != null ? (50 + r.score * 10).toFixed(1) : '-'}</td>
      <td class="num">${r.si != null ? r.si.toFixed(0) : '-'}</td>
      <td class="num">${r.cz != null ? r.cz.toFixed(1) : '-'}</td>
      <td class="num" data-live-odds="${e.umaban}">${e.win_odds ?? '-'}${e.pop != null ? `(${e.pop})` : ''}</td>
      <td>${r.myomi ? '💰' : ''}</td>
      <td class="small fold"><span class="kv">${esc(konkyo)}</span></td>
    </tr>`;
  }).join('');

  return raceHeaderHtml(raceMeta) + `
  <div class="note">直近の馬場: ${recentBias || 'データなし'}　印は学習モデル（勝ちやすさ）順。　<span id="oddsUpdated" class="badge"></span></div>
  <div id="evMonitor" class="note" hidden></div>
  <div class="card"><div class="tablewrap">
    <table>
      <tr><th>AI印</th><th>枠</th><th>番</th><th class="stickyname">馬名</th><th>AI予測</th><th>勝率</th><th>総合</th><th>SI</th><th>調教</th><th>単勝(人気)</th><th>妙味</th><th>根拠</th></tr>
      ${rows}
    </table>
  </div>
  <div class="legend"><b>AI印・AI予測</b>＝学習モデル（リッジ回帰・v2馬場差補正）の勝ちやすさ。検証（後半908R）で◎勝率40.6%・複勝率73.5%（従来指数35.8%・67.2%を上回る）。指数も馬場差・斤量・ペース補正済み。<b>勝率</b>＝スコアから推定した各馬の単勝的中確率（過去4年で較正・全馬合計100%）。総合＝指数/SI/調教/テンの加重。💰＝スピード指数1位×4番人気以下（回収率108%）。</div></div>`;
}

// レース単位の調教ビュー（各馬の最新坂路追切・ラップ判定・調教偏差順）
function cyokyoRaceHtml(raceMeta, entries, cyokyo, history) {
  if (!entries.length) return raceHeaderHtml(raceMeta) + '<div class="empty">出馬表データがありません</div>';
  const cyoByUma = {};
  for (const c of cyokyo) cyoByUma[c.umaban] = c;
  const hb = state.stats && state.stats.hanro;
  const hensachi = (t3) => (hb && hb.std && t3 != null ? 50 + 10 * (hb.mean - t3) / hb.std : null);
  const cyoZOf = (um) => cyoZFromWorks(cyoByUma[um]);
  const aiRanked = entries.map((e) => [e.umaban, modelScore(e, history, raceMeta, cyoZOf(e.umaban))])
    .filter(([, v]) => v != null).sort((a, b) => b[1] - a[1]);
  const aiMark = new Map();
  aiRanked.forEach(([um], i) => { if (i < MARKS.length) aiMark.set(um, MARKS[i]); });
  const latestHanro = (c) => {
    if (!c) return null;
    const hh = (c.works || []).filter((w) => (w.course || '').includes('坂') && (w.times || {}).t_half != null);
    hh.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    return hh[0] || null;
  };
  const rows = entries.map((e) => {
    const c = cyoByUma[e.umaban];
    const w = latestHanro(c);
    const t = (w && w.times) || {};
    const z = hensachi(t.t_half);
    return { e, w, t, mark: aiMark.get(e.umaban) || '', best: cyoZOf(e.umaban),
      lap: w ? hanroLapCells(t.t_5f, t.t_half, t.t_3f, t.t_1f, z) : { str: '', tag: '' },
      arrow: c ? c.arrow : null, tanpyo: c ? c.tanpyo : null };
  }).sort((a, b) => (b.best ?? -99) - (a.best ?? -99));
  const body = rows.map((r) => {
    const e = r.e, t = r.t;
    return `<tr>
      <td style="font-size:15px">${r.mark}</td>
      <td><span class="waku w${e.waku || 1}">${e.waku ?? ''}</span></td>
      <td>${e.umaban ?? ''}</td>
      <td class="l"><a class="horse-link" ${e.horse_id ? `data-hid="${esc(e.horse_id)}"` : `data-horse="${esc(e.horse_name)}"`}><b>${esc(e.horse_name)}</b></a></td>
      <td class="num ${r.mark === '◎' ? 'best' : ''}">${r.best != null ? r.best.toFixed(1) : '-'}</td>
      <td>${r.w ? mmdd(r.w.date) : ''}</td>
      <td>${r.w ? esc(r.w.course) : '<span class="sub">追切なし</span>'}</td>
      <td class="num">${t.t_5f != null ? t.t_5f.toFixed(1) : ''}</td>
      <td class="num">${t.t_half != null ? t.t_half.toFixed(1) : ''}</td>
      <td class="num">${t.t_3f != null ? t.t_3f.toFixed(1) : ''}</td>
      <td class="num">${t.t_1f != null ? t.t_1f.toFixed(1) : ''}</td>
      <td class="small l">${r.lap.str}${r.lap.tag}</td>
      <td class="small l">${arrowHtml(r.arrow)} ${esc(r.tanpyo || '')}</td>
    </tr>`;
  }).join('');
  return raceHeaderHtml(raceMeta) + `
  <div class="note">各馬の最新の坂路追切（調教偏差の良い順）。AI印は学習モデル順。馬名クリックで全調教履歴。</div>
  <div class="card tablewrap"><table>
    <tr><th>AI印</th><th>枠</th><th>番</th><th>馬名</th><th>調教偏差</th><th>追切日</th><th>コース</th><th>4F</th><th>3F</th><th>2F</th><th>1F</th><th>ラップ(200m毎)</th><th>短評</th></tr>
    ${body}
  </table>
  <div class="legend">調教偏差＝坂路3F最速の偏差値（50が平均）。ラップは200m毎・<span class="badge conf-S">加速</span>尻上がり／<span class="badge conf-C">失速</span>終い掛かる／<span class="badge conf-S">🔥好走</span>偏差値60+×加速（実測複勝59%）。</div></div>`;
}

// ---- リアルタイムオッズ（keiba.go.jp・門別=馬場コード36、Workerプロキシ経由でCORS回避）----
const ODDS_PROXY = 'https://keiba-proxydeploy.maguronagareboshi.workers.dev/?url=';
const jstToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

async function fetchLiveOdds(raceDate, raceNo) {
  if (!raceDate || !raceNo) return null;
  const url = `https://www.keiba.go.jp/KeibaWeb/TodayRaceInfo/OddsTanFuku?k_raceDate=${raceDate.replace(/-/g, '/')}&k_raceNo=${raceNo}&k_babaCode=36`;
  try {
    const html = await (await fetch(ODDS_PROXY + encodeURIComponent(url))).text();
    if (html.indexOf('odd_popular_table_02') < 0) return null;
    const m = html.match(/odd_popular_table_02[\s\S]*?<tbody>([\s\S]*?)<\/tbody>/);
    const body = m ? m[1] : '';
    const odds = {};
    for (const tr of (body.match(/<tr[^>]*>[\s\S]*?<\/tr>/g) || [])) {
      const tds = [...tr.matchAll(/<td[^>]*>([\s\S]*?)<\/td>/g)].map((x) => x[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim());
      if (tds.length < 4) continue;
      const uma = parseInt(tds[1]), o = parseFloat(tds[3]);
      if (uma >= 1 && uma <= 20 && o > 0) odds[uma] = o;
    }
    if (!Object.keys(odds).length) return null;
    const pop = {};
    Object.entries(odds).sort((a, b) => a[1] - b[1]).forEach(([um], i) => { pop[um] = i + 1; });
    const pm = html.match(/(\d{1,2}):(\d{2})\s*発走/);
    return { odds, pop, postTime: pm ? `${pm[1]}:${pm[2]}` : null };
  } catch (e) { return null; }
}

// 当日馬体重（keiba.go.jp 出走表 DebaTable）。計量発表後（発走60〜70分前頃）に値が入る。
// モデルには使わない（体重変化は全量検定で無価値と確定）・表示のみ。
async function fetchLiveWeights(raceDate, raceNo) {
  if (!raceDate || !raceNo) return null;
  const url = `https://www.keiba.go.jp/KeibaWeb/TodayRaceInfo/DebaTable?k_raceDate=${raceDate.replace(/-/g, '/')}&k_raceNo=${raceNo}&k_babaCode=36`;
  try {
    const html = await (await fetch(ODDS_PROXY + encodeURIComponent(url))).text();
    if (html.indexOf('horseNum') < 0) return null;
    const out = {};
    const re = /class="horseNum"[^>]*>\s*(\d+)\s*<\/td>[\s\S]*?class="odds_weight"[^>]*>[\s\S]*?<\/td>\s*[\s\S]*?class="odds_weight"[^>]*>([\s\S]*?)<\/td>/g;
    let m;
    while ((m = re.exec(html))) {
      const um = +m[1];
      const cell = m[2].replace(/<[^>]+>/g, ' ');
      const wm = cell.match(/(\d{3})/), dm = cell.match(/\(([-+±]?\d+)\)/);
      if (um >= 1 && um <= 20 && wm && +wm[1] >= 300 && +wm[1] <= 650) {
        out[um] = { w: +wm[1], d: dm ? dm[1] : null };
      }
    }
    return Object.keys(out).length ? out : null;
  } catch (e) { return null; }
}

function applyLiveWeights(wts) {
  if (!wts) return;
  for (const td of document.querySelectorAll('#raceView [data-live-weight]')) {
    const v = wts[+td.dataset.liveWeight];
    if (v) td.textContent = `${v.w}${v.d != null ? `(${v.d})` : ''}`;
  }
}

function applyLiveOdds(live) {
  if (!live) return;
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const o = live.odds[+td.dataset.liveOdds], p = live.pop[+td.dataset.liveOdds];
    td.textContent = o != null ? `${o}${p ? `(${p})` : ''}` : '-';
  }
  const n = new Date(), badge = $('oddsUpdated');
  if (badge) badge.textContent = `🔴ライブ ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}更新${live.postTime ? `（発走${live.postTime}）` : ''}`;
  updateEvMonitor(live.odds);
}

// EVモニター: AI◎×単勝5-10倍×EV≥1.5 のみ買い（全年ウォークフォワードで
// 2024:130.0% / 2025:112.1% / 2026:100.0%・計195賭119.7%。t=1.07なので前向き検証中の扱い）
function updateEvMonitor(oddsMap) {
  const el = $('evMonitor');
  const w = state.evWatch;
  if (!el || !w || w.rid !== state.raceId) { if (el) el.hidden = true; return; }
  const o = oddsMap ? oddsMap[w.um] : null;
  if (!o) { el.hidden = true; return; }
  const ev = w.p * o;
  const hit = o >= 5 && o < 10 && ev >= 1.5;
  el.hidden = false;
  el.className = hit ? 'note ev-hit' : 'note ev-idle';
  el.innerHTML = hit
    ? `💰 <b>EV買いシグナル</b>: ◎${w.um}番 ${esc(w.name)}　単勝${o}倍 × AI勝率${(w.p * 100).toFixed(0)}% = <b>EV ${ev.toFixed(2)}</b>　（検証済ゾーン: 5-10倍×EV≥1.5・全年回収100%超）`
    : `EV監視: ◎${w.um}番 ${esc(w.name)}　現在${o}倍 EV ${ev.toFixed(2)}　→ 買い条件は単勝5-10倍×EV≥1.5${(o < 5 || o >= 10) ? '（オッズ帯外）' : '（EV不足）'}`;
}

function recordOdds(rid, live) {
  if (!live) return;
  state.oddsHist = state.oddsHist || {};
  const hist = state.oddsHist[rid] = state.oddsHist[rid] || {};
  const n = new Date(), ts = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}`;
  for (const [um, o] of Object.entries(live.odds)) {
    const arr = hist[um] = hist[um] || [];
    if (!arr.length || arr[arr.length - 1].o !== o) arr.push({ t: ts, o });   // 変化した時だけ点を追加
  }
  saveOddsHist();   // リロードしても消えないよう都度保存
}

// ---- オッズ推移の永続化（リロードで消える問題の対策） ----
// localStorage（このブラウザで見ていた分）＋ Supabase記録（5分おきの自動スナップショット）を
// マージして復元する。日付が変わったら自動破棄。
const ODDS_STORE_KEY = 'mb_odds_hist_v1';
function saveOddsHist() {
  try {
    if (state.oddsDate) localStorage.setItem(ODDS_STORE_KEY, JSON.stringify({ d: state.oddsDate, h: state.oddsHist || {} }));
  } catch (e) { /* 容量超過等は無視（表示は生きる） */ }
}
function loadOddsHist(rd) {
  try {
    const j = JSON.parse(localStorage.getItem(ODDS_STORE_KEY) || 'null');
    if (j && j.d === rd && j.h) return j.h;
  } catch (e) { /* 壊れていたら無視 */ }
  return null;
}
// 時刻順マージ（'朝'は先頭扱い・同オッズの連続は1点に圧縮）
function mergeOddsSeries(a, b) {
  const keyT = (x) => (x.t === '朝' ? '00:00' : x.t);
  const all = [...(a || []), ...(b || [])].sort((x, y) => (keyT(x) < keyT(y) ? -1 : keyT(x) > keyT(y) ? 1 : 0));
  const out = [];
  for (const p of all) {
    const last = out[out.length - 1];
    if (last && last.o === p.o) continue;
    if (last && last.t === p.t && last.o === p.o) continue;
    out.push(p);
  }
  return out;
}

// 記録済みスナップショット（monbetsu_odds・5分おき自動記録）を取り込む。
// 発走間際に開いても・リロードしても、朝→現在の流れが復元される。未記録なら無害にスキップ。
async function seedRecordedOdds(rd, raceNo, hist) {
  try {
    const rows = await sbGet(`monbetsu_odds?race_date=eq.${rd}&race_no=eq.${raceNo}&order=captured_at.asc&select=uma_ban,odds,captured_at`);
    const srv = {};
    for (const r of rows || []) {
      if (r.odds == null) continue;
      const um = String(r.uma_ban), d = new Date(r.captured_at);
      const t = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
      (srv[um] = srv[um] || []).push({ t, o: r.odds });
    }
    for (const um in srv) hist[um] = mergeOddsSeries(hist[um], srv[um]);
  } catch (e) { /* テーブル未作成/未記録なら朝＋ライブのみで動作 */ }
}

async function startLiveOdds(raceMeta) {
  clearInterval(state.oddsTimer); state.oddsTimer = null;
  const rd = raceMeta.race_date || raceMeta.date;
  if (rd !== jstToday() || !(state.sub === 'yosou' || state.sub === 'syutuba')) return;
  const rid = raceMeta.race_id || state.raceId;
  state.oddsDate = rd;
  // ① 前回このブラウザで見ていた推移を復元（リロードで消えない）
  state.oddsHist = state.oddsHist || {};
  const stored = loadOddsHist(rd);
  if (stored) {
    for (const srid in stored) {
      const cur = state.oddsHist[srid] = state.oddsHist[srid] || {};
      for (const um in stored[srid]) {
        if (!cur[um] || cur[um].length < stored[srid][um].length) cur[um] = stored[srid][um];
      }
    }
  }
  const hist = state.oddsHist[rid] = state.oddsHist[rid] || {};
  // ② 朝オッズ（Supabase値）を推移の起点として記録
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const um = td.dataset.liveOdds, o = parseFloat(td.textContent);
    if (!hist[um] && !isNaN(o)) hist[um] = [{ t: '朝', o }];
  }
  // ③ 5分おきの自動スナップショット（Supabase記録）をマージ＝別端末で開いても流れが出る
  await seedRecordedOdds(rd, raceMeta.race_no, hist);
  saveOddsHist();
  // EVモニター初期判定（朝オッズベース。以後はライブ更新毎に再判定）
  const domOdds = {};
  for (const td of document.querySelectorAll('#raceView [data-live-odds]')) {
    const o = parseFloat(td.textContent);
    if (!isNaN(o)) domOdds[td.dataset.liveOdds] = o;
  }
  updateEvMonitor(domOdds);
  const run = async () => {
    const live = await fetchLiveOdds(rd, raceMeta.race_no);
    // 当日馬体重: 計量発表まで毎回試行→取れたら保持（変わらないので再取得しない）
    state.liveWeights = state.liveWeights || {};
    if (!state.liveWeights[rid]) {
      const wts = await fetchLiveWeights(rd, raceMeta.race_no);
      if (wts) state.liveWeights[rid] = wts;
    }
    if (state.raceId === rid && state.view === 'race') {
      applyLiveOdds(live); applyLiveWeights(state.liveWeights[rid]); recordOdds(rid, live);
    }
  };
  await run();
  state.oddsTimer = setInterval(run, 60000);
}

// オッズ推移ポップアップ（クリックしたセルの馬の 朝→現在 の変化をミニグラフ表示）
function showOddsFlow(um, anchor) {
  const arr = ((state.oddsHist || {})[state.raceId] || {})[um] || [];
  let pop = $('oddsFlowPop');
  if (!pop) { pop = document.createElement('div'); pop.id = 'oddsFlowPop'; pop.hidden = true; document.body.appendChild(pop); }
  if (arr.length < 2) { pop.innerHTML = `<b>${um}番</b> 推移データ蓄積中（この画面を開いたまま60秒毎に記録）`; }
  else {
    const os = arr.map((x) => x.o), mn = Math.min(...os), mx = Math.max(...os), W = 180, H = 44;
    const pts = arr.map((x, i) => `${(i / Math.max(arr.length - 1, 1)) * W},${(mx === mn ? H / 2 : H - 4 - (x.o - mn) / (mx - mn) * (H - 8))}`).join(' ');
    const first = os[0], last = os[os.length - 1];
    const trend = last < first * 0.92 ? '<b class="arrow-up">▼人気上昇（妙味減）</b>' : last > first * 1.08 ? '<b class="bias-front">▲人気低下（妙味増）</b>' : '→ ほぼ変わらず';
    pop.innerHTML = `<b>${um}番 単勝オッズ推移</b> ${trend}<br>
      <svg width="${W}" height="${H}" style="margin:3px 0"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/></svg>
      <div class="small">${arr.map((x) => `${x.t} <b>${x.o}</b>`).join(' → ')}</div>`;
  }
  const r = anchor.getBoundingClientRect();
  pop.style.left = `${Math.min(r.left, window.innerWidth - 220)}px`;
  pop.style.top = `${r.bottom + window.scrollY + 4}px`;
  pop.hidden = false;
}

async function renderRaceView() {
  clearInterval(state.oddsTimer); state.oddsTimer = null;
  $('raceView').innerHTML = '<div class="empty">読み込み中…</div>';
  const raceId = state.raceId;
  if (state.sub === 'sim') {   // このレースの展開シミュレータを埋め込み表示
    $('raceView').innerHTML = `<div class="card" style="padding:0;overflow:hidden;border-radius:8px">
      <iframe src="simulator.html?race=${encodeURIComponent(raceId)}&embed=1" style="width:100%;height:920px;border:0;display:block" title="展開シミュレータ" loading="lazy"></iframe></div>
      <div class="note">このレースの展開シミュレータ（テン3F/上がり実績で隊列・伸びを再現・1000回モンテカルロで勝率/複勝率/EV）。全画面は上部の🎲シミュレータから。</div>`;
    return;
  }
  try {
    if (state.sub === 'seiseki') {
      const data = await state.provider.loadRace(raceId);
      if (!(data.results || []).length && state.sub === 'seiseki') {
        state.sub = 'syutuba';  // 未発走レースは出馬表へ
        renderSubTabs();
        return renderRaceView();
      }
      // 成績表にもAI印（レース前情報のみで再現）
      if (state.statsPromise) await state.statsPromise;
      const ids = data.results.map((r) => r.horse_id).filter(Boolean);
      const tgtDate = data.race.race_date || data.race.date || state.date;
      const raw = await state.provider.loadHistory(ids);
      const hist = {};
      for (const id in raw) hist[id] = raw[id].filter((r) => !r.date || !tgtDate || r.date < tgtDate);
      const scored = data.results.filter((r) => r.horse_id)
        .map((r) => [r.umaban, modelScore(r, hist, data.race)]).filter(([, v]) => v != null)
        .sort((a, b) => b[1] - a[1]);
      const aiMark = new Map();
      scored.forEach(([um], i) => { if (i < MARKS.length) aiMark.set(um, MARKS[i]); });
      $('raceView').innerHTML = seisekiHtml(data, aiMark);
    } else {
      const meta = (state.dates[state.date] || []).find((r) => r.race_id === raceId) || {};
      const [raceData, entries, cyokyo, nouryoku] = await Promise.all([
        state.provider.loadRace(raceId),
        state.provider.loadEntries(raceId),
        state.provider.loadCyokyo(raceId),
        state.provider.loadNouryoku(raceId),
      ]);
      const raceMeta = Object.keys(raceData.race || {}).length > 1 ? raceData.race : { ...meta, date: state.date };
      const ids = entries.map((e) => e.horse_id).filter(Boolean);
      const rawHistory = await state.provider.loadHistory(ids);
      // 振り返り防止: このレースの日付以降の走りは予想に使わない（未来予想には影響なし）
      const tgtDate = raceMeta.date || raceMeta.race_date || state.date;
      const history = {};
      for (const id in rawHistory) history[id] = rawHistory[id].filter((r) => !r.date || !tgtDate || r.date < tgtDate);
      if (state.statsPromise) await state.statsPromise;  // 指数計算に基準タイムが要る
      $('raceView').innerHTML = state.sub === 'yosou'
        ? yosouHtml(raceMeta, entries, cyokyo, history, nouryoku)
        : state.sub === 'cyokyo'
          ? cyokyoRaceHtml(raceMeta, entries, cyokyo, history)
          : syutubaHtml(raceMeta, entries, cyokyo, history, nouryoku);
      startLiveOdds(raceMeta);   // 当日レースは現在オッズをライブ取得・自動更新
    }
  } catch (e) {
    $('raceView').innerHTML = `<div class="empty">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

function analysisHtml(st) {
  if (!st) return '<div class="empty">統計データがありません（scraper/build_stats.py --push を実行してください）</div>';
  const rateBar = (r) => `${(r * 100).toFixed(1)}%`;

  // 馬場バイアス（直近20日・門別平均との相対値）＋4角位置バイアス
  const dates = Object.keys(st.bias_daily).sort().reverse().slice(0, 20);
  const fmtDev = (v) => (v == null ? '-' : `${v > 0 ? '+' : ''}${v.toFixed(2)}`);
  const c4d = st.corner4_daily || {};
  const c4label = (v) => (v == null ? '-' : v >= 0.15 ? '内有利' : v <= -0.15 ? '外有利' : 'フラット');
  const biasRows = dates.map((d) => {
    const b = st.bias_daily[d];
    const cls = b.label === '前有利' ? 'bias-front' : b.label === '差し有利' ? 'bias-back' : '';
    const c4 = c4d[d];
    const c4cls = c4 == null ? '' : c4 >= 0.15 ? 'bias-back' : c4 <= -0.15 ? 'bias-front' : '';
    const kk = ['逃げ', '先行', '差し', '追込'].map((k) =>
      b.kyaku[k] ? `<td class="num">${rateBar(b.kyaku[k].rate)} <span class="kyaku">${b.kyaku[k].top3}/${b.kyaku[k].n}</span></td>` : '<td>-</td>').join('');
    return `<tr><td>${d}</td><td class="${cls}">${b.label}</td>
      <td class="num">${b.rel != null ? (b.rel > 0 ? '+' : '') + b.rel : '-'}</td>
      <td class="${c4cls}">${c4label(c4)}${c4 != null ? `<span class="kyaku">${fmtDev(c4)}</span>` : ''}</td>
      <td class="num">${fmtDev(b.agari3_dev)}</td>
      <td class="num">${fmtDev(b.agari4_dev)}</td>${kk}</tr>`;
  }).join('');

  // ペース×脚質（内回り1500-1600と外回り1700は分割）
  const bands = ['1000', '1100', '1200', '1500-1600内', '1700外', '1800+'];
  const paces = ['ハイ', 'ミドル', 'スロー'];
  const kyakus = ['逃げ', '先行', '差し', '追込'];
  const pkTables = bands.map((band) => {
    const rows = paces.map((p) => {
      const cells = kyakus.map((k) => {
        const e = st.pace_kyaku[`${band}|${p}|${k}`];
        return e ? `<td class="num">${rateBar(e.rate)} <span class="kyaku">${e.n}</span></td>` : '<td>-</td>';
      }).join('');
      return `<tr><td>${p}</td>${cells}</tr>`;
    }).join('');
    return `<div><h3 class="sec">${band}m ペース×脚質（複勝率）</h3><div class="card tablewrap"><table>
      <tr><th>ペース</th>${kyakus.map((k) => `<th>${k}</th>`).join('')}</tr>${rows}</table></div></div>`;
  }).join('');

  // 枠別成績（距離帯別 複勝率）
  const ws = st.waku_stats || {};
  const wakuRows = bands.map((band) => {
    const cells = [];
    for (let w = 1; w <= 8; w++) {
      const e = ws[`${band}|${w}`];
      if (!e) { cells.push('<td>-</td>'); continue; }
      const rates = [];
      for (let x = 1; x <= 8; x++) if (ws[`${band}|${x}`]) rates.push(ws[`${band}|${x}`].rate);
      const mean = rates.reduce((s, v) => s + v, 0) / rates.length;
      const cls = e.rate >= mean + 0.03 ? 'bias-back' : e.rate <= mean - 0.03 ? 'bias-front' : '';
      cells.push(`<td class="num ${cls}">${rateBar(e.rate)} <span class="kyaku">${e.n}</span></td>`);
    }
    return `<tr><td>${band}m</td>${cells.join('')}</tr>`;
  }).join('');
  const wakuTable = `<h3 class="sec">枠別成績（距離帯×枠番・複勝率）</h3>
    <div class="card tablewrap"><table>
      <tr><th>距離</th>${[1, 2, 3, 4, 5, 6, 7, 8].map((w) => `<th>${w}枠</th>`).join('')}</tr>${wakuRows}
    </table><div class="legend">青=その距離で平均+3%以上有利／オレンジ=平均-3%以上不利。門別1000mは内枠不利の傾向。</div></div>`;

  // 血統別成績（父の門別複勝率・砂適性・馬場別・距離帯別）
  const sst = st.sire_stats || {};
  const bandOrder = ['1000', '1100', '1200', '15-16', '1700', '1800+'];
  const pct = (v) => v == null ? '-' : `${Math.round(v * 100)}%`;
  // 延長/短縮は標本20走以上のときだけ数値表示（少数のブレを出さない）
  const pctN = (v, n) => (v == null || !n || n < 20) ? '-' : `${Math.round(v * 100)}%`;
  const pedRow = (type) => ([name, e]) => {
    const bd = bandOrder.filter((b) => e.bands[b]).map((b) => `${b.replace('15-16', '1500/1600')}:${pct(e.bands[b].rate)}`).join('　');
    return `<tr><td class="l stickyname"><a class="pedname" data-pt="${type}" data-pn="${esc(name)}" style="cursor:pointer;color:var(--accent);text-decoration:underline">${esc(name)}</a></td><td class="num">${e.n}</td>
      <td class="num">${pct(e.win)}</td><td class="num">${rateBar(e.rate)}</td>
      <td class="num">${pct(e.good)}</td><td class="num">${pct(e.omo)}</td>
      <td class="num">${pctN(e.ext, e.ext_n)}</td><td class="num">${pctN(e.sht, e.sht_n)}</td>
      <td class="small l fold"><span class="kv">${bd}</span></td></tr>`;
  };
  // 父・母父共通の血統成績テーブル（母父=broodmare sire で母系の適性も掘る）。名タップで産駒一覧。
  const pedTable = (label, type, statsObj, note) => {
    const list = Object.entries(statsObj || {}).filter(([, e]) => e.n >= 25).sort((a, b) => (b[1].rate || 0) - (a[1].rate || 0));
    if (!list.length) return '';
    return `<h3 class="sec">${label}別成績（門別成績／複勝率順・25走以上・${label}名タップで産駒一覧）</h3>
    <div class="card tablewrap"><table>
      <tr><th class="stickyname">${label}</th><th>出走</th><th>勝率</th><th>複勝率</th><th>良</th><th>重</th><th>延長</th><th>短縮</th><th>距離帯別 複勝率</th></tr>
      ${list.slice(0, 30).map(pedRow(type)).join('')}
    </table><div class="legend">${note}</div></div>`;
  };
  const sireTable = pedTable('父', 'sire', sst, `勝率＝1着率／複勝率＝3着内率。良と重で差がある父、距離帯で得意不得意がある父も。<b>延長</b>＝前走より距離を伸ばした時／<b>短縮</b>＝縮めた時の複勝率（20走以上のみ表示）。AI予想にも <b>sire_rate</b>（父の砂適性）として反映済み。`);
  const bmsTable = pedTable('母父', 'bms', st.bms_stats, `<b>母父（母の父＝ブルードメアサイアー）</b>別の門別成績。父だけでなく母系の砂適性・距離適性が見えます。名前が短いのは競馬ブック表記の略称（例: Elusive→Elusive Quality）。父と母父の両面で買い材料を掘れます。`);

  // 基準タイム（クラス別。'全'はフォールバック用なので非表示）
  const clsOrder = { '2歳': 0, '3歳': 1, '3歳以上': 2 };
  // 走破タイムを秒→分秒(M:SS.s)へ（例 73.9→1:13.9）。門別は全て60秒超。
  const mmss = (s) => { if (s == null) return '-'; const m = Math.floor(s / 60); return `${m}:${(s - m * 60).toFixed(1).padStart(4, '0')}`; };
  // クラス別(2歳限定/3歳限定/3歳以上)にセクション分け・馬場は良/重系を横並び
  const clsLabel = { '2歳': '2歳限定', '3歳': '3歳限定' };
  const btByClass = ['2歳', '3歳'].map((cls) => {
    const dists = [...new Set(Object.keys(st.base_times)
      .filter((k) => { const p = k.split('_'); return p[2] === cls; })
      .map((k) => +k.split('_')[0]))].sort((a, b) => a - b);
    if (!dists.length) return '';
    const bt = (d, g) => st.base_times[`${d}_${g}_${cls}`];
    const rows = dists.map((d) => {
      const eR = bt(d, '良'), eH = bt(d, '重系');
      const cell = (e) => e && e.time ? `<b>${mmss(e.time.mean)}</b> <span class="small" style="opacity:.7">±${e.time.std.toFixed(1)}</span>` : '-';
      const seg = (e, fld) => e && e[fld] ? e[fld].mean.toFixed(1) : '-';
      return `<tr><td><b>${d}m</b></td>
        <td class="num">${cell(eR)}</td><td class="num">${cell(eH)}</td>
        <td class="num small">${seg(eR, 'first3f')} / ${seg(eR, 'last3f')}</td>
        <td class="num">${eR && eR.time ? eR.time.n : ''}${eH && eH.time ? '+' + eH.time.n : ''}</td></tr>`;
    }).join('');
    return `<h4 class="sec" style="margin:12px 0 4px;font-size:14px">${clsLabel[cls]}</h4>
      <div class="card tablewrap"><table>
      <tr><th>距離</th><th>走破タイム(良)</th><th>走破タイム(重系)</th><th>良の前半3F/上り3F</th><th>N(良+重)</th></tr>${rows}</table></div>`;
  }).join('');
  // 3歳以上(古馬)はクラス別マトリクス（C4とA級を混ぜない）。行=距離・列=クラス・走破タイム(良)平均
  const koba = st.base_times_koba || {};
  const presentCls = new Set(Object.keys(koba).map((k) => k.split('_')[2]));
  const kobaCls = ['C4', 'C3', 'C2', 'C1', 'B', 'A', 'OP'].filter((c) => presentCls.has(c));
  const kobaDists = [...new Set(Object.keys(koba).map((k) => +k.split('_')[0]))].sort((a, b) => a - b);
  const kobaMatrix = (kobaDists.length && kobaCls.length) ? `<h4 class="sec" style="margin:12px 0 4px;font-size:14px">3歳以上（クラス別・走破タイム 良の平均）</h4>
    <div class="card tablewrap"><table>
      <tr><th>距離</th>${kobaCls.map((c) => `<th>${c}</th>`).join('')}</tr>
      ${kobaDists.map((d) => `<tr><td><b>${d}m</b></td>${kobaCls.map((c) => {
        const e = koba[`${d}_良_${c}`];
        return e && e.time ? `<td class="num"><b>${mmss(e.time.mean)}</b><br><span class="small" style="opacity:.6">n${e.time.n}</span></td>` : '<td class="num" style="opacity:.4">-</td>';
      }).join('')}</tr>`).join('')}
    </table><div class="legend">古馬戦を<b>実クラス（C4〜A・オープン）で分けた</b>走破タイム(良)の平均。C4とA級を混ぜないのでクラス毎の時計水準が分かる（右ほど上位＝速い）。空欄はサンプル不足。母数の少ないB/A/OPは別定・ハンデ混在で振れます。</div></div>` : '';

  // 騎手・厩舎（勝率順）
  const rankTable = (obj, label) => {
    const rows = Object.entries(obj).sort((a, b) => b[1].win_rate - a[1].win_rate).slice(0, 30)
      .map(([n, e], i) => `<tr><td>${i + 1}</td><td class="l">${esc(n)}</td><td class="num">${e.starts}</td>
        <td class="num">${e.wins}</td><td class="num">${rateBar(e.win_rate)}</td><td class="num">${rateBar(e.top3_rate)}</td></tr>`).join('');
    return `<div><h3 class="sec">${label}（勝率順・10走以上）</h3><div class="card tablewrap"><table>
      <tr><th>#</th><th>${label}</th><th>騎乗/出走</th><th>勝利</th><th>勝率</th><th>複勝率</th></tr>${rows}</table></div></div>`;
  };

  return `
  <div class="note">対象: ${st.n_races}レース（〜${esc(st.generated)}）。前残り度は「その日の(前複勝率−後複勝率) − 門別平均ギャップ${st.overall_gap != null ? `(+${st.overall_gap})` : ''}」の相対値。上がり偏差は基準タイム比（負＝上がりが速い＝差しが利く馬場）。</div>
  <h3 class="sec">開催日ごとの馬場バイアス（直近20日・門別平均との相対評価）</h3>
  <div class="card tablewrap"><table>
    <tr><th>開催日</th><th>判定</th><th>前残り度<br>(対平均)</th><th>4角<br>位置</th><th>勝ち馬<br>上がり3F偏差</th><th>レース<br>上がり4F偏差</th><th>逃げ</th><th>先行</th><th>差し</th><th>追込</th></tr>
    ${biasRows}
  </table></div>
  <div class="grid2">${pkTables}</div>
  ${wakuTable}
  ${sireTable}
  ${bmsTable}
  <h3 class="sec">基準タイム（クラス別・走破タイムは分秒の平均。偏差値/指数の土台）</h3>
  ${btByClass}
  ${kobaMatrix}
  <div class="grid2">${rankTable(st.jockeys, '騎手')}${rankTable(st.trainers, '厩舎')}</div>`;
}

async function renderAnalysis() {
  if (state.statsPromise) await state.statsPromise;
  if (state.record === undefined) state.record = await loadRecord();
  $('analysisRoot').innerHTML = recordHtml(state.record) + analysisHtml(state.stats);
}
